  - id: q29
    type: SHORT
    topic: Relationships
    marks: 3
    question: Describe how to determine the owning side in a one-to-many bidirectional relationship.
    correct: >-
      The owning side is the MANY side — it uses @ManyToOne + @JoinColumn (holds the foreign key). The ONE side uses
      @OneToMany(mappedBy="ownerField") and is the inverse side. The JPA provider only consults the owning side for
      persistence; the inverse is for Java object graph navigation.
    rationale: >-
      Key terms: MANY side owns, @ManyToOne, @JoinColumn, FK, inverse side uses mappedBy. Common mistake:
      putting @JoinColumn on the ONE side. mappedBy value = FIELD name on owning side, not class name.
  - id: q30
    type: SHORT
    topic: Inheritance
    marks: 3
    question: What are the three ways to map an inheritance hierarchy in JPA?
    correct: >-
      (1) SINGLE_TABLE (default) — one table for entire hierarchy with a discriminator column. (2) JOINED — one table
      per class with foreign-key join from subclass to superclass. (3) TABLE_PER_CLASS — separate complete table per
      concrete subclass; parent columns duplicated.
    rationale: >-
      Must name all three strategies. Note SINGLE_TABLE is the DEFAULT and requires a discriminator column
      (@DiscriminatorColumn). Strategy declared via @Inheritance(strategy=InheritanceType.X) on the root entity.
  - id: q31
    type: SHORT
    topic: Use Cases
    marks: 3
    question: What are the three class stereotypes used in analysis modeling?
    correct: >-
      Boundary (UI / external interface), Control (workflow orchestration for a use case), Entity (persistent domain
      objects / important state).
    rationale: >-
      Mnemonic: BCE. Boundary = edge/UI, Control = coordinator per UC, Entity = long-lived domain data.
      Watch for confusion with MVC — stereotypes are an analysis abstraction, not an implementation pattern.
  - id: q32
    type: SHORT
