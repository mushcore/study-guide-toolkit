    type: SHORT
    topic: Relationships
    marks: 3
    question: Describe how to determine the owning side in a ONE-to-ONE bidirectional relationship.
    correct: >-
      There is no automatic "many side rule" in 1:1 — the developer designates one side as owning by placing
      @JoinColumn (or @PrimaryKeyJoinColumn) there. The OTHER side then uses @OneToOne(mappedBy="fieldName")
      to point back. The owning side holds the FK; the inverse side is read-only from JPA's perspective.
    rationale: >-
      Key distinction from 1:N: in 1:1 the choice is arbitrary — pick whichever side makes more sense
      conceptually. Must mention mappedBy and @JoinColumn / @PrimaryKeyJoinColumn.
