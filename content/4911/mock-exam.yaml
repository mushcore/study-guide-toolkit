    marks: 2
    question: Which annotation indicates that a Singleton session bean should be instantiated when the application is deployed?
    correct: 1
    rationale: >-
      @Startup forces container to instantiate at deploy time rather than first-call. @DependsOn controls init ORDER
      between singletons.
