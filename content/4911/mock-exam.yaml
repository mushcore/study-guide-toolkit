      Elaboration = architecture baseline; Construction = build remaining features; Transition = beta → GA.
  - id: q33
    type: SHORT
    topic: JPQL
    marks: 3
    question: >-
      Given Customer—(n:n)—Reservation—(n:1)—Cruise, write a JPQL query that returns all Cruises for which a given :cust
      Customer has a Reservation.
    correct: >-
      SELECT DISTINCT c FROM Cruise c, Reservation r WHERE r.cruise = c AND :cust MEMBER OF r.customers &nbsp;—&nbsp; OR
      equivalently: SELECT DISTINCT c FROM Cruise c JOIN c.reservations r JOIN r.customers cu WHERE cu = :cust. DISTINCT
      avoids duplicates.
    rationale: >-
      DISTINCT is critical — without it, a cruise appears once per reservation. MEMBER OF works against
      a collection-valued association. Use named parameters (:cust), not positional. Either cartesian-WHERE
      or explicit JOIN form accepted.
  - id: q34
    type: SHORT
    topic: EVMS
    marks: 3
    question: Given BCWS=$10,000, BCWP=$8,000, ACWP=$12,000, compute CV and SV. Interpret each.
    correct: >-
      CV = BCWP − ACWP = 8,000 − 12,000 = −$4,000 (over budget). SV = BCWP − BCWS = 8,000 − 10,000 = −$2,000 (behind
      schedule). Negative values indicate problems in both cost and schedule.
    rationale: >-
      Formulas: CV = BCWP − ACWP, SV = BCWP − BCWS. Sign convention: negative = bad (over budget / behind).
      Remember BCWP (earned value) is always the first term. Interpret both numbers, not just compute.
  - id: q35
    type: SHORT
    topic: Use Cases
    marks: 10
    question: >-
      Discuss how use cases drive the development process in the Unified Process. Explain how use cases drive analysis
      and design, test, and iteration planning.
    correct: >-
      <strong>Model Answer Outline (connect everything — Bruce: students fail big-picture):</strong>

      <ul>

      <li><strong>Use cases are the central artifact</strong> of RUP — they link requirements all the way to test.</li>

      <li><strong>Requirements</strong>: UCs capture actor-system interactions; they ARE the functional
      requirements.</li>

      <li><strong>Analysis</strong>: each UC decomposed into analysis classes (Boundary/Control/Entity); each UC has a
      realization in the analysis model (class + collaboration diagrams).</li>

      <li><strong>Design</strong>: analysis model refined into design classes; each UC has a design-level realization
      using sequence diagrams to show object interactions over time.</li>

      <li><strong>Implementation</strong>: design classes → code components. UCs guide integration (build in UC-sized
      increments).</li>

      <li><strong>Test</strong>: every UC → test cases. Main flow + alternate flows → positive + negative tests.
      Acceptance tests map directly to UCs.</li>

      <li><strong>Iteration planning</strong>: UCs prioritized (risk + value + dependency). Each iteration delivers a
      set of UCs end-to-end (mini-waterfall). UC selection drives WHAT architecture work happens WHEN.</li>

      <li><strong>Traceability</strong>: single thread runs from requirements → design → code → test — all anchored to a
      UC.</li>

      </ul>
    rationale: >-
      10-mark essay: hit all four drivers (analysis/design, test, iteration planning) with a sentence of
      explanation each, then add traceability as the unifying idea. Weak answers only describe WHAT a UC is;
      strong answers show HOW it flows through every workflow. Name the artifacts (analysis classes, sequence
      diagrams, test cases).
  - id: q36
    type: SHORT
    topic: Transactions
    marks: 10
    question: >-
      Compare and contrast the six EJB transaction attributes. For each, describe what happens when the caller has an
      active transaction vs no transaction.
    correct: >-
      <strong>Model answer outline:</strong>

      <table><thead><tr><th>Attribute</th><th>Caller HAS TX</th><th>Caller NO TX</th><th>Typical
      use</th></tr></thead><tbody>

      <tr><td>REQUIRED (default)</td><td>Join caller's TX</td><td>Container creates new TX</td><td>Default — business
      method</td></tr>

      <tr><td>REQUIRES_NEW</td><td>Suspend caller; create new independent TX</td><td>Create new TX</td><td>Audit log
      that must commit separately</td></tr>

      <tr><td>SUPPORTS</td><td>Join caller's TX</td><td>Run without TX</td><td>Read-only method</td></tr>

      <tr><td>NOT_SUPPORTED</td><td>Suspend caller; run without TX</td><td>Run without TX</td><td>Legacy non-TX
      code</td></tr>

      <tr><td>MANDATORY</td><td>Join caller's TX</td><td>Throws EJBTransactionRequiredException</td><td>Private helper
      expecting a TX</td></tr>

      <tr><td>NEVER</td><td>Throws EJBException</td><td>Run without TX</td><td>Methods that must not be
      TX-bound</td></tr>

      </tbody></table>

      <p>Also mention: declared via <code class="inline">@TransactionAttribute</code> under CMT. System exceptions
      (RuntimeException) auto-rollback; application exceptions do NOT unless declared <code
      class="inline">@ApplicationException(rollback=true)</code>. Can call <code
      class="inline">ctx.setRollbackOnly()</code> to force rollback programmatically.</p>
    rationale: >-
      10-mark essay: table each of six attributes × two caller states (has TX / no TX). Don't forget NEVER
      and MANDATORY throw exceptions in the "wrong" state. Bonus points: mention CMT vs BMT, rollback
      semantics (system vs app exception), setRollbackOnly(). Partial credit if student misses one attribute
      but gets TX-propagation logic right.
  - id: q37
    type: SHORT
    topic: Relationships
    marks: 10
    question: >-
      Annotate the two classes below so they form a 1:N BIDIRECTIONAL relationship where each Department has many
      Employees, using FK column DEPT\_ID in the Employee table. Department.id should be auto-generated. public class
      Department {     private Long id;     private String name;     private List<Employee> employees;     //
      getters/setters... } public class Employee {     private Long id;     private String name;     private Department
      department;     // getters/setters... }
    correct: |-
      <pre class="language-java">@Entity
      @Table(name = "DEPARTMENT")
      public class Department {
          @Id
          @GeneratedValue(strategy = GenerationType.AUTO)
          private Long id;

          @Column(name = "NAME")
          private String name;

          @OneToMany(mappedBy = "department", cascade = CascadeType.ALL, orphanRemoval = true)
          private List&lt;Employee&gt; employees = new ArrayList&lt;&gt;();
          // getters/setters...
      }

      @Entity
      @Table(name = "EMPLOYEE")
      public class Employee {
          @Id
          @GeneratedValue(strategy = GenerationType.AUTO)
          private Long id;

          @Column(name = "NAME")
          private String name;

          @ManyToOne
          @JoinColumn(name = "DEPT_ID")
          private Department department;
          // getters/setters...
      }</pre>
    rationale: >-
      **Bruce's grading checklist:** -   @Entity on BOTH classes (students forget the Entity itself) -   @Id on PK field
      -   @GeneratedValue on auto-gen id -   MANY side owns → Employee has @ManyToOne + @JoinColumn(name="DEPT\_ID") -
      ONE side is inverse → Department has @OneToMany(mappedBy="department") -   mappedBy value is FIELD name on owning
      side ("department"), NOT class name -   Common mistake: putting @JoinColumn on the ONE side — it belongs on the
      owning MANY side
  - id: q38
    type: MCQ
    topic: EntityManager
    marks: 2
    question: Which EntityManager method writes changes from a detached/unmanaged entity back to the database?
    correct: 2
    rationale: >-
      merge() copies the state of a detached entity into a managed copy and schedules UPDATE. update()/delete()
      don't exist on EntityManager. refresh() goes the OTHER direction (DB → entity).
    choices:
      - EntityManager.update()
      - EntityManager.refresh()
      - EntityManager.merge()
      - Cabin.update()
      - PersistenceContext.update()
  - id: q39
    type: MCQ
    topic: EntityManager
    marks: 2
    question: Which EntityManager method removes an entity from the database?
    correct: 0
    rationale: >-
      remove() schedules DELETE at flush. executeUpdate() is a Query method, not EntityManager. clear() detaches
      everything in the PC without touching the DB. delete() doesn't exist.
    choices:
      - EntityManager.remove()
      - EntityManager.executeUpdate()
      - EntityManager.clear()
      - PersistenceContext.delete()
      - EntityManager.delete()
  - id: q40
    type: MCQ
    topic: EntityManager
    marks: 2
    question: Which call requests the persistence context to push pending updates to the database?
    correct: 4
    rationale: >-
      EntityManager.flush() synchronizes the PC with the DB (SQL runs, TX not yet committed). PersistenceContext
      is not a directly-called object in JPA; EntityManager owns the API. update()/saveUpdates() don't exist.
    choices:
      - EntityManager.update()
      - PersistenceContext.flush()
      - PersistenceContext.saveUpdates()
      - PersistenceContext.update()
      - EntityManager.flush()
  - id: q41
    type: MCQ
    topic: EntityManager
    marks: 2
    question: If Cabin is an entity class, which statement creates a NEW instance ready to be persisted?
    correct: 4
    rationale: >-
      Entities are plain Java objects — you instantiate them with `new`. entityManager.persist() is then called
      to make the instance managed. persist() does NOT return an instance (void). entityManager.new(...) is fake.
    choices:
      - Cabin myCabin = entityManager.persist(Cabin.class);
      - Cabin myCabin = new Entity(Cabin.class);
      - Cabin myCabin = entityManager.new(Cabin.class);
      - Cabin myCabin = connection.new(Cabin.class);
      - Cabin myCabin = new Cabin();
  - id: q42
    type: MCQ
    topic: Mapping
    marks: 2
    question: Which annotation maps a java.util.Date property to a SQL date/time column?
    correct: 3
    rationale: >-
      @Temporal(TemporalType.DATE|TIME|TIMESTAMP) is required on java.util.Date / Calendar because SQL doesn't
      know which date precision to pick. Not needed for java.time.LocalDate etc. in JPA 2.2+.
    choices:
      - "@Date"
      - "@DateType"
      - "@Type"
      - "@Temporal"
      - "@Mapping"
  - id: q43
    type: MCQ
    topic: Mapping
    marks: 2
    question: Which is the correct syntax to map an entity to a table named FRED?
    correct: 4
    rationale: >-
      @Table(name="FRED") on the class — no semicolon (annotation, not a statement); uses `name=` attribute,
      not a positional String; lowercase keyword. @Table(value=...) doesn't exist.
    choices:
      - '@Table(value="FRED")'
      - '@Table(name="FRED");'
      - '@Table("FRED")'
      - '@Table("FRED");'
      - '@Table(name="FRED")'
  - id: q44
    type: MCQ
    topic: Mapping
    marks: 2
    question: The entity inheritance strategy is declared using which annotation?
    correct: 3
    rationale: >-
      @Inheritance(strategy = InheritanceType.X) on the root entity. InheritanceType is the enum; the annotation
      itself is @Inheritance. @InheritanceType / @InheritanceStrategy / @Strategy are distractors.
    choices:
      - "@EntityInheritance"
      - "@InheritanceType"
      - "@Strategy"
      - "@Inheritance"
      - "@InheritanceStrategy"
  - id: q45
    type: MCQ
    topic: Mapping
    marks: 2
    question: One or more fields that make up an entity's primary key are identified by which annotation?
    correct: 0
    rationale: >-
      @Id on a single field, or @IdClass / @EmbeddedId for composite keys. @PK / @Identity / @PrimaryKey are
      not JPA. @Entity has no primaryKey attribute.
    choices:
      - "@Id"
      - "@PK"
      - "@PrimaryKey"
      - '@Entity(primaryKey = "...")'
      - "@Identity"
  - id: q46
    type: MCQ
    topic: Mapping
    marks: 2
    question: To map a 1:1 relationship using primary-key join columns, which annotation is added alongside @OneToOne?
    correct: 4
    rationale: >-
      @PrimaryKeyJoinColumn indicates the PK of each row IS the FK to the other table — no separate FK column.
      @JoinColumn uses a distinct FK column. @ForeignKey is a DDL hint, not a mapping strategy.
    choices:
      - "@JoinColumn"
      - "@ForeignKey"
      - "@OneToOne"
      - "@Id"
      - "@PrimaryKeyJoinColumn"
  - id: q47
    type: MCQ
    topic: Relationships
    marks: 2
    question: Which return types are valid for the collection accessor on the "many" side of a @OneToMany?
    correct: 4
    rationale: >-
      JPA supports Collection, List, Set, and Map as collection-valued association types. Pick the one whose
      semantics match (Set = no dups, Map = keyed lookup, List = ordered). Map requires @MapKey.
    choices:
      - Collection only
      - List only
      - Set only
      - Map only
      - All of the above
  - id: q48
    type: MCQ
    topic: Persistence
    marks: 2
    question: Which data MUST be defined in persistence.xml?
    correct: 0
    rationale: >-
      persistence-unit name is mandatory (`<persistence-unit name="X">`). Transaction type defaults to JTA on
      EE. Data source, properties, description are optional or provider-supplied.
    choices:
