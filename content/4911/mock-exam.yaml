  - id: q80
    type: SHORT
    topic: Relationships
    marks: 10
    question: >-
      Annotate the Cruise and Reservation classes below to form a 1:N BIDIRECTIONAL relationship (one Cruise,
      many Reservations) using a foreign key column named CRUISE_NAME on the Reservation table. id fields are
      auto-generated. public class Cruise { private int id; private String name; private Ship ship; private
      Collection&lt;Reservation&gt; reservations = new ArrayList&lt;&gt;(); } public class Reservation { private int id;
      private Date date; private double amountPaid; private Cruise cruise; }
    correct: |-
      <pre class="language-java">@Entity
      public class Cruise implements java.io.Serializable {
          @Id
          @GeneratedValue(strategy = GenerationType.AUTO)
          private int id;

          private String name;

          @OneToOne
          private Ship ship;

          @OneToMany(mappedBy = "cruise")
          private Collection&lt;Reservation&gt; reservations = new ArrayList&lt;&gt;();
          // ...
      }

      @Entity
      public class Reservation implements java.io.Serializable {
          @Id
          @GeneratedValue(strategy = GenerationType.AUTO)
          private int id;

          @Temporal(TemporalType.DATE)
          private Date date;

          private double amountPaid;

          @ManyToOne
          @JoinColumn(name = "CRUISE_NAME")
          private Cruise cruise;
          // ...
      }</pre>
    rationale: >-
      Grading checklist: @Entity on BOTH; @Id + @GeneratedValue on int ids; @Temporal on java.util.Date (often
      missed); Reservation (many side) OWNS with @ManyToOne + @JoinColumn(name="CRUISE_NAME"); Cruise has
      @OneToMany(mappedBy="cruise") — mappedBy value matches the FIELD name on the owning side, NOT class name.
      Ship reference should get @OneToOne / @ManyToOne. Common errors: @JoinColumn on the one side; missing
      mappedBy; wrong mappedBy string.
  - id: q81
    type: SHORT
    topic: Architecture
    marks: 10
    question: >-
      Describe, in point form, what an "architecture" is according to the Unified Process, and how it is
      described (i.e. what artifacts are produced).
    correct: >-
      <strong>Model answer outline:</strong>

      <ul>

      <li><strong>Definition</strong>: architecture = the organization of the software system; key structural
      elements and their interfaces; collaborations among them; composition into progressively larger subsystems;
      architectural style guiding the organization.</li>

      <li><strong>Architecture is captured through the "4+1" view model:</strong>

        <ul>

          <li><em>Use-Case View</em> — the "+1"; architecturally significant UCs that drive everything else.</li>

          <li><em>Logical View</em> — design model (subsystems, classes, key collaborations).</li>

          <li><em>Process View</em> — concurrency, processes/threads, synchronization.</li>

          <li><em>Implementation View</em> — components, packaging, source code organization.</li>

          <li><em>Deployment View</em> — physical nodes, hardware, distribution.</li>

        </ul>

      </li>

      <li><strong>Baselined at end of Elaboration (LCA milestone)</strong> with an executable architectural
      prototype demonstrating the significant decisions.</li>

      <li><strong>Key artifact</strong>: Software Architecture Document (SAD) containing all five views plus
      architecturally significant requirements + rationale.</li>

      </ul>
    rationale: >-
      10-mark essay: must name all five views (4+1) with a short description of each; connect to LCA
      milestone; mention executable prototype; name the SAD artifact. Partial credit for listing views without
      descriptions.
