  - id: q50
    type: MCQ
    topic: JPQL
    marks: 2
    question: |
      Given CustomerBean (1)↔(n) OrderBean and OrderBean (1)↔(n) LineitemsBean, which JPQL returns the SET of customers that have orders?
    correct: 4
    rationale: >-
      SELECT DISTINCT c FROM Customer c, Order o WHERE c.custnum = o.custnum — JPQL selects entity aliases, not
      table columns, and DISTINCT is required to avoid dup rows (one per matching order). Option A selects
      unaliased "Customer" which is illegal in JPQL.
    choices:
      - SELECT DISTINCT Customer FROM Order
      - SELECT o.custnum FROM Order o, Customer c WHERE c.custnum = o.custnum
      - SELECT c FROM Customer c, Order o WHERE c.custnum = o.custnum
      - SELECT Customer FROM Order
      - SELECT DISTINCT c FROM Customer c, Order o WHERE c.custnum = o.custnum
  - id: q51
    type: MCQ
    topic: JPQL
    marks: 2
    question: Which expression is equivalent to `p.discount NOT BETWEEN 10 AND 15`?
    correct: 2
    rationale: >-
      BETWEEN x AND y is INCLUSIVE on both ends, so NOT BETWEEN 10 AND 15 = `<10 OR >15`. Off-by-one trap:
      options using `>= 15` would exclude 15, but 15 is outside the range so it must be included in the NOT set.
    choices:
      - p.discount < 10 OR p.discount >= 15
      - p.discount <= 10 OR p.discount > 15
      - p.discount < 10 OR p.discount > 15
      - p.discount <= 10 OR p.discount >= 15
      - p.discount < 10 OR p.discount = 15
