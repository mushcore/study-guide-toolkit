      - "@PostConstruct"
      - "@Startup"
      - "@DependsOn"
      - "@Eager"
      - "@EarlyInit"
  - id: q2
    type: MCQ
    topic: Session Beans
    marks: 2
    question: Which of the following describes the concurrency behaviour of a Singleton session bean method annotated with @Lock(READ)?
    correct: 1
    rationale: READ lock = many readers concurrently, WRITE = exclusive. READ blocks ONLY while a WRITE is active.
    choices:
      - Only one thread at a time
      - Multiple concurrent readers; exclusive writer
      - No concurrency control
      - No access during WRITE lock only
      - Strict serialized access
