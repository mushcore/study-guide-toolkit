  - id: q32
    type: SHORT
    topic: Memory
    marks: 5
    question: >-
      Given process size s = 1 MB, page table entry size e = 8 bytes. Compute optimal page size p\* and the overhead at
      p\*.
    correct: |-
      p* = √(2·s·e) = √(2 × 2^20 × 2^3) = √(2^24) = 2^12 = 4 KB.
      Overhead at p* = s·e/p* + p*/2
                    = (2^20·8)/4096 + 4096/2
                    = 2048 + 2048 = 4096 bytes
                    = √(2se) = p* (matches the derivation).
    rationale: Past-exam Q6. Overhead at optimal page size equals p\* itself.
  - id: q33
    type: SHORT
    topic: Deadlock
    marks: 6
    question: Compare deadlock prevention, avoidance, and detection+recovery. Give one strength and one weakness of each.
    correct: >-
      Prevention: eliminates at least one Coffman condition by design. STRENGTH: no runtime overhead to detect.
      WEAKNESS: often restricts resource use (e.g. request-all-at-once wastes resources). Avoidance (Banker's): grants
      requests only if state stays safe. STRENGTH: less restrictive than prevention. WEAKNESS: requires max-need info
      upfront; costly safety check per request. Detection+recovery: allow deadlocks, find them, resolve by
      killing/preempting. STRENGTH: no up-front restrictions. WEAKNESS: recovery disruptive (lost work, rollback cost).
    rationale: ""
  - id: q34
    type: SHORT
    topic: Memory
    marks: 6
    question: Describe the page fault handling sequence from CPU interrupt to process resumption.
    correct: >-
      1) CPU traps — process hit unmapped VA. 2) Trap to OS page fault handler. 3) OS saves process state (registers,
      PC). 4) Identify faulting VA and its virtual page. 5) Find a free physical frame; if none, select a victim via
      page replacement. 6) If victim is dirty, write to swap. 7) Load the needed page from disk into the free frame. 8)
      Update the page table (set present=1, frame#). 9) Restore process state, rewind PC to faulting instruction. 10)
      Resume; instruction is re-executed successfully.
    rationale: ""
