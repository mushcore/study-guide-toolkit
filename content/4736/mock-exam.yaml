  - id: q44
    type: MCQ
    topic: Deadlock
    marks: 1
    question: An unsafe state is the same as a deadlocked state.
    correct: 1
    rationale: >-
      False. Unsafe means there is no guarantee all processes can complete under worst-case future requests, but
      deadlock has not yet occurred. Banker's avoidance denies requests that would produce unsafe states to
      pre-empt the possibility of deadlock.
    choices:
      - "True"
      - "False"

  # ---- IPC 1 / Semaphores / Sync (4) ----
  - id: q45
    type: MCQ
    topic: IPC1/Sem
    marks: 2
    question: >-
      In producer-consumer with three semaphores (`empty=N, full=0, mutex=1`), what deadlock results if a producer
      calls `P(mutex)` before `P(empty)`?
    correct: 2
    rationale: >-
      Producer holds mutex, waits on empty when the buffer is full. Consumer cannot call P(mutex) to remove an item
      → buffer stays full forever. A — no, the initial state is fine. B — livelock implies active state changes;
      here both are blocked. D — misnames the deadlock; specifics of which sem is held matter.
    choices:
      - "No deadlock — semaphores are symmetric"
      - "Starvation, not deadlock"
      - "Producer holds mutex forever, consumer blocks on mutex"
      - "Both block on the same semaphore"

