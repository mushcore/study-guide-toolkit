    rationale: >-
      True. MAP_SHARED writes are visible to all processes mapping the same region of the same file. This is the
      cross-Part-8-and-Part-10 bridge concept flagged as a likely exam target in the knowledge graph.
    choices:
      - "True"
      - "False"

  - id: q52
    type: MCQ
    topic: IPC2
    marks: 2
    question: In a TCP socket server, which sequence correctly sets up a listening endpoint?
    correct: 0
    rationale: >-
      socket → bind → listen → accept. B swaps bind and listen (listen cannot happen before the address is
      assigned). C omits listen entirely. D is the client-side order (connect replaces listen/accept).
    choices:
      - "socket, bind, listen, accept"
      - "socket, listen, bind, accept"
      - "socket, bind, accept"
      - "socket, bind, connect"

  # ---- Paging — address translation + bit-splits (6) ----
  - id: q53
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: With page size 4 KB and a 32-bit virtual address, how many bits make up the offset?
    correct: 2
    rationale: >-
      4 KB = 2^12 so the offset is 12 bits; the remaining 20 bits are the virtual page number. A (10) matches 1 KB
      pages. B (11) matches 2 KB. D (13) matches 8 KB.
    choices:
      - "10"
      - "11"
      - "12"
      - "13"

  - id: q54
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: A 36-bit virtual address with 4 KB pages yields how many virtual pages?
    correct: 1
    rationale: >-
      offset = 12 bits → VP bits = 36 − 12 = 24 → pages = 2^24. A — forgets to subtract offset. C — uses PA bits.
      D — uses 64-bit VA.
    choices:
      - "2^36"
      - "2^24"
      - "2^20"
      - "2^52"

  - id: q55
    type: MCQ
    topic: Memory/Paging
    marks: 2
    tags: [memory-focus]
    question: >-
      Page size 4 KB. The page table says VP 3 → frame 5. What physical address corresponds to virtual address 12400?
    correct: 2
    rationale: >-
      VA 12400 / 4096 = VP 3, offset 112. PA = 5 × 4096 + 112 = 20480 + 112 = 20592. A — uses VP × 4096 only.
      B — off-by-one page. D — arithmetic slip (× 4 instead of × 4096).
    choices:
      - "20480"
      - "16492"
      - "20592"
      - "112"

  - id: q56
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: The offset portion of a virtual address passes through translation unchanged.
    correct: 0
    rationale: >-
      True. Translation only rewrites the page/frame high-order bits; the offset (low-order byte index inside the
      page) is concatenated onto the frame base unaltered. This is what makes translation a pure bit-substitution.
    choices:
      - "True"
      - "False"

  - id: q57
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: For a VA, the physical-address formula is PA = frame × page_size + offset.
    correct: 0
    rationale: >-
      True. The equivalent form `PA = VA + (frame_base − page_base)` (shown on Part 10 slides as `Y = x + (a − A)`)
      gives the same number; both methods earn marks on the written exam.
    choices:
      - "True"
      - "False"

  - id: q58
    type: MCQ
    topic: Memory/Paging
    marks: 2
    tags: [memory-focus]
    question: >-
      48-bit virtual address, 40-bit physical address, 16 KB pages. How many page frames does the system have?
    correct: 1
    rationale: >-
      offset = log₂(16 KB) = 14 bits → frames = 2^(40 − 14) = 2^26. A — uses VA bits. C — uses 4 KB pages. D —
      forgets subtraction.
    choices:
      - "2^34"
      - "2^26"
      - "2^28"
      - "2^40"

  # ---- Page tables (4) ----
  - id: q59
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: An inverted page table has one entry per physical frame, not per virtual page.
    correct: 0
    rationale: >-
      True. This trades direct-indexing speed (linear PT) for size that scales with RAM rather than VA space.
      Lookups require hashing and chain search. Essential for 64-bit systems where linear PTs are infeasible.
    choices:
      - "True"
      - "False"

  - id: q60
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: Which PTE field causes a page fault when its value is 0 on access?
    correct: 0
    rationale: >-
      Present/absent bit. When 0, the MMU traps and the OS loads the page (or kills the process for invalid VAs).
      B (dirty) just tracks writeback need. C (referenced) is for replacement algorithms. D (caching-disabled)
      affects cache policy, not faults.
    choices:
      - "Present/absent"
      - "Modified (dirty)"
      - "Referenced"
      - "Caching-disabled"

  - id: q61
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: >-
      A 64-bit virtual address with 4 KB pages requires 2^52 entries in a single-level linear page table per process.
    correct: 0
    rationale: >-
      True. 64 − 12 = 52 VP bits → 2^52 entries. This is exactly why 64-bit systems use multi-level (or inverted)
      page tables — a linear 2^52-entry PT per process is infeasible.
    choices:
      - "True"
      - "False"

  - id: q62
    type: MCQ
    topic: Memory/Paging
    marks: 2
    tags: [memory-focus]
    question: >-
      Two-level page table with 32-bit VA, 4 KB pages, 10 top-level bits, 10 second-level bits. How many outer-table
      entries and inner-table entries does each level have?
    correct: 1
    rationale: >-
      Outer = 2^10 = 1024; inner = 2^10 = 1024; offset = 12. A — uses linear PT count. C — swaps levels. D — uses
      2^20 for both.
    choices:
      - "1024 outer, 4096 inner"
      - "1024 outer, 1024 inner"
      - "4096 outer, 1024 inner"
      - "1M outer, 1M inner"

  # ---- Page replacement (4) ----
  - id: q63
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: The clock algorithm approximates LRU using the referenced bit.
    correct: 0
    rationale: >-
      True. The hand advances through frames; if referenced=1, clear it and advance. If 0, evict. Pages that survive
      a full rotation without re-access get evicted — a cheap approximation of "least recently used".
    choices:
      - "True"
      - "False"

  - id: q64
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: Which page-replacement policy can suffer Belady's anomaly?
    correct: 0
    rationale: >-
      FIFO — more frames can mean more faults on certain reference strings. B (LRU) cannot. C (OPT) cannot. D
      (Second Chance) is FIFO variant that uses the reference bit but the core queue is still FIFO — reduces but
      does not immunize against the anomaly per Part 10 slides.
    choices:
      - "FIFO"
      - "LRU"
      - "OPT"
      - "Random"

  - id: q65
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: The OPT (furthest-future) replacement policy is implementable in production systems.
    correct: 1
    rationale: >-
      False. OPT requires knowing future accesses — not available at runtime. It's a theoretical benchmark against
      which practical policies (LRU, Clock) are measured.
    choices:
      - "True"
      - "False"

  - id: q66
    type: MCQ
    topic: Memory/Paging
    marks: 2
    tags: [memory-focus]
    question: >-
      3 frames, reference string 1, 2, 3, 1, 2, 4, 1, 2, 3, 4. How many page faults with LRU?
    correct: 2
    rationale: >-
      Trace: 1(F), 2(F), 3(F) → [1,2,3]; 1(hit), 2(hit); 4(F evict 3) → [1,2,4]; 1(hit), 2(hit); 3(F evict 4) →
      [1,2,3]; 4(F evict 1) → [2,3,4]. **6 faults.** A — miscounts 3 as hit. B — misses the 3/4 thrash. D — uses
      FIFO trace.
    choices:
      - "4"
      - "5"
      - "6"
      - "7"

  # ---- TLB (3) ----
  - id: q67
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: A TLB soft miss and hard miss differ in whether the page is currently in physical memory.
    correct: 0
    rationale: >-
      True. Soft miss: not in TLB but page IS in memory → just refill TLB. Hard miss: not in TLB AND page not in
      memory → page fault + disk I/O. Hard miss is orders of magnitude slower.
    choices:
      - "True"
      - "False"

  - id: q68
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: The TLB caches recent virtual-to-physical translations.
    correct: 0
    rationale: >-
      True. TLB hits skip the page-table walk entirely — the MMU returns the frame number directly. This is what
      makes translation fast on average despite the walk being expensive.
    choices:
      - "True"
      - "False"

  - id: q69
    type: MCQ
    topic: Memory/Paging
    marks: 2
    tags: [memory-focus]
    question: >-
      TLB 1 ns, memory 100 ns, PT walk adds one memory access, hit rate 0.98. Closest EAT?
    correct: 0
    rationale: >-
      EAT = 0.98 × 101 + 0.02 × 201 = 98.98 + 4.02 = 103 ns. B — forgets PT cost. C — uses 0.90 hit rate. D — uses
      no-TLB baseline.
    choices:
      - "103 ns"
      - "101 ns"
      - "111 ns"
      - "201 ns"

  # ---- Allocation algorithms (4) ----
  - id: q70
    type: MCQ
    topic: Memory/Alloc
    marks: 2
    tags: [memory-focus]
    question: >-
      Holes [10, 4, 20, 18, 7, 9, 12, 15] MB. Request 10 MB. Which hole does **first fit** pick?
    correct: 0
    rationale: >-
      First fit stops at the first hole ≥ 10: scan → 10 ≥ 10 → take 10 (index 0). B — best fit. C — worst fit.
      D — confuses with a 12 MB request.
    choices:
      - "10"
      - "12"
      - "20"
      - "18"

  - id: q71
    type: MCQ
    topic: Memory/Alloc
    marks: 2
    tags: [memory-focus]
    question: >-
      Same holes [10, 4, 20, 18, 7, 9, 12, 15]. Request 9 MB. Which hole does **best fit** pick?
    correct: 2
    rationale: >-
      Candidates ≥ 9: {10, 20, 18, 9, 12, 15}. Smallest = 9. A — first fit would take 10. B — next fit rover-dependent.
      D — worst fit picks 20.
    choices:
      - "10"
      - "12"
      - "9"
      - "20"

  - id: q72
    type: MCQ
    topic: Memory/Alloc
    marks: 1
    tags: [memory-focus]
    question: Worst fit leaves smaller leftover fragments than best fit on average.
    correct: 1
    rationale: >-
      False. Worst fit picks the **largest** hole regardless of request size, so leftover tends to be large (useful)
      per the original design intuition. Best fit leaves tiny fragments. Actual practice: worst fit performs poorly
      because it exhausts large holes prematurely.
    choices:
      - "True"
      - "False"

  - id: q73
    type: MCQ
    topic: Memory/Alloc
    marks: 1
    tags: [memory-focus]
    question: Quick fit maintains separate free-lists for common request sizes.
    correct: 0
    rationale: >-
      True. One list per size bucket → allocation is a single list pop (O(1), no scan). Tradeoff: coalescing is
      harder because neighbor-adjacency is not tracked directly.
    choices:
      - "True"
      - "False"

  # ---- Buddy system (3) ----
  - id: q74
    type: MCQ
    topic: Memory/Alloc
    marks: 2
    tags: [memory-focus]
    question: >-
      Buddy arena 1024 KB, min 32 KB. Process requests 300 KB. What block size is allocated?
    correct: 2
    rationale: >-
      300 rounds up to next power of 2 ≥ 300 = 512. A — 256 < 300 (would not fit). B — rounds down, wrong. D — next
      power after 512 but 512 already fits.
    choices:
      - "256 KB"
      - "300 KB"
      - "512 KB"
      - "1024 KB"

  - id: q75
    type: MCQ
    topic: Memory/Alloc
    marks: 1
    tags: [memory-focus]
    question: Buddy-system coalescing merges two blocks only when both are wholly free and are buddies.
    correct: 0
    rationale: >-
      True. Any busy leaf anywhere in the buddy's subtree blocks the merge. Two adjacent free blocks that are NOT
      buddies (different parents) also do not merge — buddy status is determined by the split history, not
      adjacency.
    choices:
      - "True"
      - "False"

  - id: q76
    type: MCQ
    topic: Memory/Alloc
    marks: 1
    tags: [memory-focus]
    question: Buddy systems eliminate internal fragmentation.
    correct: 1
    rationale: >-
      False. Power-of-2 rounding causes up to ~50% internal fragmentation worst case (request = 2^k + 1 takes block
      2^(k+1)). They reduce external fragmentation via predictable coalescing, not internal.
    choices:
      - "True"
      - "False"

  # ---- Fragmentation + thrashing (1) ----
  - id: q77
    type: MCQ
    topic: Memory/Paging
    marks: 1
    tags: [memory-focus]
    question: Thrashing is best remedied by increasing the degree of multiprogramming.
    correct: 1
    rationale: >-
      False. Thrashing happens when combined working sets exceed RAM; adding more processes makes it worse.
      **Reducing** the degree of multiprogramming (suspending a process to disk) is the canonical fix per Part 10.
    choices:
      - "True"
      - "False"
