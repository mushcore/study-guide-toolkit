  - id: q23
    type: SHORT
    topic: IPC1/Sem
    marks: 4
    question: Explain the lost-wakeup problem and how semaphores solve it.
    correct: >-
      In sleep/wakeup, a producer may signal wakeup before the consumer actually calls sleep(). The wakeup is discarded
      (not queued) and the consumer sleeps forever. Semaphores solve this: V() atomically increments the counter; if P()
      sees a positive value it proceeds without sleeping. No wakeup can be "lost" because the count captures it.
    rationale: "Key insight: atomicity + persistent counter."
  - id: q24
    type: SHORT
    topic: Deadlock
    marks: 4
    question: Name the 4 Coffman conditions and give one real-world prevention strategy for each.
    correct: >-
      1) Mutual exclusion — spool the resource (e.g. printer daemon). 2) Hold and wait — require all resources requested
      at once. 3) No preemption — allow the OS to reclaim resources. 4) Circular wait — enforce a global ordering of
      resource IDs, request only in increasing order.
    rationale: ""
  - id: q25
    type: SHORT
    topic: Memory
    marks: 4
    question: Explain why multi-level page tables are used instead of a single-level linear table in 64-bit systems.
    correct: >-
      Single-level table would need 2^52 entries (64-bit VA / 4 KB pages) — impossible to keep in memory. Multi-level
      splits VA into (top-level index, second-level index, offset). Unused regions of the address space need no
      second-level table at all, saving vast amounts of memory. Only populated ranges consume PT entries.
    rationale: ""
