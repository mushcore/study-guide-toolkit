      remove; V(mutex); V(empty). Ordering: wait for slot count BEFORE taking mutex. If producer holds mutex while
      waiting for an empty slot, consumer cannot enter buffer to free a slot — deadlock.
    rationale: ""

  # ---- Memory / Paging (6) ----
  - id: q36
    type: MCQ
    topic: Memory/Paging
    marks: 1
    question: FIFO page replacement can produce more faults with 4 frames than with 3 frames on the same reference string.
    correct: 0
    rationale: >-
      True. This is Belady's anomaly — FIFO's eviction depends on arrival order, not recency, so adding a frame can
      reorder evictions and push out a page the smaller-frame run would have kept. LRU and OPT are immune.
    choices:
      - "True"
      - "False"

