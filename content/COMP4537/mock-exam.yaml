    '
  bloom: understand
  source: Slide 2, Quiz 5 Q5, ISAQuiz5.pdf Q5
  tags:
  - pretest
- id: async-await-q-01
  type: MCQ
  topic: 'async/await: Cleaner Syntax Over Promises'
  marks: 2
  question: "What does the following function return when invoked?\n\n```js\nasync function greet() {\n  return \"Hello\"\
    ;\n}\n\nconst result = greet();\nconsole.log(typeof result);\n```\n"
  choices:
  - '`object`'
  - '`string`'
  - '`undefined`'
  - '`function`'
  correct: 0
  rationale: 'An `async` function always returns a Promise, regardless of what the function body returns. The runtime wraps
    the bare return value `"Hello"` in `Promise.resolve("Hello")` automatically. A Promise is an object, so `typeof result`
    evaluates to `"object"`. The `.then()` handler on the returned Promise would receive the string `"Hello"`, but `result`
    itself is a Promise object. Distractor B targets students who conflate the fulfilled value (`"Hello"`, a string) with
    the return type of the async function itself — the string is what the Promise resolves with, not what the function returns
    to the caller. Distractor C targets the misconception that async functions with no explicit `await` return nothing, or
    that the return value is lost because the function is asynchronous. Distractor D targets students who believe that because
    `async` transforms the function, calling it returns another function rather than executing it.

    '
  bloom: understand
  source: Slide 9, ISAQuiz8 Q11
- id: html-css-review-q-01
  type: MCQ
  topic: HTML DOM Structure, CSS Box Model, Selectors, and Attributes
  marks: 2
  question: 'What is the correct order of the CSS box model layers, from **inside to outside**?

    '
  choices:
  - margin → padding → border → content
  - content → border → padding → margin
  - content → padding → border → margin
  - margin → border → padding → content
  correct: 2
  rationale: 'The CSS box model places the content layer at the center, surrounded outward by padding (space

    between content and border), then border (the visible edge), then margin (transparent space

    separating the element from its neighbors). Distractor A (`margin → padding → border → content`)

    is the exact wrong order tested in ISAQuiz1 Q1 — it reverses the model entirely, targeting

    students who memorize the layer names without knowing their direction. Distractor B

    (`content → border → padding → margin`) swaps padding and border, targeting students who

    confuse which layer is closer to the content. Distractor D mirrors the ISAQuiz1 wrong option

    that starts from the outside in but mis-orders the middle two layers.

