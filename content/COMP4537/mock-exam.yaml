- id: promise-chaining-q-01
  type: MCQ
  topic: .then() Chaining, .catch(), and .finally()
  marks: 2
  question: "What is the output of the following code?\n\n```js\nsetTimeout(() => console.log('setTimeout1'), 0);\nPromise.resolve()\n\
    \  .then(() => console.log('then1'))\n  .then(() => console.log('then2'));\nsetTimeout(() => console.log('setTimeout2'),\
    \ 0);\n```\n"
  choices:
  - '`then1`, `then2`, `setTimeout1`, `setTimeout2`'
  - '`then1`, `setTimeout1`, `then2`, `setTimeout2`'
  - '`setTimeout1`, `then1`, `then2`, `setTimeout2`'
  - '`then1`, `setTimeout2`, `then2`, `setTimeout1`'
  correct: 0
  rationale: '`.then()` callbacks are microtasks; `setTimeout` callbacks are macrotasks. The event loop drains the entire
    microtask queue before pulling any macrotask. `setTimeout1` is queued as a macrotask, then `then1` is queued as a microtask
    via `Promise.resolve().then(...)`, then `setTimeout2` is queued as a macrotask. The call stack empties. The microtask
    queue drains first: `then1` fires and immediately queues `then2` (the next `.then()` in the chain); `then2` fires. Only
    after the microtask queue is fully empty does the event loop pick up the first macrotask, printing `setTimeout1`, then
    `setTimeout2`. Distractor B targets the misconception that `setTimeout` callbacks can interleave with microtasks after
    each `.then()` fires — the macrotask queue does not get a turn between microtasks. Distractor C targets students who assume
    `setTimeout` fires first because it was registered before the `.then()` calls. Distractor D targets students who believe
    `setTimeout` callbacks are interleaved with `.then()` callbacks based on registration order rather than queue type.

    '
  bloom: apply
  source: Slide 6, ISAQuiz9 Q3
- id: promise-chaining-q-02
  type: MCQ
  topic: .then() Chaining, .catch(), and .finally()
  marks: 2
  question: "What is the output of the following code?\n\n```js\nPromise.resolve(42)\n  .finally(() => {\n    console.log('cleanup');\n\
    \    return 99;\n  })\n  .then(val => {\n    console.log(val);\n  });\n```\n"
  choices:
  - '`cleanup`, `42`'
  - '`cleanup`, `99`'
  - '`cleanup`, `undefined`'
  - '`42`, `cleanup`'
  correct: 0
  rationale: '`.finally()` runs its callback regardless of the settled outcome but passes the original upstream value through
    to the next link in the chain — it does not receive an argument and its return value is ignored (unless it throws). The
    upstream Promise is fulfilled with `42`. `.finally()` fires, printing `cleanup`. The `return 99` inside `.finally()` is
    discarded. The Promise returned by `.finally()` is fulfilled with the original value `42`, so the `.then()` callback receives
    `42` and prints it. Distractor B targets the misconception that the return value of the `.finally()` callback replaces
    the upstream value — students who treat `.finally()` like `.then()` would expect `99`. Distractor C targets students who
    know `.finally()` receives no argument but incorrectly assume that the downstream `.then()` also receives `undefined`
    rather than the original fulfilled value. Distractor D targets students who assume `.finally()` runs after all downstream
    `.then()` handlers, reversing the order.

    '
  bloom: understand
  source: Slide 6, ISAQuiz9 Q10
- id: js-oop-q-01
  type: MCQ
  topic: 'OOP in JavaScript: Classes, Inheritance, and Composition'
  marks: 2
  question: 'What does `typeof []` return in JavaScript?

    '
  choices:
  - '`"array"`'
  - '`"object"`'
  - '`"undefined"`'
  - '`"number"`'
  correct: 1
  rationale: 'Arrays are objects in JavaScript. The `typeof` operator reports the internal type tag, which for

    all non-function objects — including arrays and even `null` — is `"object"`. `typeof` cannot

    distinguish a plain object from an array; use `Array.isArray(value)` for that. Distractor A

    (`"array"`) is the most common wrong answer on ISAQuiz4: students expect `typeof` to reflect

    the array''s literal construction. Distractor C (`"undefined"`) targets students who confuse

    an empty array with an uninitialized variable. Distractor D (`"number"`) targets students who

    think the bracket notation `[]` implies something numeric.

    '
  bloom: remember
  source: Slide 1, ISAQuiz4 Q5
- id: js-oop-q-02
  type: MCQ
  topic: 'OOP in JavaScript: Classes, Inheritance, and Composition'
  marks: 2
  question: "A subclass constructor calls `super(first, last)` before assigning `this.gpa = gpa`.\nWhat happens if you remove\
    \ the `super(first, last)` call and access `this` immediately?\n\n```js\nclass Student extends Person {\n  constructor(first,\
    \ last, gpa) {\n    // super(first, last) removed\n    this.gpa = gpa;\n  }\n}\n```\n"
  choices:
  - '`this.gpa` is set to `undefined` because the parent constructor never ran'
  - '`ReferenceError: Must call super constructor in derived class before accessing ''this''`'
  - The code runs normally; `extends` handles the parent initialization automatically
  - '`TypeError: gpa is not a constructor`'
  correct: 1
  rationale: 'JavaScript enforces that `super()` must be called before any access to `this` in a derived class

    constructor. `extends` sets up the prototype chain but does not automatically invoke the parent

    constructor — `super()` does that. Omitting it and then touching `this` throws a `ReferenceError`

    at runtime. Distractor A targets students who think the missing parent call merely leaves fields

    unset rather than throwing. Distractor C targets the misconception that `extends` implicitly calls

    the parent constructor. Distractor D targets students who confuse `gpa` (a plain value) with a

    constructor function, misreading the `TypeError` message.

    '
  bloom: analyze
  source: Slide 1, ISAQuiz4
- id: nodejs-basics-q-01
  type: MCQ
  topic: Node.js Runtime
  marks: 2
  question: 'Which statement best describes how Node.js handles 100 simultaneous file-read requests?

    '
  choices:
  - It creates one thread per request, so 100 requests require 100 threads waiting on the file system.
  - It delegates each file-read to the OS asynchronously, then processes callbacks as results arrive — all on one thread.
  - It blocks the single thread on each file-read in turn, processing requests one at a time.
  - It uses the Chrome V8 engine to spawn worker processes for each I/O operation.
  correct: 1
  rationale: 'Node.js runs single-threaded non-blocking: the single thread delegates file-read operations to the OS via libuv,
    registers a callback, and immediately picks up the next request — the thread never idles waiting for disk (Slide 4).

    Creating one thread per request is the traditional synchronous multi-threaded model (e.g., naive PHP/ASP.NET); it is what
    Node.js replaces, not what it does.

    Blocking the single thread sequentially would serialize all 100 requests — this is the single-threaded blocking model
    shown in the restaurant analogy as the waiter who stands at the kitchen window.

    V8 is the JavaScript engine that compiles JS to native machine code; it does not spawn worker processes for I/O. Worker
    threads are a separate opt-in feature, not the default model.

    '
  bloom: understand
  source: Slide 4, ISAQuiz7.pdf
  tags:
  - pretest
- id: api-security-best-practices-q-01
  type: MCQ
  topic: API security — SQL injection prevention
  marks: 2
  question: 'An Express route builds a query this way:


    ```js

    const query = `UPDATE users SET email=''${newEmail}'' WHERE id=${userId}`;

    database.query(query);

    ```


    Which change prevents SQL injection in this code?

    '
  choices:
  - Replace single quotes in `newEmail` using `.replace(/'/g, '')`
  - Wrap the template literal in `JSON.stringify()` before passing it to `database.query()`
  - 'Use a parameterized query: `database.query(''UPDATE users SET email=? WHERE id=?'', [newEmail, userId])`'
  - Validate that `newEmail` matches an email regex before running the query
  correct: 2
  rationale: 'Parameterized queries pass user input as bound data values through the database driver''s

    protocol layer. The driver treats the entire substituted value as a string literal — SQL syntax

    inside the value never executes. This separates SQL structure from data at the protocol level.

    Option A is the explicit wrong-answer pattern confirmed in ISAQuiz12 Q2: `.replace()` strips

    single quotes but is bypassable with hex encodings, multi-byte characters, and other vectors

    that do not rely on the single-quote character. It is not a fix. Option B wraps the already-

    constructed injection-vulnerable string in JSON encoding, which does not prevent the injected

    SQL from executing once the driver receives it. Option D applies input validation (an email

    regex) — useful as a secondary layer but not sufficient alone, because regex-valid email values

    can still carry SQL payloads when interpolated into template literals.

    '
  bloom: apply
  source: Slide 12, ISAQuiz12 Q2
- id: api-security-best-practices-q-02
  type: MCQ
  topic: API security — broken object-level authorization (BOLA)
  marks: 2
  question: 'A student successfully authenticates and then sends `PUT /api/users/99/edit-profile`

    even though their own user ID is 42. The server updates user 99''s profile without

    returning an error. Which OWASP API vulnerability does this illustrate?

    '
  choices:
  - Mass Assignment — the server auto-binds all request body fields to the model
  - Broken Object-Level Authorization (BOLA) — the server checks authentication but not ownership of object 99
  - Excessive Data Exposure — the server returns more fields than the client requested
  - Security Misconfiguration — the server has a hardcoded admin credential
  correct: 1
  rationale: 'Broken Object-Level Authorization (BOLA) occurs when a server verifies that a user is

    authenticated but fails to verify that the authenticated user owns the specific object

    being acted on. Here the server confirms the student is logged in, but never checks whether

    user 42 has the right to modify user 99''s profile. The fix is object-level access control

    that verifies ownership at the resource level, not just at the user level. Option A describes

    Mass Assignment, which is about injecting unexpected model properties (e.g., `isAdmin: true`)

    via a raw request body — the vulnerability here is not about body field binding. Option C

    describes Excessive Data Exposure, which is a response-side problem about returning too much

    data — not about who is allowed to trigger an operation. Option D describes Security

    Misconfiguration, which involves hardcoded secrets or default credentials — not about

    authorization logic on object ownership.

    '
  bloom: understand
  source: Slide 12, ISAQuiz12 Q7, ISAQuiz12 Q10
- id: js-arrays-loops-q-01
  type: MCQ
  topic: Arrays, Loops, and Iteration Patterns
  marks: 2
  question: 'What does the following code print to the console?


    ```js

    let arr = [];

    arr[1] = 1234;

    console.log(arr[0]);

    ```

    '
  choices:
  - '`1234`'
  - '`undefined`'
  - '`Error: cannot assign index 1 to empty array`'
  - '`null`'
  correct: 1
  rationale: 'JavaScript arrays are sparse objects. Writing to index 1 without writing to index 0 leaves slot 0

    uninitialized. Reading an uninitialized slot returns `undefined` — no error is thrown. Distractor A

    (`1234`) targets students who assume a one-element array has only index 0 and expect both reads to

    return the same value. Distractor C (`Error`) directly mirrors a wrong-answer option from ISAQuiz2

    Q8 ("Error - cannot assign index 1 to empty array"), which students chose when they incorrectly

    believed sparse assignment was illegal. Distractor D (`null`) targets students who conflate

    "unassigned" with an explicit `null`.

    '
  bloom: understand
  tags:
  - pretest
  source: ISAQuiz2 Q8
- id: json-localstorage-q-01
  type: MCQ
  topic: JSON and Web Storage
  marks: 2
  question: 'A developer runs the following code and then closes and reopens the browser tab.

    What does `localStorage.getItem("user")` return after the tab is reopened?


    ```js

