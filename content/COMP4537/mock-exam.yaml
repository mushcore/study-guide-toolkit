  - '`SELECT * FROM employees WHERE department = ''HR'';`'
  - '`SELECT *.* FROM employees WHERE department = ''HR'';`'
  - '`SELECT * FROM employees WHERE department != ''HR'';`'
  correct: 1
  rationale: '`WHERE department = ''HR''` uses the equality operator `=`, which is the correct SQL operator for matching a
    column value against a string literal. Choice A uses `IS`, which tests for NULL (`WHERE column IS NULL`) — using `IS`
    with a non-NULL string literal is not valid standard SQL for equality comparison; this misconception was a live wrong-answer
    option in ISAQuiz10 Q12. Choice C uses `*.*`, which is not valid SQL syntax — `SELECT *` retrieves all columns from all
    identified tables, but `*.*` is not a recognized column specifier in this context. Choice D uses `!=`, which returns all
    employees who are NOT in HR — the opposite of the intended query.

    '
