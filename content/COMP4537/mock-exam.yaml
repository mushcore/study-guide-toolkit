- id: restful-url-design-q-01
  type: MCQ
  topic: RESTful URL Design and API Versioning
  marks: 2
  question: 'A team publishes `GET /getPatient/1` on day one.

    Six months later they want to add versioning. Which statement is true?

    '
  choices:
  - They can add `/v1/` to the path without breaking existing clients because the resource ID stays the same.
  - Adding `/v1/` retroactively is itself a breaking change — every existing client must update its endpoint string.
  - Versioning is only required when the HTTP method changes, not when the path structure changes.
  - The unversioned path `/getPatient/1` automatically redirects to `/v1/getPatient/1` once versioning is enabled.
  correct: 1
  rationale: 'API versioning must be designed in from the first public release. Clients that start calling `/getPatient/1`
    on day one have hard-coded that path. Renaming it to `/v1/patients/1` breaks every existing integration — that rename
    is itself a breaking change. Option A presents a common misconception: students assume the ID value is what clients depend
    on, not the URL structure; but REST clients bind to the full URL, not just the numeric segment. Option C conflates HTTP
    method changes (which are a separate kind of breaking change) with URL structural changes; both require a version bump
    for established clients. Option D invents automatic redirect behaviour — no framework creates redirects automatically
    when versioning is added; redirects must be explicitly configured, and even then existing clients pointing to the old
    path are broken until the redirect is live.

    '
  bloom: analyze
  source: Slide 8, Slide 11, Lesson 17
- id: public-private-keys-q-01
  type: MCQ
  topic: Asymmetric encryption — signing and verification key directions
  marks: 2
  question: 'Amir signs a message using asymmetric encryption and sends it to Tom.

    Tom wants to verify that the message came from Amir and was not altered.

    Which key does Tom use?

    '
  choices:
  - Tom's private key
  - Tom's public key
  - Amir's private key
  - Amir's public key
  correct: 3
  rationale: 'Verification uses the sender''s public key. Amir signed the message with Amir''s private key —

    only Amir holds that key, so only Amir could have produced a valid signature. Tom uses Amir''s

    public key to verify the signature: if the check passes, the message came from Amir and was

    not tampered with in transit. Tom''s own keys play no role in this verification step. Option A

    is the most seductive wrong answer, confirmed by ISAQuiz11 Q9: students confuse "verify" with

    "decrypt" and reach for the receiver''s private key. Decryption of a confidential inner envelope

    uses the receiver''s private key — but verification of a signature is a separate operation with

    the opposite key direction. Option B (Tom''s public key) would be used only if Tom had signed

    something himself and needed external parties to verify it. Option C (Amir''s private key) is

    the key Amir used to sign — it is kept secret and never shared, so Tom cannot hold it.

    '
  bloom: understand
  source: Slide 9, Slide 10, ISAQuiz11 Q9
- id: js-async-event-loop-q-01
  type: MCQ
  topic: 'The Event Loop: How JavaScript Stays Non-Blocking'
  marks: 2
  question: "What does the following code print to the console, in order?\n\n```js\nsetTimeout(function() {\n  console.log(1);\n\
    }, 1);\n\nnew Promise(function(resolve) {\n  console.log(2);\n  resolve();\n}).then(function() {\n  console.log(4);\n\
    });\n\nconsole.log(3);\n```\n"
  choices:
  - '`2`, `3`, `4`, `1`'
  - '`1`, `2`, `3`, `4`'
  - '`2`, `3`, `1`, `4`'
  - '`2`, `4`, `3`, `1`'
  correct: 0
  rationale: 'The Promise executor runs eagerly and synchronously the moment `new Promise(executor)` is

    evaluated, so `console.log(2)` fires first. `resolve()` enqueues the `.then` callback to the

    microtask queue — it does not run immediately. `console.log(3)` runs next as synchronous code.

    When the call stack empties, the event loop drains the entire microtask queue before touching any

    macrotask, so `console.log(4)` runs. Only then does the `setTimeout` macrotask fire, printing `1`.

    Distractor B (`1, 2, 3, 4`) targets students who assume `setTimeout` callbacks execute at their

    registration point rather than in the macrotask queue. Distractor C (`2, 3, 1, 4`) targets

    students who know microtasks beat macrotasks but incorrectly place the `setTimeout` callback

    before the `.then` callback. Distractor D (`2, 4, 3, 1`) targets students who correctly identify

    `2` first but assume the `.then` callback fires immediately after `resolve()` rather than after

    all synchronous code.

    '
  bloom: analyze
  source: Slide 4, ISAQuiz6 Q1, ISAQuiz6 Q14
- id: modern-web-arch-q-01
  type: MCQ
  topic: Modern Web Architecture Trends
  marks: 2
  question: 'A news organization runs a website, a mobile app, and a smart-TV interface —

    all displaying the same article content. The backend stores articles once and

    delivers them via API; each frontend renders them independently.

    Which architectural pattern describes this backend design?

    '
  choices:
  - Serverless architecture — the backend runs as stateless cloud functions invoked per request.
  - Headless architecture — the backend is decoupled from the frontend presentation layer.
  - Monolithic architecture — all three frontends share a single deployable unit.
  - Edge computing — content is processed close to the user rather than in a central data center.
  correct: 1
  rationale: 'Headless architecture decouples the backend (data and logic) from the frontend (presentation). The backend exposes
    content via API; any number of distinct frontends consume the same API and render content in whatever format suits their
    interface. This is the exact pattern described — one backend, three independent frontends. Option A (serverless) targets
    the misconception that headless and serverless are the same thing; serverless is an infrastructure decision about who
    manages servers, not a decision about frontend coupling. Option C (monolithic) targets students who confuse the fact that
    all three frontends share one backend with those frontends sharing a single deployable unit — they share an API, not a
    codebase. Option D (edge computing) is a distractor for students who associate distributed delivery (content reaching
    multiple devices) with edge processing; edge computing is about geographic proximity of compute nodes, not about frontend
    decoupling.

    '
  bloom: apply
  source: Slide 8, Lesson 18
- id: nodejs-modules-q-01
  type: MCQ
  topic: Node.js Modules
  marks: 2
  question: 'Given the following code:


    ```js

    const url = require(''url'');

    const address = ''http://localhost:8000/admin.html?user=123'';

    const parsed = url.parse(address, true);

    ```


    Which expression prints `/admin.html` — the path without the query string?

    '
  choices:
  - '`console.log(parsed.pathname)`'
  - '`console.log(parsed.path)`'
  - '`console.log(parsed.search)`'
  - '`console.log(parsed.host)`'
  correct: 0
  rationale: '`parsed.pathname` returns only the path segment of the URL — everything after the origin up to (but not including)
    the `?` character, giving `/admin.html` (ISAQuiz7 Q3, Slide 4).

    `parsed.path` includes the query string, returning `/admin.html?user=123`; using it as a filename means the server looks
    for a file whose name contains `?user=123`, which does not exist even when `admin.html` does — this is the documented
    exam trap (ISAQuiz7 Q3).

    `parsed.search` returns the raw query string portion including the `?`, giving `?user=123`.

    `parsed.host` returns the host and port (`localhost:8000`), not the path at all.

    '
  bloom: understand
  source: Slide 4, ISAQuiz7.pdf Q3
- id: password-hashing-q-01
  type: MCQ
  topic: bcrypt — cost factor and hashing semantics
  marks: 2
  question: 'A registration handler calls `bcrypt.hash(''123'', 10)`. What does the `10` control,

    and why is a higher value more secure?

    '
  choices:
  - The length of the produced hash string — a longer hash is harder to crack
  - The number of salt characters prepended to the password before hashing
  - The cost factor, which sets the number of hashing iterations to 2^10; a higher value makes each hash computation slower,
    increasing the cost of brute-force attacks
  - The encryption key size in bits — 10 means 10-bit AES encryption
  correct: 2
  rationale: 'The second argument to `bcrypt.hash()` is the cost factor (also called salt rounds). Setting

    it to 10 causes bcrypt to perform 2^10 = 1,024 internal hashing iterations before producing

    the final hash. Raising the cost factor makes each individual hash computation slower. An

    attacker attempting millions of brute-force guesses per second pays the full computational

    cost for every attempt — higher cost factor = fewer guesses per second = slower attack.

    Option A is wrong: bcrypt always produces a fixed-length 60-character hash string regardless

    of the cost factor; length is not controlled by this argument. Option B conflates the cost

    factor with salt management. bcrypt generates a random salt automatically and embeds it in the

    hash string; the second argument controls iteration count, not salt character length. Option D

    is wrong: bcrypt is a hashing function, not an encryption algorithm. There is no encryption

    key and no bits-of-AES involved. The cost factor governs computational work, not key size.

    '
  bloom: understand
  source: Slide 9, Slide 11
- id: express-framework-q-01
  type: MCQ
  topic: Express Framework
  marks: 2
  question: "An Express server has this middleware registered before all route handlers:\n\n```js\napp.use((req, res, next)\
    \ => {\n    res.setHeader('Access-Control-Allow-Origin', '*');\n    res.setHeader('Access-Control-Allow-Methods', 'GET,\
    \ POST, PUT, DELETE, OPTIONS');\n    res.setHeader('Access-Control-Allow-Headers', 'Content-Type');\n    // next() is\
    \ intentionally omitted here\n});\n\napp.get('/api/v1/patients', (req, res) => {\n    res.json(patients);\n});\n```\n\n\
    A client sends `GET /api/v1/patients`. What happens?\n"
  choices:
  - The request stalls permanently — the middleware never calls `next()`, so control never reaches the route handler.
  - Express skips the middleware because the route handler is registered first in source order.
  - The route handler executes normally — `next()` is only required in error-handling middleware.
  - The server throws a TypeError because `next` is not called within the timeout window.
  correct: 0
  rationale: 'Middleware in Express must call `next()` to pass control to the next middleware or route handler. A middleware
    that neither calls `next()` nor sends a response leaves the request permanently pending — the client waits indefinitely
    and the route handler never runs (Slide 8).

    Express executes middleware in registration order, not source-order of the route handler; the `app.use()` call precedes
    `app.get()`, so the middleware always runs first.

    `next()` is required in all middleware that does not terminate the request — not only in error handlers. Omitting it in
    any pipeline function stalls the request.

    Express does not impose a call timeout on `next()`; no TypeError is thrown. The request simply hangs with no response.

    '
  bloom: apply
  source: Slide 8
- id: oauth-ssl-q-01
  type: MCQ
  topic: OAuth 2.0 — bearer token and authorization model
  marks: 2
  question: 'After a user clicks "Login with Google" and approves the consent screen,

    Google issues a bearer token to ClientApp. An attacker intercepts the token.

    What access does the attacker gain?

    '
  choices:
  - No access — the bearer token is bound to the original user's IP address
  - Read-only access — bearer tokens cannot be used to modify data
  - Full authorization for the scopes the token covers, because anyone who holds this token is implicitly granted authorization
  - Temporary read access for 60 seconds, because bearer tokens always expire in under a minute
  correct: 2
  rationale: 'A bearer token grants authorization by possession alone: anyone who holds this token is

    implicitly granted authorization. The server does not verify the holder''s identity beyond

    checking that the token is valid and unexpired. An attacker who intercepts the token has

    the same access as ClientApp for every scope the token covers. This is why bearer tokens

    must be transmitted exclusively over HTTPS and kept out of logs, URLs, and browser-accessible

    storage. Option A is wrong: bearer tokens are not IP-bound; the bearer model specifically

    omits any proof-of-identity requirement beyond possession. Option B is wrong: the token''s

    scope is set at the consent screen and can include write permissions; bearer does not imply

    read-only. Option D is wrong: bearer tokens issued by OAuth 2.0 providers such as Google

    typically last much longer than 60 seconds (often hours or months); expiry duration is

    provider-configured and scope-dependent.

    '
  bloom: apply
  source: Slide 11
- id: sql-promises-q-01
  type: MCQ
  topic: 'Async DB queries with promises: chaining successive SQL calls'
  marks: 2
  question: "A Node.js route handler runs this code:\n\n```js\nconst promiseCon = con.promise();\n\npromiseCon\n  .query('SELECT\
    \ * FROM patient WHERE patientid = ?', [id])\n  .then(([rows]) => {\n    if (rows.length === 0) throw new Error('Not found');\n\
    \    return promiseCon.query(\n      'UPDATE patient SET name = ? WHERE patientid = ?',\n      [newName, id]\n    );\n\
    \  })\n  .then(([result]) => res.json({ updated: result.affectedRows }))\n  .catch(err => res.status(500).json({ error:\
    \ err.message }));\n```\n\nWhat does `con.promise()` return, and why is the UPDATE placed inside the first `.then()` rather\
    \ than after the chain?\n"
  choices:
  - '`con.promise()` returns a resolved Promise containing the connection; the UPDATE is placed inside `.then()` only for
    readability'
  - '`con.promise()` returns a promise-based wrapper around the connection whose `query()` calls return Promises; placing
    the UPDATE inside `.then()` guarantees it only runs after the SELECT result is available'
  - '`con.promise()` converts the connection to async/await syntax; the UPDATE must be inside `.then()` because `await` cannot
    be used with `query()`'
  - '`con.promise()` re-opens the database connection as a new socket; the UPDATE must follow the SELECT because two simultaneous
    connections would conflict'
  correct: 1
  rationale: '`con.promise()` wraps the existing connection and returns an object whose `query()` method returns a Promise
    instead of accepting a callback. Placing the UPDATE query inside the first `.then()` handler enforces ordering: the handler
    only runs after the SELECT Promise settles, so `rows` is available to check existence before the UPDATE fires. Omitting
    this and firing the UPDATE outside the chain creates a race condition where both queries enter the MySQL queue simultaneously
    and the existence check is bypassed. Choice A targets the misconception that promise chaining is cosmetic — calling `.then()`
    is the mechanism that guarantees sequential execution, not a style choice. Choice C confuses `con.promise()` with `async/await`
    syntax — it returns a promise-based wrapper, not a syntax transformation; `await` can be used with `query()` on the wrapper.
    Choice D incorrectly describes `con.promise()` as creating a new socket; it wraps the same underlying connection.

    '
  bloom: apply
  source: Slide 11
- id: nodejs-db-connect-q-01
  type: MCQ
  topic: 'Node.js MySQL connection: setup, query, and hosting'
  marks: 2
  question: "A student writes this Node.js file and runs it with `node server.js`. The process crashes immediately with `Error:\
    \ Cannot find module 'mysql'`.\n\n```js\nconst mysql = require('mysql');\nconst con = mysql.createConnection({\n  host:\
    \ 'localhost', user: 'root', password: '', database: 'mydb'\n});\ncon.connect(function(err) {\n  if (err) throw err;\n\
    \  console.log('Connected!');\n});\n```\n\nWhat is the cause, and what is the fix?\n"
  choices:
  - '`mysql` is a built-in Node.js module that must be enabled via a config flag; run `node --enable-mysql server.js`'
  - 'The `createConnection` call is missing the `port` property; add `port: 3306` to the config object'
  - '`mysql` is an external package not bundled with Node.js; run `npm install mysql` in the project directory before requiring
    it'
  - The `require` path is wrong; use `require('./mysql')` to load a local module
  correct: 2
  rationale: '`mysql` is not a built-in Node.js module. Built-in modules — `http`, `fs`, `path`, `url`, `os` — are available
    immediately via `require`. The `mysql` package must be installed from npm before it can be required; missing that step
    causes Node.js to search `node_modules/` and fail with "Cannot find module". The fix is `npm install mysql` in the project
    directory. Choice A is false — Node.js has no flag that enables a missing external package; built-in modules do not require
    flags. Choice B is a plausible distractor because `port` is a real `createConnection` option, but omitting it does not
    cause a module-not-found crash — MySQL defaults to port 3306. Choice D targets the misconception that `require` without
    a relative path means a local file; bare module names like `''mysql''` resolve to `node_modules/`, not to a local file,
    so the fix is installing the package, not changing the path.

    '
  bloom: understand
  source: Slide 5, Slide 7, Quiz 7
- id: api-documentation-q-01
  type: MCQ
  topic: OpenAPI / Swagger — swagger.json structure and purpose
  marks: 2
  question: 'A developer generates a `swagger.json` file for a RESTful API.

    Which of the following does this file document?

    '
  choices:
  - The server's deployment configuration including environment variables and port bindings
  - The API's endpoint paths, HTTP methods, request parameters, response schemas, and authentication requirements
  - The source code of each route handler so consumers can read the implementation
  - The database schema including table names and column types used by the API
  correct: 1
  rationale: 'A `swagger.json` file is an OpenAPI / Swagger Interface Description Language document that

    records the external contract of a REST API: the endpoint paths (e.g., `/patients`), their

    supported HTTP methods (GET, POST, PUT, DELETE), request parameters (path params, query

    params, headers), request body schemas (shape of JSON payloads), response schemas and status

    codes for each outcome, and authentication requirements per endpoint. It does not describe

    deployment internals or implementation details. Option A describes server configuration

    (environment variables, ports) — that belongs in deployment manifests or `.env` files, not

    in an API specification. Option C describes source code documentation (e.g., inline comments

    or JSDoc), not an interface contract; swagger.json describes what the API accepts and returns,

    not how it is implemented. Option D describes database schema documentation (e.g., an ERD or

    migration file) — the storage layer is not part of the API surface that Swagger documents.

    '
  bloom: remember
  source: Slide 11
