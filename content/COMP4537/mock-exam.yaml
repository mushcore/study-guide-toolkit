- id: js-scope-hoisting-q-01
  type: MCQ
  topic: var/let/const Scope and Hoisting
  marks: 2
  question: 'What does the following code print to the console?


    ```js

    console.log(x);

    var x = 42;

    ```

    '
  choices:
  - '`42`'
  - '`ReferenceError: x is not defined`'
  - '`undefined`'
  - '`null`'
  correct: 2
  rationale: 'The `var x` declaration is hoisted to the top of its enclosing scope before any line executes.

    Only the declaration moves — the initialization `= 42` stays at its original line — so `x` exists

    in scope but holds `undefined` when `console.log` runs. Distractor B (`ReferenceError`) targets

    the misconception that reading a variable before its written line always throws an error; that rule

    applies to `let`/`const` in the Temporal Dead Zone, not to `var`. Distractor A (`42`) targets

    students who assume the entire declaration-with-assignment is hoisted together. Distractor D

    (`null`) targets students who conflate the "not yet assigned" state with an explicit `null` value.

    '
  bloom: understand
  source: Slide 1, ISAQuiz6 Q3
- id: js-scope-hoisting-q-02
  type: MCQ
  topic: var/let/const Scope and Hoisting
  marks: 2
  question: "What does the following code print to the console?\n\n```js\nfunction show() {\n  console.log(msg);\n  var msg\
    \ = \"hello\";\n  console.log(msg);\n}\nshow();\n```\n"
  choices:
  - '`ReferenceError: msg is not defined`, then `hello`'
  - '`undefined`, then `hello`'
  - '`hello`, then `hello`'
  - '`undefined`, then `undefined`'
  correct: 1
  rationale: 'Inside `show`, the `var msg` declaration is hoisted to the top of the function body, giving `msg`

    the initial value `undefined` before any statement runs. The first `console.log(msg)` therefore

    prints `undefined`. Then the assignment `msg = "hello"` executes and the second `console.log`

    prints `"hello"`. Distractor A (`ReferenceError`) repeats the same TDZ-confusion targeted in

    q-01 — students incorrectly apply `let`/`const` semantics to `var`. Distractor C (`hello, hello`)

    targets the misconception that the entire `var msg = "hello"` statement is moved, including the

    assignment. Distractor D (`undefined, undefined`) targets students who believe the assignment

    never executes because the declaration was hoisted.

    '
  bloom: apply
  source: Slide 1, ISAQuiz6 Q3
- id: js-scope-hoisting-q-03
  type: MCQ
  topic: var/let/const Scope and Hoisting
  marks: 2
  question: "What does the following code print to the console?\n\n```js\nif (true) {\n  let score = 99;\n}\nconsole.log(score);\n\
    ```\n"
  choices:
  - '`99`'
  - '`undefined`'
  - '`ReferenceError: score is not defined`'
  - '`null`'
  correct: 2
  rationale: '`let` is block-scoped: `score` lives only inside the `if` block''s `{}`. Once that block closes,

    `score` is gone from the enclosing scope. Accessing it outside throws `ReferenceError: score is

    not defined`. Distractor A (`99`) targets students who apply `var`-style function-scope thinking

    to `let`. Distractor B (`undefined`) targets the same `var`-hoisting analogy — students expect

    `let` to hoist as `undefined` the way `var` does; it does not; `let` throws instead. Distractor D

    (`null`) targets students who conflate "out of scope" with an explicit `null` value.

    '
  bloom: understand
  source: Slide 1, ISAQuiz6 Q5
- id: rest-anatomy-q-01
  type: MCQ
  topic: Anatomy of Web APIs
  marks: 2
  question: 'A developer sends `POST /v1/patients/` three times with identical request bodies.

    How many patient records does the server create?

    '
  choices:
  - One — POST is idempotent, so duplicate calls are ignored.
  - Three — POST is not idempotent, so each call creates a new record.
  - Zero — POST requires a unique ID in the URL before the server stores anything.
  - It depends on the status code returned by the first call.
  correct: 1
  rationale: 'POST is not idempotent. An operation is idempotent if applying it multiple times produces the same result as
    applying it once; POST does not satisfy that property — each call creates a new resource, so three identical POST requests
    produce three patient records. Option A targets the misconception that POST behaves like PUT (which is idempotent) because
    both can carry a request body. Option C conflates POST with PUT/PATCH, which do require an ID in the path for single-resource
    targeting. Option D is a distractor targeting students who confuse response-code inspection with idempotency rules; the
    status code returned describes what happened, not whether the operation was safe to repeat.

    '
  bloom: remember
  source: Slide 8, ISAQuiz7.pdf Q8
  tags:
  - pretest
- id: rest-anatomy-q-02
  type: MCQ
  topic: Anatomy of Web APIs
  marks: 2
  question: 'A client sends `PUT /v1/patients/1` with a body containing only `{"phone": "604-555-0101"}`.

    The patient record currently stores `name`, `age`, and `phone`.

    What is the state of the record after the request succeeds?

    '
  choices:
  - Only `phone` is updated; `name` and `age` are unchanged.
  - The record contains only `phone`; `name` and `age` are overwritten with null or empty values.
  - The request is rejected — PUT requires all fields to be present in the body.
  - The server merges the body with the existing record, leaving no fields missing.
  correct: 1
  rationale: 'PUT replaces the entire resource. Sending a partial body overwrites the stored document — fields absent from
    the payload become null or are removed, depending on the schema. Option A describes PATCH behaviour; the misconception
    is confusing PUT (replace-whole) with PATCH (update-one-field). Option C is a common student guess — past-exam wrong answers
    show students believe the server enforces schema completeness as a precondition of PUT; it does not (schema validation
    is separate from HTTP semantics). Option D describes a merge-patch strategy that is closer to PATCH; students frequently
    imagine PUT as an intelligent merge because merging feels safer.

    '
  bloom: apply
  source: Slide 8, ISAQuiz7.pdf Q7
- id: rest-anatomy-q-03
  type: MCQ
  topic: Anatomy of Web APIs
  marks: 2
  question: 'Which statement correctly describes the difference between a `4xx` status code

    and a `5xx` status code?

    '
  choices:
  - 4xx indicates a server error; 5xx indicates a client error.
  - 4xx indicates a client error; 5xx indicates a server error.
  - Both 4xx and 5xx indicate server errors — the difference is only in severity.
  - 4xx means the request was redirected; 5xx means the request succeeded partially.
  correct: 1
  rationale: 'Status codes group by their leading digit: 2xx is success, 3xx is redirect, 4xx is client error, and 5xx is
    server error. A 4xx response means the client sent a request the server understood but could not fulfil because of something
    the client did (bad URL, missing auth, malformed body). A 5xx response means the server itself failed while processing
    a valid request. Option A reverses the two categories — a common exam mistake where students memorise the digit range
    without the direction of blame. Option C reflects a misconception that 4xx and 5xx are on a single severity scale rather
    than representing distinct fault owners. Option D conflates 3xx (redirect) with 4xx, a distractor drawn from students
    mixing up the first-digit category table.

    '
  bloom: understand
  source: Slide 3, Slide 8, ISAQuiz7.pdf Q8
- id: ajax-cors-q-01
  type: MCQ
  topic: AJAX, CORS, and Same-Origin Policy
  marks: 2
  question: 'An `XMLHttpRequest` object has just been constructed with `new XMLHttpRequest()`, but `open()` has not yet been
    called.

    What is the value of `readyState` at this point?

    '
  choices:
  - 0 (UNSENT)
  - 1 (OPENED)
  - 4 (DONE)
  - 5 (COMPLETE)
  correct: 0
  rationale: '`readyState` is set to 0 (UNSENT) immediately on construction, before any method is called on the object.

    The `open()` call advances `readyState` to 1 (OPENED); it does not start at 1.

    `readyState` 4 (DONE) is the terminal state indicating the operation is complete — confusing it with the initial state
    conflates end state with start state, a documented distractor (Slide 5, Quiz 6).

    `readyState` 5 does not exist; the scale is strictly 0–4. Checking `readyState == 5` never fires (Slide 5, Quiz 6).

    '
  bloom: remember
  source: Slide 5, ISAQuiz6.pdf
- id: ajax-cors-q-02
  type: MCQ
  topic: AJAX, CORS, and Same-Origin Policy
  marks: 2
  question: "The following handler is attached to an XHR request:\n\n```js\nxhttp.onreadystatechange = function () {\n  if\
    \ (this.readyState == 4 && this.status == 200) {\n    document.getElementById(\"result\").innerHTML = this.responseText;\n\
    \  }\n};\n```\n\nThe handler fires but the `if` block never executes.\nThe server returns HTTP 200 and the network tab\
    \ shows a completed response.\nWhich `readyState` value is `this.readyState` most likely holding when the check fails?\n"
  choices:
  - 3 (LOADING) — the response body is still arriving
  - 5 (COMPLETE) — the browser advances past DONE
  - 0 (UNSENT) — the object was never opened
  - 1 (OPENED) — open() was called but send() was not
  correct: 0
  rationale: '`onreadystatechange` fires on every state transition, including 1, 2, and 3 (LOADING), where the response body
    is still streaming in.

    If `readyState` is 3 when the handler fires, the `== 4` check fails even though the server has responded — the transition
    to 4 (DONE) happens on a subsequent fire.

    `readyState` 5 does not exist; the value never advances past 4 (Slide 5, Quiz 6). Believing the browser increments past
    DONE is a common distractor.

    States 0 and 1 precede `send()`, so the handler would not have fired from network activity at those points.

    '
  bloom: apply
  source: Slide 5, ISAQuiz6.pdf
- id: ajax-cors-q-03
  type: MCQ
  topic: AJAX, CORS, and Same-Origin Policy
  marks: 2
  question: 'A browser script on `http://localhost:3000` uses XHR to send the following request:


    ```js

    xhttp.open("DELETE", "http://api.example.com/users/42", true);

    xhttp.withCredentials = true;

    xhttp.send();

    ```


    The server at `http://api.example.com` responds with:


    ```

    Access-Control-Allow-Origin: *

    Access-Control-Allow-Credentials: true

    ```


    What does the browser do with the response?

    '
  choices:
  - Rejects the response — `withCredentials` requires a specific origin, not `*`
  - Accepts the response — both CORS headers are present
  - Rejects the response — DELETE always requires a separate preflight that was not shown
  - Accepts the response — `withCredentials` is only checked for POST requests
  correct: 0
  rationale: 'When `withCredentials` is `true`, the browser requires `Access-Control-Allow-Origin` to name a specific origin
    (e.g. `http://localhost:3000`), not the wildcard `*`. The wildcard and credentials flag are mutually exclusive; the browser
    rejects the response even if `Access-Control-Allow-Credentials: true` is present (Slide 5, Slide 9).

    Thinking both CORS headers together are sufficient ignores the spec rule that `*` is never acceptable with credentials
    — the combination is invalid regardless of other headers.

    The preflight distractor is accurate in isolation (DELETE is non-simple and does trigger a preflight), but the question''s
    stated failure cause is the `*` + `withCredentials` conflict, not a missing preflight.

    `withCredentials` applies to all HTTP methods, not only POST; limiting it to POST reflects a misconception about how the
    flag works.

    '
  bloom: analyze
  source: Slide 5, Slide 9, Slide 10
- id: httponly-cookies-q-01
  type: MCQ
  topic: HttpOnly cookies — flags and XSS protection
  marks: 2
  question: 'A login endpoint issues a session token. The token is stored in an HttpOnly cookie.

    An attacker injects a script that calls `document.cookie`. What does the script retrieve?

    '
  choices:
  - The full token value, because document.cookie returns all cookies
  - An empty string, because HttpOnly blocks JavaScript from reading that cookie
  - An encrypted form of the token, which the attacker must decrypt
  - A browser error, because document.cookie is disabled when HttpOnly cookies are present
  correct: 1
  rationale: 'The HttpOnly flag blocks JavaScript from reading the cookie value. Any call to `document.cookie`

    returns an empty string for cookies marked HttpOnly — the browser manages them exclusively and

    never exposes their value to page scripts. This removes the read surface that XSS exploits rely on.

    Option A targets the misconception that HttpOnly merely hides the cookie from some APIs but not

    `document.cookie` itself. Option C confuses HttpOnly (an access restriction) with encryption (a

    transformation of the stored value). Option D wrongly implies HttpOnly disables the `document.cookie`

    API globally rather than simply withholding the HttpOnly cookie value from its output.

    '
  bloom: understand
  source: Slide 9, Slide 10, ISAQuiz11 Q1
- id: httponly-cookies-q-02
  type: MCQ
  topic: HttpOnly cookies — risks of omission
  marks: 2
  question: 'A developer sets a JWT cookie without the `HttpOnly` attribute. Which risks does this create?

    '
  choices:
  - Cross-site scripting (XSS) attacks only
  - Cross-site request forgery (CSRF) attacks only
  - Session hijacking attacks only
  - 'All of: XSS attacks, CSRF attacks, and session hijacking'
  correct: 3
  rationale: 'Omitting HttpOnly opens all three attack vectors simultaneously, not just one. Without HttpOnly,

    injected scripts can read the token via `document.cookie` (XSS theft). Without SameSite and Secure

    protections working as a system, forged cross-site requests can carry the cookie (CSRF). And with

    the token exposed, an attacker can impersonate the session (session hijacking). The cookie flags work

    as a system — each one closes a distinct attack surface. Option A is the most common wrong answer on

    ISAQuiz11 Q3: selecting only XSS scores zero because the other two vectors are equally real. Option B

    wrongly targets CSRF in isolation; CSRF is mitigated primarily by SameSite, but omitting HttpOnly still

    worsens the overall security posture. Option C wrongly isolates session hijacking as the sole risk.

    '
  bloom: analyze
  source: Slide 9, Slide 10, ISAQuiz11 Q3, ISAQuiz11 Q8
- id: httponly-cookies-q-03
  type: MCQ
  topic: HttpOnly cookies — cross-origin credential flow
  marks: 2
  question: 'A React app at `http://localhost:3000` makes an XHR request to an Express server at

    `http://localhost:5000`. The server sets an HttpOnly cookie on login. Every subsequent

    GET request to `/profile` returns 401. `withCredentials` is not set on the XHR.

    What is the cause?

    '
  choices:
  - The HttpOnly flag prevents the browser from sending the cookie on any request
  - The browser strips cookies from cross-origin requests when withCredentials is false
  - The Secure flag is required before the browser will send an HttpOnly cookie
  - The server must echo `Set-Cookie` on every response for the cookie to persist
  correct: 1
  rationale: 'For cross-origin requests, the browser strips all cookies when `withCredentials` is `false`

    (the default). The server receives no authentication cookie and cannot identify the user, so it

    returns 401. Setting `withCredentials: true` on the XHR, combined with the server returning

    `Access-Control-Allow-Credentials: true`, causes the browser to include the HttpOnly cookie.

    Option A is wrong: HttpOnly restricts JavaScript read access, not the browser''s own sending

    mechanism — the browser continues to attach HttpOnly cookies to same-origin requests automatically.

    Option C confuses the Secure flag''s role (HTTPS-only transmission) with the withCredentials

    mechanism that governs cross-origin cookie sending. Option D is wrong: a cookie set via Set-Cookie

    persists without being re-issued on every response, until it expires or is explicitly deleted.

    '
  bloom: apply
  source: Slide 9, Slide 10, ISAQuiz11
- id: promises-basics-q-01
  type: MCQ
  topic: 'Promises: Constructor, States, and Eager Execution'
  marks: 2
  question: "What is the output of the following code?\n\n```js\nconst fn1 = () => new Promise((resolve, reject) => {\n  console.log(1);\n\
    \  resolve('success');\n});\n\nfn1().then((res) => {\n  console.log(res);\n});\n\nconsole.log('start');\n```\n"
  choices:
  - '`1`, `start`, `success`'
  - '`start`, `1`, `success`'
  - '`1`, `success`, `start`'
  - '`start`, `success`, `1`'
  correct: 0
  rationale: 'The executor runs eagerly — immediately on construction, before any `.then()` is attached or any subsequent
    synchronous statement executes. `console.log(1)` fires first because it sits inside the executor. `resolve(''success'')`
    changes the Promise state to fulfilled synchronously, but the `.then()` callback is not called at that moment; it is enqueued
    as a microtask. `console.log(''start'')` is the next synchronous statement and runs before the microtask queue drains,
    so `start` appears second. Only after the call stack empties does the microtask queue drain, printing `success` last.
    Distractor B targets the misconception that the executor is deferred until a consumer attaches — students who believe
    `.then()` triggers the executor would expect `start` first. Distractor C targets students who assume `resolve()` calls
    the `.then()` handler inline, before returning to the outer synchronous code. Distractor D targets students who believe
    both the executor and the handler are deferred, placing all async activity after synchronous code.

    '
  bloom: apply
  source: Slide 6, ISAQuiz8 Q2
- id: promises-basics-q-02
  type: MCQ
  topic: 'Promises: Constructor, States, and Eager Execution'
  marks: 2
  question: "What is the output of the following code?\n\n```js\nlet promise = new Promise(function(resolve, reject) {\n \
    \ console.log('2');\n  reject('3');\n  resolve('4');\n  console.log('5');\n});\npromise.then(\n  (val)    => console.log(val),\n\
    \  (reason) => console.log(reason)\n);\nconsole.log('1');\n```\n"
  choices:
  - '`2`, `5`, `1`, `3`'
  - '`2`, `5`, `1`, `4`'
  - '`2`, `5`, `3`, `1`'
  - '`1`, `2`, `5`, `3`'
  correct: 0
  rationale: 'The executor runs eagerly, so `console.log(''2'')` fires first. `reject(''3'')` immediately transitions the
    Promise to rejected and enqueues the rejection handler as a microtask with argument `''3''`. `resolve(''4'')` arrives
    after the Promise is already settled — settlement is permanent, so this call is silently ignored and `''4''` never appears
    in the output. `console.log(''5'')` still executes synchronously inside the executor. After the executor returns, `promise.then(...)`
    registers the handlers (the rejection handler is already queued). `console.log(''1'')` runs synchronously. Only after
    the call stack empties does the microtask queue drain, invoking the rejection handler and printing `''3''`. Distractor
    B targets the misconception that `resolve()` wins over `reject()` because it follows it, causing `''4''` instead of `''3''`.
    Distractor C targets students who believe microtasks drain immediately after `reject()` fires, printing `''3''` before
    the synchronous `console.log(''1'')`. Distractor D targets students who expect the executor to be deferred, placing the
    synchronous `console.log(''1'')` before the executor body.

    '
  bloom: analyze
  source: Slide 6, ISAQuiz8 Q3
- id: promises-basics-q-03
  type: MCQ
  topic: 'Promises: Constructor, States, and Eager Execution'
  marks: 2
  question: 'Which statement about Promise states is **incorrect**?

    '
  choices:
  - A pending Promise can be fulfilled with a value or rejected with a reason.
  - Once a Promise is settled, calling `resolve()` or `reject()` again on it has no effect.
  - A Promise transitions from pending to fulfilled when `resolve()` is called, and from pending to rejected when `reject()`
    is called.
  - A pending Promise cannot be fulfilled with a value or rejected with a reason.
  correct: 3
  rationale: 'The incorrect statement is D. A Promise in the pending state is precisely the state in which it *can* be fulfilled
    or rejected — that is the only state from which a transition is possible. `resolve(value)` transitions pending to fulfilled;
    `reject(reason)` transitions pending to rejected. Once a Promise leaves the pending state it is settled, and all subsequent
    calls to `resolve()` or `reject()` are silent no-ops (statement B). Statement A and C correctly describe valid one-way
    transitions. Distractor A looks suspicious to students who conflate "pending" with "not yet usable," but pending is the
    active, transitionable state. Distractor B mirrors a real pitfall — some students assume multiple `resolve()` calls each
    trigger a `.then()` handler, which is false. Distractor C is a restatement of the correct state-machine transitions and
    is therefore a true statement, not the incorrect one.

    '
  bloom: remember
  source: Slide 6, ISAQuiz8 Q4
- id: db-relational-design-q-01
  type: MCQ
  topic: 'Relational DB design: keys, relationships, and normalization'
  marks: 2
  question: 'A `Student` table has columns `studentID (PK)`, `name`, `enrollmentDate`. A separate `Enrollment` table has columns
    `enrollmentID (PK)`, `studentID`, `courseCode`, `grade`.


    Which column in `Enrollment` is the **foreign key**, and what does its presence enforce?

    '
  choices:
  - '`enrollmentID` — it uniquely identifies each enrollment row'
  - '`studentID` in `Enrollment` — it references `Student.studentID` and enforces referential integrity'
  - '`studentID` in `Student` — it links the parent table back to the child table'
  - '`courseCode` — it references the course catalog and acts as the join column'
  correct: 1
  rationale: '`Enrollment.studentID` is the foreign key because it references the primary key of the `Student` table. A foreign
    key enforces referential integrity — every value stored in `Enrollment.studentID` must already exist as a `studentID`
    in `Student`, preventing orphan rows. Choice A targets the misconception that the primary key of the child table is the
    foreign key; `enrollmentID` uniquely identifies enrollment rows but does not reference another table. Choice C reverses
    the direction — the parent table''s primary key is not a foreign key pointing to its own child. Choice D targets the misconception
    that any join column is a foreign key; `courseCode` has no declared FK constraint in this schema.

    '
  bloom: understand
  source: Slide 7, Quiz 10
- id: db-relational-design-q-02
  type: MCQ
  topic: 'Relational DB design: keys, relationships, and normalization'
  marks: 2
  question: 'A clinic database has a `patient` table (`patientid PK`, `name`) and a `visit` table (`visitid PK`, `patientid
    FK`, `visitDate`). A developer tries to delete the row for `patientid = 5` from `patient`, but the DELETE fails.


    What is the most likely reason?

    '
  choices:
  - Primary keys cannot be deleted once inserted
  - The `visit` table has no primary key, so the constraint cannot be evaluated
  - One or more rows in `visit` still reference `patientid = 5`, and the active foreign key constraint blocks deletion
  - The `patientid` column in `visit` must be set to NULL before the parent row can be deleted
  correct: 2
  rationale: 'MySQL enforces referential integrity by blocking DELETE on a parent row that has matching child rows. If `visit`
    contains rows where `patientid = 5`, removing the parent row in `patient` would create orphan records — visit rows pointing
    to a nonexistent patient. The constraint stops this by default. Choice A is false — primary key values are deletable when
    no child rows reference them. Choice B is false — the foreign key constraint is on `visit.patientid`; whether `visit`
    has its own primary key does not affect enforcement of that FK. Choice D reflects a partial truth (NULLing child FKs before
    deleting the parent is one resolution strategy) but is not the reason the DELETE fails — it describes a workaround, not
    the cause.

    '
  bloom: apply
  source: Slide 7, Quiz 10
- id: db-relational-design-q-03
  type: MCQ
  topic: 'Relational DB design: keys, relationships, and normalization'
  marks: 2
  question: 'A table stores employee data with columns: `employeeID (PK)`, `name`, `officeCity`, `officeCountry`. Every cell
    holds exactly one value and every row is unique.


    Which normal form statement is correct?

    '
  choices:
  - The table violates both 1NF and 2NF
  - The table violates 1NF but complies with 2NF
  - The table complies with 2NF and therefore also complies with 1NF
  - The table complies with 1NF but violates 2NF
  correct: 3
  rationale: '1NF requires every column to hold one atomic value per row with no repeating groups — this table satisfies that
    because each cell holds a single value. 2NF requires every non-key column to depend on the entire primary key. Here `officeCountry`
    is determined by `officeCity`, not by `employeeID` — that partial transitive dependency violates 2NF. Choice A targets
    the misconception from ISAQuiz10 Q5 where students incorrectly marked the table as violating both forms; since all values
    are atomic, 1NF holds. Choice B is logically impossible: 2NF requires 1NF as a prerequisite, so a table cannot violate
    1NF while complying with 2NF. Choice C targets the misconception that satisfying 2NF automatically means the table is
    fully normalized beyond scrutiny; the statement is structurally plausible but wrong here because 2NF is violated.

    '
  bloom: analyze
  source: Slide 7, Slide 10, Quiz 10 Q5
- id: js-functions-q-01
  type: MCQ
  topic: Function declarations, callbacks, first-class functions, closures
  marks: 2
  question: "What does the following code print to the console?\n\n```js\nfunction hiGenerator(greeting) {\n  return function(name)\
    \ {\n    return greeting + ', ' + name;\n  };\n}\nconst sayHi = hiGenerator('Hello');\nconsole.log(sayHi('World'));\n\
    ```\n"
  choices:
  - '`undefined, World`'
  - '`Hello, World`'
  - '`ReferenceError: greeting is not defined`'
  - Nothing is printed — `sayHi('World')` returns a value but `console.log` is never reached
  correct: 1
  rationale: '`hiGenerator(''Hello'')` runs and binds `greeting` to `''Hello''`, then returns the inner function.

    That inner function is a closure: it retains a reference to `greeting` in its scope chain even

    after `hiGenerator` has returned. When `sayHi(''World'')` is called, `greeting` is still `''Hello''`

    and `name` is `''World''`, so the return value is `''Hello, World''`, which `console.log` prints.

    Distractor A (`undefined, World`) targets students who assume `greeting` is lost after

    `hiGenerator` returns, expecting the variable to read as `undefined`. Distractor C (`ReferenceError`)

    targets students who believe closures cannot access outer-scope variables after the enclosing

    function exits. Distractor D targets students confused by the `console.log` call being outside

    the function — it is in the outer scope and executes normally.

    '
  bloom: apply
  source: Slide 3, ISAQuiz6 Q12
- id: js-functions-q-02
  type: MCQ
  topic: Function declarations, callbacks, first-class functions, closures
  marks: 2
  question: "What does the following code print to the console?\n\n```js\nfunction tripleNumber(n) { return n * 3; }\nfor\
    \ (let i = 0; i < 4; i++) {\n  console.log(tripleNumber(i));\n}\n```\n"
  choices:
  - '`0`, `3`, `6`, `9`'
  - '`undefined`, `undefined`, `undefined`, `undefined`'
  - '`0`, `3`, `6`, `9` — then `Error: tripleNumber is undefined`'
  - '`3`, `6`, `9`, `12`'
  correct: 0
  rationale: '`tripleNumber` returns `n * 3`. The loop runs for `i = 0, 1, 2, 3` and passes each `i` as the

    argument. The four return values are `0`, `3`, `6`, `9`, each immediately passed to `console.log`.

    Distractor B (`undefined × 4`) targets students who confuse a missing `return` statement with the

    present one — in ISAQuiz3 Q12 this exact distractor appeared for a case where the function

    lacked `return`; here the function does have `return`. Distractor C targets students who believe

    a function cannot be called inside a loop multiple times. Distractor D (`3, 6, 9, 12`) targets

    students who incorrectly start the loop at `i = 1` rather than `i = 0`, or who add 1 to each index.

    '
  bloom: apply
  source: Slide 3, ISAQuiz3 Q12
- id: jwt-q-01
  type: MCQ
  topic: JWT — structure and components
  marks: 2
  question: 'A JWT produced by `jwt.sign({ username }, TOKEN_SECRET, { algorithm: ''HS256'' })` has

    which three parts, in order?

    '
  choices:
  - Header, Payload, and Certificate
  - Header, Body, and Footer
  - Header, Payload, and Signature
  - Header, Body, and Digest
  correct: 2
  rationale: 'A JWT is three Base64url-encoded strings joined by dots: header, payload, and signature.

    The header declares the algorithm and token type. The payload carries claims such as username

    and expiry. The signature is the HMAC of the header and payload computed with the secret key —

    it proves the token was not tampered with. Option A is the primary distractor in ISAQuiz11 Q5:

    "Certificate" has no meaning in JWT; a certificate is an X.509 structure used in TLS, not a JWT

    component. Option B replaces both correct terms: "Body" is not a JWT term (the correct term is

    Payload), and "Footer" does not exist in the specification. Option D combines the wrong "Body"

    term with "Digest," which is a raw hash output — not the same as a keyed HMAC signature.

    '
  bloom: remember
  source: Slide 10, ISAQuiz11 Q5
- id: jwt-q-02
  type: MCQ
  topic: JWT — signing mechanism and secret key
  marks: 2
  question: 'A server signs a JWT using `jwt.sign({ username }, TOKEN_SECRET, { algorithm: ''HS256'' })`.

    The token is later returned by the client. How does the server verify the token has not

    been tampered with?

    '
  choices:
  - It decrypts the token with the secret key and checks the payload matches its session store
  - It recomputes the HS256 signature over the received header and payload using the secret key and compares it to the token's
    signature
  - It calls a third-party certificate authority to verify the token's certificate
  - It hashes the entire token with bcrypt and compares the result to a stored hash
  correct: 1
  rationale: 'JWT verification is stateless: the server recomputes the HS256 signature by running HMAC-SHA256

    over the Base64url-encoded header and payload using the same secret key used at signing time.

    If the recomputed signature matches the signature in the token, the token is authentic and

    unmodified. No database lookup or session store is required. Option A conflates JWT with

    session-based authentication: JWT does not use a session store, and the token is not encrypted —

    it is signed. A common trap is to say the server "decrypts" the token; HS256 is HMAC, not

    encryption. Option C is a misconception about asymmetric JWT variants (RS256 uses a

    certificate-authority-backed key pair), but even then the server verifies a signature using its

    own key, not an external certificate authority call. Option D confuses bcrypt (a slow

    password-hashing function) with the keyed HMAC used for JWT signing; bcrypt is used for password

    storage, not token verification.

    '
  bloom: analyze
  source: Slide 10, ISAQuiz11 Q7
- id: jwt-q-03
  type: MCQ
  topic: JWT — storage security and XSS exposure
  marks: 2
  question: 'A developer stores a JWT in `localStorage` instead of an HttpOnly cookie.

    What attack does this enable that HttpOnly cookie storage prevents?

    '
  choices:
  - An attacker can intercept the JWT over the network because localStorage is not encrypted
  - An injected script can call `localStorage.getItem('token')` and exfiltrate the JWT
  - The JWT expires immediately because localStorage clears on tab close
  - Cross-site request forgery (CSRF) attacks, because the browser sends localStorage values automatically
  correct: 1
  rationale: 'Storing a JWT in `localStorage` makes it readable by any JavaScript on the page, including

    injected scripts from a Cross-Site Scripting (XSS) attack. An attacker who achieves XSS calls

    `localStorage.getItem(''token'')` and ships the value to their server. An HttpOnly cookie is

    invisible to JavaScript — the browser holds it and sends it on requests, but the page script

    never sees the value, so there is nothing to steal via XSS. Option A is wrong: localStorage

    stores data in the browser''s memory and is not transmitted over the network by itself; the

    Secure flag on cookies (not storage location) addresses interception. Option C is wrong:

    localStorage persists across tabs and sessions until explicitly cleared; sessionStorage clears

    on tab close, but JWT expiry is controlled by the `expiresIn` claim, not storage. Option D

    inverts the CSRF mechanism: the browser automatically sends cookies (which is why SameSite

    matters), not localStorage values; localStorage does not participate in automatic credential

    sending, so CSRF is not its primary risk.

    '
  bloom: apply
  source: Slide 10, Slide 11, ISAQuiz11 Q8
- id: web-arch-patterns-q-01
  type: MCQ
  topic: Web Architectural Patterns
  marks: 2
  question: 'A startup deploys its entire product — UI, business logic, and database access —

    as a single deployable unit. The team needs to add a coupon feature.

    What must happen before the new code reaches users?

    '
  choices:
  - Only the UI component is redeployed; business logic and data access layers continue running.
  - The entire application must be shut down, recompiled, and redeployed.
  - The coupon feature is deployed as a separate service without touching the running app.
  - The database access layer is updated independently while the rest of the app stays live.
  correct: 1
  rationale: 'Monolithic architecture packages all components into one deployable unit. Any change — even to a single feature
    — requires shutting down, rebuilding, and redeploying the entire application. Option A describes layered architecture
    behaviour where individual layers can theoretically be replaced, not a monolith where no such boundary exists. Option
    C describes MSA — the ability to deploy a single service without touching others is the defining advantage that motivated
    the migration away from monolithic design. Option D is a distractor targeting students who confuse layered architecture
    (where layers are logical boundaries) with truly independent deployability; in a monolith, the layers are logical, not
    process-level.

    '
  bloom: understand
  source: Slide 2, Lesson 15
- id: web-arch-patterns-q-02
  type: MCQ
  topic: Web Architectural Patterns
  marks: 2
  question: 'In the API-centric architecture pattern, what is the role of the API gateway?

    '
  choices:
  - It stores data for all backend services so they share a common database.
  - It routes every client HTTP request to the appropriate backend service and returns JSON to the client.
  - It renders HTML pages on the server and sends them directly to the browser.
  - It handles only authentication; all other requests bypass it and reach services directly.
  correct: 1
  rationale: 'In API-centric MSA, the API gateway is the sole entry point for all client requests. The client never calls
    individual services directly; the gateway routes each request to the correct service, which returns JSON, and the gateway
    relays the response. Option A confuses the gateway with a shared database — MSA explicitly avoids shared data stores to
    preserve service independence. Option C describes server-side rendering (SSR), which is the opposite of the API-first
    / headless pattern; in API-centric design, the client handles all rendering. Option D describes an authentication proxy,
    a limited deployment pattern where only auth goes through a gateway; full API-centric design routes all traffic, not just
    auth.

    '
  bloom: analyze
  source: Slide 2, Lesson 15
- id: sql-crud-q-01
  type: MCQ
  topic: 'SQL CRUD: querying and modifying data'
  marks: 2
  question: Which SQL statement retrieves all columns and all rows from a table named `orders`?
  choices:
  - '`SELECT all FROM orders;`'
  - '`SELECT * FROM orders;`'
  - '`GET * FROM orders;`'
  - '`FETCH orders;`'
  correct: 1
  rationale: '`SELECT * FROM orders` is valid SQL: `*` is the wildcard that returns every column, and `FROM orders` identifies
    the source table. Choice A is the trap directly tested in ISAQuiz10 Q7 — `all` is not a valid SQL keyword in a SELECT
    column list; the statement produces a syntax error. Choice C uses `GET`, which is not a SQL keyword; SQL uses SELECT for
    reads. Choice D uses `FETCH`, which is a cursor operation in some SQL dialects, not a standalone table query — it does
    not retrieve all rows from a named table without a preceding cursor declaration.

    '
