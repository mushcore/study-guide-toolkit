- id: artisan-composer
  name: "Artisan CLI and Composer"
  tags: [artisan, composer, cli, laravel]
  prose: "Composer creates and manages Laravel projects; Artisan is Laravel's built-in CLI for scaffolding files, running the server, and managing the app lifecycle. Every Artisan command uses the `php artisan` prefix with colon-separated subcommands."
  cards:

    - type: name
      prompt: "What single Artisan command creates a new Eloquent model AND its database migration at the same time?"
      answer: "php artisan make:model ModelName -m"
      explanation: "The `-m` flag tells Artisan to generate a matching migration alongside the model file. Without it you get only the model and must run `make:migration` separately."
      example: "`php artisan make:model Student -m` produces `app/Models/Student.php` and a timestamped migration in `database/migrations/`."
      source: "laravel_with_sqlite_API_SCRIPT.docx"
      bloom: remember

    - type: cloze
      prompt: "Artisan scaffold commands use a {{colon}} separator, not a hyphen — for example, `php artisan {{make:migration}} create_students_table`."
      answer: "colon; make:migration"
      explanation: "Laravel's command namespaces are colon-delimited (`make:migration`, `make:controller`, `make:model`). The hyphen form is a common distractor on the exam and does not exist."
      example: "final-practice.docx Q6: option (b) `php artisan make:migration user-table` is correct; option (c) `php artisan make-migration user-table` is wrong."
      source: "intro_to_laravel.pptx slide 10; final-practice.docx Q6"
      bloom: remember

    - type: name
      prompt: "Which Artisan command opens an interactive REPL that lets you query Eloquent models directly in the terminal?"
      answer: "php artisan tinker"
      explanation: "Tinker boots the full Laravel application in a REPL so you can run Eloquent queries, test relationships, and inspect data without writing a controller or opening a browser."
      example: "After running `php artisan tinker`, you can type `\\App\\Models\\Student::all()` to see all rows in the students table."
      source: "Week9 - Table of Contents.html"
      bloom: understand

    - type: cloze
      prompt: "To scaffold a controller with all seven RESTful methods (index, create, store, show, edit, update, destroy), you run `php artisan make:controller Name {{--resource}}`."
      answer: "--resource"
      explanation: "The `--resource` flag tells Artisan to pre-populate the controller with all standard RESTful method stubs. Without it, the controller is generated empty."
      example: "`php artisan make:controller api/StudentsController --resource` creates a controller with all 7 CRUD-mapped methods ready to fill in."
      source: "laravel_with_sqlite_API_SCRIPT.docx"
      bloom: remember

    - type: name
      prompt: "You edited `.env` to change the database name, but Laravel is still connecting to the old database. Which Artisan command clears the cached configuration?"
      answer: "php artisan config:clear"
      explanation: "Laravel caches configuration for performance. When you change `.env` or any file under `config/`, run `php artisan config:clear` to force Laravel to re-read the updated values."
      example: "Run `php artisan config:clear` after changing `DB_DATABASE` in `.env`, then restart the server."
      source: "intro_to_laravel.pptx slide 10"
      bloom: understand

    - type: name
      prompt: "What is the Composer command to create a brand-new Laravel project in a folder called `my-app`?"
      answer: "composer create-project laravel/laravel my-app"
      explanation: "Composer downloads the Laravel skeleton and all dependencies into `my-app/`. The `vendor/` folder it creates is git-ignored; teammates restore it with `composer install`."
      example: "Running `composer create-project laravel/laravel laravel-rocks` followed by `php artisan serve --port=8888` gives you a working app at `http://localhost:8888`."
      source: "intro_to_laravel.pptx slide 6; intro_to_laravel_SCRIPT.docx"
      bloom: remember

    - type: cloze
      prompt: "After cloning a Laravel repo where `vendor/` is missing, you restore all dependencies with `{{composer install}}`."
      answer: "composer install"
      explanation: "`composer install` reads `composer.json` and downloads every listed package. `composer create-project` is only for initial project creation, not restoration."
      example: "`vendor/` is in `.gitignore` by default; `composer install` is the standard onboarding step for any cloned Laravel project."
      source: "intro_to_laravel_SCRIPT.docx"
      bloom: understand

    - type: name
      prompt: "Which Artisan command drops all tables, runs every migration fresh, and then runs all seeders?"
      answer: "php artisan migrate:refresh --seed"
      explanation: "`migrate:refresh` rolls back then re-applies every migration. The `--seed` flag then invokes all database seeders, giving you a clean populated database in one step."
      example: "Use `php artisan migrate:refresh --seed` during development whenever you change a migration and need sample data rebuilt from scratch."
      source: "laravel_with_sqlite_API_SCRIPT.docx"
      bloom: remember
