    question: Which CSS framework does Laravel Breeze use for its scaffolded views?
    choices:
      - Bootstrap
      - Bulma
      - Foundation
      - Tailwind CSS
    correct: 3
    rationale: >-
      Laravel Breeze scaffolds all its authentication views using Tailwind CSS utility classes. The course materials
