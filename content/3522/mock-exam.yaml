    bloom: understand
    source: "Week 3 Slides"
    question: "A Worker interface with methods work(), eat(), sleep() forces a Robot(Worker) subclass to stub out eat() and sleep(). Which principle addresses this?"
    choices:
      - "Interface Segregation Principle — split into smaller interfaces"
      - "Single Responsibility Principle"
