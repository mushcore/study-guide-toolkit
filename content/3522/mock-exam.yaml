  - id: polymorphism-q-01
    type: MCQ
    topic: "Polymorphism + Duck typing"
    marks: 2
    tags: [oop]
    bloom: understand
    source: "Week 2 Slides"
    question: "In Python duck typing, what makes two objects 'compatible' for a given operation?"
    choices:
      - "They share a common base class"
      - "They implement the same interface explicitly"
      - "They expose the same methods needed by the calling code"
      - "They have identical attribute names"
    correct: 2
    rationale: "Duck typing: 'if it walks like a duck and quacks like a duck, it IS a duck'. Python checks method availability at call time, not inheritance. Option A describes nominal typing (Java-style). B describes explicit interface-realization. D is too weak — attribute names alone don't guarantee behavior. 'Expose the same methods' captures Python's approach: as long as the required methods are callable, types are compatible."
