  # ============ True / False (reflects real exam section 1) ============
  - id: state-q-01
    type: MCQ
    topic: "State pattern"
    marks: 1
    tags: [true-false, pretest]
    bloom: remember
    source: "DesignPatternsTable p.3, Week 10 Slides"
    question: "TRUE or FALSE: In the State design pattern, state objects are completely independent and unaware of each other."
    choices: ["TRUE", "FALSE"]
    correct: 1
    rationale: "FALSE. State objects typically know about other state classes — they instantiate the next state in their transition logic (e.g., `Red.next()` creates `Green()`). The description of 'independent and unaware of each other' fits Observer pattern, where observers are independent peers. This is a canonical exam trap — distractor C in the past final's T/F Q7. The rationale for TRUE being wrong: State requires state objects to coordinate transitions; independence would break the state machine."

  - id: decorator-q-01
    type: MCQ
    topic: "Decorator vs Proxy"
    marks: 1
    tags: [true-false, pretest]
    bloom: understand
    source: "Dec 2024 Final T/F Q3"
    question: "TRUE or FALSE: The Decorator and Proxy patterns have similar structures but very different intents."
    choices: ["TRUE", "FALSE"]
    correct: 0
    rationale: "TRUE. Both wrap an object that implements the same interface as the wrapped object. Decorator adds behavior (each layer contributes a slice of functionality, stackable as A(B(C()))). Proxy controls access (caching, auth, logging, lazy load) and typically has one proxy per concern. The structural similarity is what makes them confusable on the exam; the intent is what distinguishes them. FALSE would require the structures to differ — they don't."

  - id: dip-q-01
    type: MCQ
    topic: "DIP"
    marks: 1
    tags: [true-false, pretest]
    bloom: remember
    source: "Dec 2024 Final T/F Q2, Week 3 Slides"
    question: "TRUE or FALSE: The Dependency Inversion Principle states that both high-level and low-level modules should depend on abstractions, not concrete implementations."
    choices: ["TRUE", "FALSE"]
    correct: 0
    rationale: "TRUE. DIP rule 1 says high-level modules should not depend on low-level modules; both should depend on abstractions. Rule 2 adds: abstractions should not depend on details; details should depend on abstractions. FALSE would contradict the core statement of DIP. Note the common distractor flip 'Abstractions depend on details' which IS false — so a T/F statement with that wording would require a FALSE answer."

  - id: range-q-01
    type: MCQ
    topic: "Ranges"
    marks: 1
    tags: [true-false, pretest]
    bloom: analyze
    source: "finalexamsmerge.pdf T/F"
    question: "TRUE or FALSE: The function range() in Python returns a generator object that lazily evaluates its values."
    choices: ["TRUE", "FALSE"]
    correct: 1
    rationale: "FALSE. range() returns a range OBJECT — a lazy sequence. It IS lazy (values are computed on demand), but it is NOT a generator. Range objects are indexable (`range(10)[5] == 5`), have a known length (`len(range(10)) == 10`), and can be iterated multiple times — all properties generators lack. The 'lazy' half of the statement is true; the 'generator' half makes the full claim false."

  - id: staticmethod-q-01
    type: MCQ
    topic: "Language decorators"
    marks: 1
    tags: [true-false]
    bloom: understand
    source: "Dec 2024 Final T/F Q1"
    question: "TRUE or FALSE: The @staticmethod decorator allows a method to access class-level variables."
    choices: ["TRUE", "FALSE"]
    correct: 1
    rationale: "FALSE. @staticmethod methods receive neither `self` nor `cls` — they are just functions namespaced inside a class. @classmethod is the decorator that receives `cls` and can access class-level variables. A static method can only access class variables by hard-coded class name, which couples it to the specific class. This distinction is tested directly — don't confuse the three method decorators."

  - id: args-q-01
    type: MCQ
    topic: "Exceptions"
    marks: 1
    tags: [true-false]
    bloom: remember
    source: "finalexamsmerge.pdf T/F"
    question: "TRUE or FALSE: The args attribute of an exception contains a tuple of all arguments passed to the exception during initialization."
    choices: ["TRUE", "FALSE"]
    correct: 0
    rationale: "TRUE. Every exception instance stores its positional constructor arguments in `self.args` as a tuple. `raise ValueError('bad', 42)` produces an exception with `e.args == ('bad', 42)`. This is a stable, testable Python behavior. Custom exceptions inherit the behavior by calling `super().__init__(*args)`."

  - id: json-dumps-q-01
    type: MCQ
    topic: "JSON"
    marks: 1
    tags: [true-false]
    bloom: remember
    source: "finalexamsmerge.pdf T/F"
    question: "TRUE or FALSE: The json.dumps() method can be used to directly write a Python dictionary to a .json file."
    choices: ["TRUE", "FALSE"]
    correct: 1
    rationale: "FALSE. json.dumps() (with 's') returns a JSON-encoded STRING — it does not touch files. To write to a file, use json.dump() (without 's') with an open file object: `json.dump(obj, f)`. Mnemonic: no-s writes (to file), with-s string. Same convention applies to pickle module (dump vs dumps)."

  - id: python-obj-q-01
    type: MCQ
    topic: "Classes & Objects"
    marks: 1
    tags: [true-false]
    bloom: remember
    source: "Dec 2024 Final T/F Q3"
    question: "TRUE or FALSE: In Python, everything — including functions, classes, and modules — is an object."
    choices: ["TRUE", "FALSE"]
    correct: 0
    rationale: "TRUE. Python's data model is uniformly object-oriented. Integers, strings, functions, classes, modules, even type itself are objects with attributes and methods. This is why you can pass functions as arguments, assign classes to variables, and introspect everything via dir() and type(). This property is what enables decorators, metaclasses, and Python's dynamic nature."

  - id: profiling-q-01
    type: MCQ
    topic: "Profiling"
    marks: 1
    tags: [true-false]
    bloom: analyze
    source: "finalexamsmerge.pdf T/F"
    question: "TRUE or FALSE: Profiling is a static program analysis technique that allows developers to analyze code performance without running the program."
    choices: ["TRUE", "FALSE"]
    correct: 1
    rationale: "FALSE. Profiling is DYNAMIC analysis — it measures an actual execution. cProfile.run('...') actually executes the code and collects timing and call-count statistics. Static analysis (linting, type checking, code scanning) inspects code without running it. Confusing the two costs you a mark on an easy-looking T/F question."

  # ============ MCQ — pattern identification ============
  - id: state-q-02
    type: MCQ
    topic: "State pattern"
    marks: 2
    tags: [pattern-identification]
    bloom: apply
    source: "finalexamsmerge.pdf Q1"
    question: "A TrafficLight class holds a `state` attribute. Each concrete state (Red, Yellow, Green) has a `next(traffic_light)` method that prints a transition and calls `traffic_light.change_state(NextState())`. Which design pattern does this implement?"
    choices:
      - "Strategy — different algorithms chosen at runtime"
      - "Chain of Responsibility — request passed between handlers"
      - "State — behavior encapsulated per state with transitions"
      - "Observer — subject notifying components of changes"
    correct: 2
    rationale: "State pattern. Three signals: (1) each concrete state encapsulates behavior specific to one mode, (2) state classes trigger their own transitions by calling change_state on the context, (3) the context delegates behavior via self.state.next(self). Distractors: Strategy has no state-to-state transitions (strategies are swapped externally); Chain of Responsibility has a _successor reference and failing/forwarding logic absent here; Observer has attach/detach/notify, absent here. The canonical past-exam traffic-light identification question."

  - id: strategy-q-01
    type: MCQ
    topic: "Strategy pattern"
    marks: 2
    tags: [pattern-identification, pretest]
    bloom: apply
    source: "finalexamsmerge.pdf Q4 Duck simulator"
    question: "A Duck class holds `_fly_behavior` and `_quack_behavior` attributes, each injected at construction. `duck.perform_fly()` delegates to `self._fly_behavior.fly()`. Different ducks (MallardDuck, RubberDuck) are constructed with different behavior objects. Which pattern?"
    choices:
      - "Observer"
      - "Bridge"
      - "State"
      - "Strategy"
    correct: 3
    rationale: "Strategy. Behaviors are plugged in as objects (composition not inheritance), swappable per-instance and at runtime. Distractors: Observer requires a subject/observer split and notify mechanism — absent. Bridge would require TWO independent hierarchies (Shape + Renderer) — here only behaviors, not abstractions+implementations, are varied. State requires transitions triggered by state objects — absent. The Duck example is Head First's canonical Strategy illustration."

  - id: state-vs-strategy-q-01
    type: MCQ
    topic: "State vs Strategy"
    marks: 2
    tags: [pattern-comparison]
    bloom: analyze
    source: "Dec 2024 Final Q10"
    question: "What is the key difference between State and Strategy?"
    choices:
      - "State uses inheritance; Strategy uses composition"
      - "Strategy alters behavior by inheritance; State by composition"
      - "State allows transitions between states that change the context's state; Strategy isolates different behaviors without internal transitions"
      - "State and Strategy are functionally identical — only naming conventions differ"
    correct: 2
    rationale: "State allows state-to-state transitions (Red transitions to Green inside Red.next()). Strategy has no internal transitions — the client picks a strategy, the context delegates, and the algorithm stays fixed until the client swaps it. Distractor A and B misstate the mechanism — both patterns use composition for delegation. D is false — the patterns have the same class structure but different dynamic behavior (transitions vs. no transitions)."

  - id: decorator-q-02
    type: MCQ
    topic: "Decorator pattern"
    marks: 2
    tags: [pattern-output]
    bloom: apply
    source: "Dec 2024 Final Q14"
    question: "Given Coffee.cost() = 5, MilkDecorator adds 2, SugarDecorator adds 1, CaramelDecorator adds 3. What do these two prints output in order?\n```\nx = CaramelDecorator(SugarDecorator(MilkDecorator(Coffee())))\nprint(x.cost())\nprint(CaramelDecorator(CaramelDecorator(SugarDecorator(MilkDecorator(Coffee())))).cost())\n```"
    choices:
      - "10, 13"
      - "11, 14"
      - "11, 11"
      - "8, 11"
    correct: 1
    rationale: "First expression: 5 (Coffee) + 2 (Milk) + 1 (Sugar) + 3 (Caramel) = 11. Second: 5 + 2 + 1 + 3 + 3 = 14 (two Caramels, each adding 3). Python does NOT deduplicate decorator instances — each wrapping adds its own contribution. Distractor C (11, 11) assumes caramel is deduped — false. A and D have arithmetic errors. This is the most commonly botched past-exam output question — walk the cost() chain layer by layer, bottom up."

  - id: proxy-q-01
    type: MCQ
    topic: "Proxy pattern"
    marks: 2
    tags: [pattern-correctness, pretest]
    bloom: analyze
    source: "finalexamsmerge.pdf Q8"
    question: "Which DatabaseProxy implementation is correct for enforcing access control over a SensitiveDatabase?"
    choices:
      - "Proxy has read_data(username) that returns the database read unconditionally; also exposes get_database() getter for convenience."
      - "Proxy has read_data(username) that only returns the database read if username is in an _authorized_users list, else prints 'Access denied'. No getter exposes the real database."
      - "Proxy has read_data(username) with the access check AND exposes get_database() for advanced clients."
      - "Proxy has get_database() only; clients read via proxy.get_database().read_data()."
    correct: 1
    rationale: "Option B is the only correct Proxy. Option A has no access check at all — not a protection proxy, just a delegating wrapper. Option C adds the check but leaks the real subject via get_database() — a client can bypass the check by calling proxy.get_database().read_data() directly. Option D has ONLY the getter, which means clients always access the database without checks. The Proxy must (1) have a check, (2) never expose the wrapped object. The exam hinges on spotting the leaky getter."

  - id: chain-q-01
    type: MCQ
    topic: "Chain of Responsibility"
    marks: 2
    tags: [pattern-output]
    bloom: apply
    source: "finalexamsmerge.pdf Q3"
    question: "Chain built as: `level1 = Level1Support(); level2 = Level2Support(level1); level3 = Level3Support(level2)`. Each handler processes only its matching severity ('low', 'medium', 'high'). Request has severity='low'. Call `level3.handle_request(Request)`. Output order?"
    choices:
      - "Level3Support cannot handle. Level2Support cannot handle. Level 1 Support: Handling request."
      - "Level 1 Support: Handling request. Level2Support cannot handle. Level3Support cannot handle."
      - "Level3Support cannot handle. Level 2 Support: Handling request."
      - "Level1Support cannot handle. Level2Support cannot handle. Level 3 Support: Handling request."
    correct: 0
    rationale: "Cascade starts at the caller (level3) and flows along _successor references downward. Level3 checks severity=='high', false, forwards. Level2 checks 'medium', false, forwards. Level1 checks 'low', true, processes. Distractors: B reverses the chain (would only occur if called on level1). C skips level 1 (wrong — level 1 handles 'low', not 2). D reverses the entire cascade. Key: `self._successor` points from higher-tier handlers down to lower, not the other way around."

  - id: observer-q-01
    type: MCQ
    topic: "Observer pattern"
    marks: 2
    tags: [pattern-identification]
    bloom: understand
    source: "DesignPatternsTable p.1, Quiz 7"
    question: "Which design pattern is MOST suitable when one object's state change must automatically trigger updates in multiple unknown reactors, without the source importing the reactors?"
    choices:
      - "Mediator"
      - "Chain of Responsibility"
      - "Observer"
      - "Strategy"
    correct: 2
    rationale: "Observer. The subject maintains a list of observers and broadcasts on change — reactors subscribe and unsubscribe at runtime, and the subject never imports concrete reactors. Mediator (A) is for asymmetric peer-to-peer coordination, not broadcast. Chain of Responsibility (B) passes one request to one handler, not a broadcast. Strategy (D) is for swapping one algorithm, not notifying many reactors. Key phrase: 'unknown reactors' = dynamic subscription = Observer."

  - id: mediator-q-01
    type: MCQ
    topic: "Mediator pattern"
    marks: 2
    tags: [pattern-scenario]
    bloom: apply
    source: "finalexamsmerge.pdf dashboard MCQ"
    question: "In which software design would the Mediator pattern be MOST appropriate?"
    choices:
      - "A real-time multiplayer game server where all player objects directly update each other's positions and scores in shared memory."
      - "A modular dashboard where widgets (charts, filters, status panels) update one another based on user actions, but must remain independent and reusable."
      - "A text processing utility where each function (tokenizer, stemmer, parser) passes data linearly to the next via pipeline."
      - "A filesystem monitoring tool where file watchers trigger logging operations using observer callbacks."
    correct: 1
    rationale: "Mediator centralizes asymmetric coordination between peer components that should stay decoupled. The dashboard (B) fits: widgets need to react to each other's state changes without referencing each other, and mediator's notify(sender, event) routes selectively. A is direct peer coupling (no mediator). C is a pipeline (Chain of Responsibility). D is Observer (broadcast callbacks). Mediator's tell: 'peers need to update one another but should stay reusable independently.'"

  - id: mediator-q-02
    type: MCQ
    topic: "Mediator vs Observer"
    marks: 2
    tags: [pattern-comparison]
    bloom: analyze
    source: "Dec 2024 Final Q9"
    question: "How does the Mediator pattern differ from Observer in its primary goal?"
    choices:
      - "Mediator focuses on dynamic one-way communication; Observer centralizes communication among objects."
      - "Mediator aims to reduce mutual dependencies between components; Observer establishes dynamic one-way communication."
      - "Mediator uses composition; Observer relies on inheritance."
      - "Mediator always acts as a publisher; Observer requires no publisher."
    correct: 1
    rationale: "Mediator reduces N² peer-to-peer coupling into N-to-1 (each component knows only the mediator). Observer establishes a one-way broadcast from subject to observers. Option A reverses this. C is false — both use composition. D is nonsense — Observer REQUIRES a subject (publisher). The key insight: Mediator = peer coordination through center; Observer = state-change broadcast."

  - id: facade-q-01
    type: MCQ
    topic: "Facade vs Mediator"
    marks: 2
    tags: [pattern-comparison]
    bloom: analyze
    source: "Dec 2024 Final Q11"
    question: "How does Facade differ from Mediator in its relationship to the underlying subsystem?"
    choices:
      - "Facade allows direct communication between components; Mediator does not."
      - "Mediator defines a simplified interface to a subsystem; Facade eliminates subsystem dependencies."
      - "Facade does not introduce new functionality to a subsystem; Mediator coordinates component interactions."
      - "Facade increases coupling between subsystems; Mediator decreases coupling."
    correct: 2
    rationale: "Facade is a simplified entry point — it doesn't add behavior to the subsystem, just hides complexity. Mediator actively coordinates: it routes messages between components and contains routing logic. Option A reverses the direction (Facade restricts direct access, Mediator is the direct path for coordinated comms). B reverses the roles (Mediator is not about simplifying subsystem access — that's Facade's job). D is false — both patterns aim to reduce coupling."

  - id: bridge-q-01
    type: MCQ
    topic: "Bridge pattern"
    marks: 2
    tags: [pattern-identification]
    bloom: analyze
    source: "finalexamsmerge.pdf Q9"
    question: "In the code below, which class is the Abstraction and which is the Implementation?\n```\nclass Shape: def draw(self): pass\nclass Renderer: def render_circle(self, r): pass\nclass Circle(Shape):\n    def __init__(self, r, renderer): self.r = r; self.renderer = renderer\n    def draw(self): self.renderer.render_circle(self.r)\nclass RasterRenderer(Renderer): ...\n```"
    choices:
      - "Abstraction: Shape. Implementation: Renderer."
      - "Abstraction: Renderer. Implementation: Shape."
      - "Abstraction: Circle. Implementation: RasterRenderer."
      - "Abstraction: RasterRenderer. Implementation: Circle."
    correct: 0
    rationale: "In Bridge, the Abstraction is the client-facing high-level hierarchy (Shape) that holds a reference to the Implementation (Renderer) and delegates platform-specific work. Circle is a 'refined abstraction' (Shape subclass); RasterRenderer is a 'concrete implementation' (Renderer subclass). Distractor B reverses the two hierarchies. C mislabels concrete vs abstract levels. D is doubly wrong. The key phrase is 'Abstraction controls Implementation' — the Shape calls methods on Renderer, not the reverse."

  - id: singleton-q-01
    type: MCQ
    topic: "Singleton pattern"
    marks: 2
    tags: [pattern-identification]
    bloom: remember
    source: "DesignPatternsTable p.7"
    question: "Which design pattern ensures a class has only one instance and provides a global point of access to it?"
    choices:
      - "Factory"
      - "Singleton"
      - "Builder"
      - "Abstract Factory"
    correct: 1
    rationale: "Singleton — both halves of the definition matter. Factory (A) creates objects without restricting instance count. Builder (C) constructs complex objects step by step — nothing about single-instance. Abstract Factory (D) produces families of related products. Common Singleton implementations in Python: override __new__, use a metaclass, apply a decorator, or rely on module-level variables."

  - id: factory-q-01
    type: MCQ
    topic: "Factory pattern"
    marks: 2
    tags: [pattern-drawback]
    bloom: analyze
    source: "finalexamsmerge.pdf MCQ"
    question: "Which best illustrates a disadvantage of using the Factory Pattern in a large-scale system?"
    choices:
      - "The use of constructors is strictly prohibited in client code."
      - "The system becomes overly reliant on subclassing and inheritance."
      - "The number of classes may grow quickly due to the need for one factory per product."
      - "It cannot be used in combination with other design patterns."
    correct: 2
    rationale: "Class proliferation is the canonical Factory drawback: each new product type may require its own factory class, multiplying class count without necessarily reducing coupling. Option A is too strong — constructors aren't prohibited, just encapsulated in the factory. B is partially true but not Factory-specific. D is false — Factory combines freely with Strategy, Decorator, Observer, etc. The exam specifically asks for the 'best' illustration, and class count growth is the most cited issue."

  - id: builder-q-01
    type: MCQ
    topic: "Builder pattern"
    marks: 2
    tags: [pattern-identification]
    bloom: remember
    source: "finalexamsmerge.pdf MCQ Q1"
    question: "Which design pattern constructs complex objects step by step?"
    choices:
      - "Builder"
      - "Abstract Factory"
      - "Singleton"
      - "Factory"
    correct: 0
    rationale: "Builder. Named after its step-by-step construction signature — a Builder class has reset(), build_step_A(), build_step_B(), get_result(). Optional Director encodes named recipes. Abstract Factory (B) produces whole families of objects in one call — not step-by-step. Singleton (C) is about instance count. Factory (D) produces one object per call — no step decomposition. The phrase 'step by step' in the question maps directly to Builder."

  - id: chain-q-02
    type: MCQ
    topic: "Chain of Responsibility"
    marks: 2
    tags: [pattern-role]
    bloom: understand
    source: "Dec 2024 Final Q6"
    question: "What is the typical role of the base handler class in the Chain of Responsibility pattern?"
    choices:
      - "To define a subscription mechanism for request notifications."
      - "To forward requests to the next handler by default."
      - "To act as a factory for creating handlers."
      - "To store the client's request data persistently."
    correct: 1
    rationale: "The base handler's template-method role is to hold the _successor reference and contain the forwarding logic. Concrete handlers override can_handle + process; the base provides the 'if I can't, pass it along' default. Option A is Observer's attach/detach. C is Factory. D is a separate data-storage concern, not CoR's job. The base handler is the 'chain plumbing' — it knows how to forward, not how to process."

  - id: strategy-q-02
    type: MCQ
    topic: "Strategy pattern"
    marks: 2
    tags: [pattern-drawback]
    bloom: analyze
    source: "Dec 2024 Final Q7"
    question: "What is a common drawback of the Strategy pattern?"
    choices:
      - "It introduces tight coupling between the context and strategy objects."
      - "It requires the client to know and select the appropriate strategy."
      - "It makes it difficult to extend the behavior of an object."
      - "It enforces a static behavior for all context objects."
    correct: 1
    rationale: "Strategy decouples the context from algorithms via an interface, but the CLIENT still has to know about concrete strategies to construct and inject them. Strategy doesn't hide the variants — that's what Factory adds. Option A is the opposite of truth (Strategy reduces coupling). C is false — extension is easy (new strategy class). D is false — runtime swapping is Strategy's main feature. The drawback here is the visibility of the variant ecosystem to clients."

  - id: decorator-vs-proxy-q-01
    type: MCQ
    topic: "Decorator vs Proxy"
    marks: 2
    tags: [pattern-comparison]
    bloom: analyze
    source: "Dec 2024 Final Q8"
    question: "How does Decorator differ from Proxy in terms of structure and purpose?"
    choices:
      - "Proxy is based on inheritance, while Decorator relies on composition."
      - "Decorator manages the lifecycle of its service object, while Proxy does not."
      - "Proxy typically controls access or permissions, while Decorator enhances functionality without modifying the interface."
      - "Both Decorator and Proxy are interchangeable patterns used for encapsulating objects."
    correct: 2
    rationale: "Correct answer captures both differences: Proxy gatekeeps (caching / auth / logging); Decorator adds behavior. Both use composition and implement the same interface as the wrapped object. Option A is false — both use composition. B inverts lifecycle ownership (Proxy often manages the real subject's lifecycle; Decorator wraps existing instances). D is false — the patterns share structure but have clearly distinct intents, not interchangeable."

  - id: solid-srp-q-01
    type: MCQ
    topic: "SOLID - SRP"
    marks: 2
    tags: [solid, pretest]
    bloom: analyze
    source: "finalexamsmerge.pdf MCQ"
    question: "What design principle is most clearly violated when a class like `Character` directly handles all weapon attack logic?"
    choices:
      - "Dependency Inversion Principle"
      - "Interface Segregation Principle"
      - "Single Responsibility Principle"
      - "Liskov Substitution Principle"
    correct: 2
    rationale: "SRP: Character has many reasons to change — any weapon's attack mechanics force an edit. Extract WeaponStrategy; Character delegates. DIP (A) is about abstraction layers — weapon logic isn't a layer violation, just a responsibility pile-up. ISP (B) would apply if Character had many unused method stubs. LSP (D) is about substitutability of subclasses — unrelated. The signal is 'directly handles all' — multiple concerns in one class = SRP."

  - id: solid-ocp-q-01
    type: MCQ
    topic: "SOLID - OCP"
    marks: 2
    tags: [solid]
    bloom: apply
    source: "Week 14 review"
    question: "A take_damage() method branches with if-elif on self._type ('Troll', 'Evil Turtle', 'Human Underling'). Which SOLID principle should you apply to refactor?"
    choices:
      - "Open/Closed Principle — extend via subclasses, not by editing the if-chain"
      - "Law of Demeter"
      - "Liskov Substitution Principle"
      - "Single Responsibility Principle"
    correct: 0
    rationale: "OCP. The if-chain requires editing the method for each new type — closed for modification is violated. Refactor: make Enemy an ABC, each type a subclass overriding take_damage. Adding a new enemy = new class, zero edits. Law of Demeter (B) is about method-call chains, not type-branching. LSP (C) is about subclass compatibility. SRP (D) is a weaker fit — this is more about extensibility (OCP) than responsibility count. 'Object Inversion Principle' (sometimes on quizzes) does not exist."

  - id: solid-dip-q-01
    type: MCQ
    topic: "SOLID - DIP"
    marks: 2
    tags: [solid]
    bloom: analyze
    source: "Week 14 review"
    question: "Which statement about the Dependency Inversion Principle is FALSE?"
    choices:
      - "Low-level modules should not depend on high-level modules."
      - "Abstractions depend on details."
      - "High-level modules should not depend on low-level modules."
      - "High-level and low-level modules should depend on abstractions."
    correct: 1
    rationale: "B is the false one — it inverts DIP's rule 2, which says 'Abstractions should NOT depend on details; DETAILS should depend on abstractions.' A is true (rule 1 corollary — neither direction between high/low). C is true (rule 1). D is true (the positive statement of rule 1). DIP's fundamental inversion is that BOTH high-level and low-level point up at abstractions, not at each other."

  - id: solid-lsp-q-01
    type: MCQ
    topic: "SOLID - LSP"
    marks: 2
    tags: [solid]
    bloom: understand
    source: "practiceGuidedQuestion-sol.pdf"
    question: "A FreeShipping subclass of ShippingStrategy throws an exception if weight exceeds 10 kg, while StandardShipping never throws. Which principle is violated?"
    choices:
      - "SRP"
      - "OCP"
      - "LSP"
      - "DIP"
    correct: 2
    rationale: "LSP. A FreeShipping instance is not substitutable for a generic ShippingStrategy — code that expects any strategy to return a number now sometimes gets exceptions. Subclasses must honor the base's contract (same preconditions, at-least-as-strong postconditions, no new exceptions). SRP (A) isn't about runtime substitutability. OCP (B) is about extension vs modification. DIP (D) is about abstraction layers. LSP explicitly covers 'subclass surprise' — weakening the contract breaks Liskov."

  - id: lod-q-01
    type: MCQ
    topic: "Law of Demeter"
    marks: 2
    tags: [design-principle]
    bloom: apply
    source: "Week 14 review"
    question: "`obj.getX().getY().getZ().doSomething()` — which design principle is violated?"
    choices:
      - "SRP"
      - "Law of Demeter"
      - "Open/Closed Principle"
      - "DIP"
    correct: 1
    rationale: "Law of Demeter — the caller 'talks to strangers' by reaching through multiple objects. LoD permits calls on self, parameters, locally-created objects, and direct member attributes. The dot chain here violates by reaching into getX's return value, then its return value, and so on. Refactor by adding a top-level method on obj that handles the chain internally. Other SOLID principles don't specifically address chain depth."

  - id: isp-q-01
    type: MCQ
    topic: "SOLID - ISP"
    marks: 2
