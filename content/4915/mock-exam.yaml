    correct: 1
    rationale: >-
      **B: `chown -R alice:devs /srv/data`**. Syntax is `user:group` (colon-separated) and `-R` (capital R) is
      recursive. (A) uses lowercase `-r` which is not a valid chown flag — the midterm Q16 trap. (C) `chgrp`
      only sets group, missing the user change. (D) `chown.chgrp` is invalid; commands are run separately, and
      this joins them with `.` (a legacy BSD separator that modern GNU chown accepts for user.group but not for
      chaining). (E) reverses the order to `group:user` — colon semantics are strictly user then group.
    choices:
