    source: "materials/past-exams/midterm.md Q58"
    question: >-
      Discuss and distinguish the similarities and differences between hard and soft links in Linux. Include limitations
      and when to use each.
    correct: >-
      Hard link: extra directory entry pointing to same inode. Soft (symbolic) link: special file containing target's
      pathname as text.<br><br><strong>Similarities:</strong> both allow multiple names/paths to reach same data; both
      created with <code>ln</code>.<br><br><strong>Differences:</strong><br>• Hard link shares inode → identical file;
      can't span filesystems (inode unique per FS); can't link to directories (normal users); no dangling — file
      persists as long as link count &gt; 0.<br>• Soft link has own inode containing target path text; CAN span
      filesystems; CAN link to directories; CAN dangle if target deleted; ls -l shows <code>l</code> type and arrow to
      target.<br><br><strong>Use hard link when:</strong> aliasing same file on one filesystem, tracking link count for
      cleanup.<br><strong>Use soft link when:</strong> crossing filesystems, linking to directories, pointing to a path
      that may change.
    rationale: Midterm Q58. Expected to cover inode mechanics, cross-FS limitation, dangling behavior.
