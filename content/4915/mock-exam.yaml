  - id: q5
    type: MCQ
    topic: Redirection
    marks: 2
    bloom: apply
    source: "materials/past-exams/midterm.md Q10"
    question: Which directs standard output to outfile AND standard error to errfile?
    correct: 1
    rationale: >-
      stdout is fd 1 (`>` alone = `1>`); stderr is fd 2 (`2>`). Choice 1 binds each to its own file. Choice 0
      uses `0>`, which redirects fd 0 (stdin) — stderr is untouched and spills to the terminal. Choice 2
      (`1>errfile`) redirects stdout twice; last binding wins, `outfile` stays empty. Choice 3 (`<outfile`) is
      input redirection. Choice 4 swaps targets. (Midterm Q10.)
    choices:
      - make FreeCiv >outfile 0>errfile
      - make FreeCiv >outfile 2>errfile
      - make FreeCiv >outfile 1>errfile
      - make FreeCiv <outfile 2<errfile
      - make FreeCiv >errfile 2>outfile
  - id: q6
    type: MCQ
    topic: grep
    marks: 2
    bloom: remember
    source: "materials/past-exams/midterm.md Q34"
    question: Correct syntax to search for word 'superman' in SuperHeroes?
    correct: 1
    rationale: >-
      **B: `grep -w`**. The question says *word*. `-w` matches whole-word boundaries — `superman` hits but
      `supermanhood` does not. Plain `grep superman` (D) is a substring match and would also hit `supermanhood`, so D
      does not satisfy the 'word' constraint. Distractors: -v inverts, -q is quiet, -n adds line numbers. (Midterm Q34.)
    choices:
      - grep -v superman SuperHeroes
      - grep -w superman SuperHeroes
      - grep -q superman SuperHeroes
      - grep superman SuperHeroes
      - grep -n superman SuperHeroes
  - id: q7
    type: MCQ
    topic: Permissions
    marks: 2
    bloom: remember
    source: "materials/past-exams/midterm.md Q16"
    question: Make jack the owner of all files under /home/jack/candy?
    correct: 1
    rationale: >-
      `chown -R` (capital R) recurses. `chown`/`chgrp` are the exception — every other common recursive tool
      (`grep`, `cp`, `ls`, `rm`) uses lowercase `-r`, so `-r` is the reflex trap. `-changes` isn't a flag. `chmod`
      changes permission bits, not ownership, so `chmod u+rwx` leaves `jack` as non-owner. (Midterm Q16.)
    choices:
      - chown -changes jack /home/jack/candy
      - chown -R jack /home/jack/candy
      - chmod u+rwx /home/jack/candy
      - chown -r jack /home/jack/candy
      - chmod a+rwx jack /home/jack/candy
  - id: q8
    type: MCQ
    topic: Quoting
    marks: 2
    bloom: apply
    source: "materials/past-exams/midterm.md Q47"
    tags: [pretest]
    question: person=jenny. Output of `echo '$person'`?
    correct: 3
    rationale: >-
      Single quotes suppress all 7 shell expansions — content is emitted byte-for-byte, so `'$person'` prints
      `$person`. Trap: assuming any quote form expands `$var`. Double quotes expand `$var`, backticks, `$(...)`,
      and `\`; bare expands all 7; single quotes expand nothing. (Midterm Q47.)
    choices:
      - person
      - jenny
      - "'$person'"
      - $person
      - $jenny
  - id: q9
    type: MCQ
    topic: Links
    marks: 2
    bloom: remember
    source: "Mod02 Ch6; materials/past-exams/midterm.md Q24"
    question: To link a file so that the linked file exists even after original is deleted?
    correct: 4
    rationale: >-
      A hard link is a second directory entry pointing to the *same inode*; the file disappears only when the
      inode's link count reaches 0, so either entry can be deleted and the other still works. Soft/symbolic links
      store the *pathname* as data — deleting the target leaves a dangling link. 'virtual' and 'shortcut' aren't
      Linux link types (Windows shortcut terminology). (Midterm Q24.)
    choices:
      - virtual
      - shortcut
      - soft
      - symbolic
      - hard
  - id: q10
    type: MCQ
    topic: Shell params
    marks: 2
    bloom: remember
    source: "materials/past-exams/midterm.md Q31"
    tags: [pretest]
    question: Which variable holds the entire argument list?
    correct: 3
    rationale: >-
      `$@` expands to the full positional-parameter list — and under `"$@"` each argument stays a separate word,
      the only safe iteration form. `$#` is the *count* of args, not the list. `$?` is last exit status. `$$`
      is the shell's PID. `$args` is just a user variable — no special meaning. Trap: `$*` looks identical until
      you quote it (`"$*"` joins all args into one string). (Midterm Q31.)
    choices:
      - $?
      - $#
      - $args
      - $@
      - $$
  - id: q11
    type: MCQ
    topic: Runlevels
    marks: 2
    bloom: remember
    source: "materials/past-exams/midterm.md Q35"
    question: Run level 3 in Linux System V does what?
    correct: 3
    rationale: >-
      SysV runlevels: 0 halt, 1 single-user, 3 multi-user text (server default), 5 multi-user GUI, 6 reboot.
      Trap: "Multiuser graphics" sounds right because modern desktops boot to it — but that's runlevel 5.
      "Reboots"/"Halts" are 6/0. `systemctl get-default` maps targets to the old numeric runlevel. (Midterm Q35.)
    choices:
      - Reboots
      - Single user
      - Multiuser graphics
      - Multiuser text
      - Halts
  - id: q12
