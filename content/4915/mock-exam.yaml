    correct: 2
    rationale: >-
      **C: Invalid cross-device link error.** Hard links share an inode number, and inode numbers are unique
      only within a single filesystem — so a hard link cannot cross FS boundaries. The kernel returns `EXDEV`,
      and `ln` prints `Invalid cross-device link`. (A) would happen with `ln -s`, not a hard link. (B) silent
      success is impossible — the syscall rejects it. (D) `~/vmlinuz-link` as a copy would need `cp`, not `ln`.
