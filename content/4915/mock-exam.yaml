    source: "materials/past-exams/comp4915_quiz3.md Q4"
    question: In bash, comments start with `#`.
    correct: 0
    rationale: >-
      TRUE. Bash treats `#` through end-of-line as a comment, anywhere on a line — except the shebang `#!` at
      line 1, col 1, which the kernel reads as an interpreter directive. Trap: confusing `#` (comment / length
      prefix in `${#var}`) with `$` (variable prefix) or `!` (history expansion). (Sample Q8, Quiz 3 Q4.)
    choices:
      - "True"
      - "False"
