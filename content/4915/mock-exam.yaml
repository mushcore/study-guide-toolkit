    type: MCQ
    topic: DHCP
    marks: 2
    bloom: remember
    source: "Mod06 Ch18"
    question: DHCP client-server exchange (DORA) in order?
    correct: 1
    rationale: >-
      **DORA**: client has no IP, *broadcasts* Discover. Server(s) *Offer* a lease. Client *Requests* a specific
      offer (so rejected servers free their reservations). Server *Acks*, lease is granted. Any reshuffle breaks
      the handshake — you can't Offer before Discover (server doesn't know who to talk to), can't Ack before
      Request (nothing to confirm).
    choices:
      - Offer, Discover, Ack, Request
      - Discover, Offer, Request, Ack
      - Request, Offer, Discover, Ack
      - Ack, Discover, Offer, Request
      - Discover, Request, Offer, Ack
