      zero-fill disks (`dd if=/dev/zero of=... bs=1M`), pad files, or allocate blank anonymous memory.
      `/dev/random` / `/dev/urandom` give cryptographically random bytes (not zero). `/dev/null` is the
      *write-only* bit-bucket — reads return EOF immediately. Trap: confusing the three `/dev` specials.
    choices:
