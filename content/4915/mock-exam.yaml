  - id: q3
    type: MCQ
    topic: Redirection
    marks: 2
    bloom: apply
    source: "materials/past-exams/midterm.md Q4"
    question: To send command output to a file and also to standard output, use which command?
    correct: 0
    rationale: >-
      `tee` duplicates stdin to both stdout and a named file — T-pipe semantics. `>` / `>>` redirect *away* from
      stdout (nothing reaches the terminal), so neither satisfies "also to stdout". 'redirection' and 'switch'
      aren't commands. Trap: assuming `>>` is a "show-and-append" operator — it isn't, it's append-only. (Midterm Q4.)
    choices:
      - tee
      - redirection
      - switch
      - "`>`"
      - "`>>`"
