    source: "Mod04 Ch9"
    question: "Predict output. x doesn't exist, y contains 'This is y': ```bash cat x y 1>hold 2>&1 cat hold ```"
    correct: |-
      <pre><code class="language-bash">cat: x: No such file or directory
      This is y</code></pre>
    rationale: >-
      Trace: `1>hold` first binds fd 1 to file `hold`; `2>&1` then duplicates fd 2 onto fd 1's *current*
      binding — so stderr also lands in `hold`. `cat x y` processes each arg in order: `x` fails (stderr:
      "No such file or directory"), then `y` succeeds (stdout: "This is y"). Both streams end up in `hold`,
      in the order cat emitted them. Trap: writing `2>&1 1>hold` reverses the order — stderr stays at the
      terminal because `2>&1` copied fd 1's pre-redirect binding. (Midterm Q50.)
