    source: "materials/past-exams/midterm.md Q33"
    question: Which command changes your login shell?
    correct: 4
    rationale: >-
      `chsh` = change shell; edits the final field of `/etc/passwd` (login shell path) for the invoking user. The
      other options (`newsh`, `chngsh`, `chlg`, `cs`) aren't real commands. Trap: inventing abbreviations by
      analogy with `chmod`/`chown` — the canonical verb is `chsh` with its own spelling. (Midterm Q33.)
    choices:
      - newsh
      - chngsh
      - chlg
      - cs
      - chsh
  - id: q13
    type: MCQ
    topic: Networking
    marks: 2
    bloom: remember
    source: "Mod06 Ch19; materials/past-exams/midterm.md Q1"
    question: Secure technology for serving files over internet?
    correct: 1
    rationale: >-
      `sftp` is file-transfer *over* the SSH channel — credentials and payload both encrypted. `ftp://` and plain
      `ftp` ship credentials and data in cleartext (anyone on-path sniffs them). `http` is also cleartext and
      has no file-transfer semantics — wrong protocol family. `ssh` alone is a *remote shell*, not a file-serving
      protocol (you'd layer `scp`/`sftp` on top). Trap: picking `ssh` because it's "the secure one". (Midterm Q1.)
    choices:
      - ftp://
      - sftp
      - http
      - ssh
      - ftp
  - id: q14
    type: MCQ
    topic: Networking
    marks: 2
    bloom: remember
    source: "Mod07 Ch22; materials/past-exams/midterm.md Q19"
    question: Service to offer remote mounting of Linux partitions on a Linux-only network?
    correct: 4
    rationale: >-
      **NFS** (Network File System) is the native Unix remote-mount protocol — server exports a directory in
      `/etc/exports`, client runs `mount -t nfs server:/path /mnt`. `SMB` is the Windows-family protocol (use
      Samba for Linux↔Windows interop, not Linux-only). `NIS` distributes user/group maps, not filesystems.
      `DNS` resolves names. `FIPS` is a US crypto standard — not a filesystem at all. (Midterm Q19.)
    choices:
      - FIPS
      - NIS
      - SMB
      - DNS
      - NFS
  - id: q15
    type: MCQ
    topic: DNS
    marks: 2
    bloom: remember
    source: "Mod08 Ch24; materials/past-exams/midterm.md Q28"
    question: Which daemon manages a machine's DNS?
    correct: 2
    rationale: >-
      The running daemon is `named` ("name-d"). **BIND** (Berkeley Internet Name Domain) is the *software suite*
      and the package name — not the process in the process table. `inetd` is a superserver for other network
      services. `dnsd` and `iisd` don't exist. Trap: picking `bind` because it's the name everyone *says* —
      `ps` shows `named`. (Midterm Q28.)
    choices:
      - dnsd
      - inetd
      - named
      - bind
      - iisd
  - id: q16
    type: MCQ
