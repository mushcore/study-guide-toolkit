    question: etcd is where Kubernetes *persists* raw cluster state data.
    correct: 0
    rationale: >-
      TRUE — etcd is the distributed KV store (raft consensus) that holds the cluster's state data. Note: Quiz 4 Q5
      asked what *maintains* state — that answer is kube-controller-manager (etcd is not even in Q5's options).
    choices:
      - "True"
      - "False"
  - id: q36
    type: MCQ
    topic: Networking
    marks: 1
    bloom: remember
    source: "Mod07 Ch22-23"
    question: NFS is suitable for Linux-to-Windows file sharing.
