  - id: q81
    type: MCQ
    topic: Exit status
    marks: 2
    bloom: apply
    source: "Mod09 Ch28 bash scripting"
    tags: [exit-status, short-circuit, variant]
    question: |
      After `false && echo A || echo B`, what prints and what is `$?` at the end?
    correct: 3
    rationale: >-
      **D: B prints, `$?` = 0**. `false` exits 1. `&&` short-circuits — `echo A` is skipped. `||` then sees the
      preceding nonzero status and runs `echo B`, which exits 0. So stdout is `B`, and `$?` reflects the *last*
      command run (echo B → 0). (A) A prints is wrong — the `&&` blocks it. (B) both print is wrong — short-
      circuiting skips one. (C) neither is wrong — `||` catches the failure. (E) `$? = 1` mis-remembers which
      command ends the chain; it's `echo B`, not `false`.
    choices:
      - "A, `$?` = 0"
      - "A and B, `$?` = 0"
      - "nothing, `$?` = 1"
      - "B, `$?` = 0"
      - "B, `$?` = 1"
