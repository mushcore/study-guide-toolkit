    question: Which command displays the system manual for a utility?
    correct: 1
    rationale: >-
      `man` is the canonical man-page viewer. `info` is GNU's hyperlinked alternative — not every utility ships
      info pages, so it isn't the universal answer. `disp` and `sysman` don't exist as Unix commands. `mozilla` is
