    type: SHORT
    topic: Expansions
    marks: 3
    bloom: apply
    source: "materials/past-exams/midterm.md + Review Apr 17"
    question: Given `set -- 'alpha beta' 'gamma'`, show the difference between `for x in "$@"` and `for x in "$*"`.
    correct: >-
      <code>"$@"</code> iterates twice: x='alpha beta' then x='gamma' (preserves separation). <code>"$*"</code> iterates
      once: x='alpha beta gamma' (all args joined). Use <code>"$@"</code> in functions.
    rationale: >-
      `"$@"` expands each positional parameter as its own word (preserves argument boundaries in quoted strings),
      so the loop body runs once per arg. `"$*"` joins all positional parameters into a single word separated by
      the first character of `$IFS` (space by default), so the loop body runs once. Use `"$@"` when forwarding
      args to another command; use `"$*"` only for display. Past-exam trap: writing `$@` (unquoted) — word
      splitting still fires and the 'alpha beta' arg splits into two. (Midterm Q60 pattern.)
  - id: q73
    type: SHORT
    topic: Container
    marks: 3
    bloom: apply
    source: "materials/past-exams/midterm.md + Review Apr 17"
    question: What is a container image?
    correct: >-
      A layered, read-only template used to instantiate containers. Includes filesystem snapshot, entrypoint, env vars,
      and metadata. Standardized by OCI. Pulled from a registry; runtime adds a writable layer per container.
    rationale: >-
      Image vs container is the core distinction: image is read-only and versioned; container is a running
      instance with its own writable layer on top. Layered FS (overlayfs) dedupes common parts across images.
      OCI standardizes the format so any compliant runtime (containerd, CRI-O, Podman) can run the image.
      Common wrong answers: "a running container" (that's the instance), "a VM snapshot" (no kernel included),
      "same as a Docker file" (Dockerfile builds the image, isn't the image). (Mod10A container basics.)
