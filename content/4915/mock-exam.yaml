  - id: q18
    type: MCQ
    topic: K8s
    marks: 2
    bloom: remember
    source: "materials/past-exams/comp4915_quiz4.md Q4"
    question: Most common way to run a K8s app?
    correct: 0
    rationale: >-
      **Deployment** wraps a ReplicaSet to provide declarative rolling updates, rollback, and scaling — the
      default choice for stateless apps. A bare `pod` has no self-healing or replicas. `DaemonSet` is
      infrastructure (one pod per node). `StatefulSet` handles stateful workloads (DBs, order-sensitive apps).
      `container` is a Docker term, not a K8s workload object. (Quiz 4 Q4.)
    choices:
      - deployment
      - pod
      - daemonset
      - StatefulSet
      - container
  - id: q19
    type: MCQ
    topic: K8s
    marks: 2
    bloom: remember
    source: "materials/past-exams/comp4915_quiz4.md Q8"
    question: K8s object running one pod on every node?
    correct: 3
    rationale: >-
      **DaemonSet** schedules exactly one pod on every matching node — perfect for log collectors, node
      monitoring agents, CNI components. `Node` is a host *machine*, not a workload controller. `StatefulSet`
      gives ordered/named pods, not one-per-node. `Job` runs to completion. `DNS` is a service, not a workload
      controller. (Quiz 4 Q8.)
    choices:
      - Node
      - StatefulSet
      - Job
      - DaemonSet
      - DNS
  - id: q20
    type: MCQ
    topic: K8s
    marks: 2
    bloom: remember
    source: "materials/past-exams/comp4915_quiz4.md Q10"
    question: Reason for the pause container in a pod?
    correct: 0
    rationale: >-
      The pause container is the first started in a pod; it holds NET/IPC/UTS namespaces open so subsequent
      containers can `join` them — creating the shared-network/localhost illusion inside a pod. It calls
      `pause()` and burns zero CPU. The other options reverse cause/effect (pause doesn't serve anything, K8s
      doesn't "pause" workloads through it). (Quiz 4 Q10.)
    choices:
      - helps set up Linux namespaces and cgroups for a pod
      - allows running the pause service
      - allows each pod to use the pause service
      - allows the pod it is with to use the pause service
      - allows kubernetes to pause the pod it is in
  - id: q21
    type: MCQ
    topic: Runlevels
    marks: 2
    bloom: remember
    source: "materials/past-exams/comp4915_quiz4.md Q5"
    question: Which run level halts the system?
    correct: 0
    rationale: >-
      Runlevel 0 halts (power-off style). 6 reboots. 1 is single-user maintenance. 3/5 are multi-user text/GUI.
      Trap: picking 6 because "shutdown" mentally maps to "restart" — the machine cycles to 0 (halt) only if you
      explicitly target it; 6 loops back into the OS.
    choices:
      - "0"
      - "1"
      - "3"
      - "5"
      - "6"
  - id: q22
    type: MCQ
    topic: iptables
    marks: 2
    bloom: remember
    source: "Mod08 Ch25; materials/labs/Lab8.pdf"
    question: Default policy of the filter table INPUT chain if no rule matches and no policy set?
    correct: 2
    rationale: >-
      A fresh filter table ships with INPUT/OUTPUT/FORWARD all defaulting to **ACCEPT** — iptables is permissive
      until you set `iptables -P INPUT DROP`. Trap: assuming "firewall = default-deny" because modern security
      training drills deny-by-default; Linux itself does not start there. `REJECT` is a *target*, not a default
      policy. `LOG`/`MASQUERADE` aren't valid policy values.
    choices:
      - DROP
      - REJECT
      - ACCEPT
      - LOG
      - MASQUERADE
  - id: q23
    type: MCQ
    topic: Apache
    marks: 2
    bloom: remember
    source: "Mod10D; materials/labs/Lab10.pdf"
    question: Default DocumentRoot on RHEL/Fedora?
    correct: 1
    rationale: >-
      RHEL/CentOS/Fedora package `httpd` with DocumentRoot `/var/www/html` (Debian mirrors the path). `/etc/httpd/`
      is the config tree (httpd.conf, conf.d/), not the content tree — mixing them is the classic trap. `/srv/www`
      is an FHS-blessed convention some distros use but not RHEL default. `/home/www` and `/usr/local/httpd`
      aren't standard.
    choices:
      - /etc/httpd/html
      - /var/www/html
      - /srv/www
      - /home/www
      - /usr/local/httpd
  - id: q24
    type: MCQ
    topic: Samba
    marks: 2
    bloom: remember
    source: "Mod10C; materials/labs/Lab10.pdf"
    question: Samba configuration file?
    correct: 1
    rationale: >-
      Path is `/etc/samba/smb.conf` — the `samba/` subdirectory mirrors other service packages (`/etc/ssh/`,
      `/etc/httpd/`). `/etc/smb.conf` (no subdir) and `/etc/smbd.conf` (daemon-named) are plausible-looking
      guesses but wrong. `/var/lib/samba/` holds runtime state (tdb databases, cache), not config. Trap:
      inventing `samba.conf` by analogy — the filename is still `smb.conf` (the protocol name).
    choices:
      - /etc/smb.conf
      - /etc/samba/smb.conf
      - /etc/samba/samba.conf
      - /etc/smbd.conf
      - /var/lib/samba/smb.conf
  - id: q25
    type: MCQ
    topic: Namespaces
    marks: 2
    bloom: remember
    source: "Mod10E; materials/labs/Lab10.pdf"
    question: Which command creates new Linux namespaces?
    correct: 1
    rationale: >-
      `unshare` creates a new namespace of a requested type and runs a command inside it (e.g., `unshare --net
      bash`). `nsenter` *joins* an existing namespace by PID or file descriptor — opposite direction. `lsns`
      only lists. `chroot` changes the root directory but doesn't create a namespace (no MNT isolation).
      `pivot_root` swaps the rootfs from inside an existing mount namespace.
    choices:
      - nsenter
      - unshare
      - lsns
      - chroot
      - pivot\_root
  - id: q26
    type: MCQ
    topic: Redirection
    marks: 1
    bloom: remember
    source: "materials/past-exams/midterm.md Q46"
    tags: [pretest]
    question: "`tr -d '\\r'` can convert DOS/Windows text files to Unix."
    correct: 0
    rationale: >-
      TRUE. DOS/Windows line endings are CRLF (`\r\n`); Unix is LF (`\n`) alone. `tr -d '\r'` deletes every CR
      byte on stdin, leaving LF — a clean Unix line terminator. Wrong reading: thinking `tr -d` needs both bytes
      named (`tr -d '\r\n'` would also strip LF and collapse the file into a single line). (Midterm Q46.)
    choices:
      - "True"
      - "False"
  - id: q27
    type: MCQ
    topic: Redirection
    marks: 1
    bloom: apply
    source: "Mod02 Ch7"
    question: Redirecting output to a file will warn before overwriting existing data.
    correct: 1
    rationale: >-
      FALSE. `>` truncates the target to zero bytes before writing — silently, no prompt. This is the classic
      data-destruction trap the midterm drills. Defences: `set -C` (noclobber) makes `>` error if target
      exists; override with `>|`. Use `>>` when you want append-only. Wrong reading: conflating shell safety
      with `rm -i`-style interactive prompts — redirection has no such mode. (Midterm Q43/Q44.)
    choices:
      - "True"
      - "False"
  - id: q28
    type: MCQ
    topic: Security
    marks: 1
    bloom: remember
    source: "Mod08 Ch25"
    question: rsh, rlogin, rcp all have security risks.
    correct: 0
    rationale: >-
      TRUE. The r-services transmit credentials and payload in cleartext, and authenticate via `~/.rhosts` /
      `/etc/hosts.equiv` trust — source-IP spoofing is enough to impersonate a trusted host. Modern Linux
      replaces the whole family with `ssh`/`scp`/`sftp` (public-key auth + encrypted channel). Wrong reading:
      "only passwords leak" — every byte of the session is visible on-wire. (Midterm Q45.)
    choices:
      - "True"
      - "False"
  - id: q29
    type: MCQ
    topic: Exit status
    marks: 1
    bloom: remember
    source: "Mod09 Ch28; materials/past-exams/midterm.md Q59"
    question: The shell stores the exit status of the last command in $?.
    correct: 0
    rationale: >-
      TRUE. Every child process returns an 8-bit exit status on termination; the shell captures it into the
      special parameter `$?`. Convention: 0 = success, 1–255 = failure (with some well-known codes: 2 misuse,
      126 not-executable, 127 not-found, 128+N killed by signal N). Wrong reading: confusing `$?` (status) with
      `$!` (PID of last backgrounded job) or `$$` (current shell PID). (Midterm Q39.)
    choices:
      - "True"
      - "False"
  - id: q30
    type: MCQ
    topic: Quoting
    marks: 1
    bloom: remember
    source: "Mod04 Ch9"
    question: "`echo '$person'` (with person='Fred') outputs `Fred`."
    correct: 1
    rationale: >-
      FALSE. Single quotes suppress all 7 shell expansions — the content inside is emitted byte-for-byte, so
      `'$person'` prints the literal four-character string `$person`. To expand, you need `"$person"` (double
      quotes) or bare `$person`. Wrong reading: assuming any quote style expands variables — only double /
      bare do. (Midterm Q47.)
    choices:
      - "True"
      - "False"
  - id: q31
    type: MCQ
    topic: Filesystem
    marks: 1
    bloom: remember
    source: "Mod02 Ch6; materials/past-exams/midterm.md Q24"
    tags: [pretest]
    question: Hard links can cross filesystem boundaries.
    correct: 1
    rationale: >-
      FALSE. A hard link is a directory entry pointing at an inode; inode numbers are unique only *within* one
      filesystem, so `ln /mnt/usb/file ~/link` errors with `Invalid cross-device link`. Soft (symbolic) links
      dodge this — they store the *pathname* as data and cross FS freely. Wrong reading: treating hard and
      soft links as equivalent; they differ on cross-FS, on dangling behaviour, and on directories.
    choices:
      - "True"
      - "False"
  - id: q32
    type: MCQ
    topic: less
    marks: 1
    bloom: remember
    source: "Mod02 Ch7"
    question: "`less` displays a text file one screen at a time."
    correct: 0
    rationale: >-
      TRUE. `less` is the canonical interactive pager — space/pgdn advance one screen, `/pattern` searches, `q`
      quits, and unlike `more` you can scroll backward. `cat` dumps the whole file at once (no paging). Wrong
      reading: conflating `less` with `head` (first N lines) or `tail` (last N). Mnemonic: "`less` is `more`"
      — it replaced `more` with more features. (Midterm Q40.)
    choices:
      - "True"
      - "False"
  - id: q33
    type: MCQ
    topic: K8s
    marks: 1
    bloom: remember
    source: "Mod10D"
    question: The pause container runs application logic.
    correct: 1
    rationale: >-
      FALSE. The pause container is a near-empty binary that calls `pause()` and sleeps forever. Its entire
      job is to hold the pod's NET/IPC/UTS namespaces open so the application containers can *join* them and
      share localhost + IP. Killing the pause container tears the pod down. Wrong reading: thinking "pause"
      names an app-lifecycle feature (like `kubectl pause`) — it's just a namespace anchor.
    choices:
      - "True"
      - "False"
