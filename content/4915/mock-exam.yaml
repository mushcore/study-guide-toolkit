    question: What is a container image?
    correct: >-
      A layered, read-only template used to instantiate containers. Includes filesystem snapshot, entrypoint, env vars,
      and metadata. Standardized by OCI. Pulled from a registry; runtime adds a writable layer per container.
    rationale: "Instructor: 'Useful to know about container images.'"
