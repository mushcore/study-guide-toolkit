    type: MCQ
    topic: Synthesis
    marks: 2
    bloom: understand
    source: "Mod07 Ch21 NFS × Mod02 Ch7 perms × UID mapping"
    tags: [nfs, permissions, uid, synthesis]
    question: |
      An NFS client mounts `/srv/exports` from a server. A user on the client with UID 1001 tries to read a
      file owned by UID 500 on the server, mode 0640. The client gets `Permission denied`. Why?
    correct: 1
    rationale: >-
      **B: NFS uses numeric UID matching — 1001 ≠ 500 and mode 0640 denies 'other'.** Default NFS (AUTH_SYS)
      trusts the client's UID and compares it numerically with the file's owner UID on the server. UID 1001 is
      neither the owner (500) nor in the owning group (also 500), so 'other' permissions apply — 0640 grants
      'other' nothing, hence denied. (A) UID squashing only maps root (UID 0) by default, not 1001. (C) the
      filesystem permissions do enforce, not just network ACLs. (D) NFSv4 adds krb5 auth but not by default;
      AUTH_SYS is still the common case. (E) mount options don't bypass file perms.
    choices:
      - "NFS root-squashes UID 1001 to nobody"
      - "Numeric UID mismatch: 1001 ≠ 500, and mode 0640 denies 'other'"
      - "NFS doesn't enforce filesystem permissions"
      - "NFSv4 kerberos rejected the unauthenticated client"
      - "The client mount was `ro` — reading is blocked"
  - id: q86
    type: MCQ
    topic: Synthesis
    marks: 2
    bloom: apply
    source: "Mod04 Ch11 redirection × pipes"
    tags: [redirection, pipes, synthesis]
    question: |
      Run `cmd1 | cmd2 2>&1 > out.log`. Which stream ends up in `out.log`?
    correct: 1
    rationale: >-
      **B: Only cmd2's stdout.** Parse left-to-right: `|` first connects cmd1's stdout to cmd2's stdin. Then
      `cmd2 2>&1 > out.log` runs: `2>&1` fires first and points cmd2's fd 2 at wherever fd 1 currently points —
      which is the pipe back to cmd1 (not useful, goes nowhere since cmd1 is the pipe writer). Then `> out.log`
      redirects cmd2's stdout to out.log. Net result: cmd2's stdout → out.log; cmd2's stderr → the pipe (lost);
      cmd1's stderr → terminal. (A) both streams would need `cmd2 > out.log 2>&1` (order flipped). (C) no,
      cmd1's stdout goes into the pipe. (D) `|&` is bash shorthand for pipe-with-stderr, not used here.
      (E) nothing is wrong — out.log does get cmd2's stdout.
    choices:
      - "cmd2's stdout and cmd2's stderr"
      - "Only cmd2's stdout"
      - "cmd1's stdout and cmd2's stdout"
      - "cmd2's stderr only"
      - "Nothing — the redirection fails"
