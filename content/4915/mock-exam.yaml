  - id: q75
    type: MCQ
    topic: Redirection
    marks: 2
    bloom: apply
    source: "materials/past-exams/midterm.md Q10, Q50; Mod04 Ch11"
    tags: [redirection, variant]
    question: Which form sends BOTH stdout and stderr to `log.txt`?
    correct: 0
    rationale: >-
      **A: `cmd > log.txt 2>&1`**. Redirections are evaluated left-to-right; `> log.txt` binds fd 1 to log.txt
      first, then `2>&1` points fd 2 at whatever fd 1 currently points to — log.txt. (B) `cmd 2>&1 > log.txt`
      looks symmetric but isn't: `2>&1` fires first and points fd 2 at the terminal (stdout hasn't been
      redirected yet), then `> log.txt` redirects stdout — stderr still goes to the terminal. (C) `cmd &> log.txt`
      is bash-only shorthand for the same thing as A; valid in bash but not POSIX, so A is the safe pick when
      both are listed. (D) uses `1>2` which is invalid syntax (no `&`). (E) sends stdin, not output.
    choices:
      - "`cmd > log.txt 2>&1`"
      - "`cmd 2>&1 > log.txt`"
      - "`cmd 1>2 > log.txt`"
      - "`cmd >> log.txt 2>> log.txt`"
      - "`cmd < log.txt`"
