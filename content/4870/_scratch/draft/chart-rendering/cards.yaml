id: chart-rendering
name: "Chart.js in Razor — CDN + Razor data injection"
tags: [chart, chart-js, razor]
source: "Labs/W13 Excel, PDF, Chart cocktail/; research-excel-pdf-chart.md §3"
prose: "Chart.js is a client-side library loaded from a CDN. A Razor page exposes a `<canvas>` element, builds JS data arrays by `@:` directives in a `<script>` block, and calls `new Chart(ctx, { type, data })` to render."
cards:
  - id: chart-rendering-card-01
    type: cloze
    prompt: "Chart.js renders on a `<{{canvas}}>` element identified by `id`. In the script, grab it via `document.getElementById('pie-chart')` and pass it to `new Chart(ctx, config)`."
    answer: "canvas"
    bloom: remember
    explanation: "Chart.js draws 2D graphics using the canvas's 2D context. The canvas has to be in the DOM when the script runs, so typically the <script> block appears after the canvas element."
    example: "<canvas id=\"pie-chart\" width=\"400\" height=\"400\"></canvas>"

  - id: chart-rendering-card-02
    type: name
    prompt: "Which Razor directive injects a JavaScript line per loop iteration inside a `<script>` block?"
    answer: "`@:` (at-colon) at the start of each JS line."
    bloom: apply
    explanation: "`@:` tells Razor \"treat this line as mixed content with @-expression substitutions.\" Without it, Razor may misparse the JS or produce malformed output."
    example: "@foreach (var x in Model.Data) { @:labels.push('@x.Name'); }"

  - id: chart-rendering-card-03
    type: cloze
    prompt: "The Chart.js constructor takes two arguments: `new Chart({{ctx}}, {{config}})` — the canvas element (or its 2D context) and a config object with `type`, `data`, and optional `options`."
    answer: "ctx; config"
    bloom: apply
    explanation: "Config.type picks the chart shape ('pie', 'bar', 'line', 'doughnut', etc.). Config.data has labels and datasets arrays. Options tune axes, legend, tooltips."
    example: "new Chart(canvas, { type: 'pie', data: { labels, datasets: [{ data, backgroundColor }] } });"

  - id: chart-rendering-card-04
    type: name
    prompt: "How do you load Chart.js into a Razor page?"
    answer: "Add `<script src=\"https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js\"></script>` to the page."
    bloom: remember
    explanation: "The library is distributed via CDN; no NuGet package is involved because the chart runs client-side. Pin a version (e.g. @3.9.1) so updates don't silently change behavior."
    example: "<script src=\"https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js\"></script>"

  - id: chart-rendering-card-05
    type: cloze
    prompt: "For a pie chart, the dataset's `{{backgroundColor}}` is an array of colors — one entry per slice."
    answer: "backgroundColor"
    bloom: apply
    explanation: "Unlike bar/line charts which typically use a single color across the dataset, pie slices want distinct colors. Pass an array aligned with the data array."
    example: "datasets: [{ data: [10, 20, 30], backgroundColor: ['red', 'blue', 'green'] }]"

  - id: chart-rendering-card-06
    type: name
    prompt: "Can Chart.js render a chart at the server and include the PNG in a PDF export?"
    answer: "No. Chart.js runs only in the browser. Server-side chart rendering requires a different library (e.g. SkiaSharp, System.Drawing)."
    bloom: analyze
    explanation: "The chart lives in a browser <canvas>. PDFs generated by iText 7 on the server cannot include a Chart.js-rendered image unless you first export the canvas from the browser (e.g. toDataURL) and POST it back to the server for embedding."
    example: "Use SkiaSharp or ScottPlot for server-rendered images if you need charts embedded in PDFs."
