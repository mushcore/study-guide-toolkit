modules:
  - id: module-1-ai
    name: "AI in .NET"
    topics:
      - id: ai-semantic-kernel
        name: "Semantic Kernel (W02 — GitHub Models)"
        tags: [ai, sk, semantic-kernel]
        prose: "W02 lab wires SK to GitHub Models via `OpenAIClient(new ApiKeyCredential(...), new OpenAIClientOptions{Endpoint})`. Register `AddOpenAIChatCompletion` + `AddKernel` in Program.cs. Inject `IChatCompletionService` into PageModel. Use `ChatHistory(systemPrompt)` for context, `GetStreamingChatMessageContentsAsync` for tokens."
        source: "Labs/W02 AI on Github/GitHubAiModelSK"
        cards:
          - id: sk-credential-class
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "W02 `OpenAIClient` constructor takes {{ApiKeyCredential(pat)}}, not `AzureKeyCredential`."
            answer: "ApiKeyCredential(pat)"
          - id: sk-github-endpoint
            type: cloze
            bloom: remember
            source: "appsettings.json"
            prompt: "GitHub Models endpoint for `OpenAIClientOptions.Endpoint`: `https://models.github.ai/{{inference}}`"
            answer: "inference"
          - id: sk-injected-interface
            type: cloze
            bloom: understand
            source: "Index.cshtml.cs"
            prompt: "W02 `IndexModel` constructor injects {{IChatCompletionService}}, not `IKernel`."
            answer: "IChatCompletionService"
          - id: sk-chathistory-role
            type: name
            bloom: understand
            source: "Index.cshtml.cs"
            prompt: "The string argument to `new ChatHistory(\"You are...\")` represents:"
            answer: "The system prompt — model instructions for the whole conversation"
          - id: sk-streaming-method
            type: cloze
            bloom: apply
            source: "Index.cshtml.cs"
            prompt: "Streaming tokens from SK: `await foreach (var m in _chat.{{GetStreamingChatMessageContentsAsync}}(chat)) sb.Append(m.Content);`"
            answer: "GetStreamingChatMessageContentsAsync"
          - id: sk-registration
            type: cloze
            bloom: understand
            source: "Program.cs"
            prompt: "Register SK: `builder.Services.{{AddOpenAIChatCompletion}}(modelId, client); builder.Services.{{AddKernel}}();`"
            answer: "AddOpenAIChatCompletion, AddKernel"

      - id: ai-local-models-maf
        name: "Local Models + MAF (Docker SLM, Ollama)"
        tags: [ai, maf, ollama, local-models]
        prose: "OllamaSharp's `OllamaApiClient` and Docker-based LLMs implement `IChatClient` (Microsoft.Extensions.AI). Wrap with `.AsAIAgent(name, instructions)` extension. Multi-turn state: `AgentSession` from `await agent.CreateSessionAsync()`. Stream via `RunStreamingAsync`."
        source: "code-examples/docker-slms, code-examples/Ollama"
        cards:
          - id: ollama-interface
            type: name
            bloom: understand
            source: "SLM.OllamaClient/Program.cs"
            prompt: "`new OllamaApiClient(uri, modelId)` implements which interface?"
            answer: "IChatClient (from Microsoft.Extensions.AI)"
          - id: ichatclient-streaming
            type: cloze
            bloom: apply
            source: "SLM.OllamaClient/Program.cs"
            prompt: "`IChatClient` streaming method: `await foreach (var update in _chat.{{GetStreamingResponseAsync}}(messages)) sb.Append(update.Text);`"
            answer: "GetStreamingResponseAsync"
          - id: maf-extension-wrap
            type: cloze
            bloom: remember
            source: "FunnyDockerMAF.cs"
            prompt: "Wrap `IChatClient` into a MAF agent: `chatClient.{{AsAIAgent}}(name, instructions)`"
            answer: "AsAIAgent"
          - id: maf-session-multiturn
            type: cloze
            bloom: understand
            source: "FunnyDockerMAF.cs"
            prompt: "Multi-turn context in MAF: `AgentSession session = {{await agent.CreateSessionAsync()}}` then pass into streaming calls."
            answer: "await agent.CreateSessionAsync()"
          - id: maf-streaming-method
            type: cloze
            bloom: apply
            source: "FunnyDockerMAF.cs"
            prompt: "MAF agent streaming: `{{await foreach (var update in agent.RunStreamingAsync(input, options))}} ...`"
            answer: "await foreach (var update in agent.RunStreamingAsync(input, options))"
          - id: docker-credential-placeholder
            type: cloze
            bloom: remember
            source: "FunnyDockerMAF.cs"
            prompt: "Docker SLM credential placeholder: `new ApiKeyCredential(\"{{unused}}\")`"
            answer: "unused"

  - id: module-2-mlnet
    name: "ML.NET"
    topics:
      - id: mlnet-pipeline-construction
        name: "Pipeline Construction (TaxiFarePrediction)"
        tags: [mlnet, pipeline, regression]
        prose: "ML.NET pipelines chain transforms (CopyColumns, OneHotEncoding, Concatenate) ending in a trainer (FastTree). Every trainer hardcodes `\"Features\"` (feature vector) and `\"Label\"` (target). CopyColumns renames your input columns to match."
        source: "code-examples/TaxiFarePrediction"
        cards:
          - id: mlnet-copycolumns-purpose
            type: name
            bloom: understand
            source: "Program.cs"
            prompt: "Why does the pipeline start with `CopyColumns(\"Label\", \"FareAmount\")`?"
            answer: "Trainers find the target by the literal name `\"Label\"`; CopyColumns gives your target column that name"
          - id: mlnet-onehotencoding-purpose
            type: name
            bloom: understand
            source: "Program.cs"
            prompt: "`OneHotEncoding(\"VendorIdEncoded\", \"VendorId\")` does what?"
            answer: "Expands each distinct text value into a binary-indicator vector"
          - id: mlnet-concatenate-output
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "`Concatenate` output column MUST be named {{\"Features\"}} — trainers hardcode that lookup."
            answer: "\"Features\""
          - id: mlnet-fit-return
            type: name
            bloom: remember
            source: "Program.cs"
            prompt: "`pipeline.Fit(trainingData)` returns:"
            answer: "ITransformer — the trained, serializable model"
          - id: mlnet-trainer-choice
            type: name
            bloom: understand
            source: "Program.cs"
            prompt: "TaxiFarePrediction uses which regression trainer?"
            answer: "FastTree"

      - id: mlnet-evaluation-consumption
        name: "Evaluation + Model Consumption"
        tags: [mlnet, evaluation, prediction, metrics]
        prose: "`Regression.Evaluate(predictions, \"Label\", \"Score\")` returns `RegressionMetrics`. R² = variance explained (0–1). RMSE = average error in label units (e.g., dollars). `CreatePredictionEngine<TIn, TOut>` wraps the model for single-row inference."
        source: "code-examples/TaxiFarePrediction"
        cards:
          - id: mlnet-rsquared-meaning
            type: name
            bloom: understand
            source: "Program.cs"
            prompt: "What does R² (RSquared) measure?"
            answer: "Fraction of variance explained by the model (0–1, unitless)"
          - id: mlnet-rmse-units
            type: name
            bloom: understand
            source: "Program.cs"
            prompt: "`RMSE = 3.30` in a taxi-fare model. What does 3.30 represent?"
            answer: "Average prediction error in the label's original units (dollars)"
          - id: mlnet-score-column-binding
            type: cloze
            bloom: analyze
            source: "Program.cs"
            prompt: "Prediction class field binding to FastTree output: `[ColumnName(\"{{Score}}\")]` (not `\"Prediction\"`)"
            answer: "Score"
          - id: mlnet-prediction-engine
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "`mlContext.Model.{{CreatePredictionEngine}}<TaxiTrip, TaxiTripFarePrediction>(model)` creates single-row inference wrapper."
            answer: "CreatePredictionEngine"
          - id: mlnet-model-save
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "Save trained model: `mlContext.Model.Save(model, {{schema}}, path)` — `schema` carries column names/types."
            answer: "schema"
          - id: mlnet-model-load
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "Load model: `mlContext.Model.Load(path, {{out}} DataViewSchema schema)`"
            answer: "out"

      - id: mlnet-automl-cli
        name: "AutoML CLI"
        tags: [mlnet, automl, cli]
        prose: "AutoML CLI (`dotnet automl`) explores algorithm + hyperparameter combinations. `--train-time 60` allocates 60 seconds. `--dataset` = CSV path. `--label-col` = target column (0-based index or name)."
        source: "code-examples/TaxiFareAutoML"
        cards:
          - id: automl-train-time-flag
            type: cloze
            bloom: remember
            source: "CLI docs"
            prompt: "AutoML exploration budget flag: `--{{train-time}} 60` (allocates 60 seconds)"
            answer: "train-time"
          - id: loadcolumn-index-base
            type: name
            bloom: remember
            source: "Models/TaxiTrip.cs"
            prompt: "`[LoadColumn(0)]` on a CSV — what is the 0?"
            answer: "0-based column index (first CSV column is 0)"

  - id: module-3-caching
    name: "Caching"
    topics:
      - id: cache-memory
        name: "IMemoryCache (In-Process)"
        tags: [cache, memory, inmemory]
        prose: "`AddMemoryCache()` registers `IMemoryCache`. Check-then-fetch: `TryGetValue(key, out T? v)` on miss → fetch → `Set(key, v, MemoryCacheEntryOptions)`. Options: `AbsoluteExpiration`, `SlidingExpiration`, `Priority`."
        source: "code-examples/DataCacheDemo"
        cards:
          - id: memory-cache-registration
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "Register `IMemoryCache`: `builder.Services.{{AddMemoryCache}}();`"
            answer: "AddMemoryCache"
          - id: memory-cache-pattern
            type: name
            bloom: apply
            source: "Index.cshtml.cs"
            prompt: "DataCacheDemo's check-then-fetch pattern:"
            answer: "TryGetValue(key, out T? v) on miss → fetch → Set(key, v, options)"
          - id: cache-expiry-rule
            type: name
            bloom: analyze
            source: "Index.cshtml.cs"
            prompt: "Entry with `AbsoluteExpiration=+50s` and `SlidingExpiration=+20s`, never accessed after set. When expires?"
            answer: "t+20s — sliding fires first since no access resets it"
          - id: cache-priority-eviction
            type: name
            bloom: understand
            source: "Index.cshtml.cs"
            prompt: "`CacheItemPriority.Low` means:"
            answer: "Evicted first when the cache is under memory pressure"

      - id: cache-redis
        name: "IDistributedCache + Redis"
        tags: [cache, distributed, redis]
        prose: "`AddStackExchangeRedisCache` registers `IDistributedCache` backed by Redis. `AbortOnConnectFail = false` (default) = writes silently no-op on connection loss. `true` = crash so orchestrators restart. Manual invalidation: `cache.Remove(key)` after writes."
        source: "code-examples/WebApiFIFA_REDIS_Final"
        cards:
          - id: redis-registration
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "Register Redis-backed `IDistributedCache`: `builder.Services.{{AddStackExchangeRedisCache}}(options => ...);`"
            answer: "AddStackExchangeRedisCache"
          - id: abort-on-connect-false
            type: name
            bloom: analyze
            source: "Program.cs"
            prompt: "`AbortOnConnectFail = false` (default) — Redis not running. What happens?"
            answer: "Cache writes silently no-op; reads return null. Framework retries in background."
          - id: getorasync-on-miss
            type: name
            bloom: understand
            source: "DistributedCacheExtensions.cs"
            prompt: "`GetOrSetAsync<T>(key, factory)` on cache miss:"
            answer: "Invokes factory → stores result as JSON bytes via SetAsync → returns value"
          - id: cache-invalidation
            type: cloze
            bloom: apply
            source: "GameService.cs"
            prompt: "After `SaveChangesAsync()` on write: `{{cache.Remove(key)}}` to invalidate."
            answer: "cache.Remove(key)"

  - id: module-4-file-apps
    name: "File-Based Apps"
    topics:
      - id: file-based-directives
        name: "Directives + CLI"
        tags: [file-based, directives, cli]
        prose: "File-based-app directives (`#:`) customize MSBuild. `#:package`, `#:property`, `#:sdk`, `#:project` are the main four. CLI: `dotnet run file.cs -- args` (note `--` separator). `dotnet project convert file.cs -o Folder` scaffolds a traditional project."
        source: "code-examples/file-based-apps"
        cards:
          - id: directive-package
            type: cloze
            bloom: remember
            source: "example-4/Locations.cs"
            prompt: "Add NuGet package to file-based app: `#:{{package}} Name@Version`"
            answer: "package"
          - id: directive-property
            type: cloze
            bloom: remember
            source: "example-2/HelloScript.cs"
            prompt: "Set target framework: `#:{{property}} TargetFramework=net10.0`"
            answer: "property"
          - id: directive-sdk-web
            type: cloze
            bloom: understand
            source: "FileBasedWebApi/WebApi.cs"
            prompt: "Enable ASP.NET Core: `#:{{sdk}} Microsoft.NET.Sdk.Web`"
            answer: "sdk"
          - id: directive-project
            type: cloze
            bloom: remember
            source: "example-3/Where.cs"
            prompt: "Reference sibling `.csproj`: `#:{{project}} ./Path/Name.csproj`"
            answer: "project"
          - id: cli-args-separator
            type: name
            bloom: apply
            source: "example-4/Locations.cs"
            prompt: "Run `Locations.cs` and pass `Kevin` to the script:"
            answer: "`dotnet run Locations.cs -- Kevin` (note `--` routes args to script, not to dotnet)"
          - id: cli-convert-project
            type: cloze
            bloom: remember
            source: "notes/file-based-apps.docx"
            prompt: "Convert single-file script to traditional project: `dotnet {{project}} {{convert}} file.cs -o Folder`"
            answer: "project, convert"

  - id: module-5-grpc
    name: "gRPC"
    topics:
      - id: grpc-proto-server
        name: "Proto Definition + Server"
        tags: [grpc, proto, server]
        prose: "`.proto` files define messages and services. First line: `syntax = \"proto3\";`. Field tags (1, 2, ...) are permanent wire contracts — reusing a tag breaks deployed clients. `Grpc.Tools` generates `[ServiceName].[ServiceName]Base`. Unary overrides: `(Request, ServerCallContext) → Task<Response>`."
        source: "Labs/W09 gRPC/GrpcBasics"
        cards:
          - id: proto-syntax-declaration
            type: cloze
            bloom: remember
            source: "students.proto"
            prompt: "First line of `.proto` file: `{{syntax}} = \"proto3\";`"
            answer: "syntax"
          - id: proto-rpc-syntax
            type: cloze
            bloom: understand
            source: "students.proto"
            prompt: "Proto service RPC: `rpc GetStudentInfo ({{StudentLookupModel}}) returns ({{StudentModel}});`"
            answer: "StudentLookupModel, StudentModel"
          - id: proto-field-tags-permanent
            type: name
            bloom: analyze
            source: "students.proto"
            prompt: "Why can't you reuse a field tag (e.g., tag 2) after removing a field?"
            answer: "Field tags are permanent wire contracts — reusing a tag breaks every deployed client that reads that tag as the old type"
          - id: grpc-server-base-class
            type: cloze
            bloom: remember
            source: "Services/StudentsService.cs"
            prompt: "`StudentsService` inherits from {{StudentRemote}}.{{StudentRemoteBase}}"
            answer: "StudentRemote, StudentRemoteBase"
          - id: grpc-unary-override-signature
            type: name
            bloom: apply
            source: "Services/StudentsService.cs"
            prompt: "Unary override signature in gRPC server:"
            answer: "public override Task<Response> MethodName(Request request, ServerCallContext context)"
          - id: grpc-registration
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "Register gRPC: `builder.Services.{{AddGrpc}}(); app.{{MapGrpcService}}<StudentsService>();`"
            answer: "AddGrpc, MapGrpcService"
          - id: grpc-client-generation
            type: cloze
            bloom: analyze
            source: "BlazorGrpcClient.csproj"
            prompt: "Client `.csproj` needs `<Protobuf Include=... {{GrpcServices}}=\"{{Client}}\" />`"
            answer: "GrpcServices, Client"

  - id: module-6-aspire
    name: ".NET Aspire"
    topics:
      - id: aspire-apphost-defaults
        name: "AppHost + Service Defaults"
        tags: [aspire, apphost, orchestration]
        prose: "Aspire `DistributedApplication.CreateBuilder(args)` is the orchestrator. Resources: `AddSqlServer().AddDatabase()`. Wiring: `WithReference(db)` injects config, `WaitFor(db)` delays startup. Each service calls `AddServiceDefaults()` (not AppHost). `/health` readiness, `/alive` liveness."
        source: "code-examples/SoccerFIFA_Aspire"
        cards:
          - id: aspire-apphost-builder
            type: cloze
            bloom: remember
            source: "AppHost.cs"
            prompt: "Aspire AppHost builder: `var builder = {{DistributedApplication}}.{{CreateBuilder}}(args);`"
            answer: "DistributedApplication, CreateBuilder"
          - id: aspire-database-resource
            type: cloze
            bloom: understand
            source: "AppHost.cs"
            prompt: "Define SQL database: `builder.{{AddSqlServer}}(\"server\").{{AddDatabase}}(\"sqldata\")`"
            answer: "AddSqlServer, AddDatabase"
          - id: aspire-with-reference-waitfor
            type: name
            bloom: understand
            source: "AppHost.cs"
            prompt: "`WithReference(db)` and `WaitFor(db)` do what respectively?"
            answer: "`WithReference` injects config as environment variables; `WaitFor` delays consumer startup until the resource is healthy"
          - id: aspire-service-defaults-location
            type: name
            bloom: apply
            source: "Program.cs (service)"
            prompt: "`builder.AddServiceDefaults()` belongs in:"
            answer: "Each service project's Program.cs (NOT the AppHost)"
          - id: aspire-health-vs-alive
            type: name
            bloom: understand
            source: "ServiceDefaults/Extensions.cs"
            prompt: "`/health` vs `/alive`:"
            answer: "`/health` readiness (all checks); `/alive` liveness (only `\"live\"`-tagged checks)"
          - id: aspire-db-context-consumption
            type: cloze
            bloom: apply
            source: "WebApiFIFA/Program.cs"
            prompt: "Service consumes database: `builder.{{AddSqlServerDbContext}}<ApplicationDbContext>(\"sqldata\")`"
            answer: "AddSqlServerDbContext"
          - id: aspire-default-endpoints
            type: cloze
            bloom: remember
            source: "Program.cs (service)"
            prompt: "Call in service: `app.{{MapDefaultEndpoints}}()` (registers `/health`, `/alive`)"
            answer: "MapDefaultEndpoints"

  - id: module-7-localization
    name: "Localization"
    topics:
      - id: localization-setup
        name: "Middleware + Resource Files"
        tags: [localization, i18n, resx]
        prose: "`AddLocalization(options => options.ResourcesPath = \"Resources\")` sets root folder for `.resx` files. `AddViewLocalization()` registers `IViewLocalizer`. `UseRequestLocalization()` middleware runs culture providers per request. `@inject IViewLocalizer Localizer` in Razor. `CurrentCulture` formats (dates/decimals); `CurrentUICulture` selects `.resx`."
        source: "Labs/W10 Localization/Sports"
        cards:
          - id: localization-resources-path
            type: cloze
            bloom: remember
            source: "Program.cs"
            prompt: "`AddLocalization(options => options.{{ResourcesPath}} = \"Resources\")` sets:"
            answer: "ResourcesPath"
          - id: current-culture-vs-uiculture
            type: name
            bloom: understand
            source: "Program.cs"
            prompt: "`CurrentCulture` vs `CurrentUICulture`:"
            answer: "`CurrentCulture` controls date/number formatting; `CurrentUICulture` controls which `.resx` file loads"
          - id: request-localization-middleware
            type: cloze
            bloom: analyze
            source: "Program.cs"
            prompt: "Middleware that runs culture providers per request: `app.{{UseRequestLocalization}}()`"
            answer: "UseRequestLocalization"
          - id: view-localizer-injection
            type: cloze
            bloom: remember
            source: "Index.cshtml"
            prompt: "Inject into `.cshtml`: `@{{inject}} IViewLocalizer Localizer`"
            answer: "inject"
          - id: view-localizer-usage
            type: cloze
            bloom: apply
            source: "Index.cshtml"
            prompt: "Use in view: `@Localizer[\"{{Key}}\"]`"
            answer: "Key"

  - id: module-8-blazor
    name: "Blazor QuickGrid"
    topics:
      - id: quickgrid-paginator
        name: "QuickGrid + Paginator"
        tags: [blazor, quickgrid, paginator]
        prose: "`PaginationState` tracks current page and `ItemsPerPage`. `<Paginator State=\"@pagination\" />` renders controls. `@bind:event=\"oninput\"` fires per keystroke for live filtering (default `onchange` fires only on blur)."
        source: "Labs/W07 QuickGrid/BlazorStudents"
        cards:
          - id: pagination-state-property
            type: cloze
            bloom: remember
            source: "Index.razor"
            prompt: "`new PaginationState { {{ItemsPerPage}} = 15 }`"
            answer: "ItemsPerPage"
          - id: paginator-binding
            type: cloze
            bloom: remember
            source: "Index.razor"
            prompt: "Render paginator: `<Paginator {{State}}=\"@pagination\" />`"
            answer: "State"
          - id: bind-oninput-live-filter
            type: name
            bloom: analyze
            source: "Index.razor"
            prompt: "Why pair `@bind` with `@bind:event=\"oninput\"`?"
            answer: "Default `onchange` fires only on blur; `oninput` fires per keystroke for live filtering"
          - id: quickgrid-items-binding
            type: cloze
            bloom: apply
            source: "Index.razor"
            prompt: "`<QuickGrid {{Items}}=\"@FilteredStudents\" Pagination=\"@pagination\">`"
            answer: "Items"

  - id: module-9-tdd
    name: "TDD (xUnit + Moq)"
    topics:
      - id: tdd-xunit-moq
        name: "xUnit Attributes + Moq Patterns (GoodBooks)"
        tags: [tdd, xunit, moq, testing]
        prose: "xUnit: `[Fact]` one-run test, `[Theory]` + `[InlineData(...)]` parameterized. Constructor runs fresh per test (no `[SetUp]` needed). Moq: `Setup(r => r.Method(...)).Returns(...)` stubs, `.Callback<T>(...)` captures, `.Verify(..., Times.Once)` asserts. `.Object` accesses the fake."
        source: "materials/project/GoodBooks/test"
        cards:
          - id: xunit-fact-attribute
            type: cloze
            bloom: remember
            source: "AccountTests.cs"
            prompt: "One-run parameterless test: `[{{Fact}}]`"
            answer: "Fact"
          - id: xunit-theory-inlinedata
            type: name
            bloom: apply
            source: "BaseServiceTests.cs"
            prompt: "Parameterized test with three input sets:"
            answer: "`[Theory]` + three `[InlineData(...)]` rows"
          - id: xunit-constructor-lifecycle
            type: name
            bloom: understand
            source: "BaseServiceTests.cs"
            prompt: "xUnit constructor lifecycle:"
            answer: "Fresh test-class instance per `[Fact]` or `[Theory]` run — no cross-test state"
          - id: assert-equal-order
            type: cloze
            bloom: apply
            source: "AccountTests.cs"
            prompt: "Correct order: `Assert.Equal({{expected}}, actual)` (expected FIRST)"
            answer: "expected"
          - id: moq-setup-returns
            type: cloze
            bloom: apply
            source: "BaseServiceTests.cs"
            prompt: "Stub return value: `_mockRepo.{{Setup}}(r => r.Table).{{Returns}}(banks.AsQueryable());`"
            answer: "Setup, Returns"
          - id: moq-callback
            type: name
            bloom: apply
            source: "BaseServiceTests.cs"
            prompt: "`Callback<T>(...)` does what?"
            answer: "Captures what the SUT passed into the method (records side effects)"
          - id: moq-verify-times
            type: cloze
            bloom: apply
            source: "BaseServiceTests.cs"
            prompt: "Assert called exactly once: `_mockRepo.{{Verify}}(expr, {{Times.Once}});`"
            answer: "Verify, Times.Once"
          - id: moq-it-isany
            type: name
            bloom: understand
            source: "BaseServiceTests.cs"
            prompt: "`It.IsAny<T>()` means:"
            answer: "Matches any value"

