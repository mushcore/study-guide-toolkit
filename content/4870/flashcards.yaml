  - id: module-2-distributed-services
    name: Distributed Services & Orchestration
    topics:
      - id: grpc-proto-contracts
        name: gRPC .proto contracts
        tags:
          - grpc
          - protobuf
          - contract-first
        source: slides/gRPC.pptx; notes/gRPC_EF_SQLite_VSCode_SCRIPT.docx; research-grpc.md
        prose: >-
          These cards drill the proto3 syntax you must read and write on the exam — keywords, field-tag rules, and the
          defaults that trip students up.
        cards:
          - id: grpc-proto-contracts-card-01
            type: cloze
            prompt: >-
              In a `.proto` file, the `{{1}}` keyword declares a gRPC service and each `{{2}}` keyword inside declares
              one callable method.
            answer: service; rpc
            bloom: remember
            explanation: >-
              The generator walks every `rpc` line inside a `service` block to emit one C# method per RPC on both the
              server base class and the client stub.
            example: |-
              service StudentRemote {
                rpc GetStudentInfo (StudentLookupModel) returns (StudentModel);
              }
          - id: grpc-proto-contracts-card-02
            type: cloze
            prompt: Proto field tags `1` through `{{1}}` encode in one byte; tags `{{2}}` and higher take two bytes.
            answer: 15; 16
            bloom: remember
            explanation: >-
              Protobuf packs the wire-type and tag number into a varint. Values below 16 fit in the first byte's 4
              available tag bits, so frequently-sent fields should live in the 1–15 range.
            example: |-
              message Person {
                int32 id = 1;      // 1-byte tag
                string bio = 16;   // 2-byte tag
              }
          - id: grpc-proto-contracts-card-03
            type: name
            prompt: What is the default value of an unset `string` field in proto3?
            answer: The empty string "".
            bloom: remember
            explanation: >-
              Proto3 removed the `null` / `HasField` concept for scalars. The server cannot distinguish 'client sent
              nothing' from 'client sent an empty string' on a plain `string` field.
            example: message Reply { string result = 1; }  // unset Result is ""
          - id: grpc-proto-contracts-card-04
            type: cloze
            prompt: The `{{1}}` keyword in a `message` definition maps to a `List<T>` in the generated C# code.
            answer: repeated
            bloom: understand
            explanation: >-
              `repeated` marks a field as a zero-or-more collection. `protoc` emits a `RepeatedField<T>` property that
              implements `IList<T>`, which is how you iterate or add items in C#.
            example: |-
              message StudentList {
                repeated StudentModel items = 1;
              }
          - id: grpc-proto-contracts-card-05
            type: name
            prompt: >-
              You delete the field `string school = 4;` from a deployed `.proto`. Can you safely reuse tag `4` for a new
              `int32 gradeLevel = 4;`?
            answer: >-
              No — reusing a tag number is forbidden. Old clients still sending tag 4 as a string will be misdecoded as
              the new `int32`.
            bloom: analyze
            explanation: >-
              Field tags are the immutable binary wire identifier. Changing a tag's type without changing its number
              silently corrupts any already-deployed client. Either pick a fresh tag or mark the old one `reserved`.
            example: |-
              message Student {
                reserved 4;             // protect old tag
                int32 gradeLevel = 5;   // new field, new tag
              }
          - id: grpc-proto-contracts-card-06
            type: predict
            prompt: >-
              Given this proto, what does the generated C# class for `StudentLookupModel` expose, and what is the
              default value of `StudentId` on a freshly-constructed instance?
            lang: proto
            code: |
              message StudentLookupModel {
                int32 studentId = 1;
              }
            answer: >-
              A C# class `StudentLookupModel` with a public `int StudentId { get; set; }` property. A `new
              StudentLookupModel()` has `StudentId == 0` because proto3 unset `int32` defaults to zero.
            bloom: apply
            explanation: >-
              `protoc` PascalCases proto field names for C#, so `studentId` becomes `StudentId`. Proto3 scalar defaults
              are 0 / "" / false — there is no null option for plain scalars.
            example: |-
              var req = new StudentLookupModel();
              // req.StudentId == 0
          - id: grpc-proto-contracts-card-07
            type: cloze
            prompt: >-
              In a `.csproj`, `<Protobuf Include="Protos\x.proto" GrpcServices="{{1}}" />` generates the abstract base
              class your service implementation inherits from.
            answer: Server
            bloom: understand
            explanation: >-
              The `GrpcServices` attribute controls which half of the contract `protoc` emits. `Server` yields the
              `ServiceNameBase` class; `Client` yields the `ServiceNameClient` stub; `Both` yields both.
            example: <Protobuf Include="Protos\students.proto" GrpcServices="Server" />
          - id: grpc-proto-contracts-card-08
            type: name
            prompt: What does `option csharp_namespace = "GrpcStudentsServer";` do in a `.proto` file?
            answer: It sets the C# namespace that `protoc` wraps around every generated class for this `.proto`.
            bloom: remember
            explanation: >-
              Without this option, `protoc` derives the namespace from the `package` directive, which may not match your
              C# project's conventions. The option lets the proto and C# namespaces diverge.
            example: |-
              option csharp_namespace = "GrpcStudentsServer";
              package greet;
          - id: grpc-proto-contracts-card-09
            type: predict
            prompt: A client sends this proto message with `studentId` left unset. What does the server see?
            lang: proto
            code: |
              message StudentLookupModel {
                int32 studentId = 1;
              }
            answer: >-
              The server reads `request.StudentId == 0`. Proto3 cannot distinguish 'unset' from 'explicit zero' for a
              plain `int32` — both serialize identically on the wire.
            bloom: analyze
            explanation: >-
              This is the proto3-no-null trap. If you need to tell 'missing' from 'zero', wrap the field in a singleton
              `message` or use a `google.protobuf.Int32Value` wrapper, which does carry presence information.
            example: |-
              if (request.StudentId == 0) {
                // could mean unset OR id = 0
              }
      - id: grpc-server-implementation
        name: gRPC server implementation
        tags:
          - grpc
          - server
          - asp-net-core
        source: notes/gRPC_EF_SQLite_VSCode_SCRIPT.docx; Labs/W09 gRPC/; research-grpc.md
        prose: >-
          A gRPC server inherits from the auto-generated `[Service].[Service]Base` class and overrides one method per
          `rpc`. Each override takes the request type plus `ServerCallContext` and returns `Task<Response>`. Services
          are registered with `AddGrpc()` and routed with `MapGrpcService<T>()`.
        cards:
          - id: grpc-server-implementation-card-01
            type: cloze
            prompt: >-
              A gRPC service class inherits from `{{StudentRemote.StudentRemoteBase}}` — the pattern is
              `[ServiceName].[ServiceName]{{Base}}`.
            answer: StudentRemote.StudentRemoteBase; Base
            bloom: remember
            explanation: >-
              `Grpc.Tools` generates the base at build time. Inheriting from it is the only way to get your methods
              matched to the wire-level service dispatch.
            example: 'public class StudentsService : StudentRemote.StudentRemoteBase { … }'
          - id: grpc-server-implementation-card-02
            type: name
            prompt: Every gRPC server-side method takes two parameters. Name them in order for a unary call.
            answer: The request message type, then ServerCallContext.
            bloom: remember
            explanation: >-
              The `ServerCallContext` carries cancellation tokens, deadlines, metadata, and peer info. Omitting it is a
              compile error because the `override` target requires it.
            example: >-
              public override Task<StudentModel> GetStudentInfo(StudentLookupModel request, ServerCallContext context) {
              ... }
          - id: grpc-server-implementation-card-03
            type: cloze
            prompt: >-
              Server-side unary methods return `{{Task<Response>}}`. Wrap a synchronous value with
              `{{Task.FromResult}}(value)`.
            answer: Task<Response>; Task.FromResult
            bloom: apply
            explanation: >-
              gRPC methods are always asynchronous on the wire. Even when your implementation is synchronous, you must
              return a `Task` — `Task.FromResult` wraps the value cheaply.
            example: return Task.FromResult(new StudentModel { StudentId = 3 });
          - id: grpc-server-implementation-card-04
            type: name
            prompt: Which two calls register gRPC services in `Program.cs`?
            answer: '`builder.Services.AddGrpc()` plus `app.MapGrpcService<YourService>()`.'
            bloom: apply
            explanation: >-
              `AddGrpc` registers framework types (serialization, interceptors, resilience). `MapGrpcService<T>` wires
              routing so HTTP/2 requests reach your class.
            example: builder.Services.AddGrpc(); … app.MapGrpcService<StudentsService>();
          - id: grpc-server-implementation-card-05
            type: cloze
            prompt: >-
              Forgetting the `{{override}}` keyword on a method shadows the base-class method. The server compiles, but
              client calls get back `RpcException: {{UNIMPLEMENTED}}`.
            answer: override; UNIMPLEMENTED
            bloom: analyze
            explanation: >-
              Without `override`, your method is unrelated to the base class virtual method. The framework dispatches to
              the base's default, which throws UNIMPLEMENTED.
            example: public override Task<StudentModel> GetStudentInfo(... — the override keyword is non-optional.
          - id: grpc-server-implementation-card-06
            type: name
            prompt: How does a server-streaming method signature differ from a unary method?
            answer: It returns `Task` (not `Task<T>`) and takes `IServerStreamWriter<T>` as a third parameter.
            bloom: understand
            explanation: >-
              Streaming methods write each message via `responseStream.WriteAsync(...)` and return when the loop
              finishes. There is no single response object, so no `Task<T>` return.
            example: >-
              public override async Task RetrieveAllStudents(Empty r, IServerStreamWriter<StudentModel> stream,
              ServerCallContext ctx) { … }
          - id: grpc-server-implementation-card-07
            type: cloze
            prompt: >-
              To inject an EF Core DbContext into a gRPC service, register it with
              `{{builder.Services.AddDbContext}}<T>` in `Program.cs`, then accept it in the service constructor.
            answer: builder.Services.AddDbContext
            bloom: apply
            explanation: >-
              gRPC services use standard ASP.NET Core DI. Any service registered in the container can be
              constructor-injected, and gRPC services are instantiated per-request by default.
            example: public StudentsService(SchoolDbContext context) => _context = context;
          - id: grpc-server-implementation-card-08
            type: name
            prompt: What does the `ServerCallContext` parameter carry that you might use inside an override?
            answer: Cancellation tokens, deadlines, request metadata, and peer (client) info.
            bloom: understand
            explanation: >-
              Use `context.CancellationToken` to short-circuit expensive work if the client disconnects.
              `context.Deadline` tells you when the client will time out. `context.RequestHeaders` carries metadata like
              auth tokens.
            example: if (context.CancellationToken.IsCancellationRequested) return Task.FromResult(new Reply { IsOk = false });
      - id: grpc-client-consumption
        name: gRPC client consumption
        tags:
          - grpc
          - client
          - di
          - asp-net-core
        source: notes/gRPC_EF_SQLite_VSCode_SCRIPT.docx; Labs/W09 gRPC/; research-grpc.md
        prose: >-
          A gRPC client project shares the `.proto` file with the server but sets `GrpcServices="Client"` in its
          `.csproj`. Clients are constructed from a long-lived `GrpcChannel.ForAddress(url)` or registered via
          `AddGrpcClient<T>()` for DI. Blazor pages awaiting gRPC calls must use `@rendermode InteractiveServer`.
        cards:
          - id: grpc-client-consumption-card-01
            type: cloze
            prompt: >-
              To generate only the client-side stub from a shared `.proto`, the `.csproj` entry is `<Protobuf
              Include="…" GrpcServices="{{Client}}" />`.
            answer: Client
            bloom: remember
            explanation: >-
              `GrpcServices` chooses which code `Grpc.Tools` emits. `Server` produces the base class; `Client` produces
              the stub; `Both` produces both and is rarely needed.
            example: <Protobuf Include="Protos\students.proto" GrpcServices="Client" />
          - id: grpc-client-consumption-card-02
            type: name
            prompt: Which method constructs a long-lived gRPC connection given a URL?
            answer: GrpcChannel.ForAddress(url)
            bloom: remember
            explanation: >-
              The channel holds the HTTP/2 connection. Creating one is expensive; reuse across many client stubs. Client
              stubs themselves are cheap throwaway objects bound to a channel.
            example: using var channel = GrpcChannel.ForAddress("http://localhost:5099");
          - id: grpc-client-consumption-card-03
            type: cloze
            prompt: >-
              For DI-based client registration in ASP.NET Core, use
              `builder.Services.{{AddGrpcClient}}<StudentRemote.StudentRemoteClient>(opts => opts.Address = new
              Uri("http://localhost:5099"))` after adding the {{Grpc.Net.ClientFactory}} NuGet package.
            answer: AddGrpcClient; Grpc.Net.ClientFactory
            bloom: apply
            explanation: >-
              `AddGrpcClient` wires the client into the DI container with channel pooling, resilience handlers, and
              OpenTelemetry. Plain `new GrpcChannel` in Program.cs loses all those benefits.
            example: >-
              builder.Services.AddGrpcClient<StudentRemote.StudentRemoteClient>(o => o.Address = new
              Uri("http://backend"));
          - id: grpc-client-consumption-card-04
            type: name
            prompt: What render mode must a Blazor page use so it can `await` a gRPC client call inside `OnInitializedAsync`?
            answer: '`@rendermode InteractiveServer` (or `InteractiveWebAssembly` / `InteractiveAuto`).'
            bloom: apply
            explanation: >-
              Static server rendering completes before asynchronous work resolves. An interactive mode keeps the
              component alive and re-renders when the awaited task finishes.
            example: |-
              @page "/students"
              @rendermode InteractiveServer
              @inject StudentRemote.StudentRemoteClient _g
          - id: grpc-client-consumption-card-05
            type: cloze
            prompt: >-
              gRPC client methods are exposed in two forms: a blocking `{{Xxx}}(...)` and an asynchronous
              `{{XxxAsync}}(...)` that returns a `Task<T>` you await.
            answer: Xxx; XxxAsync
            bloom: understand
            explanation: >-
              Protocol Buffers generate both forms. The Async form is what you almost always call from managed code —
              the blocking form can deadlock in sync contexts.
            example: var reply = await client.GetStudentInfoAsync(request); // not client.GetStudentInfo(request)
          - id: grpc-client-consumption-card-06
            type: name
            prompt: >-
              A Blazor client gets `ConnectionRefused` every time it calls the gRPC server. What is the first thing to
              check?
            answer: >-
              That the client's Uri matches the server's `launchSettings.json` applicationUrl (including port and http
              vs https).
            bloom: analyze
            explanation: >-
              Port drift between server launch profile and client config is the single most common cause. Aspire service
              discovery via `http://backend/` eliminates this class of bug entirely.
            example: Server listens on https://localhost:7001. Client Uri must be exactly that URL — not http://localhost:5001.
          - id: grpc-client-consumption-card-07
            type: cloze
            prompt: >-
              Once registered with `AddGrpcClient<T>()`, inject the stub anywhere with `{{@inject}}` (Razor) or
              constructor injection (plain C# services).
            answer: '@inject'
            bloom: apply
            explanation: >-
              DI-registered gRPC clients are transient by default. Each request gets a fresh stub bound to a pooled
              channel.
            example: '@inject StudentRemote.StudentRemoteClient _grpcClient'
      - id: aspire-apphost
        name: .NET Aspire AppHost
        tags:
          - aspire
          - orchestration
          - apphost
        source: notes/aspire_SCRIPT.docx; Labs/W09 gRPC/; research-aspire.md
        prose: >-
          The Aspire AppHost is a separate project whose `Program.cs` builds a `DistributedApplication`. Four calls do
          the work: `CreateBuilder`, `AddProject<Projects.X>(name)`, `.WithReference(other)` for config injection, and
          `.WaitFor(other)` for startup ordering.
        cards:
          - id: aspire-apphost-card-01
            type: cloze
            prompt: >-
              The Aspire orchestrator builder is created with `DistributedApplication.{{CreateBuilder}}(args)`, and the
              app runs with `builder.Build().{{Run}}()`.
            answer: CreateBuilder; Run
            bloom: remember
            explanation: >-
              AppHost `Program.cs` follows the same pattern as any other .NET host: builder → configure → build → run.
              The only difference is the type is `DistributedApplication`, not `WebApplication`.
            example: var builder = DistributedApplication.CreateBuilder(args); … builder.Build().Run();
          - id: aspire-apphost-card-02
            type: name
            prompt: What does `builder.AddProject<Projects.StudentsGrpcApi>("backend")` do?
            answer: Registers the StudentsGrpcApi project as a service under the logical name "backend".
            bloom: understand
            explanation: >-
              Logical names (e.g. "backend") become the service-discovery identity. Consumers reach the service via
              `http://backend/` instead of a hardcoded localhost URL.
            example: var backend = builder.AddProject<Projects.StudentsGrpcApi>("backend");
          - id: aspire-apphost-card-03
            type: cloze
            prompt: >-
              To make the frontend aware of the backend's URL, call `.{{WithReference}}(backend)`. To delay the
              frontend's startup until the backend is healthy, also call `.{{WaitFor}}(backend)`.
            answer: WithReference; WaitFor
            bloom: apply
            explanation: >-
              `WithReference` injects env-vars with connection info. `WaitFor` adds a health-gated startup order. Pair
              them when the consumer cannot recover from a cold dependency.
            example: builder.AddProject<Projects.Frontend>("frontend").WithReference(backend).WaitFor(backend);
          - id: aspire-apphost-card-04
            type: name
            prompt: In an AppHost, how do you add a containerized SQL Server resource with one database called `cms`?
            answer: '`builder.AddSqlServer("sql").AddDatabase("cms")`'
            bloom: apply
            explanation: >-
              `AddSqlServer("sql")` registers the server resource; `.AddDatabase("cms")` chains a named database onto
              it. The service then `WithReference`s that database and gets `ConnectionStrings__cms` injected
              automatically.
            example: var cms = builder.AddSqlServer("sql").AddDatabase("cms"); api.WithReference(cms);
          - id: aspire-apphost-card-05
            type: cloze
            prompt: >-
              Services reach each other via their logical name — `http://{{backend}}/` resolves to the actual host:port
              at runtime. This is called {{service discovery}}.
            answer: backend; service discovery
            bloom: understand
            explanation: >-
              Aspire's service-discovery protocol handler intercepts URLs whose host matches a registered logical name
              and swaps in the real address. This keeps client code identical across local dev, Docker, and cloud.
            example: 'In the Blazor app: `public const string ApiBaseUrl = "http://backend/";`'
          - id: aspire-apphost-card-06
            type: name
            prompt: >-
              Where does `AddServiceDefaults()` belong — in the AppHost's `Program.cs`, or in each service's
              `Program.cs`?
            answer: In each service's Program.cs, never in the AppHost's.
            bloom: analyze
            explanation: >-
              AppHost is the orchestrator — it shouldn't register service-side concerns like OpenTelemetry or health
              checks on itself. Putting `AddServiceDefaults` in AppHost breaks boot.
            example: 'Service project: builder.AddServiceDefaults();  // in WebApi/Program.cs, NOT AppHost/Program.cs'
          - id: aspire-apphost-card-07
            type: cloze
            prompt: >-
              The AppHost project must have a `<ProjectReference>` to each service project — run `{{dotnet add
              reference}}` from the AppHost `.csproj` to each service.
            answer: dotnet add reference
            bloom: apply
            explanation: >-
              The `Projects.X` namespace used in `AddProject<Projects.X>` is generated from referenced projects. Without
              the reference, the type doesn't exist and the AppHost won't compile.
            example: dotnet add ./Cms.AppHost reference ./Cms.WebApi/Cms.WebApi.csproj
          - id: aspire-apphost-card-08
            type: name
            prompt: Which command runs the whole Aspire stack during development?
            answer: '`dotnet watch` (or `dotnet run`) from the AppHost project directory.'
            bloom: remember
            explanation: >-
              The AppHost owns orchestration, so running it starts every declared service, database, and container.
              Other projects are not launched directly during dev.
            example: cd Cms.AppHost && dotnet watch
      - id: aspire-service-defaults
        name: .NET Aspire ServiceDefaults
        tags:
          - aspire
          - observability
          - health-checks
        source: notes/aspire_SCRIPT.docx; research-aspire.md
        prose: >-
          Every Aspire service calls `builder.AddServiceDefaults()` at configure time and `app.MapDefaultEndpoints()` at
          map time. Together they install service discovery, OpenTelemetry, `/health` + `/alive` endpoints, and
          HttpClient resilience.
        cards:
          - id: aspire-service-defaults-card-01
            type: cloze
            prompt: >-
              Every Aspire service's `Program.cs` calls `builder.{{AddServiceDefaults}}()` and
              `app.{{MapDefaultEndpoints}}()`.
            answer: AddServiceDefaults; MapDefaultEndpoints
            bloom: remember
            explanation: >-
              `AddServiceDefaults` registers services (discovery, OTel, health checks, resilience).
              `MapDefaultEndpoints` exposes the HTTP endpoints (`/health`, `/alive`). Both are required.
            example: builder.AddServiceDefaults(); … app.MapDefaultEndpoints();
          - id: aspire-service-defaults-card-02
            type: name
            prompt: What four capabilities does `AddServiceDefaults()` install?
            answer: Service discovery, OpenTelemetry, default health checks, HttpClient resilience.
            bloom: understand
            explanation: >-
              These are the four Aspire primitives that every service is expected to have. Registering them manually in
              each service would produce dozens of lines; the extension consolidates them.
            example: >-
              ConfigureOpenTelemetry + AddDefaultHealthChecks + AddServiceDiscovery +
              ConfigureHttpClientDefaults(AddStandardResilienceHandler)
          - id: aspire-service-defaults-card-03
            type: cloze
            prompt: >-
              Aspire exposes two health endpoints: `{{/health}}` for readiness (all checks pass) and `{{/alive}}` for
              liveness (checks tagged "live" only).
            answer: /health; /alive
            bloom: remember
            explanation: >-
              Readiness gates traffic routing; liveness gates container restarts. Kubernetes maps them to
              `readinessProbe` and `livenessProbe` respectively.
            example: curl http://backend/health → 200 when ready; curl http://backend/alive → 200 when the process is alive.
          - id: aspire-service-defaults-card-04
            type: name
            prompt: Which `.csproj` change connects a service to its ServiceDefaults library?
            answer: A `<ProjectReference>` to the ServiceDefaults project (add via `dotnet add reference`).
            bloom: apply
            explanation: >-
              ServiceDefaults is a separate class library project in the solution. Each service project references it so
              the `AddServiceDefaults` extension method is available.
            example: dotnet add ./Cms.WebApi reference ./Cms.ServiceDefaults/Cms.ServiceDefaults.csproj
          - id: aspire-service-defaults-card-05
            type: cloze
            prompt: '`AddServiceDefaults()` belongs in {{each service''s}} `Program.cs`, NOT in the {{AppHost''s}} `Program.cs`.'
            answer: each service's; AppHost's
            bloom: analyze
            explanation: >-
              AppHost is the orchestrator — it shouldn't register service-side concerns. Putting `AddServiceDefaults`
              there makes the orchestrator try to configure telemetry on itself and breaks boot.
            example: >-
              AppHost/Program.cs: DistributedApplication.CreateBuilder + AddProject calls only. WebApi/Program.cs:
              AddServiceDefaults here.
          - id: aspire-service-defaults-card-06
            type: name
            prompt: A new service appears red in the Aspire Dashboard. What is the single most likely cause?
            answer: The service is missing `builder.AddServiceDefaults()` so it has no `/health` endpoint.
            bloom: analyze
            explanation: >-
              The dashboard polls `/health` for every registered project. Without default health checks, the endpoint
              returns 404 and the dashboard flags it red.
            example: Add builder.AddServiceDefaults(); and app.MapDefaultEndpoints(); to fix.
          - id: aspire-service-defaults-card-07
            type: cloze
            prompt: >-
              `AddServiceDefaults` also configures HttpClientFactory: every `HttpClient` created through DI inherits
              {{AddStandardResilienceHandler}} and {{AddServiceDiscovery}}.
            answer: AddStandardResilienceHandler; AddServiceDiscovery
            bloom: understand
            explanation: >-
              This is why `HttpClient` calls to `http://backend/` work without per-client setup. The factory applies
              both resilience policies and name resolution globally.
            example: >-
              builder.Services.ConfigureHttpClientDefaults(http => { http.AddStandardResilienceHandler();
              http.AddServiceDiscovery(); });
      - id: aspire-orchestrated-resources
        name: .NET Aspire orchestrated resources
        tags:
          - aspire
          - sql-server
          - redis
          - orchestration
        source: notes/aspire_SCRIPT.docx; research-aspire.md
        prose: >-
          AppHost declares infrastructure resources with `AddSqlServer`, `AddRedis`, `AddPostgres`, etc. under logical
          names. `.WithReference(resource)` injects the resource's connection info into consuming services as
          environment variables. Services consume it via typed helpers like `AddSqlServerDbContext<T>(name)`.
        cards:
          - id: aspire-orchestrated-resources-card-01
            type: cloze
            prompt: >-
              To register a SQL Server container with one database called `cms`:
              `builder.{{AddSqlServer}}("sql").{{AddDatabase}}("cms")`.
            answer: AddSqlServer; AddDatabase
            bloom: remember
            explanation: >-
              `AddSqlServer` registers the server resource under a logical name. `.AddDatabase` chains a named database
              onto it. The returned resource handle is what services `WithReference` to.
            example: var db = builder.AddSqlServer("sql").AddDatabase("cms");
          - id: aspire-orchestrated-resources-card-02
            type: name
            prompt: >-
              How does a consuming service receive the connection string for an Aspire-managed SQL Server database named
              `cms`?
            answer: Aspire injects `ConnectionStrings__cms` as an environment variable when the service process launches.
            bloom: understand
            explanation: >-
              The double-underscore is .NET's hierarchical-config convention — `ConnectionStrings__cms` equals
              `builder.Configuration.GetConnectionString("cms")`. Aspire writes it; the service reads it.
            example: builder.AddSqlServerDbContext<CmsDbContext>("cms"); // reads ConnectionStrings__cms automatically
          - id: aspire-orchestrated-resources-card-03
            type: cloze
            prompt: >-
              A consuming service only receives a resource's connection info if the AppHost chains
              `.{{WithReference}}(resource)` onto `AddProject<>(...)`.
            answer: WithReference
            bloom: apply
            explanation: >-
              `AddProject` alone launches the service but shares no resource info. `WithReference` is the bridge that
              translates resource declarations into env-vars on the consumer.
            example: builder.AddProject<Projects.Api>("api").WithReference(db);
          - id: aspire-orchestrated-resources-card-04
            type: name
            prompt: In a service's `Program.cs`, how do you wire EF Core to an Aspire-managed SQL Server database named `cms`?
            answer: '`builder.AddSqlServerDbContext<CmsDbContext>("cms")`'
            bloom: apply
            explanation: >-
              This helper ships in `Aspire.Microsoft.EntityFrameworkCore.SqlServer`. It reads `ConnectionStrings__cms`
              automatically and configures `DbContextOptions`.
            example: builder.AddSqlServerDbContext<CmsDbContext>("cms"); // that's the only setup needed
          - id: aspire-orchestrated-resources-card-05
            type: name
            prompt: How do you register a Redis cache resource in the AppHost?
            answer: '`var cache = builder.AddRedis("cache");`'
            bloom: remember
            explanation: >-
              No `.AddDatabase` chain — Redis is a single key-value store per resource. Services consume it with
              `builder.AddRedisDistributedCache("cache")`.
            example: |-
              AppHost: var cache = builder.AddRedis("cache"); api.WithReference(cache);
              Service: builder.AddRedisDistributedCache("cache");
          - id: aspire-orchestrated-resources-card-06
            type: cloze
            prompt: To pass an arbitrary env-var from AppHost to one specific service, use `.{{WithEnvironment}}(key, value)`.
            answer: WithEnvironment
            bloom: apply
            explanation: >-
              Scoped to that one project's process. Prefer this over leaking values globally. The service reads it via
              `IConfiguration` or `Environment.GetEnvironmentVariable`.
            example: api.WithEnvironment("FeatureFlags__NewCheckout", "true");
          - id: aspire-orchestrated-resources-card-07
            type: name
            prompt: >-
              Your service throws "connection string not found" at runtime even though AppHost has
              `AddSqlServer("sql").AddDatabase("cms")`. What's the most likely omission?
            answer: The consuming service's `AddProject<>(...)` call is missing `.WithReference(db)`.
            bloom: analyze
            explanation: >-
              Declaring the resource is not enough. Without `WithReference`, Aspire never injects the connection string
              into the target service's environment.
            example: builder.AddProject<Projects.Api>("api").WithReference(db).WaitFor(db);
  - id: module-3-performance-caching
    name: Performance & Caching
    topics:
      - id: cache-abstractions
        name: IMemoryCache vs IDistributedCache
        tags:
          - cache
          - architecture
        source: notes/DataCache_SCRIPT.docx; research-cache.md §1-2
        prose: >-
          `IMemoryCache` lives per-process and fails in web farms — each server holds its own copy. `IDistributedCache`
          lives across the network (Redis is the canonical backend) and is the only choice for load-balanced
          deployments.
        cards:
          - id: cache-abstractions-card-01
            type: cloze
            prompt: >-
              `{{IMemoryCache}}` stores entries in-process; `{{IDistributedCache}}` stores entries across the network,
              typically in Redis.
            answer: IMemoryCache; IDistributedCache
            bloom: remember
            explanation: >-
              The interface you register decides where entries live. In-process is microseconds-fast but per-server.
              Distributed is milliseconds-fast but shared across every app instance.
            example: builder.Services.AddMemoryCache();  // vs  builder.Services.AddStackExchangeRedisCache(...)
          - id: cache-abstractions-card-02
            type: name
            prompt: Why does `IMemoryCache` produce inconsistent data in a load-balanced web farm?
            answer: Each server instance holds its own separate cache — writes on Server A are invisible to Server B.
            bloom: understand
            explanation: >-
              In-process memory is not shared across app instances. Request 1 on Server A caches X; Request 2 on Server
              B finds no cache and refetches from DB. Users see different data depending on routing.
            example: Two pods behind a k8s service → two separate IMemoryCache instances → cache writes diverge.
          - id: cache-abstractions-card-03
            type: cloze
            prompt: >-
              Two fixes for `IMemoryCache` in a multi-server deployment are: switch to `{{IDistributedCache}}` (e.g.
              Redis) or configure {{sticky sessions}} to route each client to the same server.
            answer: IDistributedCache; sticky sessions
            bloom: apply
            explanation: >-
              Redis is the clean fix — one cache, all servers see it. Sticky sessions are the lazy fix — they work until
              the pinned server restarts or becomes unbalanced.
            example: 'k8s sessionAffinity: ClientIP gives sticky sessions; Redis gives a proper shared cache.'
          - id: cache-abstractions-card-04
            type: name
            prompt: When is `IMemoryCache` still appropriate?
            answer: >-
              Per-process, ephemeral caching — single-server dev environments, precomputed lookup tables inside one app
              instance, data that does not need to survive a restart.
            bloom: understand
            explanation: >-
              For values that only need to be visible within one process, IMemoryCache wins on latency (microseconds)
              and simplicity (no container, no serialization). The rule: cross-request-cross-server = distributed;
              within-process = memory.
            example: Parsing appsettings.json once on boot and reusing the parsed object — IMemoryCache.
          - id: cache-abstractions-card-05
            type: cloze
            prompt: >-
              Does `IMemoryCache` data survive an app restart? {{No}}. Does Redis-backed `IDistributedCache` survive?
              {{Yes}} (when Redis has AOF or RDB persistence enabled).
            answer: No; Yes
            bloom: remember
            explanation: >-
              IMemoryCache is RAM inside the app process — the restart wipes it. Redis runs as a separate
              process/container with configurable persistence, so it can survive app restarts and redeployments.
            example: A pod redeployment wipes IMemoryCache; the Redis container keeps serving entries across the swap.
          - id: cache-abstractions-card-06
            type: name
            prompt: Which one-liner registers an in-memory cache in `Program.cs`?
            answer: '`builder.Services.AddMemoryCache();`'
            bloom: remember
            explanation: '`AddMemoryCache` wires `IMemoryCache` into DI. No options required for a basic setup.'
            example: builder.Services.AddMemoryCache();
          - id: cache-abstractions-card-07
            type: name
            prompt: Which one-liner registers a Redis-backed distributed cache in `Program.cs`?
            answer: '`builder.Services.AddStackExchangeRedisCache(opts => opts.Configuration = "localhost:6379");`'
            bloom: apply
            explanation: >-
              The helper reads from `Microsoft.Extensions.Caching.StackExchangeRedis` and registers `IDistributedCache`.
              Any service can then inject `IDistributedCache`.
            example: builder.Services.AddStackExchangeRedisCache(o => o.Configuration = "localhost:6379");
      - id: cache-expiration
        name: Cache expiration — Absolute, Sliding, Priority
        tags:
          - cache
          - ttl
          - expiration
        source: notes/DataCache_SCRIPT.docx; research-cache.md §2, §4
        prose: >-
          `MemoryCacheEntryOptions` exposes `AbsoluteExpiration` (hard deadline), `SlidingExpiration` (idle timeout that
          resets on access), and `Priority` (eviction order under memory pressure). Combining absolute + sliding gives a
          capped-and-refreshing window.
        cards:
          - id: cache-expiration-card-01
            type: cloze
            prompt: '`AbsoluteExpiration` is a {{hard}} deadline; `SlidingExpiration` resets on each {{access}}.'
            answer: hard; access
            bloom: remember
            explanation: >-
              Absolute kills the entry at a wall-clock moment regardless of traffic. Sliding keeps hot entries alive
              while aging out idle ones.
            example: 'Absolute: expires at 10:00 AM. Sliding: expires 5 minutes after last read/write.'
          - id: cache-expiration-card-02
            type: name
            prompt: >-
              When `AbsoluteExpirationRelativeToNow = 50s` and `SlidingExpiration = 20s` are BOTH set and the entry is
              accessed at t=15s, when does it expire?
            answer: At t=50s, because Absolute is a hard ceiling that wins over the reset Sliding window.
            bloom: apply
            explanation: >-
              Sliding resets the idle timer to run until t=35s when the access happens at t=15s. Absolute deadline at
              t=50s is still binding and farther out, so Absolute fires first. Without the access, the entry would have
              expired at t=20s from sliding.
            example: Access at 15s → sliding resets to 35s deadline → absolute 50s deadline fires first → entry dies at 50s.
          - id: cache-expiration-card-03
            type: cloze
            prompt: '`CacheItemPriority` controls {{eviction order}} under memory pressure — NOT the entry''s expiration time.'
            answer: eviction order
            bloom: understand
            explanation: >-
              A Low-priority entry with a 1-hour Absolute still lives 1 hour unless memory pressure forces eviction. A
              High-priority entry with a 30-second Absolute still expires at 30 seconds.
            example: >-
              Priority = Low does NOT mean 'expires sooner.' It means 'dropped first when the cache is over its size
              limit.'
          - id: cache-expiration-card-04
            type: cloze
            prompt: The four `CacheItemPriority` levels are `{{NeverRemove}}`, `{{High}}`, `{{Normal}}`, and `{{Low}}`.
            answer: NeverRemove; High; Normal; Low
            bloom: remember
            explanation: >-
              `NeverRemove` excludes an entry from automatic eviction (only explicit `Remove` or time-based expiration
              can free it). Use sparingly — it converts the cache into persistent state.
            example: _cache.Set("config", cfg, new MemoryCacheEntryOptions { Priority = CacheItemPriority.NeverRemove });
          - id: cache-expiration-card-05
            type: name
            prompt: >-
              Which `MemoryCacheEntryOptions` setting is best for session-like data that should time out when the user
              goes idle?
            answer: '`SlidingExpiration`'
            bloom: apply
            explanation: >-
              Sliding resets on each access, so active users stay in cache and idle ones age out. Pair with a loose
              Absolute ceiling if you want a hard refresh guarantee.
            example: new MemoryCacheEntryOptions { SlidingExpiration = TimeSpan.FromMinutes(15) };
          - id: cache-expiration-card-06
            type: cloze
            prompt: >-
              On `IDistributedCache`, the options type is `{{DistributedCacheEntryOptions}}` and you use the fluent
              setters `{{SetAbsoluteExpiration}}` and `{{SetSlidingExpiration}}`.
            answer: DistributedCacheEntryOptions; SetAbsoluteExpiration; SetSlidingExpiration
            bloom: apply
            explanation: >-
              The shape differs between IMemoryCache (property-bag) and IDistributedCache (fluent). Semantics are
              identical — absolute is a hard deadline; sliding resets on access.
            example: >-
              new
              DistributedCacheEntryOptions().SetAbsoluteExpiration(TimeSpan.FromHours(1)).SetSlidingExpiration(TimeSpan.FromMinutes(30));
      - id: cache-aside-pattern
        name: Cache-aside pattern
        tags:
          - cache
          - pattern
          - getorset
          - invalidation
        source: notes/DataCache_SCRIPT.docx; notes/redis_SCRIPT.docx; research-cache.md §3
        prose: >-
          Cache-aside: check cache, on miss fetch from source, store result, return. `GetOrCreateAsync` on
          `IMemoryCache` and `GetOrSetAsync<T>` extension on `IDistributedCache` give a one-line form. Writers must
          invalidate affected keys via `Remove(key)`.
        cards:
          - id: cache-aside-pattern-card-01
            type: cloze
            prompt: >-
              The three steps of cache-aside are: (1) {{look up}} in the cache, (2) on {{hit}} return cached, (3) on
              {{miss}} fetch, store, return.
            answer: look up; hit; miss
            bloom: remember
            explanation: >-
              The same sequence at every call site: check, hit/miss branch, store-and-return on miss. Wrappers like
              GetOrCreateAsync collapse this into one call.
            example: if (!cache.TryGetValue(k, out v)) { v = fetch(); cache.Set(k, v, opts); } return v;
          - id: cache-aside-pattern-card-02
            type: name
            prompt: >-
              Which single `IMemoryCache` method checks the cache, runs a factory on miss, stores the result, and
              returns it?
            answer: '`GetOrCreateAsync` (or `GetOrCreate` for synchronous factories).'
            bloom: apply
            explanation: >-
              The factory runs only on cache miss. This is the idiomatic .NET helper — prefer it over hand-rolled
              TryGetValue + Set pairs for readability.
            example: >-
              var p = await cache.GetOrCreateAsync("key", entry => { entry.AbsoluteExpirationRelativeToNow =
              TimeSpan.FromMinutes(5); return FetchAsync(); });
          - id: cache-aside-pattern-card-03
            type: cloze
            prompt: >-
              `IDistributedCache` works in raw {{byte arrays}}, so consumers typically wrap it with extension methods
              that serialize to {{JSON}}.
            answer: byte arrays; JSON
            bloom: understand
            explanation: >-
              The interface has Get/Set on byte[]. A JSON extension (SetAsync<T>, TryGetValue<T>, GetOrSetAsync<T>)
              hides serialization and matches the IMemoryCache ergonomics.
            example: bytes = Encoding.UTF8.GetBytes(JsonSerializer.Serialize(value));
          - id: cache-aside-pattern-card-04
            type: name
            prompt: After an `AddGame` write to the DB, what must you call on the cache to prevent stale reads?
            answer: '`_cache.Remove(key)` for every affected cached key.'
            bloom: apply
            explanation: >-
              Cache-aside doesn't know when the source changes. The writer is responsible for invalidating affected keys
              after SaveChangesAsync — otherwise reads serve stale data until the TTL fires.
            example: await _db.SaveChangesAsync(); _cache.Remove("games"); _cache.Remove($"games:country:{game.Country}");
          - id: cache-aside-pattern-card-05
            type: cloze
            prompt: >-
              `TryGetValue<T>` takes an `{{out}}` parameter: `if (cache.TryGetValue<Product>("key", out var product)) {
              ... }`.
            answer: out
            bloom: apply
            explanation: >-
              TryGetValue returns bool; the value is set via the out parameter. `if (cache.TryGetValue("key", product))`
              is wrong — the compiler requires `out var`.
            example: if (cache.TryGetValue<Product>("key", out var product)) return product!;
          - id: cache-aside-pattern-card-06
            type: name
            prompt: Why does JSON-round-tripping through `IDistributedCache` lose polymorphic type information by default?
            answer: System.Text.Json omits the runtime type — deserializing to a base type strips derived-type properties.
            bloom: analyze
            explanation: >-
              A List<Dog> : Animal cached as JSON and read back as List<Animal> keeps only Animal properties. Fix: cache
              the concrete type, use a discriminator property, or enable TypeInfoResolver settings.
            example: >-
              Cache: new List<Dog>{...} → JSON → read as List<Animal> → breeds lost. Fix: keep the concrete type
              explicit in the cache signature.
          - id: cache-aside-pattern-card-07
            type: cloze
            prompt: >-
              The helper `GetOrSetAsync<T>` defaults, in the course's example, to
              `{{SetAbsoluteExpiration(TimeSpan.FromHours(1))}}` combined with
              `{{SetSlidingExpiration(TimeSpan.FromMinutes(30))}}`.
            answer: SetAbsoluteExpiration(TimeSpan.FromHours(1)); SetSlidingExpiration(TimeSpan.FromMinutes(30))
            bloom: remember
            explanation: >-
              A 1-hour hard ceiling with a 30-minute idle window — sensible defaults for most read-heavy data. Override
              with your own `DistributedCacheEntryOptions` when finer control is needed.
            example: >-
              opts ??= new
              DistributedCacheEntryOptions().SetAbsoluteExpiration(TimeSpan.FromHours(1)).SetSlidingExpiration(TimeSpan.FromMinutes(30));
      - id: redis-configuration
        name: Redis configuration — Docker, StackExchange.Redis
        tags:
          - redis
          - docker
          - stackexchange-redis
        source: slides/redis.pptx; notes/redis_SCRIPT.docx; research-cache.md §6
        prose: >-
          Start Redis with `docker run --name redis -d -p 6379:6379 redis`. Wire it to ASP.NET Core with
          `builder.Services.AddStackExchangeRedisCache(opts => opts.Configuration = "localhost:6379")` after adding the
          `Microsoft.Extensions.Caching.StackExchangeRedis` NuGet package.
        cards:
          - id: redis-configuration-card-01
            type: cloze
            prompt: >-
              Redis's default port is {{6379}}. The conventional Docker invocation is `docker run --name redis -d -p
              {{6379}}:{{6379}} redis`.
            answer: 6379; 6379; 6379
            bloom: remember
            explanation: >-
              Every Redis example in the course assumes 6379. `-d` runs detached; `-p host:container` maps the port;
              `redis` is the official Docker Hub image.
            example: docker run --name redis -d -p 6379:6379 redis
          - id: redis-configuration-card-02
            type: name
            prompt: Which NuGet package provides the `AddStackExchangeRedisCache` extension?
            answer: '`Microsoft.Extensions.Caching.StackExchangeRedis`'
            bloom: remember
            explanation: >-
              Without this package, the extension method doesn't compile. `StackExchange.Redis` is the underlying client
              library; the `Microsoft.Extensions.Caching.*` package wraps it for `IDistributedCache`.
            example: dotnet add package Microsoft.Extensions.Caching.StackExchangeRedis
          - id: redis-configuration-card-03
            type: cloze
            prompt: In the Redis CLI, `{{SETEX}} destination 10 "Tokyo"` sets the key with a {{10-second}} expiration.
            answer: SETEX; 10-second
            bloom: remember
            explanation: SETEX = SET + EXpiration (seconds). Sub-second precision needs PSETEX, which takes milliseconds.
            example: SETEX greeting 60 "hello for a minute"
          - id: redis-configuration-card-04
            type: name
            prompt: What does `AbortOnConnectFail = true` do when Redis is unreachable at startup?
            answer: It causes the app to fail fast at startup instead of silently running with a no-op cache.
            bloom: apply
            explanation: >-
              In production you want the orchestrator to notice and restart the pod. `false` (the default) silently
              retries in the background — fine for dev, hazardous for prod.
            example: >-
              new StackExchange.Redis.ConfigurationOptions { AbortOnConnectFail = true, EndPoints = { "localhost:6379" }
              };
          - id: redis-configuration-card-05
            type: cloze
            prompt: >-
              Under .NET Aspire, you skip the connection string and use `builder.{{AddRedisDistributedCache}}("cache")`
              in the service's `Program.cs`; AppHost declares the resource with `builder.{{AddRedis}}("cache")`.
            answer: AddRedisDistributedCache; AddRedis
            bloom: apply
            explanation: >-
              Aspire registers the Redis container resource and injects the connection string via environment variables.
              The typed helper reads the injected string automatically — no `opts.Configuration` literal needed.
            example: |-
              AppHost: var cache = builder.AddRedis("cache"); api.WithReference(cache);
              Api: builder.AddRedisDistributedCache("cache");
          - id: redis-configuration-card-06
            type: name
            prompt: Name five Redis data structures.
            answer: String, Hash, List, Set, Sorted Set.
            bloom: remember
            explanation: >-
              Recognition-level only — `IDistributedCache` just does byte-keyed `Get`/`Set`, which maps to the String
              type. The other types appear in Redis CLI usage and Redis-native C# clients.
            example: >-
              SET user:1 "Alice"  | HSET user:1 name Alice age 30  |  LPUSH feed p1 p2  |  SADD tags x y  |  ZADD board
              100 alice
      - id: cache-tag-helper
        name: Cache Tag Helper
        tags:
          - cache
          - razor
          - tag-helper
        source: notes/Cache_Tag_Helper_SCRIPT.docx; research-cache.md §5
        prose: >-
          `<cache>` is the built-in Razor Tag Helper for fragment caching. Attributes `expires-after`, `expires-on`,
          `expires-sliding` control TTL; `vary-by-user`, `vary-by-route`, `vary-by-query`, `vary-by-cookie`,
          `vary-by-header`, `vary-by` create per-dimension cache keys. Backs onto `IMemoryCache`, so the web-farm
          problem applies.
        cards:
          - id: cache-tag-helper-card-01
            type: cloze
            prompt: >-
              `<cache expires-after="@TimeSpan.FromMinutes(10)">…</cache>` caches the enclosed fragment for {{10}}
              minutes as an {{absolute}} TTL.
            answer: 10; absolute
            bloom: remember
            explanation: >-
              `expires-after` is absolute-from-now. Use `expires-sliding` for a reset-on-access window, `expires-on` for
              a specific wall-clock deadline.
            example: <cache expires-after="@TimeSpan.FromMinutes(10)"><p>@DateTime.Now</p></cache>
          - id: cache-tag-helper-card-02
            type: name
            prompt: Which `vary-by-*` attribute gives each logged-in user their own cached fragment?
            answer: '`vary-by-user="true"`'
            bloom: apply
            explanation: >-
              Without vary-by-user, the first visitor's personalized content leaks to every subsequent viewer until the
              TTL fires. `vary-by-user` keys the cache by authenticated identity.
            example: <cache vary-by-user="true"><p>Hello, @User.Identity?.Name</p></cache>
          - id: cache-tag-helper-card-03
            type: cloze
            prompt: >-
              `<cache>` uses `{{IMemoryCache}}` under the hood, so it has the same {{web-farm}} problem as raw in-memory
              caching.
            answer: IMemoryCache; web-farm
            bloom: analyze
            explanation: >-
              Each server caches its own rendered HTML. Users routed round-robin across servers see diverging cached
              content. Workarounds: sticky sessions, short TTLs, or output caching middleware / CDN.
            example: >-
              Three pods → three separate <cache> fragments → same URL, three different HTML outputs depending on
              routing.
          - id: cache-tag-helper-card-04
            type: name
            prompt: List three `vary-by-*` attributes beyond `vary-by-user`.
            answer: '`vary-by-route`, `vary-by-query`, `vary-by-cookie`, `vary-by-header` (any three).'
            bloom: remember
            explanation: >-
              Each varies the cache key by a different request dimension. Combine freely — e.g. `vary-by-user +
              vary-by-route` produces one fragment per (user, route).
            example: <cache vary-by-user="true" vary-by-route="id" expires-after="@TimeSpan.FromMinutes(5)">...</cache>
          - id: cache-tag-helper-card-05
            type: cloze
            prompt: To disable a `<cache>` block without deleting the markup, set `{{enabled}}="false"` on the element.
            answer: enabled
            bloom: remember
            explanation: >-
              The `enabled` attribute short-circuits the caching behavior — the fragment re-renders on every request.
              Useful for toggling caching behind a feature flag.
            example: <cache enabled="@cachingEnabled" expires-after="@TimeSpan.FromMinutes(5)">…</cache>
          - id: cache-tag-helper-card-06
            type: name
            prompt: >-
              You want to cache a product detail view per user AND per product id, with a 10-minute absolute ceiling and
              a 2-minute sliding window. Write the tag.
            answer: >-
              `<cache vary-by-user="true" vary-by-route="id" expires-after="@TimeSpan.FromMinutes(10)"
              expires-sliding="@TimeSpan.FromMinutes(2)">…</cache>`
            bloom: apply
            explanation: >-
              Combine vary-by dimensions and both expiration modes on one tag. Sliding keeps hot fragments alive;
              absolute guarantees a refresh within the ceiling.
            example: Same as answer.
      - id: taghelper-authoring
        name: Tag Helper authoring
        tags:
          - tag-helper
          - razor
          - asp-net-core
        source: notes/TagHelpers_SCRIPT.docx; research-taghelpers-blazor.md
        prose: >-
          A custom Tag Helper inherits from `TagHelper`, is decorated with `[HtmlTargetElement("tag-name")]`, and
          overrides `ProcessAsync(context, output)` (or `Process` for sync bodies). PascalCase C# properties bind to
          kebab-case HTML attributes.
        cards:
          - id: taghelper-authoring-card-01
            type: cloze
            prompt: >-
              A custom Tag Helper inherits from the `{{TagHelper}}` base class and is decorated with
              `[{{HtmlTargetElement}}("tag-name")]`.
            answer: TagHelper; HtmlTargetElement
            bloom: remember
            explanation: >-
              Both pieces are non-optional. Without the base class, the framework won't recognize the type. Without the
              attribute, Razor has no tag binding.
            example: '[HtmlTargetElement("toon")] public class ToonTagHelper : TagHelper { … }'
          - id: taghelper-authoring-card-02
            type: name
            prompt: Which override do you use when the Tag Helper body performs async I/O?
            answer: '`ProcessAsync(TagHelperContext, TagHelperOutput)`'
            bloom: apply
            explanation: >-
              Overriding `Process` and calling `.Result` or `Task.Run` blocks the render thread and can deadlock.
              `ProcessAsync` lets the framework await without blocking.
            example: >-
              public override async Task ProcessAsync(TagHelperContext context, TagHelperOutput output) { var data =
              await FetchAsync(); … }
          - id: taghelper-authoring-card-03
            type: cloze
            prompt: >-
              A C# property named `{{FontFamily}}` binds to the HTML attribute `{{font-family}}` — PascalCase →
              kebab-case is the Razor convention.
            answer: FontFamily; font-family
            bloom: understand
            explanation: >-
              The mapping is automatic, not configurable. `ForegroundColor` becomes `foreground-color`; `DataTestId`
              becomes `data-test-id`. Never use underscores in the HTML attribute.
            example: public string? FontFamily { get; set; }  →  <toon font-family="arial">
          - id: taghelper-authoring-card-04
            type: name
            prompt: Which `TagHelperOutput` call replaces the rendered tag's name?
            answer: '`output.TagName = "div"` (set to `null` to suppress the element entirely).'
            bloom: apply
            explanation: >-
              `TagName` is the rendered-element name. Setting `null` renders only the inner content without wrapping tag
              — useful for conditional wrappers.
            example: output.TagName = "span";  // <my-tag> → <span>
          - id: taghelper-authoring-card-05
            type: cloze
            prompt: >-
              `output.Content.{{SetHtmlContent}}("<p>Hi</p>")` replaces the inner content, while
              `output.Content.{{AppendHtmlContent}}("<p>More</p>")` preserves the existing inner content.
            answer: SetHtmlContent; AppendHtmlContent
            bloom: apply
            explanation: >-
              SetHtmlContent wipes what the page author wrote between the open and close tags. AppendHtmlContent keeps
              it and adds after.
            example: output.Content.AppendHtmlContent("<p>Footer</p>");  // keeps original inner
          - id: taghelper-authoring-card-06
            type: name
            prompt: How do you bind a Tag Helper to an existing `<div>` only when a specific attribute is present?
            answer: '`[HtmlTargetElement("div", Attributes = "toonie")]`'
            bloom: apply
            explanation: >-
              The Attributes selector restricts binding to elements carrying the named attribute. You can stack multiple
              [HtmlTargetElement] attributes on one class to bind several patterns.
            example: '[HtmlTargetElement("div", Attributes = "toonie")] public class DivToonTagHelper : TagHelper { … }'
          - id: taghelper-authoring-card-07
            type: cloze
            prompt: >-
              Use `output.{{SuppressOutput}}()` to render nothing at all from a Tag Helper — handy when a condition says
              the element should not appear.
            answer: SuppressOutput
            bloom: apply
            explanation: >-
              SuppressOutput removes both the wrapping tag and its content from the rendered HTML. A feature-flag helper
              often does this when the flag is off.
            example: if (!_flags.IsEnabled(Flag!)) output.SuppressOutput();
      - id: taghelper-output-registration
        name: Tag Helper output + _ViewImports registration
        tags:
          - tag-helper
          - razor
          - view-imports
        source: notes/TagHelpers_SCRIPT.docx; research-taghelpers-blazor.md
        prose: >-
          Tag Helpers are registered globally in `_ViewImports.cshtml` via `@addTagHelper *, AssemblyName`. In the
          helper's `Process`/`ProcessAsync`, the `TagHelperOutput` exposes `TagName`, `Content`, `PreContent`,
          `PostContent`, `Attributes`, and `SuppressOutput`.
        cards:
          - id: taghelper-output-registration-card-01
            type: cloze
            prompt: >-
              Tag Helpers are registered in `{{_ViewImports.cshtml}}` with the directive `@addTagHelper *,
              {{AssemblyName}}`.
            answer: _ViewImports.cshtml; AssemblyName
            bloom: remember
            explanation: >-
              The `*` glob imports every Tag Helper in the assembly. Swap `*` for a fully qualified type name when you
              want to register only one.
            example: |-
              @addTagHelper *, Microsoft.AspNetCore.Mvc.TagHelpers
              @addTagHelper *, MyApp
          - id: taghelper-output-registration-card-02
            type: name
            prompt: Where should you register a Tag Helper assembly — in each .cshtml file, or in `_ViewImports.cshtml`?
            answer: In `_ViewImports.cshtml`. Individual .cshtml files inherit the registrations.
            bloom: understand
            explanation: >-
              Registration is hierarchical — `_ViewImports.cshtml` in a subdirectory adds to the registrations from
              ancestor directories. Per-page registration is not the convention.
            example: Pages/_ViewImports.cshtml registers once; Pages/Admin/Dashboard.cshtml inherits automatically.
          - id: taghelper-output-registration-card-03
            type: cloze
            prompt: >-
              To scope a Tag Helper registration to pages under `Pages/Admin/` only, drop a `_ViewImports.cshtml` into
              `{{Pages/Admin/}}` with the `@addTagHelper` directive.
            answer: Pages/Admin/
            bloom: apply
            explanation: >-
              Sub-folder _ViewImports.cshtml files extend their parent. The admin page picks up both registrations;
              pages outside `Admin/` see only the root set.
            example: 'Pages/Admin/_ViewImports.cshtml: @addTagHelper *, MyApp.AdminHelpers'
          - id: taghelper-output-registration-card-04
            type: name
            prompt: Which `TagHelperOutput` method renders nothing at all from a helper?
            answer: '`output.SuppressOutput()`'
            bloom: apply
            explanation: >-
              Suppresses both the tag and its content. Use when a condition says the element should not appear (feature
              gate, empty model, etc.).
            example: if (!_flags.IsEnabled(Flag!)) output.SuppressOutput();
          - id: taghelper-output-registration-card-05
            type: cloze
            prompt: >-
              Given `<mytag>existing</mytag>` plus `output.PreContent.SetHtmlContent("[pre]");
              output.Content.AppendHtmlContent("[appended]");` the rendered inner block reads
              `{{[pre]existing[appended]}}`.
            answer: '[pre]existing[appended]'
            bloom: apply
            explanation: >-
              PreContent injects HTML at the start of the inner area. Content.AppendHtmlContent adds after existing
              content. PostContent goes at the end. PreElement / PostElement (not shown) inject OUTSIDE the tag.
            example: output.PreContent + output.Content + output.PostContent ordered inside the rendered element.
          - id: taghelper-output-registration-card-06
            type: name
            prompt: Which call removes an HTML attribute the page author wrote on the tag?
            answer: '`output.Attributes.RemoveAll("attribute-name")`'
            bloom: apply
            explanation: >-
              RemoveAll strips every attribute matching the name (supports case-insensitive match). SetAttribute
              replaces; this one deletes.
            example: output.Attributes.RemoveAll("data-legacy");
          - id: taghelper-output-registration-card-07
            type: cloze
            prompt: >-
              To disable a globally-registered Tag Helper in one Razor file, use the directive `@{{removeTagHelper}}
              "FullType, AssemblyName"`.
            answer: removeTagHelper
            bloom: remember
            explanation: >-
              Rarely used but handy when a third-party package adds helpers you want to opt out of for specific pages.
              Pair @addTagHelper with @removeTagHelper at different scopes.
            example: '@removeTagHelper "Microsoft.AspNetCore.Mvc.TagHelpers.CacheTagHelper, Microsoft.AspNetCore.Mvc.TagHelpers"'
  - id: module-4-i18n-ui
    name: Internationalization & Modern UI
    topics:
      - id: localization-resources-cultures
        name: Localization resources + cultures
        tags:
          - i18n
          - culture
          - resx
        source: notes/razor_pages_localization_SCRIPT.docx; research-localization.md §2
        prose: >-
          Resource files live at `Resources/<folder>/<ClassName>.<culture>.resx` — the subfolder mirrors the class's
          project location. `CurrentCulture` controls formatting; `CurrentUICulture` controls which .resx loads. Culture
          providers run QueryString → Cookie → Accept-Language, first match wins.
        cards:
          - id: localization-resources-cultures-card-01
            type: cloze
            prompt: >-
              The French resource file for `Pages/Index.cshtml.cs` (class `IndexModel`) lives at
              `Resources/{{Pages}}/IndexModel.{{fr}}.resx`.
            answer: Pages; fr
            bloom: remember
            explanation: >-
              Directory structure under `Resources/` mirrors the class location. The filename is
              `<ClassName>.<culture>.resx` — not `<PageName>` and not flat.
            example: Pages/Courses.cshtml.cs (class CoursesModel) → Resources/Pages/CoursesModel.fr.resx
          - id: localization-resources-cultures-card-02
            type: name
            prompt: What is the difference between `Thread.CurrentCulture` and `Thread.CurrentUICulture`?
            answer: >-
              CurrentCulture controls date/number/currency formatting; CurrentUICulture controls which .resx file
              IStringLocalizer loads.
            bloom: understand
            explanation: >-
              Setting only one produces a half-translated page — numbers in the right locale but strings in the wrong
              one, or vice versa. UseRequestLocalization sets both together.
            example: CurrentCulture=fr-FR → decimal '3,14'; CurrentUICulture=fr-FR → IndexModel.fr.resx selected.
          - id: localization-resources-cultures-card-03
            type: cloze
            prompt: >-
              The three default culture providers run in this order: `{{QueryString}}` → `{{Cookie}}` →
              `{{AcceptLanguageHeader}}`. First match wins.
            answer: QueryString; Cookie; AcceptLanguageHeader
            bloom: remember
            explanation: >-
              QueryString beats cookie (useful for testing / deep links). Cookie beats header (persistent user selection
              overrides browser default). Order is configurable via options.RequestCultureProviders.
            example: '?culture=fr in the URL overrides a stored cookie or a browser Accept-Language: en-US header.'
          - id: localization-resources-cultures-card-04
            type: name
            prompt: >-
              If a resource key has no match in any .resx file for the current culture, what does
              `IStringLocalizer<T>["Key"]` return?
            answer: The key itself, as a string.
            bloom: understand
            explanation: >-
              The indexer returns a `LocalizedString` whose `Name` equals `Value` equals the key, with `ResourceNotFound
              = true`. This makes it easy to stub a site in English before any .resx files exist.
            example: _localizer["Welcome"] where no .resx has "Welcome" → string "Welcome".
          - id: localization-resources-cultures-card-05
            type: cloze
            prompt: >-
              Fallback chain: a request for `{{fr-CA}}` falls back to `{{fr}}`, which falls back to the un-suffixed
              default `.resx` if one exists.
            answer: fr-CA; fr
            bloom: understand
            explanation: >-
              ASP.NET Core walks the parent culture chain. Ship a generic `fr.resx` and you can omit region-specific
              `.fr-CA.resx` unless you actually need Canadian-specific translations.
            example: Resources/Pages/IndexModel.fr.resx alone covers both fr-CA and fr-FR users.
          - id: localization-resources-cultures-card-06
            type: name
            prompt: Which culture provider persists a user's language choice across sessions?
            answer: CookieRequestCultureProvider (reads the `.AspNetCore.Culture` cookie).
            bloom: apply
            explanation: >-
              QueryString doesn't persist; Accept-Language reflects browser settings but not in-app selection. Only a
              cookie survives a browser restart and identifies the returning user.
            example: >-
              Response.Cookies.Append(CookieRequestCultureProvider.DefaultCookieName,
              CookieRequestCultureProvider.MakeCookieValue(new RequestCulture("fr")), new CookieOptions { Expires = ...
              });
      - id: localization-setup
        name: Localization setup — AddLocalization + UseRequestLocalization
        tags:
          - i18n
          - middleware
          - program-cs
        source: notes/razor_pages_localization_SCRIPT.docx; research-localization.md §3
        prose: >-
          Register services with `AddLocalization(opts => opts.ResourcesPath = "Resources")`, declare supported cultures
          via `Configure<RequestLocalizationOptions>`, add `AddViewLocalization()` to the MVC/Razor builder, and —
          critically — call `app.UseRequestLocalization()` middleware.
        cards:
          - id: localization-setup-card-01
            type: cloze
            prompt: >-
              The service registration for localization is `builder.Services.{{AddLocalization}}(opts =>
              opts.ResourcesPath = "{{Resources}}")`.
            answer: AddLocalization; Resources
            bloom: remember
            explanation: >-
              `AddLocalization` registers IStringLocalizer<T>, IHtmlLocalizer<T>, and the factory. ResourcesPath points
              at the root folder where .resx files live.
            example: builder.Services.AddLocalization(opts => opts.ResourcesPath = "Resources");
          - id: localization-setup-card-02
            type: name
            prompt: Which middleware call applies the detected culture to each incoming request?
            answer: '`app.UseRequestLocalization()`'
            bloom: remember
            explanation: >-
              Without the middleware call, no culture provider ever runs, so CurrentCulture / CurrentUICulture stay at
              defaults. This is the #1 silent-failure cause for 'my app never translates anything.'
            example: app.UseRequestLocalization();   // must run early in the pipeline
          - id: localization-setup-card-03
            type: cloze
            prompt: >-
              Inside `RequestLocalizationOptions`, `{{SupportedCultures}}` controls the allowed `CurrentCulture` values
              (formatting); `{{SupportedUICultures}}` controls the allowed `CurrentUICulture` values (.resx selection).
            answer: SupportedCultures; SupportedUICultures
            bloom: understand
            explanation: >-
              Two separate lists because in theory an app could format dates as en-US while showing French UI. In
              practice, set both to the same list.
            example: >-
              opts.SupportedCultures = opts.SupportedUICultures = new[] { new CultureInfo("en"), new CultureInfo("fr")
              };
          - id: localization-setup-card-04
            type: name
            prompt: What does `builder.Services.AddMvc().AddViewLocalization()` enable?
            answer: '`IViewLocalizer` injection directly in `.cshtml` files via `@inject`.'
            bloom: apply
            explanation: >-
              AddLocalization alone gives you IStringLocalizer<T> in code-behind. AddViewLocalization adds the
              view-scoped IViewLocalizer used by @inject in Razor markup.
            example: builder.Services.AddRazorPages().AddViewLocalization();   // @inject IViewLocalizer Localizer now works
          - id: localization-setup-card-05
            type: cloze
            prompt: >-
              `UseRequestLocalization` must run {{before}} any endpoint routing / handler in the pipeline — typically
              just after `CreateBuilder().Build()`.
            answer: before
            bloom: apply
            explanation: >-
              Middleware runs in registration order. Put UseRequestLocalization after UseRouting and endpoint handlers
              run with the default culture even when the user's preferred culture could have been detected.
            example: app.UseRequestLocalization(); app.UseStaticFiles(); app.UseRouting(); ...
          - id: localization-setup-card-06
            type: name
            prompt: >-
              What's the single most likely missing line if services are registered but language never changes at
              runtime?
            answer: '`app.UseRequestLocalization()` middleware call.'
            bloom: analyze
            explanation: >-
              Without the middleware, no request-culture provider executes. Every request uses DefaultRequestCulture.
              Adding the line at the top of the pipeline usually fixes it immediately.
            example: Add `app.UseRequestLocalization();` after `var app = builder.Build();`.
      - id: localization-injection
        name: Localizer injection — IStringLocalizer, IHtmlLocalizer, IViewLocalizer
        tags:
          - i18n
          - di
        source: notes/razor_pages_localization_SCRIPT.docx; research-localization.md §2, §5
        prose: >-
          `IStringLocalizer<T>` for code-behind plain text; `IHtmlLocalizer<T>` for code-behind HTML content that should
          NOT be encoded; `IViewLocalizer` for direct `.cshtml` use via `@inject`. Shared app-wide strings use a marker
          `SharedResource` class plus `IStringLocalizerFactory.Create`.
        cards:
          - id: localization-injection-card-01
            type: cloze
            prompt: In a Razor view (`.cshtml`), inject the view-scoped localizer with `@inject {{IViewLocalizer}} Localizer`.
            answer: IViewLocalizer
            bloom: remember
            explanation: >-
              IViewLocalizer picks up the resource file matching the view's generated class. IStringLocalizer<T> and
              IHtmlLocalizer<T> are for code-behind injection.
            example: |-
              @inject IViewLocalizer Localizer
              <h1>@Localizer["Welcome"]</h1>
          - id: localization-injection-card-02
            type: name
            prompt: When should you use `IHtmlLocalizer<T>` instead of `IStringLocalizer<T>`?
            answer: When the translated string contains HTML markup that must render as HTML, not HTML-encoded text.
            bloom: apply
            explanation: >-
              IStringLocalizer returns a plain string that Razor HTML-encodes. IHtmlLocalizer returns IHtmlContent which
              Razor passes through verbatim. Use it for translations containing <a>, <strong>, etc.
            example: '.resx value: "Read <a href=\"/docs\">the docs</a>" → use IHtmlLocalizer so the anchor renders as a link.'
          - id: localization-injection-card-03
            type: cloze
            prompt: >-
              A PageModel localizes plain text by constructor-injecting `{{IStringLocalizer<IndexModel>}}` and accessing
              values via the indexer: `_localizer["{{Key}}"]`.
            answer: IStringLocalizer<IndexModel>; Key
            bloom: apply
            explanation: >-
              The generic parameter drives both DI resolution and the resource-file name mapping. The indexer returns a
              LocalizedString that implicitly converts to string.
            example: >-
              public IndexModel(IStringLocalizer<IndexModel> localizer) => _localizer = localizer; ... ViewData["Msg"] =
              _localizer["Welcome"];
          - id: localization-injection-card-04
            type: name
            prompt: How do you implement app-wide shared strings used by many pages?
            answer: >-
              Create an empty marker class `SharedResource`, build a service using
              `IStringLocalizerFactory.Create(nameof(SharedResource), assemblyName)`, register it as a singleton, and
              inject where needed.
            bloom: apply
            explanation: >-
              This avoids duplicating the same translations across every per-class .resx. Pair with
              `Resources/SharedResource.<culture>.resx` files. DataAnnotations localization often targets this shared
              class too.
            example: builder.Services.AddSingleton<SharedLocalizer>(); ... @inject SharedLocalizer S ... @S.Get("CompanyName")
          - id: localization-injection-card-05
            type: cloze
            prompt: >-
              Localizers accept positional format arguments: `_localizer["{{GreetUser}}", userName]` with a .resx value
              of `"Hello, {0}!"`.
            answer: GreetUser
            bloom: apply
            explanation: >-
              Positional args let translators reorder placeholders in languages with different word order. Prefer this
              over string concatenation which cannot express reorderings.
            example: _localizer["ItemsCount", 3] with .resx "{0} items" → "3 items" (en) / "3 articles" (fr)
          - id: localization-injection-card-06
            type: name
            prompt: >-
              What error do you get if you use `@inject IViewLocalizer` without calling `AddViewLocalization()` in
              Program.cs?
            answer: 'A runtime exception: ''No service for type IViewLocalizer has been registered.'''
            bloom: analyze
            explanation: >-
              AddLocalization registers IStringLocalizer<T> and IHtmlLocalizer<T>; it does NOT register IViewLocalizer.
              The view-scoped localizer requires AddViewLocalization() on the MVC/Razor Pages builder.
            example: builder.Services.AddRazorPages().AddViewLocalization();   // enables IViewLocalizer
      - id: blazor-quickgrid
        name: Blazor QuickGrid
        tags:
          - blazor
          - ui
          - quickgrid
        source: >-
          notes/BlazorServer_QuickGrid.docx; notes/BlazorWasm_QuickGrid.docx; Labs/W07 QuickGrid/;
          research-taghelpers-blazor.md
        prose: >-
          `<QuickGrid Items="IQueryable<T>" Pagination="PaginationState">` plus `<PropertyColumn>` for simple bindings
          and `<TemplateColumn>` with `SortBy` for custom markup. Live filter via `<input @bind @bind:event="oninput">`
          + computed IQueryable. Host page needs an interactive render mode.
        cards:
          - id: blazor-quickgrid-card-01
            type: cloze
            prompt: >-
              A `QuickGrid` binds to an `{{IQueryable<T>}}` via `Items="@..."`, with paging controlled by a
              `{{PaginationState}}` declared in `@code`.
            answer: IQueryable<T>; PaginationState
            bloom: apply
            explanation: >-
              IQueryable lets EF Core translate filtering / paging to SQL. PaginationState's `ItemsPerPage` decides page
              size; a sibling `<Paginator State="@state">` component renders the controls.
            example: private PaginationState _p = new() { ItemsPerPage = 10 };
          - id: blazor-quickgrid-card-02
            type: name
            prompt: How do you make a `PropertyColumn` sortable?
            answer: Add the `Sortable="true"` attribute.
            bloom: remember
            explanation: >-
              PropertyColumn already knows which property to sort by — setting Sortable="true" is sufficient.
              TemplateColumn needs an explicit SortBy because it has no implicit sort key.
            example: <PropertyColumn Property="@(s => s.FirstName)" Sortable="true" />
          - id: blazor-quickgrid-card-03
            type: cloze
            prompt: >-
              A `TemplateColumn` needs `{{SortBy}}` to be sortable; `Sortable="true"` alone does nothing on a
              TemplateColumn.
            answer: SortBy
            bloom: apply
            explanation: >-
              TemplateColumn's render fragment might touch many properties, so QuickGrid can't infer a single sort key.
              SortBy takes a GridSort<T> you build fluently.
            example: >-
              <TemplateColumn Title="Name" SortBy="@GridSort<Student>.ByAscending(s =>
              s.LastName)"><div>@context.FirstName @context.LastName</div></TemplateColumn>
          - id: blazor-quickgrid-card-04
            type: name
            prompt: How do you build a multi-key sort expression for a `TemplateColumn`?
            answer: '`GridSort<T>.ByAscending(x => x.First).ThenAscending(x => x.Second)` (or `.ThenDescending(...)`).'
            bloom: apply
            explanation: >-
              Chain as many .ThenAscending / .ThenDescending calls as you need. Each one tie-breaks equal rows from the
              previous key.
            example: GridSort<Student>.ByAscending(s => s.FirstName).ThenAscending(s => s.LastName);
          - id: blazor-quickgrid-card-05
            type: cloze
            prompt: >-
              For a live-filter input, use `@bind="_filter" @bind:event="{{oninput}}"` — not the default onchange — so
              the filter updates on every keystroke.
            answer: oninput
            bloom: apply
            explanation: >-
              The default @bind event is onchange, which fires only when the input loses focus. Users typing in a search
              box expect instant filtering — oninput fires per keystroke.
            example: <input @bind="_filter" @bind:event="oninput" />
          - id: blazor-quickgrid-card-06
            type: name
            prompt: >-
              What render-mode directive must a page hosting a QuickGrid declare for sorting / paging / filtering to
              work?
            answer: '`@rendermode InteractiveServer` (or `InteractiveWebAssembly` / `InteractiveAuto`).'
            bloom: remember
            explanation: >-
              Static server rendering produces initial HTML but no client-side runtime. Interactive modes keep the
              component alive so clicks and input events trigger re-renders.
            example: |-
              @page "/students"
              @rendermode InteractiveServer
          - id: blazor-quickgrid-card-07
            type: cloze
            prompt: >-
              Calling `{{.ToList()}}` on your data source before binding to QuickGrid breaks server-side SQL translation
              — keep the expression as `IQueryable<T>` all the way to the grid.
            answer: .ToList()
            bloom: analyze
            explanation: >-
              ToList() materializes the entire result set into memory, after which filtering / paging happens in .NET.
              For large tables this wrecks performance. Let the grid see an IQueryable and EF Core builds an efficient
              SQL query per page.
            example: |-
              // wrong: _students.Where(...).ToList()
              // right: _students.Where(...)
  - id: module-5-dotnet10-reporting
    name: .NET 10 Scripts & Reporting
    topics:
      - id: file-based-app-basics
        name: File-based .NET apps — basics
        tags:
          - dotnet-10
          - scripting
          - file-based
        source: slides/file-based-apps.pptx; notes/file-based-apps.docx; research-file-based.md
        prose: >-
          .NET 10 lets you run a single `.cs` file with `dotnet run file.cs` — no `.csproj`, no `bin/`, no `obj/`.
          Top-level statements replace `Main`. Implicit usings include System, System.Linq, System.Collections.Generic,
          System.Text, System.Threading.Tasks.
        cards:
          - id: file-based-app-basics-card-01
            type: cloze
            prompt: >-
              A .NET 10 file-based app runs with `{{dotnet run}} filename.cs` — no `.csproj`, no `bin/`, no `obj/`
              directory.
            answer: dotnet run
            bloom: remember
            explanation: >-
              The CLI detects the .cs argument, creates an implicit project context, compiles in memory, and caches
              artifacts under `~/.dotnet/runfile/`.
            example: dotnet run greet.cs
          - id: file-based-app-basics-card-02
            type: name
            prompt: To pass command-line args to a file-based script, what separator must you use?
            answer: '`--` (double-dash). Everything after it becomes `args` inside the script.'
            bloom: apply
            explanation: >-
              Without `--`, the CLI interprets trailing tokens as its own flags. `dotnet run greet.cs Kevin` gives you
              nothing; `dotnet run greet.cs -- Kevin` makes `args[0] == "Kevin"`.
            example: dotnet run greet.cs -- Kevin   // args[0] == "Kevin"
          - id: file-based-app-basics-card-03
            type: cloze
            prompt: >-
              File-based apps use {{top-level statements}}, so no `Program` class or `Main` method is needed; the file
              body executes as if it were inside `Main`.
            answer: top-level statements
            bloom: understand
            explanation: >-
              C# 9+ top-level statements let you write `Console.WriteLine("Hi");` as the first line of a file.
              File-based apps rely on this feature exclusively.
            example: // greet.cs\nConsole.WriteLine("Hello!");
          - id: file-based-app-basics-card-04
            type: name
            prompt: List three of the namespaces automatically imported in a file-based app.
            answer: System, System.Collections.Generic, System.Linq (also System.Text and System.Threading.Tasks).
            bloom: remember
            explanation: >-
              Implicit usings cover the most common BCL namespaces so short scripts don't need `using` directives.
              Others still require explicit `using`.
            example: 'No `using System.Linq;` needed: arr.Where(x => x > 0) just works.'
          - id: file-based-app-basics-card-05
            type: cloze
            prompt: >-
              Compiled file-based-app binaries are cached under `~/.dotnet/{{runfile}}/` on macOS/Linux and
              `%USERPROFILE%\.dotnet\{{runfile}}\` on Windows, keyed by filename + content hash.
            answer: runfile; runfile
            bloom: remember
            explanation: >-
              The cache makes subsequent runs fast. Edit the .cs file and a new hash triggers a fresh compile; other
              files stay cached.
            example: ~/.dotnet/runfile/greet-3faf7380.../bin/debug/greet.dll
          - id: file-based-app-basics-card-06
            type: name
            prompt: Which command converts a file-based app into a traditional .NET project with a .csproj?
            answer: '`dotnet project convert file.cs -o Folder`'
            bloom: apply
            explanation: >-
              Use when the single-file form outgrows its use case (multi-file, tests, deployment). The command preserves
              `#:` directives as the equivalent MSBuild settings.
            example: dotnet project convert api.cs -o ApiProject
          - id: file-based-app-basics-card-07
            type: cloze
            prompt: >-
              File-based apps require .NET version {{10}} or higher; earlier SDKs either error or require a separate
              shim.
            answer: '10'
            bloom: remember
            explanation: >-
              The `dotnet run file.cs` flow was finalized in .NET 10. On .NET 8/9 the command fails; verify with `dotnet
              --version` if a script mysteriously refuses to run.
            example: dotnet --version   // should report 10.x.x or later
      - id: file-based-app-directives
        name: 'File-based app #: directives'
        tags:
          - dotnet-10
          - scripting
          - directives
        source: notes/file-based-apps.docx; research-file-based.md §2.4
        prose: >-
          Four directives put build metadata into a file-based `.cs` — `#:package` for NuGet, `#:property` for MSBuild
          properties, `#:sdk` for SDK selection, `#:project` for project references. No space after the colon.
        cards:
          - id: file-based-app-directives-card-01
            type: cloze
            prompt: 'The NuGet-package directive is `#:{{package}} PackageName@Version` — note: no space after the {{colon}}.'
            answer: package; colon
            bloom: remember
            explanation: >-
              `#:package Spectre.Console@0.49.1` is legal; `#: package Spectre.Console@0.49.1` is not. The spaced form
              is a classic exam distractor.
            example: '#:package Spectre.Console@0.49.1'
          - id: file-based-app-directives-card-02
            type: name
            prompt: Which directive switches the file's SDK to support ASP.NET Core minimal APIs?
            answer: '`#:sdk Microsoft.NET.Sdk.Web`'
            bloom: apply
            explanation: >-
              The default SDK (`Microsoft.NET.Sdk`) is console-only. `Microsoft.NET.Sdk.Web` adds `WebApplication`,
              routing, middleware, etc.
            example: '#:sdk Microsoft.NET.Sdk.Web\nvar app = WebApplication.CreateBuilder(args).Build();'
          - id: file-based-app-directives-card-03
            type: cloze
            prompt: To set an MSBuild property like the target framework, use `#:{{property}} TargetFramework={{net10.0}}`.
            answer: property; net10.0
            bloom: apply
            explanation: >-
              Stack multiple #:property directives for more settings (LangVersion, Nullable, etc.). The `=` has no
              spaces around it.
            example: '#:property TargetFramework=net10.0\n#:property Nullable=enable'
          - id: file-based-app-directives-card-04
            type: name
            prompt: How do you reference a local .csproj from a file-based .cs?
            answer: '`#:project ./Relative/Path/Lib.csproj`'
            bloom: apply
            explanation: >-
              The path is resolved relative to the file-based .cs's location. Useful when a one-off script consumes
              types from a shared library.
            example: '#:project ./MyLibrary/MyLibrary.csproj\nusing MyLibrary;\nvar p = new Person();'
          - id: file-based-app-directives-card-05
            type: cloze
            prompt: >-
              The four `#:` directives are: `#:{{package}}`, `#:{{property}}`, `#:{{sdk}}`, and `#:{{project}}`. Each
              has NO space after the colon.
            answer: package; property; sdk; project
            bloom: remember
            explanation: >-
              Each directive targets one build-configuration concern. Stack as many as needed; each must sit on its own
              line.
            example: '#:sdk Microsoft.NET.Sdk.Web\n#:package Microsoft.AspNetCore.OpenApi@10.0.0\n#:property Nullable=enable'
          - id: file-based-app-directives-card-06
            type: name
            prompt: 'Is `#: sdk Microsoft.NET.Sdk.Web` (with a space after the colon) valid?'
            answer: No. Directive names sit flush against `#:` with no whitespace between.
            bloom: analyze
            explanation: >-
              The spaced form is the most common distractor in exams because it reads naturally. Always proofread for
              the zero-space rule.
            example: '#:sdk Microsoft.NET.Sdk.Web   (correct)\n#: sdk Microsoft.NET.Sdk.Web  (invalid)'
      - id: file-based-app-web
        name: 'File-based web apps — #:sdk + minimal API'
        tags:
          - dotnet-10
          - scripting
          - web
          - minimal-api
        source: notes/file-based-apps.docx; research-file-based.md
        prose: >-
          `#:sdk Microsoft.NET.Sdk.Web` switches a file-based app from console mode to ASP.NET Core.
          `WebApplication.CreateBuilder(args).Build()` plus `app.MapGet/Post/Put/Delete` gives a complete minimal-API
          web server in one file.
        cards:
          - id: file-based-app-web-card-01
            type: cloze
            prompt: >-
              To write a file-based web API, the first line is `#:sdk {{Microsoft.NET.Sdk.Web}}` — without it,
              `WebApplication` is not resolvable.
            answer: Microsoft.NET.Sdk.Web
            bloom: remember
            explanation: >-
              The default file-based SDK is console-only. Switching to the Web SDK pulls in ASP.NET Core's implicit
              references so minimal-API types are available.
            example: >-
              #:sdk Microsoft.NET.Sdk.Web\nvar app = WebApplication.CreateBuilder(args).Build();\napp.MapGet("/", () =>
              "Hi");\napp.Run();
          - id: file-based-app-web-card-02
            type: name
            prompt: What runtime type does `WebApplication.CreateBuilder(args).Build()` return?
            answer: '`WebApplication` — which you then use to call `MapGet`, `MapPost`, etc., and `Run()`.'
            bloom: remember
            explanation: >-
              `WebApplication` is the minimal-API host. It replaces the historical `IHost` + `IApplicationBuilder` split
              with a single object exposing routing + lifecycle methods.
            example: var app = WebApplication.CreateBuilder(args).Build();
          - id: file-based-app-web-card-03
            type: cloze
            prompt: A GET endpoint mapping in a file-based web app reads `app.{{MapGet}}("/route", () => result)`.
            answer: MapGet
            bloom: apply
            explanation: >-
              Map methods take a route template and a handler delegate. Delegates can be lambdas, method references, or
              typed handlers with DI via parameter injection.
            example: app.MapGet("/widgets", (AppDb db) => db.Widgets.ToList());
          - id: file-based-app-web-card-04
            type: name
            prompt: How do you include an additional NuGet package in a file-based web app?
            answer: Add a `#:package PackageName@Version` directive at the top of the file.
            bloom: apply
            explanation: >-
              Directives stack: the SDK swap plus any number of package directives, all at the file's top. Each on its
              own line.
            example: '#:sdk Microsoft.NET.Sdk.Web\n#:package Microsoft.AspNetCore.OpenApi@10.0.0'
          - id: file-based-app-web-card-05
            type: cloze
            prompt: >-
              The error `The name 'WebApplication' does not exist in the current context` on a file-based `.cs` almost
              always means the `{{#:sdk}}` directive is missing.
            answer: '#:sdk'
            bloom: analyze
            explanation: >-
              WebApplication lives in ASP.NET Core types that the default console SDK does not reference. Adding `#:sdk
              Microsoft.NET.Sdk.Web` fixes the resolution.
            example: Add `#:sdk Microsoft.NET.Sdk.Web` as the first line of the file.
          - id: file-based-app-web-card-06
            type: name
            prompt: When should you convert a file-based web app to a proper .NET project?
            answer: When you need multiple files, test projects, complex deployment, or CI pipelines that expect a .csproj.
            bloom: apply
            explanation: >-
              Single-file form is great for demos and one-off utilities. Anything requiring structure graduates via
              `dotnet project convert file.cs -o Folder`.
            example: dotnet project convert api.cs -o ApiProject
      - id: excel-export
        name: Excel export with ClosedXML
        tags:
          - excel
          - closedxml
          - report
        source: Labs/W13 Excel, PDF, Chart cocktail/; research-excel-pdf-chart.md §3
        prose: >-
          Create `XLWorkbook`, add a worksheet, write cells with 1-based indexing, save to a `MemoryStream`, return a
          `FileResult` with MIME type `application/vnd.openxmlformats-officedocument.spreadsheetml.sheet`.
        cards:
          - id: excel-export-card-01
            type: cloze
            prompt: 'ClosedXML cell indexing is {{1-based}}: `sheet.Cell(1, 1)` is the top-left cell (A1), not `Cell(0, 0)`.'
            answer: 1-based
            bloom: remember
            explanation: >-
              The 1-based convention matches Excel's UI (row 1, column A = A1). Mixing it with C# arrays causes
              off-by-one bugs, especially when data loops start at row 2 (header in row 1).
            example: sheet.Cell(1, 1).Value = "Name"; sheet.Cell(2, 1).Value = "Alice";
          - id: excel-export-card-02
            type: name
            prompt: What MIME type identifies an .xlsx file download?
            answer: '`application/vnd.openxmlformats-officedocument.spreadsheetml.sheet`'
            bloom: remember
            explanation: >-
              Long but precise — this is the OpenXML spreadsheet MIME. `application/excel` and
              `application/vnd.ms-excel` refer to older or incorrect formats.
            example: return File(bytes, "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet", "Report.xlsx");
          - id: excel-export-card-03
            type: cloze
            prompt: >-
              In ClosedXML, save the workbook to a `{{MemoryStream}}` with `workbook.SaveAs(stream)`, then call
              `stream.{{ToArray}}()` to get bytes for `File(...)`.
            answer: MemoryStream; ToArray
            bloom: apply
            explanation: >-
              The byte array form works with `File(byte[], mime, name)` which returns `FileContentResult`. For very
              large exports, return `FileStreamResult` and remember to rewind the stream — but `ToArray` is simpler for
              typical report sizes.
            example: using var ms = new MemoryStream(); workbook.SaveAs(ms); return File(ms.ToArray(), mime, name);
          - id: excel-export-card-04
            type: name
            prompt: How do you style all cells in a header range (rows 1, columns 1-3) with a background fill?
            answer: >-
              `sheet.Range(sheet.Cell(1,1).Address,
              sheet.Cell(1,3).Address).Style.Fill.SetBackgroundColor(XLColor.Almond);`
            bloom: apply
            explanation: >-
              IXLRange applies styles to all cells in the rectangular region. Single-cell styling works via `.Style`
              directly on `Cell(r, c)`.
            example: sheet.Range(sheet.Cell(1,1).Address, sheet.Cell(1,3).Address).Style.Font.Bold = true;
          - id: excel-export-card-05
            type: cloze
            prompt: >-
              After populating data, call `sheet.Columns().{{AdjustToContents}}()` to auto-fit every column's width
              before saving.
            answer: AdjustToContents
            bloom: apply
            explanation: >-
              Without autofit, users open your export and see all columns at the default ~8-character width. Call it
              once after all cells are written.
            example: sheet.Columns().AdjustToContents();  // before workbook.SaveAs(stream)
          - id: excel-export-card-06
            type: name
            prompt: What ASP.NET Core return type does an Excel-export handler typically produce?
            answer: '`FileResult` — specifically constructed via `File(bytes, mime, filename)`.'
            bloom: remember
            explanation: >-
              `File(...)` is a controller/PageModel helper that creates a `FileContentResult` (or `FileStreamResult`
              when streaming). Both inherit from `FileResult`.
            example: public FileResult OnGet() => File(bytes, mime, "Report.xlsx");
      - id: pdf-export
        name: PDF export with iText 7
        tags:
          - pdf
          - itext7
          - report
        source: Labs/W13 Excel, PDF, Chart cocktail/; research-excel-pdf-chart.md §3
        prose: >-
          iText 7 plus `itext.bouncy-castle-adapter` are both required. Pipeline: `MemoryStream` → `PdfWriter` →
          `PdfDocument` → `Document`. Call `writer.SetCloseStream(false)` to keep the stream open for
          `FileStreamResult`, and reset `ms.Position = 0` before returning.
        cards:
          - id: pdf-export-card-01
            type: cloze
            prompt: >-
              iText 7 requires two NuGet packages: `{{itext7}}` and `{{itext.bouncy-castle-adapter}}` — the adapter is a
              runtime crypto dependency, not optional.
            answer: itext7; itext.bouncy-castle-adapter
            bloom: remember
            explanation: >-
              Installing just itext7 compiles fine but crashes at runtime when iText attempts hashing or signing. Add
              both packages together to avoid the late failure.
            example: >-
              <PackageReference Include="itext7" Version="9.6.0" />\n<PackageReference
              Include="itext.bouncy-castle-adapter" Version="9.6.0" />
          - id: pdf-export-card-02
            type: name
            prompt: Order the four iText 7 types you construct top-to-bottom in a PDF pipeline.
            answer: MemoryStream → PdfWriter(stream) → PdfDocument(writer) → Document(pdfDoc, PageSize.A4, false)
            bloom: apply
            explanation: >-
              Each layer wraps the previous. MemoryStream is the byte sink; PdfWriter writes PDF-shaped bytes;
              PdfDocument owns PDF file structure (pages, xref); Document is the layout engine that accepts Paragraphs
              and Tables.
            example: >-
              var ms = new MemoryStream(); var writer = new PdfWriter(ms); var pdfDoc = new PdfDocument(writer); var doc
              = new Document(pdfDoc, PageSize.A4, false);
          - id: pdf-export-card-03
            type: cloze
            prompt: >-
              Call `writer.{{SetCloseStream}}(false)` so `document.Close()` does NOT close the underlying `MemoryStream`
              — you still need to read from it when returning the response.
            answer: SetCloseStream
            bloom: apply
            explanation: >-
              By default, closing the Document cascades and closes the writer + stream. Flipping the flag keeps the
              MemoryStream open for `FileStreamResult`. An alternative is returning `File(ms.ToArray(), ...)` which
              materializes bytes and doesn't care about the stream state.
            example: writer.SetCloseStream(false);
          - id: pdf-export-card-04
            type: name
            prompt: What line do you need before returning a `FileStreamResult` wrapping your PDF `MemoryStream`?
            answer: '`ms.Position = 0;`'
            bloom: analyze
            explanation: >-
              After writing, the MemoryStream's position is at the end. FileStreamResult reads from current position,
              finds nothing, and serves an empty file. Rewinding to 0 fixes this.
            example: document.Close(); ms.Position = 0; return new FileStreamResult(ms, "application/pdf");
          - id: pdf-export-card-05
            type: cloze
            prompt: >-
              In iText, page numbering is added AFTER layout by looping over `pdfDoc.{{GetNumberOfPages}}()` and calling
              `document.ShowTextAligned(...)` per page.
            answer: GetNumberOfPages
            bloom: apply
            explanation: >-
              You can't know the total page count until content is laid out. Loop from 1 to GetNumberOfPages() and add a
              page-N-of-total paragraph to each page.
            example: >-
              for (int i = 1; i <= pdfDoc.GetNumberOfPages(); i++) document.ShowTextAligned(new Paragraph($"Page {i} of
              {pdfDoc.GetNumberOfPages()}"), 559, 806, i, TextAlignment.RIGHT, VerticalAlignment.TOP, 0);
          - id: pdf-export-card-06
            type: name
            prompt: Which MIME type identifies a PDF download?
            answer: '`application/pdf`'
            bloom: remember
            explanation: >-
              Standard MIME — browsers recognize it and either render in a built-in viewer or save to disk.
              `FileStreamResult` takes it as a constructor argument.
            example: return new FileStreamResult(ms, "application/pdf") { FileDownloadName = "Report.pdf" };
          - id: pdf-export-card-07
            type: cloze
            prompt: >-
              A simpler alternative to `FileStreamResult` + `ms.Position = 0` is `return {{File}}(ms.ToArray(),
              "application/pdf", "name.pdf")` — the `ToArray()` is position-insensitive.
            answer: File
            bloom: apply
            explanation: >-
              File(byte[], mime, name) materializes the bytes, bypassing the stream-position trap. Trade-off:
              materializing into memory uses more RAM for large PDFs.
            example: return File(ms.ToArray(), "application/pdf", "Report.pdf");
      - id: chart-rendering
        name: Chart.js in Razor — CDN + Razor data injection
        tags:
          - chart
          - chart-js
          - razor
        source: Labs/W13 Excel, PDF, Chart cocktail/; research-excel-pdf-chart.md §3
        prose: >-
          Chart.js is a client-side library loaded from a CDN. A Razor page exposes a `<canvas>` element, builds JS data
          arrays by `@:` directives in a `<script>` block, and calls `new Chart(ctx, { type, data })` to render.
        cards:
          - id: chart-rendering-card-01
            type: cloze
            prompt: >-
              Chart.js renders on a `<{{canvas}}>` element identified by `id`. In the script, grab it via
              `document.getElementById('pie-chart')` and pass it to `new Chart(ctx, config)`.
            answer: canvas
            bloom: remember
            explanation: >-
              Chart.js draws 2D graphics using the canvas's 2D context. The canvas has to be in the DOM when the script
              runs, so typically the <script> block appears after the canvas element.
            example: <canvas id="pie-chart" width="400" height="400"></canvas>
          - id: chart-rendering-card-02
            type: name
            prompt: Which Razor directive injects a JavaScript line per loop iteration inside a `<script>` block?
            answer: '`@:` (at-colon) at the start of each JS line.'
            bloom: apply
            explanation: >-
              `@:` tells Razor "treat this line as mixed content with @-expression substitutions." Without it, Razor may
              misparse the JS or produce malformed output.
            example: '@foreach (var x in Model.Data) { @:labels.push(''@x.Name''); }'
          - id: chart-rendering-card-03
            type: cloze
            prompt: >-
              The Chart.js constructor takes two arguments: `new Chart({{ctx}}, {{config}})` — the canvas element (or
              its 2D context) and a config object with `type`, `data`, and optional `options`.
            answer: ctx; config
            bloom: apply
            explanation: >-
              Config.type picks the chart shape ('pie', 'bar', 'line', 'doughnut', etc.). Config.data has labels and
              datasets arrays. Options tune axes, legend, tooltips.
            example: 'new Chart(canvas, { type: ''pie'', data: { labels, datasets: [{ data, backgroundColor }] } });'
          - id: chart-rendering-card-04
            type: name
            prompt: How do you load Chart.js into a Razor page?
            answer: Add `<script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>` to the page.
            bloom: remember
            explanation: >-
              The library is distributed via CDN; no NuGet package is involved because the chart runs client-side. Pin a
              version (e.g. @3.9.1) so updates don't silently change behavior.
            example: <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
          - id: chart-rendering-card-05
            type: cloze
            prompt: For a pie chart, the dataset's `{{backgroundColor}}` is an array of colors — one entry per slice.
            answer: backgroundColor
            bloom: apply
            explanation: >-
              Unlike bar/line charts which typically use a single color across the dataset, pie slices want distinct
              colors. Pass an array aligned with the data array.
            example: 'datasets: [{ data: [10, 20, 30], backgroundColor: [''red'', ''blue'', ''green''] }]'
          - id: chart-rendering-card-06
            type: name
            prompt: Can Chart.js render a chart at the server and include the PNG in a PDF export?
            answer: >-
              No. Chart.js runs only in the browser. Server-side chart rendering requires a different library (e.g.
              SkiaSharp, System.Drawing).
            bloom: analyze
            explanation: >-
              The chart lives in a browser <canvas>. PDFs generated by iText 7 on the server cannot include a
              Chart.js-rendered image unless you first export the canvas from the browser (e.g. toDataURL) and POST it
              back to the server for embedding.
            example: Use SkiaSharp or ScottPlot for server-rendered images if you need charts embedded in PDFs.
  - id: module-6-testing
    name: Testing Discipline
    topics:
      - id: tdd-cycle
        name: TDD cycle — Red, Green, Refactor + Three Laws
        tags:
          - tdd
          - discipline
        source: slides/TDD_xunit.pptx; notes/TDD_xunit_SCRIPT.docx; research-tdd.md
        prose: >-
          TDD is a loop: write a failing test (Red), write the minimum code to make it pass (Green), then clean up
          without breaking the test (Refactor). Robert C. Martin's Three Laws enforce test-first discipline.
        cards:
          - id: tdd-cycle-card-01
            type: cloze
            prompt: >-
              The TDD cycle has three phases: `{{Red}}` (failing test), `{{Green}}` (minimum code to pass),
              `{{Refactor}}` (clean up without breaking the test).
            answer: Red; Green; Refactor
            bloom: remember
            explanation: >-
              Each phase has a single job. Skipping any phase defeats the purpose — no Red means you might be writing a
              tautological test; no Refactor means technical debt compounds.
            example: >-
              Red → Write Assert.Equal(4, calc.Add(2, 2));  // fails because Calculator doesn't exist\nGreen → class
              Calculator { public int Add(int a, int b) => a + b; }\nRefactor → rename, extract, simplify
          - id: tdd-cycle-card-02
            type: name
            prompt: State Robert C. Martin's First Law of TDD.
            answer: You are not allowed to write any production code unless it is to make a failing test pass.
            bloom: remember
            explanation: >-
              The First Law defines the relationship: production code exists to satisfy failing tests. Writing code
              without a failing test in hand breaks the TDD discipline.
            example: Failing test on table → you may write production code. No failing test → you may not.
          - id: tdd-cycle-card-03
            type: cloze
            prompt: >-
              During the {{Green}} phase, you write the {{minimum}} code necessary to make the failing test pass — not
              more, not less.
            answer: Green; minimum
            bloom: understand
            explanation: >-
              Resisting the urge to add 'just in case' logic is the hardest discipline. Extra code has no test backing
              it and accumulates as unverified complexity.
            example: >-
              Test expects Add(2, 2) → 4. Green code could be `return 4;` (passes the one test). Add more tests to force
              more general logic.
          - id: tdd-cycle-card-04
            type: name
            prompt: >-
              Why is writing the test first (the Red phase) important — what does it prove that a test written after the
              code cannot?
            answer: >-
              It proves the test can fail when the feature is missing, confirming the test's assertion is valid and the
              test framework can detect the failure.
            bloom: analyze
            explanation: >-
              A test written after the code might be tautological — it may check something the code trivially satisfies
              without you knowing. Watching it fail first eliminates that false-confidence.
            example: >-
              If you watch the test fail, then see it pass after implementing, you've proved: (a) the test detects
              absence, (b) your code fixes it.
          - id: tdd-cycle-card-05
            type: cloze
            prompt: >-
              In the Refactor phase, you clean up code while {{re-running tests}} after each change to ensure nothing
              breaks.
            answer: re-running tests
            bloom: apply
            explanation: >-
              Refactor happens under the safety net of green tests. Every structural change should leave all tests
              green. If a refactor breaks a test, undo and try a smaller step.
            example: Rename variable → run tests → still green → commit. Extract method → run tests → still green → commit.
          - id: tdd-cycle-card-06
            type: name
            prompt: When is TDD a poor fit?
            answer: >-
              Exploratory spikes, UI prototyping, research code — situations where the goal is learning, not
              regression-proof production code.
            bloom: understand
            explanation: >-
              Test-first requires you to know what the test should check; exploratory work is about discovering what you
              don't know. After the spike, rewrite production-worthy parts with TDD.
            example: Prototyping 'does ML.NET support this feature?' — write code first, test viable outputs later.
          - id: tdd-cycle-card-07
            type: cloze
            prompt: >-
              Robert Martin's Third Law: you are not allowed to write any more production code than is sufficient to
              make the {{currently failing test}} pass.
            answer: currently failing test
            bloom: remember
            explanation: >-
              Keeps production code tied to test coverage. Adding logic beyond the current failing test introduces
              untested behavior — exactly what TDD exists to prevent.
            example: >-
              Test: Divide(10, 2) → 5. Green body: `return 5;` — not `return a / b;`. The next test (Divide(6, 2) → 3)
              forces generalization.
      - id: xunit-attributes-assertions
        name: xUnit attributes, assertions, AAA
        tags:
          - tdd
          - xunit
          - assert
        source: slides/TDD_xunit.pptx; notes/TDD_xunit_SCRIPT.docx; research-tdd.md
        prose: >-
          xUnit uses `[Fact]` for single-scenario tests and `[Theory]` + `[InlineData]` for parameterized tests.
          Arrange/Act/Assert organizes the body. `Assert.Equal(expected, actual)` argument order is expected-first, and
          `Assert.Throws<T>(() => action())` is the exception matcher.
        cards:
          - id: xunit-attributes-assertions-card-01
            type: cloze
            prompt: >-
              A single-scenario xUnit test is marked `[{{Fact}}]`; a parameterized test is marked `[{{Theory}}]` and
              paired with one or more `[{{InlineData}}]` rows.
            answer: Fact; Theory; InlineData
            bloom: remember
            explanation: >-
              Each [InlineData(...)] produces one test execution. Four [InlineData] rows = four runs of the same
              [Theory] method body. Individual failures are reported per-row.
            example: >-
              [Theory]\n[InlineData(1, 2, 3)]\n[InlineData(0, 0, 0)]\npublic void Add(int a, int b, int expected) =>
              Assert.Equal(expected, calc.Add(a, b));
          - id: xunit-attributes-assertions-card-02
            type: cloze
            prompt: >-
              The canonical test body structure is {{Arrange}} / {{Act}} / {{Assert}} — setup, the operation under test,
              then the verification.
            answer: Arrange; Act; Assert
            bloom: understand
            explanation: >-
              AAA keeps tests readable and makes failures diagnosable — a stack trace points to Arrange, Act, or Assert
              and you know immediately whether setup, behavior, or expectations broke.
            example: // Arrange\nvar calc = new Calculator();\n// Act\nint r = calc.Add(2, 3);\n// Assert\nAssert.Equal(5, r);
          - id: xunit-attributes-assertions-card-03
            type: name
            prompt: What's the argument order for `Assert.Equal`?
            answer: 'Expected first, actual second: `Assert.Equal(expected, actual)`.'
            bloom: remember
            explanation: >-
              The compiler doesn't enforce order. Reversing produces failure messages that lie — the Expected/Actual
              labels in the message will be swapped, and you'll chase the wrong value.
            example: Assert.Equal(5, calc.Add(2, 3));  // expected 5, actual is the result of Add
          - id: xunit-attributes-assertions-card-04
            type: name
            prompt: How do you test that a method throws `ArgumentException`?
            answer: '`Assert.Throws<ArgumentException>(() => method(args));`'
            bloom: apply
            explanation: >-
              Assert.Throws runs the lambda and asserts a specific exception type was thrown. It returns the exception
              instance so you can also assert on Message or custom properties.
            example: >-
              var ex = Assert.Throws<ArgumentException>(() => _service.DoThing(null));\nAssert.Contains("cannot be
              null", ex.Message);
          - id: xunit-attributes-assertions-card-05
            type: cloze
            prompt: >-
              When multiple derived exception types could match, use `Assert.{{ThrowsAny}}<T>(() => action())` to accept
              any subtype of `T`.
            answer: ThrowsAny
            bloom: apply
            explanation: >-
              Assert.Throws<T> matches T EXACTLY — a derived type fails the test. Assert.ThrowsAny<T> accepts T or any
              subclass. Use the strict form when the exact type matters; the any form when it doesn't.
            example: >-
              Assert.ThrowsAny<ArgumentException>(() => action());  // ArgumentNullException and
              ArgumentOutOfRangeException both pass
          - id: xunit-attributes-assertions-card-06
            type: name
            prompt: What xUnit assertion compares two references for being the same object (not just value-equal)?
            answer: '`Assert.Same(expected, actual)` (its negation: `Assert.NotSame`).'
            bloom: understand
            explanation: >-
              Same compares by reference identity; Equal compares by value. For value types Equal is almost always what
              you want; for reference types, choose based on whether you care about identity or content.
            example: Assert.Same(obj, service.GetCached());  // must be the literal same instance
          - id: xunit-attributes-assertions-card-07
            type: cloze
            prompt: >-
              `[Theory]` tests require at least one data attribute. Common choices: `[{{InlineData}}(...)]` for
              literals, `[{{MemberData}}(nameof(Method))]` for computed data, `[{{ClassData}}(typeof(Cls))]` for typed
              data providers.
            answer: InlineData; MemberData; ClassData
            bloom: remember
            explanation: >-
              [InlineData] is simplest for small literal values. [MemberData] when data requires computation or doesn't
              fit in an attribute. [ClassData] when data provider needs its own class with complex logic.
            example: >-
              [Theory]\n[MemberData(nameof(GetSamples))]\npublic void RoundTrip(string json) { /* ... */ }\npublic
              static IEnumerable<object[]> GetSamples() { yield return new object[] { "{}" }; }
      - id: xunit-fixtures-lifecycle
        name: xUnit fixtures and lifecycle
        tags:
          - tdd
          - xunit
          - fixture
          - lifecycle
        source: notes/TDD_xunit_SCRIPT.docx; research-tdd.md
        prose: >-
          xUnit creates a fresh test-class instance per test. Constructor runs before each test; `IDisposable.Dispose`
          runs after each test. `IClassFixture<T>` shares one instance across all tests in a class;
          `ICollectionFixture<T>` + `[CollectionDefinition]` + `[Collection("Name")]` shares across multiple classes.
        cards:
          - id: xunit-fixtures-lifecycle-card-01
            type: cloze
            prompt: >-
              In xUnit, the test class's {{constructor}} runs before each test, and `{{IDisposable.Dispose}}` runs after
              — replacing older frameworks' `[SetUp]` / `[TearDown]` attributes.
            answer: constructor; IDisposable.Dispose
            bloom: remember
            explanation: >-
              xUnit uses standard C# object lifecycle instead of framework-specific attributes. Every [Fact] or [Theory]
              run gets a fresh test class instance, so state doesn't leak between tests.
            example: >-
              public class MyTests : IDisposable { public MyTests() { /* setup */ } public void Dispose() { /* cleanup
              */ } }
          - id: xunit-fixtures-lifecycle-card-02
            type: name
            prompt: How do you share an expensive setup (e.g. a seeded DbContext) across all tests in one test class?
            answer: >-
              Implement the setup as a fixture class and have the test class implement `IClassFixture<TFixture>`. xUnit
              injects the shared fixture via the test class constructor.
            bloom: apply
            explanation: >-
              IClassFixture<T> creates one fixture instance per test class, shared across all tests in that class. The
              test class's own lifetime (constructor/Dispose per test) is unchanged.
            example: 'public class MyTests : IClassFixture<DbFixture> { public MyTests(DbFixture fx) { _fx = fx; } }'
          - id: xunit-fixtures-lifecycle-card-03
            type: cloze
            prompt: >-
              To share a fixture across multiple test classes, define `{{ICollectionFixture<T>}}` inside a
              `[{{CollectionDefinition}}("Name")]` class, and decorate each participating test class with
              `[{{Collection}}("Name")]`.
            answer: ICollectionFixture<T>; CollectionDefinition; Collection
            bloom: apply
            explanation: >-
              Three pieces: definition class declares the fixture, test classes join by [Collection("Name")]. Tests
              within the collection run serially; the fixture is instantiated once per collection.
            example: >-
              [CollectionDefinition("Db")] public class DbColl : ICollectionFixture<DbFixture> {}\n[Collection("Db")]
              public class UserTests { /* ... */ }\n[Collection("Db")] public class OrderTests { /* ... */ }
          - id: xunit-fixtures-lifecycle-card-04
            type: name
            prompt: By default, does xUnit run tests in the same class in parallel or serially?
            answer: Serially. Tests in one class run one at a time; different test classes run in parallel.
            bloom: understand
            explanation: >-
              This default prevents shared-fixture races within a class. Parallelism happens at the class level, so
              IClassFixture-shared state is safe (no two tests touch it concurrently). Opt into full parallelization via
              [assembly: CollectionBehavior(...)] if needed.
            example: 'TestsInClassA: serialized. TestsInClassB: serialized. ClassA vs ClassB: parallel.'
          - id: xunit-fixtures-lifecycle-card-05
            type: cloze
            prompt: >-
              Fixtures are {{not safe}} for tests that mutate the fixture's state — xUnit doesn't guarantee test
              ordering within a class, so one test's writes may or may not be visible to another.
            answer: not safe
            bloom: analyze
            explanation: >-
              If tests need to mutate shared state, either reset in the test class's own Dispose, or switch to
              fresh-per-test state (no fixture). IClassFixture is intended for read-only / idempotent setup.
            example: >-
              Bad: TestA adds a user, TestB counts users, result depends on execution order.\nFix: each test manages its
              own state, or reset in Dispose.
          - id: xunit-fixtures-lifecycle-card-06
            type: name
            prompt: When should you NOT use a fixture?
            answer: >-
              When setup is cheap (in-memory list, simple object graph). Fixtures add indirection; plain constructors
              are simpler for tests that don't need expensive shared setup.
            bloom: understand
            explanation: >-
              Fixtures trade test isolation for performance. For a few-line setup there's no perf benefit; fixture
              overhead (an extra class, [Collection] attribute for cross-class sharing) is net negative.
            example: >-
              `new Calculator()` in the constructor — no fixture needed. `new MyDbContext(...)` with seed data — fixture
              pays off.
