modules:
  - id: module-1-ai-in-dotnet
    name: AI in .NET
    topics:
      - id: ai-agent-framework
        name: Microsoft Agent Framework (MAF) + tool calling
        tags:
          - ai
          - maf
          - agent
          - tools
          - function-calling
        prose: |
          Microsoft Agent Framework (MAF) wraps an `IChatClient` into a `ChatClientAgent` via
          `.AsAIAgent()`, registers C# delegates or lambdas as `AITool` values through
          `AIFunctionFactory.Create`, and drives turns with `RunAsync` or `RunStreamingAsync`.
          Multi-turn state lives in an `AgentSession` from `await agent.CreateSessionAsync()`,
          not in a manual `ChatHistory`. Common exam traps: `.AsAgent()`, `agent.Invoke()`,
          and `AITool.Register()` do not exist.
        cards:
          - id: maf-base-package
            type: cloze
            bloom: remember
            source: research-ai.md §NuGet Packages to Add
            explanation: >-
              The base package ships separately from the OpenAI integration. Both require --prerelease because MAF is
              not GA. Exam distractors swap the name to 'Microsoft.AgentFramework' or drop --prerelease.
            example: dotnet add package Microsoft.Agents.AI --prerelease
            prompt: The base NuGet package for MAF is {{Microsoft.Agents.AI}}, installed with the {{--prerelease}} flag.
            answer: Microsoft.Agents.AI --prerelease
          - id: maf-openai-package
            type: cloze
            bloom: remember
            source: research-ai.md §NuGet Packages to Add
            explanation: >-
              The `.OpenAI` suffix is what pulls in the `ChatClient` type used for OpenAI-compatible endpoints. Missing
              this package means `.AsAIAgent()` compiles but nothing at the OpenAI layer does.
            example: dotnet add package Microsoft.Agents.AI.OpenAI --prerelease
            prompt: >-
              To get the OpenAI-compatible `ChatClient` integration (GitHub Models, Azure OpenAI), install
              {{Microsoft.Agents.AI.OpenAI}} with {{--prerelease}}.
            answer: Microsoft.Agents.AI.OpenAI --prerelease
          - id: maf-as-ai-agent-method
            type: name
            bloom: remember
            source: 'research-ai.md §Create MAF Agent (Basic); flashcard #3'
            explanation: >-
              The extension lives on `IChatClient` and accepts `name`, `instructions`, and `tools`. `.AsAgent()` is a
              common distractor and does not compile.
            example: 'var agent = chatClient.AsAIAgent(instructions: "You are a chef.", name: "RecipeAgent");'
            prompt: Name the extension method that wraps an `IChatClient` into a `ChatClientAgent`.
            answer: .AsAIAgent()
          - id: maf-register-tool
            type: name
            bloom: apply
            source: 'research-ai.md §Create MAF Agent with Tools; flashcard #2'
            explanation: >-
              `AIFunctionFactory.Create` takes a delegate plus `name:` and `description:`. The description is the
              natural-language string the LLM reads to decide when to call the tool. `AITool.Register` and
              `AIFunction.Create` are distractors.
            example: |
              AITool weatherTool = AIFunctionFactory.Create(
                  WeatherService.GetWeatherAsync,
                  name: "GetWeather",
                  description: "Get the weather details of a location using city name");
            prompt: Name the factory call that turns a C# method into an `AITool` for an MAF agent.
            answer: AIFunctionFactory.Create
          - id: maf-session-for-multiturn
            type: name
            bloom: understand
            source: 'research-ai.md §MAF Agent with Session (Multi-Turn); flashcard #6'
            explanation: >-
              `ChatHistory` is a manual `List<ChatMessage>` for raw `IChatClient` loops. MAF agents manage history and
              tool-call state inside an `AgentSession`. Passing both duplicates state.
            example: |
              var session = await agent.CreateSessionAsync();
              var reply = await agent.RunAsync("What did I ask first?", session);
            prompt: >-
              You need conversation memory across five `RunAsync` calls against one MAF agent. Do you build a
              `ChatHistory` list or an `AgentSession`, and how do you get it?
            answer: >-
              `AgentSession`, via `var session = await agent.CreateSessionAsync();` — pass it into every `RunAsync`
              call.
          - id: maf-run-method-name
            type: cloze
            bloom: remember
            source: 'research-ai.md §Create MAF Agent (Basic); flashcard #18'
            explanation: >-
              `RunAsync` returns the full response after all tool round-trips complete. `Invoke` is a Semantic Kernel
              verb and a standard distractor on MAF questions.
            example: var response = await agent.RunAsync("A dessert for a rainy Tuesday.");
            prompt: >-
              To execute an MAF agent turn and get the assembled reply, call {{agent.RunAsync(input)}} — not
              `agent.Invoke(input)`.
            answer: agent.RunAsync(input)
          - id: maf-streaming-method
            type: cloze
            bloom: apply
            source: 'research-ai.md §MAF Agent with Streaming; flashcard #9'
            explanation: >-
              `RunStreamingAsync` yields updates as the model produces them. Swap it in for `RunAsync` when you want
              incremental output to the console or UI.
            example: |
              await foreach (var update in agent.RunStreamingAsync("Which planet is closest to the sun?")) {
                  Console.Write(update);
              }
            prompt: To stream tokens from an MAF agent, `await foreach` over {{agent.RunStreamingAsync(input)}}.
            answer: agent.RunStreamingAsync(input)
          - id: maf-lambda-tool
            type: name
            bloom: apply
            source: research-ai.md §Tool Registration from Async Lambda
            explanation: >-
              `AIFunctionFactory.Create` accepts delegates, including async lambdas. The lambda parameters become the
              tool's parameter schema sent to the LLM.
            example: |
              AITool poemTool = AIFunctionFactory.Create(
                  async (string city, string weather) => (await chatClient.GetResponseAsync($"Poem for {city}, {weather}")).Text,
                  name: "WriteShortPoem",
                  description: "Write a short funny poem about clothes to wear based on city and weather");
            prompt: >-
              You have an async lambda `(string city, string weather) => Task<string>` that builds a prompt and calls
              `chatClient.GetResponseAsync`. How do you expose it as a tool to an MAF agent?
            answer: >-
              Wrap it with `AIFunctionFactory.Create(lambda, name: "...", description: "...")` and pass the result in
              the `tools:` array of `.AsAIAgent(...)`.
          - id: maf-fake-method-as-agent
            type: name
            bloom: analyze
            source: research-ai.md §Fake Method Names in MCQ
            explanation: >-
              `.AsAgent()` is a documented exam trap — it resembles the real API and compiles if you define your own
              extension. MAF ships `.AsAIAgent()` only.
            example: 'var agent = chatClient.AsAIAgent(name: "Bot", instructions: "...");'
            prompt: 'A multiple-choice option shows `chatClient.AsAgent(instructions: "...")`. Correct or distractor?'
            answer: Distractor. The real method is `.AsAIAgent()`.
          - id: maf-fake-method-register
            type: name
            bloom: analyze
            source: 'research-ai.md §Fake Method Names in MCQ; MCQ #1'
            explanation: >-
              MAF has no `AITool.Register`. All native and lambda tools flow through `AIFunctionFactory.Create`, which
              returns an `AITool` you pass in the `tools:` array.
            example: |
              AITool tool = AIFunctionFactory.Create(
                  WeatherService.GetWeather,
                  name: "Weather",
                  description: "Get weather");
            prompt: >-
              A choice reads `AITool.Register(WeatherService.GetWeather, "Weather", "Get weather");`. Real or
              distractor?
            answer: >-
              Distractor. Use `AIFunctionFactory.Create(WeatherService.GetWeather, name: "Weather", description: "Get
              weather");`.
          - id: maf-agent-reasoning-behavior
            type: name
            bloom: understand
            source: 'research-ai.md §MAF Stack; MCQ #6'
            explanation: >-
              MAF agents are agentic — tool selection is implicit in the LLM's output. Tools execute only when the model
              emits a tool-call for them. Sequential execution of every registered tool is a distractor.
            example: >-
              Input 'What should I wear in Vancouver?' triggers GetWeather only if the model decides it needs weather
              data.
            prompt: >-
              When you call `agent.RunAsync(input, session)` on an MAF agent with three registered tools, what actually
              runs?
            answer: >-
              The LLM reads input and tool descriptions, decides which (if any) tools to call, MAF invokes those, tool
              results feed back into the LLM, and the final assistant message is returned. Not all tools run.
          - id: maf-vs-sk-verbs
            type: name
            bloom: analyze
            source: research-ai.md §Semantic Kernel vs. MAF Differences
            explanation: >-
              MAF and SK are sibling SDKs with different vocabularies. Mixing `kernel.InvokeAsync` with `agent.RunAsync`
              on the same object is a classic exam trap — they do not interop directly.
            example: |
              // SK
              kernel.ImportPluginFromType<WeatherPlugin>();
              await kernel.InvokeAsync(plugin["GetWeather"], new("Vancouver"));
              // MAF
              AITool t = AIFunctionFactory.Create(WeatherPlugin.GetWeather, name: "GetWeather", description: "...");
              await agent.RunAsync("Weather in Vancouver?", session);
            prompt: >-
              Sketch the verb mapping: for (a) tool registration, (b) turn execution, which method belongs to Semantic
              Kernel and which to MAF?
            answer: >
              Registration — SK: `kernel.ImportPluginFromType<T>()`; MAF: `AIFunctionFactory.Create(method, name,
              description)`.

              Execution  — SK: `kernel.InvokeAsync(function, args)`; MAF: `agent.RunAsync(input, session)`.
        source: notes/AI-Models_MAF_SCRIPT.docx; research-ai.md §MAF
      - id: ml-pipeline-workflow
        name: ML.NET pipeline workflow — Load → Transform → Concatenate → Train → Evaluate → Predict
        tags:
          - ml-net
          - pipeline
        prose: >-
          The canonical ML.NET program chains seven steps: create MLContext, load data into an IDataView, rename the
          target column to "Label", one-hot-encode categoricals, Concatenate features into a column named "Features",
          pick a trainer, and call Fit to get back an ITransformer. These cards drill the return types, magic column
          names, and trap answers the exam reuses.
        cards:
          - id: ml-pipeline-workflow-card-01
            type: cloze
            source: 'research-mlnet.md §MLContext; card #2, #14'
            bloom: remember
            explanation: >-
              `MLContext` exposes `Data`, `Transforms`, `Regression`, `MulticlassClassification`, and `Model`. Passing
              `seed: 0` pins the random-number generator so identical inputs produce identical models.
            example: '`MLContext mlContext = new MLContext(seed: 0);` — every subsequent call starts `mlContext.Something`.'
            prompt: >-
              The root object for every ML.NET program is `{{MLContext}}`, constructed with `new MLContext(seed: 0)` to
              make training {{deterministic}}.
            answer: '`MLContext` / deterministic'
          - id: ml-pipeline-workflow-card-02
            type: cloze
            source: 'research-mlnet.md §IDataView; card #3'
            bloom: remember
            explanation: >-
              The load call is lazy: rows are not pulled into memory until a downstream transform or `Fit` asks for
              them. The generic `T` carries `[LoadColumn(N)]` attributes that map CSV indices to fields.
            example: >-
              `IDataView trainingData = mlContext.Data.LoadFromTextFile<TaxiTrip>("taxi-fare-train.csv", hasHeader:
              true, separatorChar: ',');`
            prompt: >-
              `mlContext.Data.LoadFromTextFile<T>(path, hasHeader: true, separatorChar: ',')` returns an `{{IDataView}}`
              — an immutable, streaming view over tabular data.
            answer: '`IDataView`'
          - id: ml-pipeline-workflow-card-03
            type: name
            source: 'research-mlnet.md §Exam Traps #3; card #4; MCQ Q3'
            bloom: remember
            explanation: >-
              `Fit` runs every transform and trains the final algorithm. It does not return `IDataView` (that is what
              `Transform` returns), not metrics, not a `PredictionEngine`. This is the single most common MCQ
              distractor.
            example: '`ITransformer model = pipeline.Fit(trainingData);` — never `IDataView model = pipeline.Fit(…)`.'
            prompt: What does `pipeline.Fit(trainingData)` return?
            answer: '`ITransformer` — the trained, stateless, serializable model.'
          - id: ml-pipeline-workflow-card-04
            type: cloze
            source: 'research-mlnet.md §Exam Traps #5; §Top 5 Exam Mistakes #2'
            bloom: understand
            explanation: >-
              Trainers search the `IDataView` schema for a column named `"Label"`. If you leave `FareAmount` as the
              target name, the trainer cannot find it and `Fit` throws a "column not found" error.
            example: '`mlContext.Transforms.CopyColumns(outputColumnName: "Label", inputColumnName: "FareAmount")`'
            prompt: >-
              The first step in a trainer pipeline renames the target column to the literal name `{{"Label"}}` using the
              `{{CopyColumns}}` transform.
            answer: '`"Label"` / `CopyColumns`'
          - id: ml-pipeline-workflow-card-05
            type: cloze
            source: 'research-mlnet.md §Exam Traps #6; card #7'
            bloom: understand
            explanation: >-
              Trainers look up their input by the hard-coded name `"Features"`. `Concatenate` packs the encoded columns
              into one vector under that name so the trainer can consume it as a single numeric input.
            example: '`.Append(mlContext.Transforms.Concatenate("Features", "VendorIdEncoded", "TripDistance"))`'
            prompt: >-
              `Concatenate` must produce a single vector column named exactly `{{"Features"}}` — trainers refuse to run
              if the column is called `"Input"` or `"X"`.
            answer: '`"Features"`'
          - id: ml-pipeline-workflow-card-06
            type: cloze
            source: 'research-mlnet.md card #6; MCQ Q5'
            bloom: apply
            explanation: >-
              Trainers accept only numeric input. `OneHotEncoding` expands a categorical column into one indicator
              column per distinct value — `"VTS"` becomes `[1,0]`, `"CMT"` becomes `[0,1]`.
            example: >-
              `.Append(mlContext.Transforms.Categorical.OneHotEncoding(outputColumnName: "VendorIdEncoded",
              inputColumnName: "VendorId"))`
            prompt: >-
              To convert categorical text columns such as `"VTS"` or `"CMT"` into numeric binary vectors, apply the
              `{{OneHotEncoding}}` transform before `Concatenate`.
            answer: '`OneHotEncoding`'
          - id: ml-pipeline-workflow-card-07
            type: name
            source: 'research-mlnet.md §Algorithms; card #9'
            bloom: remember
            explanation: >-
              `FastTree` is the default regression trainer for numeric prediction. Regression namespace matters: using
              `mlContext.MulticlassClassification.Trainers.…` for a regression task produces wrong metrics or compile
              errors.
            example: '`.Append(mlContext.Regression.Trainers.FastTree());`'
            prompt: >-
              Which trainer call sits at the end of a regression pipeline in the taxi-fare example, and which namespace
              does it come from?
            answer: '`mlContext.Regression.Trainers.FastTree()` — gradient-boosted decision trees from `Microsoft.ML.FastTree`.'
          - id: ml-pipeline-workflow-card-08
            type: cloze
            source: 'research-mlnet.md §Exam Traps #7'
            bloom: remember
            explanation: >-
              `LoadColumn` takes a numeric index, not a header string. The index matches the CSV column position
              starting at zero; header names are ignored by this attribute.
            example: '`[LoadColumn(0)] public string VendorId;` maps to the first CSV column.'
            prompt: >-
              `[LoadColumn({{0}})]` on a field maps it to the CSV column at {{0-based}} index — `[LoadColumn(6)]` reads
              the seventh column.
            answer: 0 / 0-based
          - id: ml-pipeline-workflow-card-09
            type: name
            source: 'research-mlnet.md §Complete Workflow Step 6; card #10'
            bloom: apply
            explanation: >-
              `Transform` applies the pipeline to new data and adds the `"Score"` column. `Regression.Evaluate` reads
              `"Label"` and `"Score"` to produce a `RegressionMetrics` with `RSquared`, `RootMeanSquaredError`, and
              `MeanAbsoluteError`.
            example: '`Console.WriteLine($"RSquared: {metrics.RSquared:0.##}");`'
            prompt: After `Fit`, how do you compute regression quality metrics on a test `IDataView`?
            answer: >-
              `var predictions = model.Transform(testData); var metrics = mlContext.Regression.Evaluate(predictions,
              "Label", "Score");`
          - id: ml-pipeline-workflow-card-10
            type: cloze
            source: 'research-mlnet.md §PredictionEngine; card #5; MCQ Q8'
            bloom: apply
            explanation: >-
              `PredictionEngine<TIn, TOut>` handles one example at a time. For batch inference use
              `model.Transform(batch)` instead — calling `Predict` in a tight loop is the single-row API.
            example: >-
              `var engine = mlContext.Model.CreatePredictionEngine<TaxiTrip, TaxiTripFarePrediction>(model); var fare =
              engine.Predict(newTrip).FareAmount;`
            prompt: >-
              For single-row inference at runtime, wrap the trained model in a `{{PredictionEngine}}` via
              `mlContext.Model.CreatePredictionEngine<TInput, TOutput>(model)`, then call `.Predict(example)`.
            answer: '`PredictionEngine`'
          - id: ml-pipeline-workflow-card-11
            type: name
            source: research-mlnet.md §Quick Reference Cheat Sheet
            bloom: analyze
            explanation: >-
              Every ML.NET program follows this shape. The order matters: rename to `"Label"` before any transforms that
              touch features; encode categoricals before `Concatenate`; `Concatenate` must come before the trainer.
            example: >-
              Taxi-fare pipeline: load CSV → copy `FareAmount` to `"Label"` → one-hot `VendorId` → concatenate into
              `"Features"` → `FastTree` → `Fit` → `Evaluate` → predict.
            prompt: Name the seven canonical steps of an ML.NET training program in order.
            answer: >-
              1. `new MLContext(seed: 0)` — 2. `LoadFromTextFile<T>` into `IDataView` — 3. `CopyColumns("Label",
              target)` — 4. `OneHotEncoding` for categoricals — 5. `Concatenate("Features", …)` — 6. append a trainer
              (`FastTree` etc.) — 7. `Fit` returns an `ITransformer`, then `Evaluate` or `CreatePredictionEngine`.
          - id: ml-pipeline-workflow-card-12
            type: cloze
            source: 'research-mlnet.md §Exam Traps #4; §Top 5 Exam Mistakes #3'
            bloom: analyze
            explanation: >-
              The trainer namespace and the evaluator namespace must match the task. Using `BinaryClassification` or
              `MulticlassClassification` for a numeric-prediction problem yields classification metrics or a compilation
              error.
            example: >-
              Taxi-fare (numeric target) uses `mlContext.Regression.Trainers.FastTree()` and
              `mlContext.Regression.Evaluate(...)`.
            prompt: >-
              Calling `mlContext.{{Regression}}.Evaluate` on a regression pipeline returns `RSquared` and `RMSE`;
              calling `mlContext.{{MulticlassClassification}}.Evaluate` instead returns accuracy metrics — picking the
              wrong namespace is an exam trap.
            answer: '`Regression` / `MulticlassClassification`'
        source: slides/ML.NET.pptx; notes/ML.NET_VSCODE_SCRIPT.docx; research-mlnet.md §Complete ML.NET Workflow
      - id: ai-semantic-kernel
        name: Semantic Kernel SDK
        tags:
          - ai
          - orchestration
          - plugins
        prose: >-
          Semantic Kernel is Microsoft's orchestration SDK for LLMs in .NET. A Kernel — built by KernelBuilder — holds
          an IChatCompletionService and plugins. A plugin is a collection of callable functions: either a native C#
          class whose methods carry [KernelFunction] + [Description], or a prompt directory containing skprompt.txt with
          {{$variable}} placeholders. Invoke everything through kernel.InvokeAsync(). The core NuGet is
          Microsoft.SemanticKernel; add-on packages live under Microsoft.SemanticKernel.Plugins.*. Do not confuse with
          Microsoft Agent Framework — agent.RunAsync() and AIFunctionFactory.Create() belong to MAF, not Semantic
          Kernel.
        cards:
          - id: ai-semantic-kernel-card-01
            type: name
            bloom: remember
            explanation: >-
              `KernelBuilder` configures services (LLM backend, logging) and constructs the `Kernel` via `Build()`.
              Variant `Kernel.Builder` does not exist.
            example: '`var kernel = new KernelBuilder().AddOpenAIChatCompletion("gpt-4o", apiKey).Build();`'
            source: research-ai.md §Register Semantic Kernel in Program.cs
            prompt: Which class builds a Semantic Kernel `Kernel` instance fluently?
            answer: '`KernelBuilder`'
          - id: ai-semantic-kernel-card-02
            type: cloze
            bloom: remember
            explanation: >-
              `InvokeAsync` is the one call that runs any plugin function through the kernel. `kernel.Execute()` is a
              fake method that appears in distractors.
            example: '`await kernel.InvokeAsync(plugin["RecipeGenerator"], new("chocolate cake"));`'
            source: research-ai.md §Kernel, §Add Plugin to Kernel (Prompt-Based)
            prompt: To execute a Semantic Kernel function, call `kernel.{{InvokeAsync}}()`.
            answer: InvokeAsync
          - id: ai-semantic-kernel-card-03
            type: name
            bloom: remember
            explanation: >-
              `[KernelFunction]` tags the method for kernel discovery; pair it with `[Description]` so the LLM can
              choose it during tool selection. `[SkillFunction]` is a distractor.
            example: >-
              `[KernelFunction("DescribeWeather")] [Description("Get weather for a city")] public static string
              GetWeatherDescription(string city) => ...;`
            source: 'research-ai.md flashcard #8, §Add Plugin to Kernel (Native C# Class)'
            prompt: Which attribute marks a C# method as a Semantic Kernel function?
            answer: '`[KernelFunction]`'
          - id: ai-semantic-kernel-card-04
            type: cloze
            bloom: understand
            explanation: >-
              The kernel substitutes each `{{$var}}` with the argument passed to `InvokeAsync` before sending the
              rendered prompt to the LLM.
            example: '`skprompt.txt`: `Identify the city in this input: {{$input}}` — called with `input = "weather in Tokyo"`.'
            source: 'research-ai.md §skprompt.txt Template, flashcard #11'
            prompt: In a Semantic Kernel prompt template, the placeholder syntax is `{{{{$variableName}}}}`.
            answer: '{{$variableName}}'
          - id: ai-semantic-kernel-card-05
            type: name
            bloom: remember
            explanation: >-
              `IChatCompletionService` lets you swap OpenAI, Azure OpenAI, or Ollama backends without changing calling
              code. Implementations register via extension methods on `KernelBuilder` like `AddOpenAIChatCompletion`.
            example: >-
              `kernelBuilder.AddOpenAIChatCompletion("phi3", new Uri("http://localhost:11434"));` registers an
              Ollama-backed `IChatCompletionService`.
            source: 'research-ai.md §IChatCompletionService, flashcard #15'
            prompt: Which interface abstracts the LLM backend in Semantic Kernel?
            answer: '`IChatCompletionService`'
          - id: ai-semantic-kernel-card-06
            type: cloze
            bloom: apply
            explanation: >-
              `ImportPluginFromType<T>()` reflects over `T`, finds every `[KernelFunction]` method, and registers them.
              Use `ImportPluginFromPromptDirectory()` instead for directories containing `skprompt.txt`.
            example: >-
              `kernel.ImportPluginFromType<WeatherPlugin>();` makes `WeatherPlugin.GetWeatherDescription` callable via
              `kernel.InvokeAsync`.
            source: research-ai.md §Add Plugin to Kernel (Native C# Class)
            prompt: To load a native C# plugin class `WeatherPlugin`, call `kernel.{{ImportPluginFromType}}<WeatherPlugin>()`.
            answer: ImportPluginFromType
          - id: ai-semantic-kernel-card-07
            type: name
            bloom: understand
            explanation: >-
              A prompt-directory plugin is a folder containing `skprompt.txt` — the template with `{{$var}}`
              placeholders — and optional config. `ImportPluginFromPromptDirectory()` reads this layout.
            example: >-
              `Plugins/CakeRecipe/skprompt.txt` contains `Write a recipe for {{$input}}.`; the kernel renders it at
              invoke time.
            source: 'research-ai.md §skprompt.txt Template, flashcard #10'
            prompt: What file name identifies a prompt-based Semantic Kernel plugin inside its directory?
            answer: '`skprompt.txt`'
          - id: ai-semantic-kernel-card-08
            type: cloze
            bloom: understand
            explanation: >-
              `ChatHistory` carries prior turns so the LLM has context on each call. It is distinct from Microsoft Agent
              Framework's `AgentSession`.
            example: '`var history = new ChatHistory(); history.AddUserMessage("hi"); history.AddAssistantMessage("hello");`'
            source: research-ai.md §ChatHistory, §Kernel → ChatHistory Flow
            prompt: >-
              The ordered list tracking multi-turn conversation state in Semantic Kernel is `{{ChatHistory}}` — a list
              of `ChatMessage` objects with a `ChatRole` (User, Assistant, System).
            answer: ChatHistory
          - id: ai-semantic-kernel-card-09
            type: name
            bloom: apply
            explanation: >-
              `ImportPluginFromPromptDirectory(path)` scans the directory for prompt templates and registers them as
              functions. `SkillFactory.Create()` is a distractor — it does not exist.
            example: '`kernel.ImportPluginFromPromptDirectory(Path.Combine(pluginDir, "CakeRecipe"));`'
            source: research-ai.md §Add Plugin to Kernel (Prompt-Based)
            prompt: Which Semantic Kernel method loads a plugin from a directory of `skprompt.txt` files?
            answer: '`ImportPluginFromPromptDirectory()`'
          - id: ai-semantic-kernel-card-10
            type: cloze
            bloom: understand
            explanation: >-
              Install the core package first; add individual `Microsoft.SemanticKernel.Plugins.*` packages only when you
              need their integrations. The MAF package `Microsoft.Agents.AI.OpenAI` is a separate SDK.
            example: '`dotnet add package Microsoft.SemanticKernel` brings in `Kernel`, `KernelBuilder`, `[KernelFunction]`.'
            source: research-ai.md §NuGet Packages to Add, §Package Naming Confusion
            prompt: >-
              The core Semantic Kernel NuGet package is `{{Microsoft.SemanticKernel}}`; add-on plugin packages live
              under `Microsoft.SemanticKernel.Plugins.*`.
            answer: Microsoft.SemanticKernel
        source: slides/CSharp_Meets_AI.pptx; notes/AI-Models_MAF_SCRIPT.docx; research-ai.md §Semantic Kernel
      - id: ml-data-transforms
        name: ML.NET data transforms
        tags:
          - ml-net
          - feature-eng
        prose: >-
          Trainers in ML.NET consume two specific columns: a scalar named `"Label"` and a vector named `"Features"`.
          Three transforms produce them. `CopyColumns` renames your target to `"Label"`. `OneHotEncoding` converts each
          categorical text column into a numeric indicator vector under a name you choose. `Concatenate` stitches the
          surviving numeric columns — including every encoded output — into the single `"Features"` vector. Skip any
          step, misname a column, or forget an encoded column in the concatenate list and training breaks or silently
          loses a feature.
        cards:
          - id: ml-data-transforms-card-01
            type: cloze
            bloom: understand
            prompt: >-
              Trainers look up the target column by the literal name `"{{Label}}"` and the feature vector by the literal
              name `"{{Features}}"`.
            answer: Label
            explanation: Both names are hardcoded in ML.NET trainer lookups. Renaming either one breaks `Fit()` at runtime.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-data-transforms-card-02
            type: name
            bloom: understand
            prompt: >-
              What does `mlContext.Transforms.CopyColumns(outputColumnName: "Label", inputColumnName: "FareAmount")` do,
              and why is it required?
            answer: It duplicates the `FareAmount` column under the name `"Label"`.
            explanation: >-
              It duplicates the `FareAmount` column under the name `"Label"`. Regression trainers look for a column
              named exactly `"Label"` as their target; without this rename, training fails.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-data-transforms-card-03
            type: name
            bloom: understand
            prompt: >-
              Why can't a regression trainer consume a raw `VendorId` column containing strings like `"CMT"` and `"VTS"`
              directly?
            answer: Trainers operate on numeric vectors.
            explanation: >-
              Trainers operate on numeric vectors. `OneHotEncoding` performs categorical encoding: each distinct text
              value becomes a slot in a binary-indicator vector (e.g. `"VTS"` → `[0, 1]`), which the trainer can then
              process.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-data-transforms-card-04
            type: cloze
            bloom: apply
            prompt: >-
              In `mlContext.Transforms.Categorical.OneHotEncoding(outputColumnName: "VendorIdEncoded", inputColumnName:
              "VendorId")`, the name `"VendorIdEncoded"` is {{chosen by you}}, but whatever you pick must then appear in
              the {{`Concatenate` input list}}.
            answer: chosen by you
            explanation: >-
              Output names are arbitrary — `"VendorIdOH"` works equally well. The only hard constraint is matching that
              exact string when you reference the encoded column downstream.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-data-transforms-card-05
            type: name
            bloom: apply
            prompt: >-
              A pipeline calls `OneHotEncoding` on `VendorId`, `RateCode`, and `PaymentType`, then
              `Concatenate("Features", "VendorIdEncoded", "PassengerCount", "TripDistance")`. What silent bug exists?
            answer: >-
              `RateCodeEncoded` and `PaymentTypeEncoded` are encoded but never listed in `Concatenate`, so they are
              dropped from …
            explanation: >-
              `RateCodeEncoded` and `PaymentTypeEncoded` are encoded but never listed in `Concatenate`, so they are
              dropped from the `"Features"` vector. The pipeline compiles and trains, but on fewer features than
              intended.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-data-transforms-card-06
            type: cloze
            bloom: apply
            prompt: >-
              When predicting taxi fare, you must exclude `TripTime` from the feature list to prevent {{data leakage}},
              because trip duration is unknown at {{prediction time}}.
            answer: data leakage
            explanation: >-
              Time-dependent columns known only after the event you're predicting leak future information into training.
              The model learns an unrealistic shortcut and fails on real inputs.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-data-transforms-card-07
            type: name
            bloom: apply
            prompt: >-
              Order these pipeline steps correctly: trainer `FastTree()`, `OneHotEncoding` calls, `CopyColumns("Label",
              "FareAmount")`, `Concatenate("Features", …)`.
            answer: >-
              `CopyColumns("Label", "FareAmount")` → `OneHotEncoding` calls → `Concatenate("Features", …)` →
              `FastTree()`.
            explanation: >-
              `CopyColumns("Label", "FareAmount")` → `OneHotEncoding` calls → `Concatenate("Features", …)` →
              `FastTree()`. Label rename and encoded-column setup must both occur before the trainer.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-data-transforms-card-08
            type: cloze
            bloom: understand
            prompt: >-
              The `[LoadColumn(0)]` attribute uses a {{0-based}} CSV index, whereas ClosedXML cells are {{1-based}} —
              don't carry one convention into the other.
            answer: 0-based
            explanation: >-
              ML.NET CSV column attributes start at 0 for the first column. ClosedXML's `Cell(1, 1)` addresses row 1,
              column 1. Mixing them causes off-by-one column mismatches.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-data-transforms-card-09
            type: name
            bloom: understand
            prompt: What does `NormalizeMinMax` do, and how does it differ in purpose from `OneHotEncoding`?
            answer: '`NormalizeMinMax` scales numeric features to the `[0, 1]` range.'
            explanation: >-
              `NormalizeMinMax` scales numeric features to the `[0, 1]` range. `OneHotEncoding` converts text categories
              into numeric indicator vectors. Normalization rescales existing numbers; one-hot encoding creates numbers
              from text.
            example: '<!-- example: Stage 5 enrichment -->'
        source: slides/ML.NET.pptx; notes/ML.NET_VSCODE_SCRIPT.docx; research-mlnet.md §Key Transform Classes
      - id: ml-regression-evaluation
        name: ML.NET regression evaluation — FastTree, RMSE, R²
        tags:
          - ml-net
          - regression
          - metrics
        prose: >-
          Regression trainers live on mlContext.Regression.Trainers; FastTree (gradient-boosted trees in
          Microsoft.ML.FastTree) is the default. You split an IDataView with mlContext.Data.TrainTestSplit(data,
          testFraction: 0.2) or average across folds with mlContext.Regression.CrossValidate. Evaluation runs through
          mlContext.Regression.Evaluate(predictions, "Label", "Score"), which returns a RegressionMetrics object. Read
          metrics.RSquared (variance explained, 0–1, unitless), metrics.RootMeanSquaredError (average error in the
          label's original units, lower is better), and metrics.MeanAbsoluteError (absolute error, more robust to
          outliers). The namespace must match the task: Regression.Evaluate produces regression metrics,
          MulticlassClassification.Evaluate does not. The score argument names the prediction column; FastTree writes to
          "Score".
        cards:
          - id: ml-regression-evaluation-card-01
            type: name
            bloom: remember
            source: 'research-mlnet.md §Regression Trainers; card #9'
            explanation: >-
              FastTree is the default choice for general regression. Its output column is named "Score". SdcaRegression
              and LightGbmRegression are alternatives; LightGbm additionally requires Microsoft.ML.LightGbm.
            example: .Append(mlContext.Regression.Trainers.FastTree())
            prompt: The default gradient-boosted-trees regression trainer is created with ___ and ships in the ___ package.
            answer: mlContext.Regression.Trainers.FastTree() ; Microsoft.ML.FastTree
          - id: ml-regression-evaluation-card-02
            type: name
            bloom: remember
            source: 'research-mlnet.md §TrainTestSplit; card #15'
            explanation: >-
              TrainTestSplit sits on mlContext.Data, not mlContext.Regression. You fit the pipeline on TrainSet and
              evaluate predictions from TestSet.
            example: |
              var split = mlContext.Data.TrainTestSplit(dataView, testFraction: 0.2);
              ITransformer model = pipeline.Fit(split.TrainSet);
              var predictions = model.Transform(split.TestSet);
            prompt: Which call partitions an IDataView into 80% training and 20% test subsets?
            answer: >-
              mlContext.Data.TrainTestSplit(dataView, testFraction: 0.2)  — returns a
              DataOperationsCatalog.TrainTestData with TrainSet and TestSet.
          - id: ml-regression-evaluation-card-03
            type: name
            bloom: understand
            source: research-mlnet.md §CrossValidate
            explanation: >-
              CrossValidate gives a tighter performance estimate than a single TrainTestSplit because every row serves
              as test data in exactly one fold.
            example: 'var cv = mlContext.Regression.CrossValidate(pipeline, data, numberOfFolds: 5);'
            prompt: >-
              Call ___ to run k-fold cross-validation: it trains k models, each on (k-1) folds, and reports ___ metrics
              across all folds.
            answer: 'mlContext.Regression.CrossValidate(pipeline, data, numberOfFolds: 5) ; averaged'
          - id: ml-regression-evaluation-card-04
            type: name
            bloom: apply
            source: 'research-mlnet.md §Evaluation Metrics; card #10'
            explanation: >-
              The first string is the label column (you renamed the target to "Label" via CopyColumns). The second is
              the score column — FastTree writes its prediction to "Score". Mismatched names break Evaluate.
            example: |
              IDataView predictions = model.Transform(split.TestSet);
              var metrics = mlContext.Regression.Evaluate(predictions, "Label", "Score");
              Console.WriteLine($"R²: {metrics.RSquared:0.##}");
            prompt: Which line evaluates a regression model and returns a RegressionMetrics object?
            answer: var metrics = mlContext.Regression.Evaluate(predictions, "Label", "Score");
          - id: ml-regression-evaluation-card-05
            type: name
            bloom: understand
            source: research-mlnet.md §Regression Metrics
            explanation: >-
              R² = 1 − (SS_residual / SS_total). It is unitless. 0.89 means the model explains 89% of the label's
              variance, not that it is 89% accurate.
            example: 'Console.WriteLine($"RSquared: {metrics.RSquared:0.##}");'
            prompt: >-
              R² is exposed as ___ on RegressionMetrics, ranges from ___ to ___, and reports the fraction of ___ the
              model explains.
            answer: metrics.RSquared ; 0 ; 1 ; variance
          - id: ml-regression-evaluation-card-06
            type: name
            bloom: evaluate
            source: 'research-mlnet.md §Regression Metrics example; MCQ #4'
            explanation: >-
              RMSE inherits the label's units (dollars here). R² is unitless variance-explained. Distractors conflate
              the two — "89% accurate with 3.3% error" is wrong on both counts.
            example: metrics.RSquared = 0.89 ; metrics.RootMeanSquaredError = 3.30 ; label column = FareAmount (USD)
            prompt: >-
              A taxi-fare model reports RSquared = 0.89 and RootMeanSquaredError = 3.3 on the test set. What do those
              numbers mean?
            answer: >-
              The model explains 89% of variance in FareAmount, and predicted fares miss the actual fare by about $3.30
              on average.
          - id: ml-regression-evaluation-card-07
            type: name
            bloom: apply
            source: research-mlnet.md §Evaluation Metrics; §Exam Traps
            explanation: >-
              A uses the wrong namespace — MulticlassClassification returns accuracy metrics, not RSquared. B passes the
              wrong score-column name; FastTree emits "Score". D is not a real method — Evaluate lives on the task
              catalog (Regression), not on Trainers.
            example: var metrics = mlContext.Regression.Evaluate(predictions, "Label", "Score");
            prompt: >
              You trained a regression model and want to print R² and RMSE on a held-out test set. Which snippet is
              correct?


              A) var metrics = mlContext.MulticlassClassification.Evaluate(predictions, "Label", "Score");

              B) var metrics = mlContext.Regression.Evaluate(predictions, "Label", "Prediction");

              C) var metrics = mlContext.Regression.Evaluate(predictions, "Label", "Score");

              D) var metrics = mlContext.Regression.Trainers.Evaluate(predictions);
            answer: C
          - id: ml-regression-evaluation-card-08
            type: name
            bloom: understand
            source: research-mlnet.md §Regression Metrics
            explanation: >-
              RMSE = √(Σ(predicted − actual)² / n). It punishes large errors more than MeanAbsoluteError does. MAE is
              the robust-to-outliers alternative.
            example: RSquared = 0.89 (89% variance explained) ; RMSE = 3.30 (≈ $3.30 average miss)
            prompt: >-
              Why is RootMeanSquaredError a better reality check than RSquared when a stakeholder asks "how far off are
              predictions?"
            answer: >-
              RMSE is in the label's original units (dollars for fare, seconds for duration) so it answers the question
              directly. RSquared is unitless variance-explained and says nothing about the size of an individual miss.
          - id: ml-regression-evaluation-card-09
            type: name
            bloom: remember
            source: research-mlnet.md §Regression Metrics; §Exam Traps
            explanation: Claiming "RMSE = 3.3%" or "RSquared is in dollars" swaps the two. RMSE inherits units; R² never does.
            example: metrics.RootMeanSquaredError = 3.30   // dollars, because FareAmount is in USD
            prompt: RootMeanSquaredError measures error in the label's ___ units, while RSquared is ___ and ranges 0 to 1.
            answer: original (e.g. dollars for fare) ; unitless
        source: slides/ML.NET.pptx; notes/ML.NET_VSCODE_SCRIPT.docx; research-mlnet.md §Evaluation Metrics
      - id: ml-prediction-consumption
        module: AI in .NET
        tags:
          - ml-net
          - inference
        cards:
          - id: ml-prediction-consumption-card-01
            type: cloze
            bloom: remember
            prompt: '`pipeline.Fit(trainingData)` returns an instance of `{{ITransformer}}`, not an `IDataView`.'
            answer: ITransformer
            explanation: >-
              `Fit` trains the pipeline and hands back the stateless, serializable trained model — the `ITransformer`.
              The `IDataView` is the input, not the output.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-prediction-consumption-card-02
            type: name
            bloom: understand
            prompt: >-
              You need to score one new `TaxiTrip` at inference time. Which ML.NET type do you create, and from which
              factory?
            answer: >-
              Create a `PredictionEngine<TaxiTrip, TaxiTripFarePrediction>` via
              `mlContext.Model.CreatePredictionEngine<TIn, TOut>(model)`, then call `Predict(trip)`.
            explanation: >-
              Create a `PredictionEngine<TaxiTrip, TaxiTripFarePrediction>` via
              `mlContext.Model.CreatePredictionEngine<TIn, TOut>(model)`, then call `Predict(trip)`. It is the
              single-row inference wrapper around an `ITransformer`.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-prediction-consumption-card-03
            type: cloze
            bloom: remember
            prompt: The prediction field on an ML.NET regression output class is decorated with `[ColumnName("{{Score}}")]`.
            answer: Score
            explanation: >-
              Regression trainers write their output into a column literally named `Score`. Using
              `[ColumnName("Prediction")]` leaves the field at its default value because the binding misses.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-prediction-consumption-card-04
            type: name
            bloom: apply
            prompt: Write the two-line C# to persist `model` (an `ITransformer`) to `model.zip` using `trainingData`'s schema.
            answer: '```csharp mlContext.Model.Save(model, trainingData.Schema, "model.zip"); ``` One call.'
            explanation: >-
              ```csharp

              mlContext.Model.Save(model, trainingData.Schema, "model.zip");

              ```

              One call. Pass the model, the training `DataViewSchema`, and the path. Omitting the schema produces a zip
              that won't load correctly.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-prediction-consumption-card-05
            type: name
            bloom: apply
            prompt: You have `model.zip` on disk. Load it back into an `ITransformer` and capture its schema.
            answer: >-
              ```csharp DataViewSchema schema; ITransformer loaded = mlContext.Model.Load("model.zip", out schema); ```
              `Load` returns the transformer; the …
            explanation: |-
              ```csharp
              DataViewSchema schema;
              ITransformer loaded = mlContext.Model.Load("model.zip", out schema);
              ```
              `Load` returns the transformer; the schema comes back through the `out` parameter.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-prediction-consumption-card-06
            type: cloze
            bloom: understand
            prompt: >-
              For batch inference on an entire `IDataView`, call `model.{{Transform}}(dataView)` — not
              `CreatePredictionEngine`.
            answer: Transform
            explanation: >-
              `PredictionEngine` is the single-row path. `Transform` is the batch path: it returns a new `IDataView`
              with the `Score` column appended.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-prediction-consumption-card-07
            type: name
            bloom: understand
            prompt: Why is sharing one `PredictionEngine` across threads a bug, and what is the recommended fix for a web API?
            answer: >-
              `PredictionEngine<TIn, TOut>` is not thread-safe — concurrent `Predict` calls corrupt its internal
              buffers.
            explanation: >-
              `PredictionEngine<TIn, TOut>` is not thread-safe — concurrent `Predict` calls corrupt its internal
              buffers. Use `PredictionEnginePool<TIn, TOut>` from `Microsoft.Extensions.ML`, or give each thread its own
              engine.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-prediction-consumption-card-08
            type: name
            bloom: apply
            prompt: >-
              A teammate writes `mlContext.Model.Save(model, null, "model.zip")` and the code compiles. What breaks, and
              when?
            answer: It breaks at load time.
            explanation: >-
              It breaks at load time. Without the `DataViewSchema`, the saved zip lacks the column-name and type
              metadata ML.NET needs to reconstruct inputs, so `Load` returns a transformer that can't be bound to a
              `PredictionEngine` correctly. Always pass `trainingData.Schema`.
            example: '<!-- example: Stage 5 enrichment -->'
        name: ML.NET inference and model persistence
        source: >-
          notes/ML.NET_VS2022_SCRIPT.docx; notes/ML.NET_VSCODE_SCRIPT.docx; research-mlnet.md §PredictionEngine, §Save &
          Load
        prose: Cards for the ML.NET inference and model persistence topic.
      - id: ai-chat-completion-local
        name: Chat completion with Ollama + SLMs
        tags:
          - ai
          - slm
          - ollama
          - streaming
        prose: >-
          Ollama runs Small Language Models locally on port 11434 over HTTP. The OllamaSharp NuGet package exposes
          OllamaApiClient, which implements IChatClient from Microsoft.Extensions.AI. You feed it a List<ChatMessage>
          (each message is a ChatRole plus content) and call GetStreamingResponseAsync for token-by-token output or
          GetResponseAsync for a buffered reply. No cloud, no API key, no internet after the initial ollama pull.
        cards:
          - id: ai-chat-completion-local-card-01
            type: name
            bloom: remember
            source: research-ai.md §Ollama; §Endpoint URL Pitfalls
            explanation: >-
              Port 11434 on localhost, HTTP only. HTTPS is the GitHub Models endpoint; port 1143 is a one-digit typo
              trap.
            example: new OllamaApiClient(new Uri("http://localhost:11434/"), "phi3")
            prompt: Ollama listens on the endpoint ___ using the ___ protocol.
            answer: http://localhost:11434/ ; HTTP (not HTTPS)
          - id: ai-chat-completion-local-card-02
            type: name
            bloom: remember
            source: 'research-ai.md §Call Ollama via OllamaSharp; SLM.docx Demo #1'
            explanation: >-
              OllamaApiClient takes a Uri and a model-id string. The returned object implements IChatClient from
              Microsoft.Extensions.AI.
            example: IChatClient chatClient = new OllamaApiClient(new Uri("http://localhost:11434/"), "phi3");
            prompt: Which constructor call creates an OllamaSharp client for a local Phi-3 model?
            answer: new OllamaApiClient(new Uri("http://localhost:11434/"), "phi3")
          - id: ai-chat-completion-local-card-03
            type: name
            bloom: remember
            source: 'research-ai.md §Ollama Setup Commands; flashcard #19'
            explanation: >-
              pull downloads weights. list/show inspect what is installed. run opens an interactive REPL against a
              model.
            example: ollama pull phi3:latest
            prompt: What command downloads a model into Ollama so it can be served locally?
            answer: ollama pull <model>  (e.g. ollama pull phi3:latest)
          - id: ai-chat-completion-local-card-04
            type: name
            bloom: understand
            source: 'research-ai.md §Chat Completion; flashcard #16; MCQ #?'
            explanation: >-
              Every ChatMessage carries a ChatRole plus content. A List<ChatMessage> is the conversation history re-sent
              on each call.
            example: chatHistory.Add(new ChatMessage(ChatRole.User, userPrompt));
            prompt: >-
              The ChatMessage constructor takes two arguments: a ___ enum value (User, Assistant, or System) and the
              message ___.
            answer: ChatRole ; content (string or structured data)
          - id: ai-chat-completion-local-card-05
            type: name
            bloom: understand
            source: research-ai.md §Call Ollama via OllamaSharp; glossary §streaming
            explanation: >-
              GetStreamingResponseAsync yields ChatResponseUpdate items incrementally; GetResponseAsync blocks until the
              full response is ready.
            example: |
              await foreach (ChatResponseUpdate item in
                  chatClient.GetStreamingResponseAsync(chatHistory))
              {
                  Console.Write(item.Text);
              }
            prompt: >-
              Which IChatClient method streams the reply as ChatResponseUpdate fragments instead of returning one
              buffered response?
            answer: GetStreamingResponseAsync(chatHistory)  — iterate with await foreach
          - id: ai-chat-completion-local-card-06
            type: name
            bloom: apply
            source: 'research-ai.md §Local vs Cloud SLM; MCQ #7'
            explanation: >-
              GitHub Models and Azure OpenAI both require cloud credentials. Ollama serves a pulled SLM from localhost
              with no auth.
            example: IChatClient client = new OllamaApiClient(new Uri("http://localhost:11434/"), "phi3");
            prompt: You want a chatbot that runs with no cloud dependency and no API key. Which setup fits?
            answer: 'Use Ollama locally: new OllamaApiClient(new Uri("http://localhost:11434/"), "phi3")'
          - id: ai-chat-completion-local-card-07
            type: name
            bloom: apply
            source: 'research-ai.md §Endpoint URL Pitfalls; MCQ #2'
            explanation: >-
              A drops a digit (1143 vs 11434). B and C wrongly use HTTPS; /inference is the GitHub Models path. E
              invents a port. Only D matches the canonical course pattern.
            example: new OllamaApiClient(new Uri("http://localhost:11434/"), "phi3")
            prompt: |
              Which endpoint URL correctly connects OllamaSharp to a local Ollama server?

              A) http://localhost:1143/
              B) https://api.ollama.com
              C) https://localhost:11434/inference
              D) http://localhost:11434/
              E) http://localhost:5000/ollama
            answer: D
          - id: ai-chat-completion-local-card-08
            type: name
            bloom: understand
            source: research-ai.md §Local vs Cloud SLM trap row
            explanation: >-
              After pull, the daemon loads weights from disk and serves requests from localhost. Airplane-mode demos are
              a common lecture point.
            example: 'ollama pull phi3:latest   # only this step needs the internet'
            prompt: 'True or false: Ollama requires an internet connection to answer prompts.'
            answer: False. Internet is needed only for ollama pull to download the model; inference is fully local.
          - id: ai-chat-completion-local-card-09
            type: name
            bloom: remember
            source: research-ai.md §Endpoint URL Pitfalls (package confusion)
            explanation: >-
              The exam may test which name is the C# package. OllamaSharp = NuGet. ollama = the command-line binary you
              run to pull, list, or serve models.
            example: dotnet add package OllamaSharp
            prompt: The third-party NuGet package for the .NET Ollama client is ___ ; the CLI binary and daemon is ___ .
            answer: OllamaSharp ; ollama
          - id: ai-chat-completion-local-card-10
            type: name
            bloom: apply
            source: research-ai.md §appsettings.json for Ollama; §Call Ollama via ChatClient (Direct)
            explanation: >-
              Keeping URL and model id in config lets you switch SLMs without recompiling. The constructor signature is
              (Uri, string).
            example: |
              string url = config["OllamaUrl"];
              string modelId = config["ModelId"];
              IChatClient client = new OllamaApiClient(new Uri(url), modelId);
            prompt: >-
              Given OllamaUrl and ModelId in appsettings.json, what two values does the OllamaApiClient constructor
              consume?
            answer: A Uri built from OllamaUrl ("http://localhost:11434/") and the ModelId string (e.g. "phi3:latest").
        source: slides/SLM.pptx; notes/SLM.docx; research-ai.md §Ollama, §Chat Completion
      - id: ai-cloud-models
        name: GitHub Models + Azure OpenAI endpoints
        tags:
          - ai
          - cloud
          - auth
        prose: |
          Wiring a hosted chat endpoint in .NET reduces to three knobs: endpoint URL,
          credential object, and model name. GitHub Models uses
          `https://models.github.ai/inference` with a GitHub PAT wrapped in
          `AzureKeyCredential`, plus a vendor-prefixed model id like
          `openai/gpt-4o-mini`. Azure OpenAI uses your resource URL and a deployment
          name. Both reuse the same credential class despite the misleading name.
        cards:
          - id: ai-cloud-models-card-01
            type: name
            bloom: remember
            source: notes/AI-Models_MAF_SCRIPT.docx
            prompt: What is the GitHub Models inference endpoint URL?
            answer: https://models.github.ai/inference
            explanation: HTTPS, and the `/inference` path is required. Dropping the path breaks routing.
            example: |
              ```json
              "ApiEndpoint": "https://models.github.ai/inference"
              ```
          - id: ai-cloud-models-card-02
            type: name
            bloom: remember
            source: notes/AI-Models_MAF_SCRIPT.docx
            prompt: Which credential class authenticates GitHub Models calls from the OpenAI SDK?
            answer: '`AzureKeyCredential(token)`'
            explanation: >-
              Despite the `Azure` prefix, this class wraps any bearer token. No `GithubCredential` type exists in the
              SDK.
            example: |
              ```csharp
              new AzureKeyCredential(config["GitHub:Token"]!)
              ```
          - id: ai-cloud-models-card-03
            type: name
            bloom: remember
            source: notes/AI-Models_MAF_SCRIPT.docx
            prompt: Which credential type does a GitHub Models `ChatClient` require?
            answer: '`AzureKeyCredential(token)`'
            explanation: >-
              `AzureKeyCredential` is reused for GitHub PATs. The other three are distractors — none exist in this SDK
              context.
            example: |
              ```csharp
              IChatClient chatClient = new ChatClient(
                  model,
                  new AzureKeyCredential(apiKey!),
                  new OpenAIClientOptions { Endpoint = new Uri(endpoint) }
              ).AsIChatClient();
              ```
          - id: ai-cloud-models-card-04
            type: name
            bloom: apply
            source: notes/AI-Models_MAF_SCRIPT.docx
            prompt: >-
              Complete the `ChatClient` wiring for GitHub Models: `new ChatClient(model, new ___(apiKey!), new
              OpenAIClientOptions { Endpoint = new Uri(endpoint) }).___();`
            answer: '`AzureKeyCredential`; `AsIChatClient`'
            explanation: >-
              `AzureKeyCredential` carries the PAT. `.AsIChatClient()` adapts the OpenAI `ChatClient` to
              `Microsoft.Extensions.AI`'s `IChatClient` so MAF can consume it.
            example: |
              ```csharp
              IChatClient chatClient = new ChatClient(
                  "openai/gpt-4o-mini",
                  new AzureKeyCredential(token),
                  new OpenAIClientOptions { Endpoint = new Uri("https://models.github.ai/inference") }
              ).AsIChatClient();
              ```
          - id: ai-cloud-models-card-05
            type: name
            bloom: apply
            source: notes/AI-Models_MAF_SCRIPT.docx
            prompt: Which model-id string is correctly formatted for GitHub Models?
            answer: '`openai/gpt-4o-mini`'
            explanation: >-
              GitHub Models routes through vendor-prefixed ids. `openai/` identifies the publisher; the bare name gets
              rejected.
            example: |
              ```json
              "Model": "openai/gpt-4o-mini"
              ```
          - id: ai-cloud-models-card-06
            type: name
            bloom: remember
            source: notes/AI-Models_MAF_SCRIPT.docx
            prompt: Which `appsettings.json` keys store the GitHub Models configuration?
            answer: '`GitHub:Token`, `GitHub:ApiEndpoint`, `GitHub:Model`'
            explanation: >-
              The PAT lives under `GitHub:Token`. Endpoint and model id live alongside it so `config[...]` binding stays
              tidy.
            example: |
              ```json
              {
                "GitHub": {
                  "Token": "PUT-GITHUB-PERSONAL-ACCESS-TOKEN-HERE",
                  "ApiEndpoint": "https://models.github.ai/inference",
                  "Model": "openai/gpt-4o-mini"
                }
              }
              ```
          - id: ai-cloud-models-card-07
            type: name
            bloom: apply
            source: notes/AI-Models_MAF_SCRIPT.docx; slides/CSharp_Meets_AI.pptx
            prompt: >-
              You need to differentiate a GitHub Models endpoint from a local Ollama endpoint in code review. Which pair
              is correct?
            answer: 'GitHub: `https://models.github.ai/inference`; Ollama: `http://localhost:11434/`'
            explanation: >-
              GitHub is HTTPS with `/inference`. Ollama is HTTP on port `11434` with no path. Common traps: dropping
              `/inference`, typoing `1143` for `11434`, or swapping protocols.
            example: |
              ```csharp
              // GitHub Models
              new Uri("https://models.github.ai/inference");
              // Ollama (local)
              new Uri("http://localhost:11434/");
              ```
        source: notes/AI-Models_MAF_SCRIPT.docx; research-ai.md §Call GitHub Models, §Call Azure OpenAI
      - id: ml-automl-cli
        cards:
          - id: ml-automl-cli-card-01
            type: cloze
            tags:
              - ml-net
              - automl
              - naming
            prompt: >-
              The ML.NET AutoML command-line tool is named {{`mlnet`}} (lowercase, no dot); the framework it targets is
              written {{`ML.NET`}} (uppercase, dotted).
            answer: mlnet
            explanation: >-
              The CLI and the framework have different casing. `mlnet` is installed via `dotnet tool install -g
              mlnet-win-x64` (swap the suffix for `osx-x64` or `linux-x64`).
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-automl-cli-card-02
            type: name
            tags:
              - ml-net
              - automl
              - cli
            prompt: >-
              What does this command do? `mlnet regression --dataset taxi-fare-train.csv --label-col 6 --train-time 60
              --has-header true`
            answer: Runs AutoML for a regression task on `taxi-fare-train.csv`, predicts the column at index 6, explores …
            explanation: >-
              Runs AutoML for a regression task on `taxi-fare-train.csv`, predicts the column at index 6, explores 40+
              algorithm/hyperparameter combinations for 60 seconds, and emits a console project wired to the best model.
              `--has-header true` says the CSV starts with a header row.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-automl-cli-card-03
            type: cloze
            tags:
              - ml-net
              - automl
              - flags
            prompt: >-
              The `--label-col` flag accepts either a 0-based {{index}} (e.g. `6`) or a column {{name}} (e.g.
              `FareAmount`).
            answer: index
            explanation: >-
              Use the index when the header text is uncertain or missing — passing a name that does not match the CSV
              header causes silent failure.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-automl-cli-card-04
            type: name
            tags:
              - ml-net
              - automl
              - flags
            prompt: Which `mlnet` flag sets the exploration budget, and what are its units?
            answer: '`--train-time`, in seconds.'
            explanation: >-
              `--train-time`, in seconds. A larger value generally surfaces better models, but returns diminish —
              doubling from 60 to 120 seconds rarely doubles RSquared.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-automl-cli-card-05
            type: name
            tags:
              - ml-net
              - automl
              - output
            prompt: After `mlnet regression` finishes, what artifact does it emit?
            answer: A full console project — source files, a `.csproj`, and a `.zip` model — wired …
            explanation: >-
              A full console project — source files, a `.csproj`, and a `.zip` model — wired to the winning pipeline.
              You run it with `dotnet run`. The CLI does not emit a bare model file on its own.
            example: '<!-- example: Stage 5 enrichment -->'
          - id: ml-automl-cli-card-06
            type: cloze
            tags:
              - ml-net
              - automl
              - pitfall
            prompt: >-
              AutoML explores {{40+}} regression variants within the `--train-time` budget and ranks them; the ``top-5``
              list is {{not guaranteed to be globally optimal}}.
            answer: 40+
            explanation: >-
              AutoML searches the algorithm + hyperparameter space it has time to reach. Larger `--train-time` explores
              more combinations, but the winner is only the best model AutoML happened to try.
            example: '<!-- example: Stage 5 enrichment -->'
