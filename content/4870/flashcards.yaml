            prompt: "Custom Tag Helpers inherit {{TagHelper}}"
            answer: "TagHelper"
          - id: html-target-element-attribute
            type: cloze
            bloom: remember
            source: "ToonTag.cs"
            prompt: "Register element name: `[{{HtmlTargetElement}}(\"toon\")]`"
            answer: "HtmlTargetElement"
          - id: process-async-override
            type: name
            bloom: apply
            source: "ToonTag.cs"
            prompt: "Override method name for processing:"
            answer: "ProcessAsync"
          - id: output-attributes-setattribute
            type: cloze
