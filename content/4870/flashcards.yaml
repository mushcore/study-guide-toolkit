  - id: module-11-reporting
    name: "Reporting (Excel, PDF, Chart)"
    topics:
      - id: reporting-excel-pdf-chart
        name: "ClosedXML + iText7 + Chart.js"
        tags: [excel, pdf, chart, reporting]
        prose: "ClosedXML: `Cell(row, col)` is 1-based; `Cell(1, 1)` = A1. Write to cells, call `SaveAs(path)`. iText7: `PdfWriter(MemoryStream)` → `PdfDocument` → `Document`. After closing, `ms.Position = 0` before returning (writer advances position to end). Chart.js via CDN: `new Chart(ctx, { type: 'pie', data: {...} })`."
        source: "Labs/w13/FifaWorldCup"
        cards:
          - id: closedxml-indexing
            type: cloze
            bloom: remember
            source: "Excel.cshtml.cs"
            prompt: "ClosedXML `worksheet.Cell({{1}}, {{1}})` = Excel cell {{A1}} (1-based)"
            answer: "1, 1, A1"
          - id: pdf-memorystream-rewind
            type: name
            bloom: analyze
            source: "PdfReport.cshtml.cs"
            prompt: "iText7 handler returns zero-byte PDF. What's missing?"
            answer: "`ms.Position = 0` after `document.Close()` and before returning the stream (writer advances position to end)"
          - id: chart-js-constructor
            type: cloze
            bloom: apply
            source: "Chart.cshtml"
            prompt: "Chart.js: `new Chart(ctx, { {{type}}: 'pie', {{data}}: { labels: ..., datasets: [...] } })`"
            answer: "type, data"
          - id: razor-colon-directive
            type: name
            bloom: understand
            source: "Chart.cshtml"
            prompt: "In `<script>`, `@:Counts.push(@item.Count);` — what does `@:` do?"
            answer: "Forces the whole line to be Razor + JavaScript mixed (without it, Razor interprets the line and breaks syntax)"
