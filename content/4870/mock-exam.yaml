  # ============================================================
  # Tag Helpers bucket — 3 questions (3 marks of 80)
  # ============================================================

  - id: mq-th-01
    type: MCQ
    topic: "Tag Helper attribute naming"
    marks: 1
    question: "A Tag Helper has `public string? FontFamily { get; set; }`. The page author writes `<toon fontfamily=\"arial\">`. What happens?"
    choices:
      - "The `FontFamily` property is set to `\"arial\"`"
      - "The `FontFamily` property stays null; Razor expects `font-family=\"arial\"` (kebab-case)"
      - "A runtime exception is thrown"
      - "The attribute is passed through unchanged to the rendered HTML"
    correct: 1
    rationale: "Razor auto-translates PascalCase C# properties to kebab-case HTML attributes. `FontFamily` → `font-family`. The `fontfamily` (all lowercase, no hyphen) doesn't match, so the property stays at its default (null for string). No exception; the Tag Helper simply runs with an unset property. Option A is the common misconception — `fontfamily` \"looks close enough\" but the kebab-case rule is strict."
    source: "research-taghelpers-blazor.md"
    bloom: analyze

  - id: mq-th-02
    type: MCQ
    topic: "Tag Helper registration location"
    marks: 1
    question: "Where do you register a custom Tag Helper so it's available to every Razor page in your app?"
    choices:
      - "In each `.cshtml` page via `@taghelper`"
      - "In `Program.cs` via `builder.Services.AddTagHelpers<T>()`"
      - "In `_ViewImports.cshtml` via `@addTagHelper *, AssemblyName`"
      - "In `appsettings.json` under `TagHelpers:*`"
    correct: 2
    rationale: "`_ViewImports.cshtml` is the central file Razor reads for per-directory Tag Helper registration. `@addTagHelper *, AssemblyName` imports every Tag Helper from the assembly. Option A would work if `@taghelper` were a real directive; it isn't. Option B fabricates an `AddTagHelpers` method. Option D invents a config section; Tag Helpers are not DI-registered, they're Razor-registered via the view-imports file."
    source: "research-taghelpers-blazor.md"
    bloom: remember

  - id: mq-th-03
    type: MCQ
    topic: "ProcessAsync vs Process"
    marks: 1
    question: "Your Tag Helper fetches data from an HTTP API. Which override do you use?"
    choices:
      - "`public override void Process(TagHelperContext context, TagHelperOutput output)` with `.Result` on the task"
      - "`public override async Task ProcessAsync(TagHelperContext context, TagHelperOutput output)` with `await`"
      - "`public override string Render(TagHelperContext context)` returning the HTML"
      - "Either works identically"
    correct: 1
    rationale: "Override `ProcessAsync` for any Tag Helper that awaits. Option A blocks on `.Result`, which can deadlock in the Razor render pipeline and kills performance under load. Option C fabricates a `Render` method; the real output mechanism is mutating `output` inside the override. Option D is dangerous — sync `.Result` in Razor can deadlock, so the two forms are not interchangeable when async work is involved."
    source: "notes/TagHelpers_SCRIPT.docx; research-taghelpers-blazor.md"
    bloom: apply

  # ============================================================
  # Blazor QuickGrid bucket — 2 questions (2 marks of 80)
  # ============================================================

  - id: mq-blazor-01
    type: MCQ
    topic: "TemplateColumn sorting"
    marks: 1
    question: "`<TemplateColumn Title=\"Name\" Sortable=\"true\">` renders correctly but the header doesn't sort when clicked. Why?"
    choices:
      - "`TemplateColumn` is not a valid QuickGrid component"
      - "`TemplateColumn` ignores `Sortable`; you must supply `SortBy=\"@someGridSort\"` instead"
      - "Sorting requires the page to be `@rendermode InteractiveWebAssembly`"
      - "QuickGrid doesn't support sorting on computed columns"
    correct: 1
    rationale: "`PropertyColumn` infers the sort key from its `Property` expression, so `Sortable=\"true\"` is enough. `TemplateColumn` renders arbitrary markup — QuickGrid cannot guess what to sort by. You must supply `SortBy=\"@GridSort<T>.ByAscending(x => x.Field)\"`. Option A is false. Option C is false — InteractiveServer also sorts fine. Option D is false — QuickGrid supports sort on any expression you provide."
    source: "research-taghelpers-blazor.md"
    bloom: analyze

  - id: mq-blazor-02
    type: MCQ
    topic: "QuickGrid live filter binding"
    marks: 1
    question: "An input `<input @bind=\"_filter\" />` tied to a computed `IQueryable` filter appears not to update the grid until the user tabs out of the input. What's the minimal fix?"
    choices:
      - "Add `@onkeyup=\"StateHasChanged\"`"
      - "Add `@bind:event=\"oninput\"`"
      - "Call `InvokeAsync(StateHasChanged)` manually"
      - "Wrap the grid in a `<CascadingValue>`"
    correct: 1
    rationale: "The default `@bind` event is `onchange`, which fires on focus loss. `@bind:event=\"oninput\"` changes it to fire per keystroke. Option A adds an extra handler that works but is redundant — `@bind` already triggers a re-render. Option C is also redundant; @bind's round-trip already calls StateHasChanged. Option D is unrelated — CascadingValue shares state across components, not the issue here."
    source: "notes/BlazorServer_QuickGrid.docx"
    bloom: apply

