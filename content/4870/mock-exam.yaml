  - id: mq-quickgrid-02
    type: MCQ
    topic: "Live filter binding"
    marks: 1
    question: "Why does the W07 lab pair `@bind=\"FilterValue\"` with `@bind:event=\"oninput\"`?"
    choices:
      - "Performance optimization"
      - "`@bind` alone defaults to `onchange` which only fires on focus loss â€” `oninput` fires on each keystroke for live filtering"
      - "Required by `QuickGrid` framework"
      - "To enable server-side validation"
