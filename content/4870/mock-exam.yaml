    question: |
      Match each item in **Column A** to the correct description in **Column B**. Write your answer as `1→X, 2→X, ...`

      | # | Column A | # | Column B |
      |---|----------|---|----------|
      | 1 | `ApiKeyCredential` | A | ML.NET — renames a column to the trainer's hardcoded target name |
      | 2 | `IChatCompletionService` | B | Aspire — creates the distributed application orchestrator builder |
      | 3 | `IChatClient` | C | gRPC — generated server base class (one per proto service) |
      | 4 | `.AsAIAgent(name, instructions)` | D | xUnit — parameterized test; one execution per data row |
      | 5 | `CopyColumns("Label", "FareAmount")` | E | Semantic Kernel — interface for `GetStreamingChatMessageContentsAsync` |
      | 6 | `ITransformer` | F | MAF — extension that wraps `IChatClient` as an AI agent |
      | 7 | `syntax = "proto3";` | G | SK / GitHub Models — `System.ClientModel` auth credential class |
      | 8 | `StudentRemote.StudentRemoteBase` | H | OllamaSharp — `Microsoft.Extensions.AI` chat interface |
      | 9 | `DistributedApplication.CreateBuilder` | I | `.proto` — mandatory syntax declaration (first line) |
