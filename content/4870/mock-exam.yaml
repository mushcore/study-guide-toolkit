    question: "What does `AIFunctionFactory.Create(methodRef, name: \"X\", description: \"Y\")` return?"
    choices:
      - "A `ChatClientAgent`"
      - "An `AITool` ready to register on an agent"
      - "A `ChatMessage`"
      - "A `KernelFunction`"
    correct: 1
    rationale: "The factory produces an `AITool` — MAF's runtime representation of a callable function. Option A confuses the output with the container that consumes it (agents hold lists of AITools). Option C confuses it with a conversation-turn type. Option D confuses MAF with Semantic Kernel, which uses `KernelFunction`/`[KernelFunction]` instead — the two SDKs do not interop at the type level."
