  - id: mq-pdf-01
    type: MCQ
    topic: "iText MemoryStream position"
    marks: 1
    question: "Your PDF handler writes into a `MemoryStream`, then returns `new FileStreamResult(ms, \"application/pdf\")`. The download is a 0-byte file. What's the fix?"
    choices:
      - "Change the MIME type to `application/octet-stream`"
      - "Set `ms.Position = 0` before constructing the FileStreamResult"
      - "Call `ms.Flush()` before returning"
      - "Use `new MemoryStream(ms.ToArray())` to copy the buffer"
    correct: 1
    rationale: "After writing, MemoryStream's position sits at the end. FileStreamResult reads from current position, finds zero bytes, delivers an empty file. Rewinding fixes it. Option A changes the MIME but still streams zero bytes. Option C (`Flush`) is a no-op for MemoryStream. Option D would work (materializes bytes at position 0) but allocates twice; simpler to rewind. Alternative: `return File(ms.ToArray(), mime, name)` is position-insensitive."
    source: "research-excel-pdf-chart.md"
    bloom: analyze

  - id: mq-chart-01
    type: MCQ
    topic: "Razor @: directive"
    marks: 1
    question: "Inside a Razor `<script>` block iterating `Model.ChartData`, how do you emit a JavaScript `push` call per iteration?"
    choices:
      - "`@foreach (var x in Model.ChartData) { labels.push('@x.Name'); }`"
      - "`@foreach (var x in Model.ChartData) { @:labels.push('@x.Name'); }`"
      - "`@foreach (var x in Model.ChartData) { Html.Raw(\"labels.push('\" + x.Name + \"');\") }`"
      - "`<@foreach (var x in Model.ChartData)>labels.push('@x.Name');</foreach>`"
    correct: 1
    rationale: "The `@:` directive tells Razor to treat a line as literal output with `@`-expression substitutions. Without it, Razor tries to parse the whole line as C# and errors or produces malformed JS. Option A writes C# that calls a JS method — nonsense at compile time. Option C uses `Html.Raw` but stacks too much ceremony; `@:` is idiomatic. Option D invents XML-like Razor syntax that doesn't exist."
    source: "research-excel-pdf-chart.md §Chart.js"
    bloom: apply

