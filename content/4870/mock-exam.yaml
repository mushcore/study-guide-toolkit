      - "The first registered tool always runs first"
      - "The framework invokes only tools whose name appears in the input"
    correct: 1
    rationale: "MAF agents are agentic — the underlying LLM reasons about the user input and decides which tools, if any, to call. Option A would make tools meaningless (why register more than one?). Option C misses that the LLM decides order based on the task. Option D describes keyword matching, which is not what MAF does — the description metadata is passed to the LLM so it can match on semantic intent, not literal tool names in user input."
    source: "research-ai.md §MAF MCQ #6"
    bloom: understand

