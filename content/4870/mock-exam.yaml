  - id: mq-cache-01
    type: MCQ
    topic: "IMemoryCache vs IDistributedCache"
    marks: 1
    question: "An ASP.NET Core app caches product data with `IMemoryCache`. After scaling from 1 to 3 servers behind a load balancer, users report seeing different product lists. Why?"
    choices:
      - "IMemoryCache uses weak references"
      - "The load balancer corrupts cache keys"
      - "Each server holds its own separate in-memory cache — data isn't shared"
      - "IMemoryCache caches everything with the same key"
    correct: 2
    rationale: "`IMemoryCache` is per-process. Three servers = three separate caches. A write on Server A is invisible to Server B. Option A invents weak-reference behavior (IMemoryCache uses strong references with optional Size-based eviction). Option B is nonsense — load balancers pass requests through unchanged. Option D is false — cache keys are user-supplied and distinct. Fix: switch to `IDistributedCache` backed by Redis, or configure sticky sessions."
    source: "notes/DataCache_SCRIPT.docx; research-cache.md MCQ #1"
    bloom: analyze
    tags: [pretest]

  - id: mq-cache-02
    type: MCQ
    topic: "Cache expiration combination"
    marks: 1
    question: "A cache entry has `AbsoluteExpiration = now + 50s` and `SlidingExpiration = 20s`. At t=15s the entry is accessed. When does it expire (assuming no further access)?"
    choices:
      - "At t=50s (absolute deadline)"
      - "At t=35s (15s + 20s sliding window from the access)"
      - "At t=65s (50s absolute + 20s extension)"
      - "Never — sliding access resets it"
    correct: 1
    rationale: "The combined expiration is `min(absolute, idle-since-last-access + sliding)`. Last access at t=15 resets the sliding timer to fire at t=35. Absolute fires at t=50. Min is t=35, so the entry dies then. If an ADDITIONAL access happened later — say at t=25, extending sliding to t=45 — absolute at t=50 would then be the binding constraint. Option A ignores the sliding timer entirely. Option C adds the two windows (wrong mental model). Option D misses that absolute is a hard ceiling."
    source: "notes/DataCache_SCRIPT.docx; research-cache.md §4"
    bloom: apply

  - id: mq-cache-03
    type: MCQ
    topic: "CacheItemPriority semantics"
    marks: 1
    question: "What does `CacheItemPriority.Low` on a cache entry mean?"
    choices:
      - "The entry expires 5 minutes sooner than `Normal`"
      - "The entry is evicted first when the cache is under memory pressure"
      - "The entry is stored with lower compression"
      - "The entry is only cached when the server is idle"
    correct: 1
    rationale: "Priority controls eviction order, not expiration. A Low-priority entry with a 1-hour absolute expiration still lives 1 hour unless memory pressure forces eviction. `NeverRemove` excludes from auto-eviction entirely; `High` is kept longer under pressure. Option A invents a time-based effect. Option C invents compression behavior. Option D invents scheduling behavior."
    source: "research-cache.md §Exam Traps trap 7"
    bloom: understand

  - id: mq-cache-04
    type: MCQ
    topic: "TryGetValue syntax"
    marks: 1
    question: "Which is the correct syntax to check for a cache entry and receive it into `product`?"
    choices:
      - "`if (_cache.TryGetValue(\"key\", product)) { ... }`"
      - "`if (_cache.TryGetValue<Product>(\"key\", out var product)) { ... }`"
      - "`var product = _cache.TryGetValue<Product>(\"key\");`"
      - "`if (_cache.ContainsKey(\"key\")) { var product = _cache[\"key\"]; }`"
    correct: 1
    rationale: "`TryGetValue` returns `bool` and takes an `out` parameter. Option A misses `out`. Option C treats it as returning the value directly — it returns `bool`. Option D invents a `ContainsKey` method (it's common on Dictionary, not on IMemoryCache) plus indexer access, which doesn't exist either. The `out var` pattern introduces the variable with inferred type in the same line."
    source: "research-cache.md §Exam Traps trap 2"
    bloom: remember

  - id: mq-cache-05
    type: MCQ
    topic: "Redis Docker port"
    marks: 1
    question: "Which Docker command starts a Redis container listening on its conventional port?"
    choices:
      - "`docker run --name redis -d -p 6380:6379 redis`"
      - "`docker run --name redis -d -p 6379:6379 redis`"
      - "`docker run --name redis -p 11434:11434 redis`"
      - "`docker run redis:latest --detached --port 6379`"
    correct: 1
    rationale: "Redis's standard port is 6379. `-p 6379:6379` maps host port to container port, both 6379. Option A remaps the host port to 6380, which means clients configured for 6379 won't find it. Option C uses Ollama's port (11434) — wrong service. Option D uses non-existent flag names (`--detached --port`); the real flags are `-d` and `-p host:container`."
    source: "notes/redis_SCRIPT.docx; research-cache.md §6"
    bloom: remember

  - id: mq-cache-06
    type: MCQ
    topic: "Redis SETEX"
    marks: 1
    question: "In the Redis CLI, `SETEX temp 10 \"hello\"` does what?"
    choices:
      - "Sets `temp` to `hello` with a 10-byte size limit"
      - "Sets `temp` to `hello` and schedules deletion in 10 seconds"
      - "Sets `temp` to `hello` and schedules deletion in 10 minutes"
      - "Sets `temp` only if it doesn't exist, with key named `10`"
    correct: 1
