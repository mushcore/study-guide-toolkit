  - id: mq-cache-06
    type: MCQ
    topic: "AbortOnConnectFail behavior"
    marks: 1
    question: "`AbortOnConnectFail = false` (default) — Redis not running. What happens?"
    choices:
      - "App crashes immediately"
      - "Cache writes silently no-op; reads return null"
      - "Framework spawns local Redis"
      - "Writes fall back to in-process memory"
      - "Writes succeed; Redis syncs later when available"
    correct: 1
    rationale: "Default `false` → Stack Exchange Redis retries in background and swallows failures. Cache writes succeed with no exception but nothing lands in Redis. `true` crashes fast so orchestrators restart the container."
    source: "code-examples/20260330_WebApiFIFA_REDIS_Final/WebApiFIFA_REDIS_Final/Program.cs"
    bloom: analyze

  - id: mq-cache-07
