  - id: mq-excel-01
    type: MCQ
    topic: "ClosedXML indexing"
    marks: 1
    question: "In ClosedXML, which call addresses the top-left cell A1?"
    choices:
      - "`worksheet.Cell(0, 0)`"
      - "`worksheet.Cell(1, 1)`"
      - "`worksheet.Cell(\"A\", 1)`"
      - "`worksheet.Cell[0][0]`"
    correct: 1
    rationale: "ClosedXML cells are 1-based, matching Excel's UI (row 1, column A). Option A treats cells as 0-based like C# arrays — produces either an exception or silent no-op depending on the version. Option C invents a string-based overload. Option D is indexer syntax that ClosedXML doesn't expose. If your data loop starts at row 2 (row 1 is headers), your counter starts at 2, not 0 or 1."
    source: "Labs/W13 Excel, PDF, Chart cocktail; research-excel-pdf-chart.md"
