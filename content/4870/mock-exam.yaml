  - id: mq-cache-03
    type: MCQ
    topic: "MemoryCacheEntryOptions expiration"
    marks: 1
    question: "`new MemoryCacheEntryOptions { AbsoluteExpiration = DateTime.Now.AddSeconds(50), SlidingExpiration = TimeSpan.FromSeconds(20) }`. The entry is never accessed after being set. When does it expire?"
    choices:
      - "At t+50 seconds"
      - "At t+20 seconds â€” sliding expiration fires since no access reset it"
      - "It never expires because Priority wasn't set"
      - "Immediately â€” both options conflict"
    correct: 1
    rationale: "The entry dies at `min(absolute, idle-since-last-access + sliding)`. With no access, sliding at t+20 fires first. If accessed at t+15, sliding resets and absolute at t+50 would eventually win."
    source: "code-examples/20260330_DataCacheDemo/DataCacheDemo/Pages/Index.cshtml.cs"
    bloom: analyze

  - id: mq-cache-04
    type: MCQ
    topic: "Priority semantics"
    marks: 1
    question: "What does `CacheItemPriority.Low` mean for a cached entry?"
    choices:
      - "The entry expires sooner than `Normal` entries"
      - "The entry is evicted first when the cache is under memory pressure"
      - "The entry is stored on disk instead of in memory"
      - "The entry is only visible to admin users"
    correct: 1
    rationale: "Priority controls EVICTION order under memory pressure, not TTL. A `Low`-priority entry with a 1-hour absolute still lives 1 hour unless memory pressure forces eviction."
    source: "code-examples/20260330_DataCacheDemo/DataCacheDemo/Pages/Index.cshtml.cs"
    bloom: understand

