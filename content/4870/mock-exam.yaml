  # ============================================================
  # CODING — 1 question (5 marks)
  # ============================================================

  - id: mq-code-01
    type: SHORT
    topic: "Coding — gRPC server override"
    marks: 5
    question: |
      The proto file defines:

      ```
      syntax = "proto3";
      service StudentRemote {
        rpc GetStudentInfo (StudentLookupModel) returns (StudentModel);
      }
      message StudentLookupModel { int32 id = 1; }
      message StudentModel {
        int32 id = 1;
        string first_name = 2;
        string last_name = 3;
      }
      ```

      `StudentsService` inherits the correct base class. An injected `_db` is an EF Core `DbContext` with `DbSet<Student> Students`. `Student` has `Id` (int), `FirstName` (string), `LastName` (string).

      **Write ONLY the `GetStudentInfo` override** — complete method signature and body.
    correct: |
      ```csharp
      public override Task<StudentModel> GetStudentInfo(
          StudentLookupModel request, ServerCallContext context)
      {
          var student = _db.Students.FirstOrDefault(s => s.Id == request.Id);
          var reply = new StudentModel
          {
              Id = student.Id,
              FirstName = student.FirstName,
              LastName = student.LastName
          };
          return Task.FromResult(reply);
      }
      ```

      Key marks:
      - Correct signature: `(StudentLookupModel request, ServerCallContext context)` returning `Task<StudentModel>`
      - Access `request.Id` (proto field → C# property)
      - Build `StudentModel` with proto field names (snake_case → PascalCase C# properties)
      - Return `Task.FromResult(reply)` for sync body
    rationale: "Override must match `(Request, ServerCallContext) → Task<Response>`. Proto snake_case fields (`first_name`) map to PascalCase C# properties (`FirstName`). Sync body uses `Task.FromResult`. `ServerCallContext` is mandatory even if unused."
    source: "Labs/W09 gRPC/GrpcBasics/GrpcStudentsServer/Services/StudentsService.cs"
    bloom: apply
