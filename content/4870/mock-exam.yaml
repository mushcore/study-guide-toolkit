  - id: mq-ai-01
    type: MCQ
    topic: "Microsoft Agent Framework"
    marks: 1
    question: "Which extension method wraps an `IChatClient` into a Microsoft Agent Framework agent?"
    choices:
      - ".AsAgent()"
      - ".AsAIAgent()"
      - ".ToAgent()"
      - ".CreateAgent()"
    correct: 1
    rationale: "`.AsAIAgent()` is the only real method. `.AsAgent()` is the single most common exam distractor — it does not exist in MAF. `.ToAgent()` and `.CreateAgent()` are also fabrications meant to confuse learners who remember \"something starts with As\" or \"something ends with Agent\". MAF's API is deliberately specific: the `AI` prefix distinguishes it from other agent frameworks in the ecosystem."
    source: "notes/AI-Models_MAF_SCRIPT.docx; research-ai.md §MAF"
    bloom: remember
    tags: [pretest]

  - id: mq-ai-02
