      - "`builder.Services.AddStackExchangeRedisCache(options => { options.Configuration = \"localhost\"; options.ConfigurationOptions = new ConfigurationOptions { AbortOnConnectFail = true, EndPoints = { options.Configuration } }; });`"
      - "`builder.Services.AddDistributedCache(\"redis://localhost:6379\");`"
      - "`builder.Services.AddRedisClient(\"localhost\");`"
      - "`builder.Services.AddRedisDistributed(\"localhost\");`"
