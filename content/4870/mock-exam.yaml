      - "Cache writes silently no-op; reads return null"
      - "The framework spawns a local Redis instance automatically"
      - "Writes fall back to in-process memory"
    correct: 1
    rationale: "Default `false` means Stack Exchange Redis retries in the background and swallows failures. Cache writes succeed with no exception but no data lands in Redis. `true` crashes fast so orchestrators (containers) replace the unhealthy app."
