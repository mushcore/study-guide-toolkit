  - id: mq-mlnet-01
    type: MCQ
    topic: "ML.NET Fit() return type"
    marks: 1
    question: "What does `pipeline.Fit(trainingData)` return?"
    choices:
      - "`IDataView`"
      - "`ITransformer`"
      - "`TrainingMetrics`"
      - "`MLContext`"
    correct: 1
    rationale: "`Fit` produces the trained model as an `ITransformer` — stateless, serializable, and ready to either evaluate or wrap in a `PredictionEngine`. Option A is the type of the INPUT (training data), not the output. Option C is what `Regression.Evaluate` returns, not `Fit`. Option D is the root container you create at step 1, not what `Fit` returns. This argument-type confusion is one of the most-tested traps."
    source: "slides/ML.NET.pptx; research-mlnet.md §Exam Traps"
    bloom: remember
    tags: [pretest]

  - id: mq-mlnet-02
    type: MCQ
    topic: "ML.NET Features column name"
    marks: 1
    question: "Why does `mlContext.Transforms.Concatenate(outputColumnName: \"Inputs\", ...)` cause regression trainers to fail?"
    choices:
      - "The column `Inputs` is too short — names must be at least 6 characters"
      - "ML.NET trainers look up the input vector by the literal name `\"Features\"` — any other name breaks the lookup"
      - "Concatenate requires the output column name to match the first input column"
      - "`\"Inputs\"` is a reserved keyword in ML.NET"
    correct: 1
    rationale: "`\"Features\"` is the hardcoded name regression and classification trainers look up at `Fit()` time. The same convention applies to the label column (`\"Label\"`). Option A invents a length rule that doesn't exist. Option C invents a matching rule — Concatenate names are entirely your choice except that the OUTPUT must be `\"Features\"`. Option D calls `\"Inputs\"` reserved, which is not true."
    source: "research-mlnet.md §Exam Traps trap 6"
    bloom: understand

  - id: mq-mlnet-03
    type: MCQ
    topic: "ML.NET pipeline ordering"
    marks: 1
    question: "Your pipeline is: `FastTree()` → `OneHotEncoding(...)` → `Concatenate(\"Features\", ...)` → `CopyColumns(\"Label\", \"FareAmount\")`. Why does training fail?"
    choices:
      - "`FastTree()` must be the last step; it's at the beginning"
      - "`CopyColumns` is not a valid ML.NET transform"
      - "The pipeline missing `hasHeader: true`"
      - "FastTree doesn't support regression"
    correct: 0
    rationale: "Pipelines execute in order, and the trainer (FastTree here) always sits at the end because it consumes the `Features` and `Label` columns that earlier transforms produce. Putting it first means no features exist when it runs. Option B is false — `CopyColumns` is real and is how you typically name the target column `\"Label\"`. Option C names an argument to `LoadFromTextFile`, not a pipeline step. Option D is false — FastTree is the default regression trainer."
    source: "research-mlnet.md §Training Pipeline Anatomy"
    bloom: analyze

  - id: mq-mlnet-04
    type: MCQ
    topic: "ML.NET one-hot encoding"
    marks: 1
    question: "You apply `OneHotEncoding` to three text columns: `VendorId`, `RateCode`, `PaymentType`. Then your `Concatenate(\"Features\", ...)` lists only `VendorIdEncoded`, `PassengerCount`, and `TripDistance`. What's the effect?"
    choices:
      - "The pipeline fails to compile"
      - "`RateCode` and `PaymentType` never reach the trainer — they're silently dropped"
      - "The trainer auto-includes the missing encoded columns"
      - "The pipeline defaults to using the raw text columns instead"
    correct: 1
    rationale: "Concatenate picks exactly the inputs you list. Encoded outputs that aren't in the list simply don't reach the trainer — the pipeline compiles and trains, just on fewer features. This is a silent-bug class: the model looks reasonable but has less signal than you expected. Option A is wrong — no compile error. Option C is wrong — ML.NET does no auto-include. Option D is wrong — raw text columns never reach the trainer because they weren't concatenated either."
    source: "research-mlnet.md §Exam Traps"
    bloom: analyze

  - id: mq-mlnet-05
    type: MCQ
    topic: "ML.NET metrics"
    marks: 1
    question: "A regression model reports `RSquared = 0.89` and `RootMeanSquaredError = 3.3`. How do you interpret these for predicting taxi fare in dollars?"
    choices:
      - "The model is 89% accurate with an average error of 3.3%"
      - "The model explains 89% of variance in fares, with average prediction error around $3.30"
      - "The model has 89% precision and 3.3% recall"
      - "The model needs retraining because RMSE is above 1"
    correct: 1
    rationale: "RSquared is the fraction of variance explained (unitless, 0-1). RMSE is in the label's original units — dollars here, because `FareAmount` is in dollars. Option A conflates RSquared with accuracy (which is a classification metric) and misinterprets RMSE as a percentage. Option C is classification-only terminology. Option D invents an absolute threshold; RMSE meaning depends on the scale of the data (3.3 dollars is fine for fare amounts that average ~$15)."
    source: "research-mlnet.md §Evaluation Metrics MCQ #4"
    bloom: understand
    tags: [pretest]

  - id: mq-mlnet-06
    type: MCQ
    topic: "ML.NET PredictionEngine"
    marks: 1
    question: "You loaded a saved model and want to predict the fare for one new `TaxiTrip`. Which call is correct?"
    choices:
      - "`model.Predict(trip)`"
      - "`var engine = mlContext.Model.CreatePredictionEngine<TaxiTrip, TaxiTripFarePrediction>(model); var p = engine.Predict(trip);`"
      - "`mlContext.Regression.Predict(model, trip)`"
      - "`model.Transform(trip)`"
    correct: 1
    rationale: "`ITransformer` has no `Predict` method — you wrap it in a `PredictionEngine<TIn, TOut>` for single-row inference. Option A is a fabrication. Option C fabricates a static Predict on the regression catalog, which doesn't exist. Option D (`Transform`) takes an `IDataView` (collection), not a single object — wrong for per-row inference. For batch inference you'd use `model.Transform(dataView)`, returning an `IDataView` with prediction columns appended."
    source: "research-mlnet.md §Code Patterns"
    bloom: apply

  - id: mq-mlnet-07
    type: MCQ
    topic: "ML.NET AutoML CLI"
    marks: 1
    question: "What does `mlnet regression --dataset train.csv --label-col 6 --train-time 60` do?"
    choices:
      - "Trains exactly one model using FastTree for 60 seconds"
      - "Converts the CSV into a binary ML.NET model file"
      - "Explores dozens of regression algorithms and hyperparameter combinations for 60 seconds, returning top-5 models"
      - "Starts a web service on port 6000"
    correct: 2
    rationale: "AutoML's CLI tries many algorithm/hyperparameter combinations within the time budget and ranks the results. Option A describes manual training, not AutoML. Option B invents CSV-to-model conversion — the CLI emits a full console project plus model. Option D confuses the `--train-time` flag (seconds) with a port number. The flag's unit is seconds; larger values explore more combinations at diminishing returns."
    source: "notes/ML.NET_vscode_automl_SCRIPT.docx; research-mlnet.md §AutoML"
    bloom: understand

  - id: mq-mlnet-08
    type: MCQ
    topic: "ML.NET Label column"
    marks: 1
    question: "What is the purpose of `mlContext.Transforms.CopyColumns(outputColumnName: \"Label\", inputColumnName: \"FareAmount\")` at the start of a regression pipeline?"
    choices:
      - "To validate the CSV column count"
      - "To rename the target column to `\"Label\"` — the name regression trainers look for"
      - "To remove the target column from the feature set"
      - "To convert numeric data to categorical"
    correct: 1
    rationale: "Regression trainers look up the target column by the literal name `\"Label\"`. If your CSV class has the target as `FareAmount`, you must rename it first — CopyColumns is the tool. Option A invents a validation role. Option C describes the inverse effect — CopyColumns leaves both columns present; it's actually Concatenate's job to pick which ones become features. Option D confuses CopyColumns with OneHotEncoding."
    source: "research-mlnet.md §Complete ML.NET Workflow"
    bloom: apply

  - id: mq-mlnet-09
    type: MCQ
    topic: "ML.NET column indexing"
    marks: 1
    question: "Your CSV has columns `VendorId`, `PassengerCount`, `Distance`, `FareAmount` in that order. Which attribute marks `FareAmount` correctly for loading?"
    choices:
      - "`[LoadColumn(\"FareAmount\")]`"
      - "`[LoadColumn(3)]`"
      - "`[LoadColumn(4)]`"
      - "`[Column(3)]`"
    correct: 1
    rationale: "`[LoadColumn(N)]` is 0-based — `FareAmount` is the 4th column, index 3. Option A fabricates a string-named overload; `LoadColumn` takes a 0-based integer index (or a range). Option C is off-by-one (treating the columns as 1-based). Option D uses `[Column]`, which is a different older attribute with incompatible semantics."
    source: "research-mlnet.md §Column Mapping"
    bloom: apply

  - id: mq-mlnet-10
    type: MCQ
    topic: "ML.NET Save / Load schema"
    marks: 1
    question: "A teammate writes `mlContext.Model.Save(model, null, \"model.zip\")`. The call compiles. What breaks and when?"
    choices:
      - "Compilation fails — `null` isn't allowed"
      - "Loading fails at runtime — the saved model is missing its schema and `PredictionEngine` cannot bind inputs"
      - "Saving succeeds; no downstream effects"
      - "The file is encrypted and unreadable"
    correct: 1
    rationale: "The `DataViewSchema` argument carries column-name and type metadata. Passing `null` skips that, so the saved ZIP has the weights but no shape info. `Load` succeeds but the returned ITransformer can't be bound to a `PredictionEngine<TIn, TOut>` correctly because the column-name mapping is lost. Option A is false — the compiler accepts null. Option C is the dangerous misconception — the save appears to work. Option D invents encryption behavior."
    source: "research-mlnet.md §Persistence"
    bloom: analyze

  - id: mq-mlnet-11
    type: MCQ
    topic: "ML.NET namespace selection"
    marks: 1
    question: "You want to evaluate a regression model. Which namespace's `Evaluate` method do you call?"
    choices:
      - "`mlContext.BinaryClassification.Evaluate(...)`"
      - "`mlContext.Regression.Evaluate(...)`"
      - "`mlContext.MulticlassClassification.Evaluate(...)`"
      - "`mlContext.Clustering.Evaluate(...)`"
    correct: 1
    rationale: "Each ML task has its own Evaluate that returns task-specific metrics (`RegressionMetrics`, `BinaryClassificationMetrics`, etc.). Using the wrong one either throws or returns metrics that don't match your problem (e.g. Classification returns `Accuracy`, which is meaningless for regression). Regression has RSquared and RMSE; BinaryClassification has Accuracy/Precision/Recall; MulticlassClassification has MacroAccuracy and Log-Loss; Clustering has Davies-Bouldin Index. Pick based on the task."
    source: "research-mlnet.md §Exam Traps trap 4"
    bloom: apply

  # ============================================================
  # Cache/Redis bucket — 8 questions (8 marks of 80)
