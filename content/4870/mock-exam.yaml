    correct: 1
    rationale: "`AddLocalization` registers `IStringLocalizer<T>` and `IHtmlLocalizer<T>` but NOT `IViewLocalizer`. The view-scoped localizer requires `AddViewLocalization()` on the MVC or Razor Pages builder. Option A invents an attribute. Option C is false — a missing .resx doesn't throw; it returns the key itself. Option D is false — the folder comes from `ResourcesPath`, with a default value that works regardless of whether the folder exists."
