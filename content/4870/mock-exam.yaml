  - id: mq-report-02
    type: MCQ
    topic: "PDF MemoryStream rewind"
    marks: 1
    question: "Your iText 7 handler constructs a `PdfWriter(ms)` â†’ `PdfDocument` â†’ `Document`, adds content, calls `document.Close()`, then returns `new FileStreamResult(ms, \"application/pdf\")`. Users download zero-byte files. What is missing?"
    choices:
      - "Adding `await` before `document.Close()`"
      - "Setting `ms.Position = 0` after `document.Close()` and before constructing `FileStreamResult`"
      - "Calling `writer.Flush()` before `Close`"
      - "Passing `PageSize.A4` to `PdfDocument`"
    correct: 1
    rationale: "`PdfWriter` advances `MemoryStream.Position` to the end. `FileStreamResult` reads from current position to end â€” zero bytes. Always `ms.Position = 0` before returning, or use `File(ms.ToArray(), \"application/pdf\", \"name.pdf\")` which is position-insensitive."
    source: "Labs/w13/FifaWorldCup/Pages/PdfReport.cshtml.cs"
    bloom: analyze
