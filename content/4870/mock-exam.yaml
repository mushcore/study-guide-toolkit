  - id: mq-cache-03
    type: MCQ
    topic: "Absolute vs sliding expiry"
    marks: 1
    question: "Entry never accessed after set. `AbsoluteExpiration=+50s`, `SlidingExpiration=+20s`. Expires when?"
    choices:
      - "t+50s"
      - "t+20s — sliding fires first since no access"
      - "Never — Priority not set"
      - "Immediately — options conflict"
      - "t+70s — options sum together"
    correct: 1
    rationale: "Expires at `min(absolute, idle+sliding)`. No access → sliding at t+20 fires first. Accessed at t+15 → sliding resets; absolute at t+50 wins."
    source: "code-examples/20260330_DataCacheDemo/DataCacheDemo/Pages/Index.cshtml.cs"
    bloom: analyze

  - id: mq-cache-04
    type: MCQ
    topic: "CacheItemPriority semantics"
    marks: 1
    question: "`CacheItemPriority.Low` means what?"
    choices:
      - "Entry expires sooner than `Normal`"
      - "Entry evicted first under memory pressure"
      - "Entry stored on disk"
      - "Entry visible to admins only"
      - "Entry skipped during cache warm-up"
    correct: 1
    rationale: "Priority controls EVICTION ORDER under memory pressure, not TTL. `Low` with 1-hour absolute still lives 1 hour unless pressure forces eviction."
    source: "code-examples/20260330_DataCacheDemo/DataCacheDemo/Pages/Index.cshtml.cs"
    bloom: understand

