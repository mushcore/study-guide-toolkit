    topic: "GetOrSetAsync on miss"
    marks: 1
    question: "`GetOrSetAsync<T>` on cache MISS — what happens?"
    choices:
      - "Throws `KeyNotFoundException`"
      - "Invokes factory, stores result as JSON bytes via `SetAsync`, returns value"
      - "Returns `default(T)` immediately"
      - "Re-runs DB query on every call regardless"
      - "Returns `default(T)`, schedules async background refresh"
    correct: 1
    rationale: "Miss → `await factory()` → if non-null `await cache.SetAsync<T>(key, value, options)` → return. `SetAsync` serializes to JSON bytes via `Encoding.UTF8.GetBytes(JsonSerializer.Serialize(...))`."
    source: "code-examples/20260330_WebApiFIFA_REDIS_Final/WebApiFIFA_REDIS_Final/Models/DistributedCacheExtensions.cs"
    bloom: understand

