    question: "Setting only `Thread.CurrentCulture = new CultureInfo(\"fr-FR\")` (and not `CurrentUICulture`) produces what behavior?"
    choices:
      - "Everything localizes normally"
      - "Numbers and dates render in French format, but UI strings stay in the default language"
      - "UI strings translate to French, but numbers stay in default format"
      - "An exception on the next request"
    correct: 1
    rationale: "CurrentCulture controls formatting (ToString on dates/numbers). CurrentUICulture controls which .resx loads. Set only the first and your numbers are French but your labels are English. `UseRequestLocalization()` middleware normally sets both from the detected culture. Option A misses the half-configuration failure. Option C reverses the two properties. Option D invents an exception that doesn't occur."
    source: "research-localization.md §2"
    bloom: analyze

  - id: mq-loc-03
    type: MCQ
    topic: "Culture provider order"
    marks: 1
    question: "In which order do the default culture providers run?"
    choices:
      - "AcceptLanguageHeader → Cookie → QueryString"
      - "QueryString → Cookie → AcceptLanguageHeader"
      - "Cookie → QueryString → AcceptLanguageHeader"
      - "All providers run in parallel; the response of the slowest one wins"
    correct: 1
    rationale: "QueryString first (highest priority; useful for testing and deep links), then Cookie (persistent user selection), then AcceptLanguageHeader (browser default). First match wins. Option A inverts the order — the header would dominate, defeating in-app selectors. Option C swaps the first two. Option D fabricates parallelism; middleware runs providers serially, first match wins."
    source: "research-localization.md §4"
    bloom: remember

