  - id: mq-cache-02
    type: MCQ
    topic: "IMemoryCache lookup pattern"
    marks: 1
    question: "Which pattern does DataCacheDemo use to check-then-fetch with `IMemoryCache`?"
    choices:
      - "`var p = _cache.GetOrCreateAsync(key, factory);`"
      - "`if (!_cache.TryGetValue(key, out Product[]? products)) { products = await fetch(); _cache.Set(key, products, options); }`"
      - "`_cache.Read(key) ?? await fetch();`"
