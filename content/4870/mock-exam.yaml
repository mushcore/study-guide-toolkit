    marks: 1
    question: "iText 7 handler returns zero-byte PDF. What is missing?"
    choices:
      - "`await` before `document.Close()`"
      - "`ms.Position = 0` after `document.Close()` and before `FileStreamResult`"
      - "`writer.Flush()` before `Close`"
      - "`PageSize.A4` to `PdfDocument`"
      - "Disposing `PdfDocument` before writing to stream"
    correct: 1
    rationale: "`PdfWriter` advances `MemoryStream.Position` to end. `FileStreamResult` reads from current position — zero bytes. Fix: `ms.Position = 0` before returning, or use `File(ms.ToArray(), ...)` which is position-insensitive."
