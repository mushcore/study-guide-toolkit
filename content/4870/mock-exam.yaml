  - id: mq-ai-09
    type: MCQ
    topic: "MAF tool invocation semantics"
    marks: 1
    question: "An MAF agent has three registered tools. When you call `agent.RunAsync(input, session)`, what happens?"
    choices:
      - "All three tools execute in sequence"
