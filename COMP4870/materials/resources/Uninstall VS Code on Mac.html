<!DOCTYPE html>
<html><head></head><body style="color: rgb(32, 33, 34); font-family: undefined;"><p>This worked for me ( VS Code 1.30 with MacOS - High Sierra 10.13.6 )</p>
<p><strong>Step 1:</strong></p>
<p>Close VS Code<br><br><strong>Step 2:</strong></p>
<p><span style="font-family: 'courier new', courier, sans-serif;">rm -rf $HOME/Library/Application\ Support/Code</span><br><br><strong>Step 3:</strong></p>

<p>Remove VSCode from application<br><br><strong>Step5:</strong></p>
<p>Reinstall VS Code if needed</p></body></html>
